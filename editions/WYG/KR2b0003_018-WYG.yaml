body:
  text: 前漢紀卷十八漢荀恱撰孝宣二四年春正月封故鄼侯曽孫建世為侯詔民有大父母父母喪勿徭事夏五月山陽濟隂雹如雞子地深一尺五寸殺二十餘人飛鳥皆死詔曰自今子首匿父母妻匿夫孫匿大父母皆勿治其父母匿子夫匿妻大父母匿孫罪殊死以下皆詣廷尉以聞立廣川惠王孫文為廣川王秋七月大司馬霍禹謀反誅初霍氏酖殺許后事頗漏泄而未察上乃徙霍氏諸女婿在内及為將校者皆為郡守更以禹為大司馬罷其屯兵霍氏由是恐懼而顯乃以許后事告禹等禹等驚恐曰縣官所以斥逐諸女壻必以是故也霍雲所親張放謂雲曰可令太夫人言於太后先殺丞相及平恩侯移徙陛下在太后耳男子張章告之事下廷尉執金吾捕霍山及張放等後有詔勿捕山等愈恐曰惡端已見之久猶未彂彂即族我矣不如先之遂謀反令太后為博平君置酒召丞相平恩侯因令其女壻光禄勲范明友等承太后制引斬丞相平恩侯因廢帝而立禹㑹彂覺雲山明友等自殺禹具五刑顯腰斬先是禹夢見第門皆壊有人彂第端門屋瓦投之地就視之則不見先是茂陵徐福上疏曰霍氏太盛陛下即愛厚之宜以時抑制無令亡書三上輒不報聞霍氏既誅而告霍氏反者金安上等五人皆封侯或為徐生上書曰臣聞客有過主人者見其竈直突旁有積薪客曰更為曲突逺徙其薪不者恐有火患主人不聼俄而其家失火鄰人救之幸而得息於是殺牛置酒謝其鄰灼爛者在上其餘以功次坐而言曲突者不得與焉或謂主人曰向使聼客之言不費牛酒終無火患今論功請客不及曲突徙薪曲突徙薪反無恩澤燋頭爛額復為上客邪主人乃悟而請之向使徐福之言早行國無列土之費而臣無逆亂之敗矣上乃賜福帛千匹以為郎中初禹與張安世長子千秋俱為郎中將兵従撃匈奴還霍光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能對光由是賢千秋以禹為不才乃歎曰霍氏世衰而張氏興矣八月己酉皇后霍氏廢處昭臺宫九月詔曰今繋者或以掠辜若饑寒凍死獄中何為用心逆人道也朕甚痛之其令郡國歳上繋囚以笞掠若瘐死者所坐名縣爵里丞相御史課殿冣以聞十有二月清河王廷年有罪廢遷房陵渤海太守龔遂以治民有績徴先是渤海左右數郡歳饑盜賊並起二千石不能禁遂以選為太守時年七十餘形貌短小上望而心輕之問遂曰渤海擾亂將何以息其盜賊遂對曰渤海遐逺不沾聖化其民困於饑寒而吏不䘏故使陛下赤子盜弄陛下之兵於潢池中爾今欲使臣勝之邪将安之邪上聞遂對甚恱曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂絲不可急也唯緩之然後可治臣願陛下詔丞相御史且勿拘臣以文法得一切以便宜行事上許之加賜黄金未至郡郡界遣兵以迎遂遂於是移書罷追捕盜賊吏民諸持鉏鉤田器皆為良民吏無得問持兵者乃為盜賊悉遣迎兵還單車至府郡中翕然盜亦皆罷又刧掠者聞教令即時解散皆持鉏鉤於是郡内悉平民安土樂業乃開倉廪假貸貧民選用良吏慰安牧養焉齊俗奢侈好為末技不作田種遂乃躬率以節約使民賣刀劒買牛犢曰何為帶牛而佩犢乎勸民農桑課民収斂數年之間民皆富足而獄訟息止上徴遂到將見議曹掾王生謂遂曰天子即問君何以為理者君宜曰皆聖主之徳非小臣之力也上嘉其言有讓歎曰君安得長者之言而稱之也遂對曰議曹掾教戒臣上拜遂為水衡都尉而王生為水衡丞以褒顯遂元康元年春正月龜兹王及其夫人来朝龜兹夫人即烏孫公主女也自以得尚漢外孫故請朝上納之贈賜甚厚焉號夫人曰公主龜兹王樂漢衣服制度歸國治宫室作徼道周衛出入𫝊呼撞鐘鼔如漢家儀外國為之語曰驢非驢馬非馬龜兹王所謂騾也以杜陵東原上為初陵更名杜縣為杜陵徙丞相將軍列侯吏二千石貲百萬者於杜陵鳳皇集太山陳留甘露降於未央宫三月赦天下徒賜吏民勤事者爵鰥寡孤獨帛夏五月立皇考廟益奉明園百戸為奉明縣有司奏言禮父為士子為天子祭以天子悼考園宜稱尊號曰皇考立廟置縣尊戾夫人曰戾太后置園廟奉邑益戾園各滿三百家復髙祖功臣絳侯周勃等三十六人子孫世世勿絶嗣其無適後者復其次秋八月詔舉通文學者冬置建章衛尉二年春正月詔曰書曰文王作罰刑兹無赦今吏修身奉法未能有稱朕甚憫焉其赦天下厲精更始二月乙丑立皇后王氏賜丞相已下至郎従官錢帛各有差王氏之先有功於髙祖賜爵闗内侯至王皇后父奉光上在民間時與相識有女當適人夫輒死及上即位乃納之後宫為婕妤是時諸愛寵婕妤皆有子上懲霍后之欲鴆太子也以王婕妤無子有寵乃立之以母養太子封父奉光為卬城侯夏五月詔曰吏用法式或以心巧析律二端深淺不平増辭飾非以成其罪奏不如實上無由得知或擅興徭役飾㕑𫝊稱過客越職逾法以取名譽二千石皆察官屬勿用此人今民頗被疾疫之災其令郡國被災甚者無出今年租詔曰聞古者天子之名難知而易諱而今百姓多上書觸諱以犯罪朕甚憐之其改諱諸觸諱在令前赦之冬京兆尹趙廣漢有罪腰斬廣漢字子都涿郡人也坐殺人不辜丞相按驗之廣漢疑丞相夫人殺侍婢以此脅丞相丞相按之甚急廣漢乃將吏突之丞相府召其夫人跪堂下収奴婢十餘人考問其事丞相上書自陳曰妻實不殺婢婢有過自殺耳丞相司直劾奏廣漢摧辱大臣欲以劫持奉公不道上乃下廣漢廷尉獄又坐賊殺不辜罪吏民守闕號泣者數萬人初廣漢為京兆尹亷明抑强扶弱小民得職而吏士盡心其盜賊姦邪纖㣲皆知之長安少年數人㑹窮里空舎謀欲劫人語未及竟廣漢知之使吏捕治之具伏富人蘇回為郎二人私劫質之有頃廣漢至曉賊曰釋質束手善相遇幸逢赦賊驚愕即出叩頭廣漢為跪謝曰幸全活郎甚厚遂送獄勅吏謹遇之給酒肉冬當斷預為調棺斂具皆曰死無所恨矣廣漢甞召湖都亭長湖亭長西經界上界上亭長戲曰為我通問趙君湖亭長至廣漢曰界上亭長謝我何故不為致問其摘姦彂伏如神皆此類也廣漢奏令長安游徼獄吏秩百石其後百石吏皆差自重不敢枉法京兆清正長老稱之以漢興京兆尹無及廣漢者百姓追思而歌之初為潁川太守誅大姓首惡郡中震慄一切治理威名流聞匈奴及匈奴降者言匈奴中皆聞廣漢然好用新進少年率多果敢之計侵犯貴戚大臣卒以此敗焉車師王烏貴靡初和於匈奴後降漢又恐匈奴攻之懼而奔烏孫漢使者鄭吉田於渠黎乃迎車師王妻子𫝊送長安賞賜甚厚四夷朝㑹常尊顯而示之乃立車師太子軍宿為車師王徙居渠黎而吉等田車師故地匈奴爭之而攻漢屯田者趙充國等議欲因匈奴衰弱出兵撃之丞相諫曰臣聞救亂誅暴謂之義兵兵義者王敵加於己不得已而應之者謂之應兵兵應者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地寳貨者謂之貪兵兵貪者破恃國家之大矜人民之衆欲見威於敵者謂之驕兵兵驕者滅此非但人事乃天道也自頃匈奴常有善意所得漢民輒奉歸之未有犯於邊境雖爭田車師故地不足以置意中今諸將軍欲興兵入奪其地臣愚不知此兵欲何名也今邊境困乏難以動兵軍旅之後必有凶年言民以愁苦之氣傷隂陽之和也兵出雖勝必有後憂今郡國守相率多不精選風俗尤薄水旱不時郡國盜賊緐多今左右不憂乃欲彂兵報纖微之忿於逺夷此乃所謂季孫之憂不在顓臾而在蕭牆之内也上乃棄車師之地丞相又奏言古有羲和之官以承四時之節以敬授人時人君動静奉順隂陽則和氣應而災害不生自髙皇帝時有主四時之官臣願陛下選用明經通知隂陽者四人各主一時明言所職以順隂陽上従之丞相勅掾吏案事郡國若休告還府輒白四方得失異聞盜賊災變輒奏言之以廣視聼是歳烏孫昆彌上書願以漢外孫楚公主子元貴靡為嗣得復尚漢公主上以楚公主弟子相夫妻之送至燉煌聞烏孫昆彌死元貴靡不得立乃還楚公主侍者馮嫽常持節為漢公主使外國外國敬信之號曰馮夫人上乃徴馮夫人問烏孫状而遣謁者送馮夫人軺車持節詔昆彌烏孫就屠以為小昆彌而立元貴靡為大昆彌兩昆彌之號自此始也三年春神雀集泰山有鳥五色以萬數飛過京師翺翔屬縣賜諸侯王將軍列侯二千石金郎従官帛各有差賜天下吏民爵鰥寡孤獨髙年帛三月詔曰葢聞象有罪而舜封之有庳骨肉之親放而不誅其封故昌邑王賀為海昬侯又曰御史大夫邴吉中郎將史曾史𤣥長樂衛尉許舜侍中光禄大夫許延夀皆與朕有舊恩故掖廷令張賀輔導朕躬厥功茂矣詩不云乎無徳不報其封賀子侍中中郎彭祖為陽都侯追諡賀為哀侯吉曽𤣥舜延夀皆列侯故人及郡邸獄復作甞有阿保之功者皆以差受禄賜是時掖宫婢名則令民夫上書自陳甞有阿保之功下掖廷令問則則辭引御史大夫邴吉知狀吉識之謂則曰汝甞坐養皇孫不謹督笞之安得有功獨渭城胡組淮陽郭徴卿有恩耳詔求組徴卿皆已死有子孫皆受厚賞免則為庶人賜錢十萬上見具問則乃知吉有舊恩賢其不言會􅁻病篤封吉為博陽侯就加印綬及其生存也太子太傅夏侯勝曰臣聞有隂徳者必饗其樂以及子孫今者吉未獲報而病甚非其死疾也後吉瘳上書固辭封上不聼又杜陵陳遂字長子上微時與上游戲博奕數負遂上即位稍見進用至太原太守乃賜遂璽書曰制詔太原太守官尊禄重可以償遂博負矣妻君寧時在旁知狀遂乃上書謝恩曰事在元平元年赦前其見厚如此元帝時遂為京兆尹後至廷尉遂孫遵字孟公以好賔客著名身長八尺餘容貌甚偉貴戚豪傑咸敬重之所在輻輳莫不震動為河南太守作私書與京師故人召善書吏十人於前遵憑几口授與書吏且省官事書數百封親踈各有意氣河南人大驚性善書與人尺牘莫不藏之以為榮然好酒奢放不拘禮度與張敞之孫張竦字伯松相善而竦好學問節約自守並著名字仕宦相及遵謂竦曰足下苦身自約而我放意自恣官爵功名不減於子而我獨差樂顧不優邪竦曰人各有長短子欲學我亦不能吾欲效子亦敗矣夏六月立皇子欽為淮陽王欽者張婕妤之子也好經學法律聦逹有才上甚愛之而張婕妤最幸有寵上有意欲立張婕妤子欽然以太子起於細㣲上少年依許氏及即位而許后已殺死故不忍廢也是歳皇太子冠既學通論語孝經太傅疎廣謂少傅受曰吾聞知足不辱知止不殆功成名遂而身退天之道也即日廣受俱謝病上疏乞骸骨上以其年老皆許之賜黄金各二十斤而皇太子贈以金五十斤公卿大夫故人邑子為祖道於東都門外送者車數百輛及道路觀者莫不歎息皆曰賢哉二大夫廣受既歸東海令其家供酒食諸族人鄉里相與娯樂數問其家金盡未昆弟諸老謂宜為子頗立産業廣曰吾自有舊田廬子孫勤力於中足以供衣食今復増益之但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者人之所怨吾既無以教化其子孫不欲益其過而生其怨又此金者聖主所以惠老臣也故樂與其鄊黨宗族共受其賜以盡吾餘日不亦可乎於是宗正陽成侯劉徳者辟彊之子也亦抑損自守家産不過百金餘與昆弟賔客終不積財霍光秉政欲以女妻徳徳不敢娶畏盛滿也好黄老術有智略少時數召見武帝謂之千里駒徳治淮南獄盡得淮南秘書徳小子向字子政幼而誦習之以為竒奏言黄金可成上令向典尚方鑄作事費金甚多不驗向坐偽鑄黄金下獄當死徳上書訟向有司奏徳訟子罪失大臣之體㑹徳病卒上亦竒向有才得減死論後立穀梁春秋上因令向受穀梁春秋𫝊與諸儒講五經於石渠拜郎中給事黄門遷諫議大夫給事中向後為宗正向為人簡易無威儀亷清樂道不交接世俗専精思於經術晝讀書𫝊夜觀天文或不寢達旦四年春正月詔曰朕惟耋老之人髪齒墮落血氣衰㣲亦無暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以来諸年八十以上非誣告殺傷人他皆勿坐遣太中大夫李彊等十二人循行天下存問孤寡觀風俗察吏治得失舉茂才異倫之士二月河東霍徴史等謀反誅三月詔曰乃者神雀五采以萬數集長樂未央北宫髙寢甘泉泰畤殿中及上林苑朕之不逮寡于徳厚屢獲嘉祥非朕之任其賜天下吏民爵三老孝弟力田鰥寡孤獨帛各有差八月賜功臣適後黄金人二千斤賜故右扶風尹翁歸子黄金百斤以奉其祭祀翁歸字子兄甚清潔語不及私温良謙退不以行能驕人然任刑威京師畏之其姦邪游俠皆有名籍盜賊彂其比伍輒使以類推迹其所過抵率常如其言初田延年為河東太守召見故吏五六十人令有文者東有武者西翁歸獨伏不肯起對曰文武兼備惟所施設延年乃與語大竒之自以為不及後舉㢘為𢎞農都尉拜東海守過辭廷尉于定國欲以邑子二人嘱託且令坐後堂待見及與翁歸語終日不敢見之已而謂其邑子曰此賢將汝不任事也且不可干以私丙寅大司馬衛將軍張安世薨安世以大司馬領尚書事職典樞機謹慎周密每定大政已决輒稱病出聞有詔令乃大驚使吏之丞相府問焉自朝廷大臣莫知其預議也常有所薦其人来謝安世安世大恨之以為舉能達賢豈有私謝邪後絶不通有郎功髙不調自言安世安世曰以君之功髙明主所知絶不許已而郎果自遷幕府長史或謂安世曰將軍為明主股肱而士無所進議者以為譏安世曰明主在上賢不肖較然人臣自修而已安知士而薦之其匿名迹逺權勢皆如此然安世家僮七百人各有技巧積累纖㣲故能殖其貨富將擬過霍氏然身衣弋綈夫人紡績車服甚節安世薨子延夀為嗣自以身無功徳何以乆堪先人大國數上書讓減戸邑又因従弟陽都侯彭祖口陳至誠彭祖初上㣲時與同硯席讀書上親之上以延夀為有讓乃徙封平原侯戸口如故租稅減半遣使至烏孫求車師前王是歳車師王烏貴靡自烏孫至賜第舍令與妻子居是時比年豐嘉穀𤣥稷降於郡國金芝九莖産於函徳殿銅池中九真獻竒獸南郡獲白虎獻其皮骨𤓰牙神雀仍集前漢紀卷十八
