body:
  text: 前漢紀卷九漢荀悦撰孝景皇帝丁未即位秋九月有星孛于西方其本值尾箕末至牽牛及天漢十六日不見元年冬十月詔曰蓋聞古者祖有功而宗有徳孝文皇帝徳厚侔於天地利澤施四海而廟樂不稱朕甚懼焉其奏昭徳四時之舞丞相嘉等奏尊孝文廟為太宗奏昭徳四時之舞令郡國皆立太宗廟四時舞孝文所作以明天下之安和夏四月御史大夫陶青使匈奴結和親五月令民田收半租太中大夫任城周仁為郎中令仁為人陰重不泄衣敝不飾甚見親信上自幸其家者再賞賜甚厚仁常固讓諸侯羣臣贈遺無所受二年冬十二月有星孛于西南令天下男子年二十始賦春三月立皇子徳為河間王閼為臨江王餘為淮陽王非為汝南王彭祖為廣川王發為長沙王夏四月壬午太皇太后崩六月丞相申屠嘉薨時内史鼂錯貴幸穿太上皇廟壖垣為舍門嘉奏請誅錯自歸上上曰此非真廟垣又我使為之錯無罪嘉曰悔不先誅錯為所賣遂歐血而死嘉為人廉直初鄧通侍文帝有慢嘉曰朝廷之禮不可不肅文帝曰君勿言吾私之罷朝嘉檄召通通恐入言文帝帝曰若往吾今召若通至嘉責之曰朝廷者乃髙皇帝之朝廷通小臣乃敢戲殿上大不敬當斬通頓首出血不赦文帝使使持節召通謝丞相曰此吾弄臣也君釋之通乃得免秋八月丁巳御史大夫陶青為丞相左内史鼂錯為御史大夫封蕭何曽孫嘉為列侯先是嘉兄則有罪失侯梁王來朝上與讌飲太后前上從容言萬嵗之後傳於王詹事竇嬰者太后從兄子進曰天下者髙帝之天下父子相傳漢之法矣陛下何得傳梁王太后怒絶嬰屬籍遂免官匈奴和親三年冬十月膠東下密人年七十餘生角角有毛本志曰老人吳王象也年七十七國象也人不當生角猶諸侯不當舉兵向京師七國將反之應也十有一月白項烏與黑項鳥共鬭楚國苦縣白項鳥不勝墮泗水中死者過半十有二月吳城門自傾大船自覆本志以為金沴木也吳地以船為家天戒若曰國家將傾覆矣春正月淮陽王正殿災呉王濞膠西王卬楚王戊趙王遂濟南王辟光淄川王賢膠東王熊渠皆謀反初上為太子時吳王太子入朝與上博爭道無禮於上上以博局擲之而死送喪至吳吳王怒曰天下一家何必來葬復遣還長安後稱疾不朝陰懷逆謀時齊人鄒陽淮陰人枚乗皆遊吳乗諫曰夫以一縷之絲系千鈞之重上懸無極之髙下埀不測之湥雖至愚之人猶知其絶矣以君所為危於累卵難於上天若變所為易於反掌安於太山今欲極天命之壽弊無窮之樂終萬乗之權不出反掌之易以居太山之安而欲乗累卵之危走上天之難此愚臣之所大惑也陽亦數諫吳王不聽乗陽皆去遊梁鼂錯説上曰吳王驕恣陰有逆謀今削之亦反不削亦反削之其反疾而禍小不削則其反遲而禍大於是楚趙有罪先削吳王恐禍及身已為使者自見膠西王合謀發使約諸侯七國同謀南使南越北連匈奴吳王下令國中曰寡人年六十二身自將小兒年十四亦為士卒先諸君年上與寡人同下與小兒等皆發移書郡國曰漢賊臣鼂錯侵奪諸侯地陛下多疾志逸不能省察欲舉兵誅之敝國雖小精兵可得五十萬人南越分其卒半以隨寡人寡人又得三十萬趙王固與胡王有約寡人節衣食積金錢修甲兵聚糧食夜以繼日至今三十餘年寡人金錢布天下諸侯王日用之不能盡今人有能得大將者賜金五千斤封邑萬户以城邑降者封萬户若率萬人降者如大將軍科他皆以差受爵吳楚反書上聞鼂錯議欲令上自將兵身留居守計未定錯素與袁盎有郄錯言盎前為吳相宜知王謀而蔽匿不言使至於是欲請治盎計未定盎密聞之乃夜告竇嬰因求見上言吳所以反故錯方與上調兵食上問盎盎對曰吳王無能為也上曰吳王即山鑄錢煮海為鹽誘天下豪傑白頭舉事何以言吳無能為也盎對曰吳王銅鹽之利則有之安得豪傑而誘之吳王若得豪傑亦將轉而為義則不反矣吳之所誘者無頼子弟亾命鑄錢姦人故相誘以反錯曰盎筴之善上問計將安出盎曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東廂意甚恨盎對曰吳楚言鼂錯擅削諸侯地故先共誅錯復其故地而罷兵今計獨有斬錯發使使吳楚七國赦其罪復其故地則兵可無血刃而俱罷上黙然良乆遂從其計斬錯東市拜盎為太常使使至吳吳王曰吾欲為東帝矣即劫盎使為將盎不聽使一都尉以五百人圍守盎欲殺之初盎為吳相時從吏私盜姦盎侍婢吏懼走而盎馳自追之遂以侍婢賜之及見拘從吏適在守盎校為司馬乃夜與盎俱亾而還枚乗獻書諫吳王曰昔秦西舉胡戎之難北備榆中之關南距羌笮之塞東當六國之鋒六國乗信陵之藉明蘇秦之要厲荆軻之威并力一心以僃秦然卒滅六國而并天下何則地利不同而民輕重不等也今漢據全秦之地兼六國之衆修戎狄之義而南朝羌笮此其地與秦地相什而民相百大王所明知也今夫佞諛之臣不論骨肉之義民之輕重國之大小以為吳禍此臣所以為大王患也夫舉吳兵以資於漢譬猶蠅蚋之附羣牛腐肉之齒利劒鋒刃始接則無事矣天下聞吳率失職諸侯責先帝之遺詔今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武矣夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國此臣之所為大王樂也今大王還兵疾歸可十得其半不然漢知吳有吞天下之心赫然加怒羽林黄頭循江而下襲大王之都虜東海之地絶吳餉道梁王飾車騎習戰射積粟固守以逼滎陽待吳之饑大王雖欲反都亦不得已今大王去千里之國而制於十里之内張韓將北地弓髙宿左右兵不得下壁軍不得休息臣竊哀之吳王不聽二月辛巳朔日有食之邯鄲有狗與豕交本志以為趙王悖亂失類外交匈奴似犬豕之行也絳侯周勃子亞夫為太尉將三十六軍擊吳楚竇嬰為大將軍賜金五十斤嬰陳金廡下軍吏過輒令取為用金無入家者嬰屯兵滎陽曲周侯酈寄擊趙將軍欒布擊齊太尉至霸上趙涉以布衣遮道説太尉曰吳楚聞將軍出兵必置伏兵姦人於崤澠阨塞之間且兵事尚神密將軍何不從此右關去趣藍田出武關指洛陽不過差一二日直入武庫擊􅢎鳴鼓諸侯聞之以將軍從天降而下也亞夫從之已而使之搜崤澠間果得吳伏兵乃請涉為護軍亞夫既至洛陽見劇孟喜曰七國舉事而不用孟吾知其無能為也孟者洛陽人為任俠行似魯朱家亞夫問故父客鄧都尉計策安出對曰吳楚兵鋭甚難與爭鋒莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍湥溝髙壘勿與戰使輕兵絶淮泗之口㫁吳餉道使呉梁相弊而糧食竭以全制其虚吳必破矣從之吳攻梁梁王急請救亞夫亞夫不往梁王上書請救上詔亞夫救梁王亞夫不奉詔堅壁昌邑而使其淮泗口兵絶吳餉道楚乏糧挑戰亞夫終不出夜軍中驚而内相攻擊擾亂至於帳下亞夫堅卧不起有頃乃自定矣吳夜攻營壁東南亞夫使為備西北吳精兵果奔西北不得入呉楚既饑乏乃引兵去亞夫出精兵追擊大破之是時弓髙侯韓頽當為將軍擊吳楚功冠諸侯吳王棄軍與壯軍數千人亾走江南保丹徒遂奔越三月吳楚平越人斬吳王頭以降吳之圍梁也梁將張羽韓安國距之羽能力戰安國能持重故吳兵不能進楚王戊軍大敗自殺戊初與吳通謀大中大夫申公白公諫不聽胥靡之衣赭衣杵臼舂於市初魯有穆生及申公白公皆與元王俱學詩於浮丘伯浮丘伯者荀卿門人也元王常禮此三人穆生不飲酒常為設醴及王戊一朝失不設醴穆生將去申公白公止之曰不為先王乎穆生曰先王之禮吾三人者為道之存也今而忽之是亾道亾道之君胡可與乆處易稱知幾其神乎不去楚人將鉗我於市遂謝病而去申公白公獨留故及於難膠東膠西濟南淄川趙王皆伏誅徙廣川王為趙王初七國反連齊齊王城守留濟南膠東淄川三國兵共圍齊齊王使路中大夫使於天子天子令還報齊堅守路中大夫還三國將劫而與之盟令反其言曰吳已破漢矣大夫既許至城下望見齊王言漢發兵百萬使太尉擊破吳楚方引兵救齊必堅守三國之兵殺之齊被圍急陰與三國約未定㑹路中大夫至復堅守漢將聞齊初有謀欲擊齊齊王將閭懼自殺上以齊迫脅非其罪乃立其太子壽為齊王濟北王志亦初與諸侯通謀後乃堅守聞齊王自殺而得立嗣志亦欲自殺齊人公孫玃止之因為説梁王曰夫濟北之地東接彊齊南當吳越北脅燕趙此四分五裂之國權不足以自守勢不足以扞寇雖墜言於吳非其正計也昔鄭祭仲許宋人立公子突以全其君春秋賢之為其以生易死以存易亾嚮使濟北先見情實則呉必先屠濟北招燕趙而緫之如此山東之從結而無郄矣今呉楚之王練諸侯之兵驅徒衆而與天子爭衡濟北獨厲節堅守不下使呉失據而無助跬行而獨進瓦解土崩敗而無救者未必非濟北之力以區區之濟北而與諸侯爭彊是猶羔犢而扞虎狼也志守職不撓可謂誠一矣功議如此尚見疑於上願大王詳思惟之梁孝王悦馳以聞濟北王得不坐徙封於淄川徙衡山王為濟北王吳之反也衡山王勃堅守無二心故諡曰貞王徙廬江王賜為衡山王初吳楚使至淮南王欲發兵應之其相曰主必應之臣願為將王屬之兵相因守城而距呉楚㑹漢救兵至故淮南王得以完全初鼂錯改制削諸侯地錯父從潁川來諫止之錯曰不然社稷不安父曰劉氏安矣鼂氏危矣遂歸去之曰吾不忍見禍及其身乃服藥而死後十餘日呉楚反鼂氏族矣初謁者僕射鄧公以校尉擊呉楚還上書言軍事上問吳楚反聞鼂錯死兵罷否對曰吳楚為謀數十年發怒削地以誅錯為名其意不在錯也且鼂錯患諸侯彊大故請削之以安京師萬世之利計畫始行卒受大戮内杜忠臣之口外為諸侯復讎臣竊為陛下不取也上喟然長息曰公言善吾亦恨之夏六月立元王子平陸侯禮為楚王續元王後初諸侯得自除吏御史大夫已下官屬擬於天子國家唯置丞相黄金印自呉楚反之後奪諸侯權為置二千石去丞相曰相銀印其後唯得衣食租税而已貧或乗牛車時欒布有功封歙侯為燕相有治迹民為之立生祠立皇子端為膠西王勝為中山王賜民爵一級徙淮南王餘為魯王徙汝南王非為江都王王故呉國也非年十五有才氣吳之反也非上書請擊呉上賜非將軍印吳破以軍功封賜天子旌旗荀悦曰江都王賜天子旌旗過矣夫唯盛徳元功有天子之勲乃受異物則周公其人也凡功者有賞而已孔子曰必也正名乎唯器與名不可以假人人君之所司也夫名設於外實應於内事制於始志成於終故王者慎之四年春復置諸關用傳出入夏四月己巳立皇子榮為皇太子徹為膠東王六月赦天下賜民爵一級七月臨江王閼薨諡哀無子國除五年春正月作陽陵邑夏募民徙陽邑錢户二十萬遣公主妻匈奴單于六年冬十有二月雷雨霖秋九月皇后薄氏廢皇后薄太后兄女上為太子時太后取以配上無寵無子故廢梁王來朝上使乗輿馳駟馬逆梁王於闕下入則侍帝出則同輿梁王侍郎謁者著金貂出入天子殿門與漢官無異居其國驕僭營東苑方三百餘里廣睢陽城七十里得賜天子旌旗千乗萬騎出稱警入言蹕擬於天子珠玉寳器多於京師招延遊士四方竝至梁王親而有功太后少子愛之太后心欲以為漢嗣大臣袁盎等十餘人議於前不聽梁王怒之陰使人刺殺盎其餘人未得上疑梁王所為先是齊人公孫詭羊勝多竒邪計初見梁王梁王賜千金官至中尉號將軍常為王内謀上使使案梁捕勝詭勝詭等自殺上召故雲中太守田叔使案梁王具得其事還報曰陛下無以梁為事也今梁王不就誅是漢法不行也若其伏法太后食不甘味卧不安席此憂在陛下上善之以為魯相枚乗鄒陽數諫梁王不聽及梁王事急梁王賞陽千金令求方略士齊人王先生多竒計鄒陽往見之王先生曰必見王長君長君者王夫人兄也陽發悟於心遂見長君曰竊聞長君女弟幸於後宫而長君行迹多不順道理今梁事既窮竟梁王恐誅此太后怫鬱泣血無所發怒側目切齒於貴臣恐長君危於累卵長君誠為上言之得無竟梁事太后厚徳長君而長君之女弟幸於兩宮金城之固也昔舜之弟象日以殺舜為事而舜封之有庳仁人之於兄弟也不含怒不宿怨厚親愛而已魯公子慶父使僕人殺子般季友不揬其情而誅焉春秋以為失親親之道以此説天子僥倖梁事得不治長君曰敬諾入言之及梁内史韓安國亦因長公主解説梁王卒得不治初陽為勝詭所讒王因囚之將殺之乃從獄中上疏曰臣聞忠無不報信不見疑蓋有以然今定虚矣昔者荆軻慕燕丹之義白虹貫日太子畏之衛先生為秦畫長平之䇿太白蝕昴昭王疑之夫精誠變於天地而信不喻於兩主豈不哀哉今臣盡忠畢義左右不明卒從吏訊為世所疑是使荆軻衞先生復出而燕秦不悟矣昔玉人獻寳楚王誅之李斯竭忠胡亥極刑是以箕子佯狂接輿避世恐遭此患也願大王察玉人李斯之意然後改楚王胡亥之聽無使臣為箕子接輿所笑夫偏聽生姦獨任成亂是以魯聽季孫之説而逐孔子宋信子罕之計而囚墨翟夫以孔墨之辨不能自免於讒諛而二國以危者何則衆口爍金積毁銷骨臣聞明月之珠夜光之璧以闇投之人莫不按劒而怒何則無因而至前也蟠木根柢輪囷離竒而為萬乗之器者以左右先為之容也故女無美惡入宫見妒士無賢愚入朝見嫉昔司馬喜臏脚於宋卒相中山范雎折脅於魏卒為應侯此二人者信必然之畫捐朋黨之私挾孤特之交故不能自免於讒諛之人是以申徒狄蹈雍之河徐衍負石入海皆不容於世義不茍取比周於朝百里奚乞食於路秦穆公授之以政甯戚飯牛車下齊桓公任之以國此二人者豈素官於朝假譽於左右哉感於心合於行堅如膠漆衆口所不能離豈惑於浮辭哉是以聖主不牽於卑亂之語不奪於衆多之口獨化於陶鈞之上而觀乎昭曠之道臣聞盛飾入朝者不以私汙義砥礪名號者不以利傷行今欲使天下寥廓之士誘於威重之權脅於勢位之貴廻面汙行以事諂諛之人而求親近於左右則士有伏死窟穴巖石之中耳安肯盡忠信而趨闕下者哉書奏梁王梁王立出之以為上客枚乗以數諫吳王上拜乗𢎞農都尉乗乆為諸侯上客不樂為郡吏後自免遊於梁田叔既至魯魯民以王取財邀相自言者百餘人叔取渠率少笞怒之曰王非汝主邪何敢自言王王慙乃取中府錢令償之相曰王自使人償之今令相償之是王為惡而相為善王好遊獵叔常從王輒休相就館叔坐苑外曰吾王㬥露獨何為舍王以故不復出遊七年冬十有一月庚寅日有食之春正月皇太子榮廢為臨江王榮者帝長子栗姬之子上嘗囑諸子於栗姬曰百嵗後善視之栗姬素怨言不遜上乃廢姬及太子栗姬以憂死二月罷太尉官夏四月乙巳立皇后王氏初皇后嫁為金王孫妻其母臧兒卜相之當貴乃奪金氏而内太子宫王后方妊身夢日入懷遂生男丁巳立膠東王徹為太子實王皇后子也中尉衞綰為太子太傅綰大陵人也為人謹慎㪟厚上為太子時嘗召文帝左右近臣飲酒綰獨稱疾不行及上即位將幸上林詔綰參乗上謂綰曰今君知所以參乗乎乃我為太子時召君不來故文皇帝有遺言曰綰長者善遇之六月乙巳丞相陶青免大尉周亞夫為丞相是嵗太僕周舎為御史大夫中元年夏四月赦天下賜民爵一級封周昌孫荀為列侯二年春令諸侯王薨及列侯初封及之國大鴻臚奏諡誄筴列侯薨及諸侯王太傅初除之官大行奏諡誄筴王薨遣灮禄大夫弔禭祠賵視喪事因立嗣列侯薨遣太中大夫弔祠視喪事立嗣其葬國得發民輓喪穿復土治冡無過三百人畢事三月臨江王榮坐侵宗廟壖垣為宫上徵榮臨江官屬祖榮於北門外升車軸折父老泣曰我王不還矣至邸王詣中尉郅都責訊王王恐自殺葬藍田有鷰數千萬頭銜土置冡上百姓憐之無子國除郅都河東人也為人剛勇而有氣公廉嘗稱曰背親事君固當奉節死職終不顧妻子矣嘗從上入上林賈姬在厠野豕入厠上目都都不行上欲持兵救賈姬都伏上前曰亾一姬復一姬進陛下縱自輕奈髙廟太后何上還豕亦不傷賈姬都為中尉丞相條侯至貴倨也而都揖之貴戚宗室側目而視號曰蒼鷹是時濟南瞷氏三百餘家豪猾放縱二千石莫能折也及都為濟南守誅瞷氏首惡郡中震慄道不拾遺旁十餘郡畏都如大府後為鴈門太守匈奴不敢近鴈門胡王為偶人像都令騎射莫能中其見憚如此匈奴中以法帝欲釋之太后以臨江王之死也怨之遂斬都是時寗成周陽由亦皆嚴剋為治成為濟南都尉郅都為守始都尉皆步入府門因吏謁見如縣令及成至直凌都出其上然都素聞其聲亦與結歡後成為中尉其治放郅都其廉弗及也自此之後吏治多放成由者己是時季布弟季心亦任俠立然諾作氣蓋關中方數千里士爭為之死心為中尉司馬郅都為中尉不敢加也夏四月有星孛於西方立皇子越為廣川王寄為膠東王秋七月更郡為太守尉為都尉九月封楚趙傅相死事者四人子為列侯甲戌晦日有食之三年冬十有一月罷諸侯王御史大夫官夏四月旱秋九月蝗有星孛于西方戊戌晦日有食之既丞相周亞夫免御史大夫周舎為丞相立皇子乗為清河王太子太傅衛綰為御史大夫四年春三月起徳陽宫夏蝗秋赦天下徙作陽陵者死罪欲腐刑者許之十月戊午日有食之五年夏四月立皇子舜為常山王六月赦天下賜民爵一級秋八月己酉未央東闕災九月詔曰獄者人之大命死者不可復生諸獄疑雖文致於法人心不厭者輒讞之六年冬十月行幸雍祠五畤十有二月定鑄錢偽黄金法棄市令春三月雨雪夏四月梁王武薨諡曰孝王時梁王北獵梁有獻牛足出背上本志以為牛禍思心務亂之咎也乃分梁為五國盡封梁孝王男五人女五人皆食湯沐邑五月丙戌立梁孝王子明為濟川王勖為淄川王彭離為濟南王定為山陽王識為濟陰王不疑為衡山王詔令吏二千石車朱兩輪千石至六百石車朱左輪詔有司減笞法自除肉刑之後笞五百三百率多死者故定律笞五百曰三百三百曰一百猶尚不全又詔曰笞者所以教之也其宜定捶令長五尺其本大一寸末大半寸皆平其節當臀笞者不得更人笞畢一人笞乃更人自是笞者得全六月匈奴入鴈門至武威酒泉邑入上郡取苑馬吏卒戰死者三千人秋七月辛亥晦日有食之後元年春正月詔曰獄者重事也其疑獄有令讞之而後不當讞者不為失三月赦天下賜民爵一級中二千石諸侯相爵右庶長夏大酺五日五月地震秋七月丙午丞相周舍免乙巳先晦一日日有食之八月壬辰御史大夫衞綰為丞相衞尉直不疑為御史大夫不疑南陽人也好黄老術隱名迹初為郎其同舍郎有告歸者誤持其同舍郎金去郎意不疑不疑買金償之後告歸者還乃知之或毁不疑淫嫂不疑曰我乃無兄終不自明矣吳楚反時為將軍封塞侯條侯周亞夫下獄死時為父買尚方工官甲稍五百枝可以葬者取庸治之不與顧直庸怒而上變反告之事連亞夫召至廷尉責問君侯欲反邪亞夫曰臣所買乃葬器何謂反乎吏曰君侯縱不反地上即反地下耳初捕亞夫亞夫欲自殺其夫人止之及至廷尉因不食五日嘔血死亞夫為河内太守許負相之曰君侯三年為侯八年為將九年為相貴重於人臣無二其後當餓死縱理入口餓死法也居三嵗兄勝有罪免文帝封亞夫續絳侯後盡如負言上欲廢栗姬太子亞夫固爭之不得上由是疏之而梁孝王以呉楚之圍怨亞夫不救每朝嘗與太后言亞夫之短太后欲封其兄王信上謙讓不許太后曰人生各以時行耳竇長君在時不得侯及死其子彭祖乃侯吾甚恨之帝趣侯信也上曰請得與丞相計之亞夫曰髙皇帝約非劉氏不王非有功不侯不如約者天下共擊之上黙然遂不封荀悦曰髙皇帝刑白馬而盟曰非劉氏不王非有功不侯不如約者當天下共擊之是教下犯上而興兵亂之階也若後人不修是盟約不行也書曰法惟上行不惟下行若以為典未可通也匈奴徐盧等五人降上欲封之亞夫曰彼背其王陛下何以責人臣守節哉上曰丞相議不可用乃悉封之荀悦曰春秋之義誅叛臣者不一而足也若以利害由之則以功封其逋逃之臣賞有等差可無列土矣上嘗居禁中召亞夫賜食獨置大胾無臠又不置箸亞夫心不平顧謂掌席者取箸亞夫前食既出上目送之曰此怏怏非少主之臣也亞夫以數忤上意故得罪也二年冬十月詔省列侯之國春匈奴入鴈門太守馮敬與戰死發車騎材官屯鴈門以嵗不登禁食馬粟食馬粟者没入之封皇后兄王信為孟侯夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女功者也農事傷則饑之本女功害則寒之原夫饑寒並至能不為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服以為天下先不受獻減太官省徭賦欲天下務農蠶常有畜積以備災害彊無凌弱衆不㬥寡耆老以壽終孤幼得遂長今嵗或不登民食頗寡其咎安在或詐為吏以貨賂為市盜奪百姓侵侮萬民縣丞長吏縱姦法與盜甚無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪布告天下使明知朕意自漢初務勸農累世承業至是始天下殷富家給人足京師之錢累百巨億貫朽而不可校太倉之粟充實露積於外腐敗而不可食衆庶街巷有馬阡陌之間成羣守閭閻者食梁肉為吏者長子孫居官者以官為姓號人人自愛而重犯法仁義興焉三年春正月詔萬民采黄金珠玉者坐贓為盜詔曰髙年者人所尊敬鰥寡孤獨者人所哀憐也其令八嵗以下八十以上及孕子未乳當鞫繫者無訟繫之甲午帝崩于未央宫遺詔賜諸侯王列侯馬二駟吏二千石黄金二斤民户百錢出宫人復終身讚曰本紀稱周秦之弊密文峻法而姦不勝漢興埽除苛政與民休息至於孝文加之恭儉孝景遵業五六十載之間至於移風易俗黎民醇厚周云成康漢稱文景美矣前漢紀卷九
