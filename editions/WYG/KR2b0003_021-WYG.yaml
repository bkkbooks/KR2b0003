body:
  text: 前漢紀卷二十一漢荀恱撰孝元一皇帝癸未即位年二十六初宣帝寢疾引外屬侍中樂陵侯史髙太傅蕭望之少府周堪至禁中拜髙為大司馬車騎將軍望之為前將軍光禄勲堪為光禄大夫皆受遺詔輔政領尚書事望之薦諫議大夫劉向以博學忠直為散騎宗正給事中初元元年春正月辛丑孝宣皇帝葬杜陵赦天下賜諸侯王公列侯金二千石以下錢帛各有差封皇太后兄侍中中郎將王舜為安平侯丙午立皇后王氏封皇后父禁為陽平侯禁即魏郡元城人也其先齊田氏濟北王安之後其子孫廢為庶人時人謂之王家田氏焉禁父字翁孺武帝時為繡衣御史捕逐羣盜黨與及長吏多所縱活而㬥勝之奏殺二千石以下及通行酒食相連坐者大郡至斬萬有餘人翁孺以奉使不稱職免翁孺歎曰吾聞活千人者有封子孫吾所活萬餘人矣後世其興乎翁孺徙居魏郡元城人建公曰昔春秋時沙麓崩晉史卜之曰隂為陽雄土火相乘沙麓崩後六百四十五年宜有聖女興其齊田氏乎元城東郭五鹿墟即沙麓地也今翁孺徙正值其地日月當之矣皇后字正君方妊正君夢月入懷長大許嫁未入門夫輒死禁怪之相者言當大貴年十八宣帝時入掖庭為家人子以配太子一見殿内即幸有娠生男即成帝也遣使者徴琅邪王吉貢禹吉年老道病卒禹至拜諫議大夫王吉與禹相善世稱王陽在位貢公彈冠言其趨舍同也始吉居長安東家有棗枝垂吉庭中吉婦取其棗以啗吉吉後知之乃去其婦東家見吉去婦欲伐樹鄰人止之因固請吉婦還里中為之語曰東家有樹王陽去婦東家樹完去婦復還其勵節如此貢禹字少翁初為河南令以職事為府官所責免冠謝禹曰冠一免豈可復冠遂去官以明經潔行自修上既見禹虛己問以政事禹曰古者宫室有制度宫女不過九人秣馬不過八匹牆塗而不雕木磨而不刻車服器物皆不文畫苑囿不過數十里與民共之髙祖孝文孝景皇帝循古節儉宫女不過十餘人廐馬不過百餘匹後世轉為奢侈臣下亦相倣效故大夫僭諸侯諸侯僭天子天子過天道今齊三服官作工數千人一歳所費數千萬杯椀器物皆文畫金銀飾之廐馬數萬匹民饑而死或人相食廐馬食粟患其大肥乃日歩作之王者受命於天為民父母固當如是乎武帝時又多取好女至數千人以塡後宫及棄天下昭帝幼弱霍光不知禮正多藏金銀財物鳥獸六畜之類凡百九十物又取後宫女置園陵大失禮逆天心後遂遵之使天下化成下及百姓皆逾制度唯陛下大減損輿服御物三分去二察後宫賢女留二十餘人餘悉歸之及諸園陵女無子者宜皆遣之廐馬可無過數十匹獨舍長安城南苑以為田獵之囿餘皆復為田以賜貧民天生聖人蓋為萬民非獨令自娛樂而已此獨可以聖心參諸天地揆之徃古不可與臣下議也若其阿意順㫖隨君上下臣禹不勝眷眷不敢不盡愚上喜納其忠詔三輔太常郡國公田及苑可省者以賑貧民凡禹所言後多施行之夏四月光禄大夫王褎等七人循行天下存問耆老鰥寡孤獨失職之民登延賢俊招顯側陋觀風俗之化詔國被災害甚者無出今年租賦江淮陂湖園池以貸貧民勿收租稅賜宗室屬籍者馬二匹至二駟孝弟力田鰥寡孤獨帛吏民五十戸牛酒秋八月屬國降胡萬餘人亡入匈奴九月關東諸郡國十一大水人饑相食詔宫館希幸御者勿繕治減食榖馬食肉獸詔列侯舉茂才匈奴呼韓邪單于上書言民衆困乏詔雲中五原郡轉二萬斛榖以給之二年春正月行幸甘泉郊泰畤賜雲陽民爵一級女子百戸牛酒立皇弟竟為清河王二月戊午隴西地震毁落太上皇廟敗豲道縣城郭官寺及民室壓殺人衆山崩地裂水泉皆湧三月立廣陵厲王太子弟霸為王罷黄門乗輿及狗馬水衡禁苑少府佽飛外池嚴籞池田假於貧民詔郡國災甚者無出租賦赦天下夏四月立皇太子賜御史大夫爵關内侯中二千石右庶長天下當為父後者爵一級列侯錢各有差荀恱曰賞罰者國家之利器也所以懲惡勸善不以喜加賞不以怒増刑列侯重爵不可以虛加也秋七月己酉地震詔舉直言極諫之士東海翼奉字少君待詔對曰臣聞人氣内逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽用其精隂用其形猶人有五臟六體五臟象天六體象地故五臓病則氣色變於面六體病則伸屈見於形地震者隂氣盛也古者朝廷必有同姓以明親親必有異姓以明賢賢今左右無同姓獨以舅后之家為親異姓之臣又疏二后之黨滿朝隂氣之盛不亦宜乎臣又聞建章未央宫人各以百數皆不得天性宜為設員出其過制今異至不應災將隨之其法為大水然極隂生陽反為大旱甚則將有火災春秋宋伯姬災是也奉又上疏曰臣聞昔盤庚改邑以起殷道聖人美之今國家郊禘寢廟祭祀之禮多不應古宫室苑囿奢侈臣愚以為誠難安居而易改作欲陛下徙都洛陽安成周之居兼盤庚之徳改正制度無復繕治宫室不急之費三歳可餘一歳之畜臣聞天道有常王道無常無常者所以應有常必有非常之主然後立非常之功願陛下留神慮上異其言奉好災異占候之術為博士諫議大夫是時史髙典治尚書事而蕭望之為副然望之名儒有師傅恩上信任之多所貢薦髙充位而已長安令楊興說髙曰將軍以親戚輔政貴於天下無二然衆庶議論休譽不專在將軍何也此誠有所聞以將軍幕府海内莫不仰望而所舉不過私門賔客乳母子弟人情忽不自知然一夫竊議語流天下夫富貴在身而列士不舉是有狐白之裘而反衣之古人疾其如此故卑體勞心以求賢為務傳曰以賢難得故曰事不待賢以食難得故曰飽不俟食惑之甚者今平原文學匡衡才智有餘經學絶倫但以無階朝廷故隨牒在逺方將軍誠召在幕府即學士翕然歸心薦之朝廷必為國器以是顯示庶衆名流後世不亦可乎髙然其言辟衡為議􅔟史薦為郎中時蕭望之周堪劉向及侍中金敞安上子中正敢言此四人者同心輔政而中書令𢎞恭僕射石顯比與史髙與望之不同恭顯皆嘗坐法腐刑為宦者自宣帝見任用矣及上即位多不親政事遂委顯等望之以為尚書政本宜以賢明之選自武帝始用宦者非國舊制白欲更用士人由是大與高恭顯等有隙待詔鄭朋華龍等者皆傾巧人也行汚穢欲入堪等不納更入許史因求見上排毁望之等恭顯遂令朋龍等上書告望之欲罷車騎將軍疏退許史候望之休沐日令二人上書事下恭顯恭顯奏望之及堪向黨與相構譖訴大臣毁謗親戚欲以專權為臣不忠誣上不道請詔謁者召致廷尉上不省為下獄可其奏後聞繫獄上驚曰非但廷尉問邪乃責顯恭即日出望之等令視事顯恭因令史髙言上曰陛下新即位未有徳化聞於天下先驗師傅既下獄又虛出之宜因決免之於是詔收望之印綬及堪向敞連坐皆免而朋龍為黄門侍郎自此忠臣退而姦臣用事六月關東大饑齊地人相食秋七月詔吏發倉廩府庫賑饑寒者上重望之不已乃下詔曰故前將軍望之傅朕八年厥功茂矣其賜爵關内侯食邑六百戸給事中朝朔望上方欲以望之為宰相㑹望之子侍中散騎常侍中郎將伋上書訟望之前事事下有司奏望之前所坐明白無譖訴者而教子上書稱引無辜之言失大臣之體大不敬請捕之顯恭等知望之素髙節不屈奏曰望之深怨望歸非於上自以託師傅恩懐終不坐非頗屈於牢獄抑其怏怏之心則聖朝無以施徳厚上曰蕭太傅素剛直安肯就獄顯等曰人命至重望之所坐罪薄必無所憂上乃可其奏顯等於是遣謁者促召望之因命太常急發執金吾圍其第使者至望之欲自殺其夫人止之以為非天子意望之以問門下生朱雲素剛直好節士教之自裁望之乃歎曰吾嘗備位宰相年踰六十矣而入獄以求生不亦鄙乎遂飲藥而卒上聞之大驚拊手曰吾固疑其不就獄果然殺吾賢相大官方上食不肯食涕泣哀動左右於是召顯等責問皆免冠謝良乆乃解其子伋嗣爵關內侯嵗時常遣使者祀望之冢暨終世望之八子育咸由伋皆至九卿育初為茂陵令㑹考課時漆令以殿責問育為之請扶風扶風大怒曰君課第六裁自脫耳何暇與左右言及罷出傳茂陵令詣後􅔟當以職事對育直出不還書佐隨牽之育按劒曰蕭育杜陵男子何詣後􅔟遂趨出欲去官明旦㑹詔召入拜司𨽻過扶風府門而官屬掾吏數百人皆拜謁於車下咸由所在皆以功績著聞名流後世是嵗丞相府家雌雞伏子漸化為雄有冠距鳴𢎞恭病死石顯為中書令車騎將軍韓昌光禄大夫張猛送呼韓邪侍子以歸昌猛見單于益盛又聞大臣多勸單于北歸者恐既北則難約束因與單于盟約曰漢與匈奴合為一家世世子孫無得相詐相殺有盜竊相報行其賞誅其有㓂發兵相救敢有背約受天不祥令子孫世世盡無違盟昌猛與單于登弱水東山刑白馬以月支王頭斫為飲器飲血盟而旋公卿議者以為單于雖北猶不能為害昌猛擅以國家世世子孫詛盟罪至不道有詔昌猛以贖論勿解盟三年春令諸侯相位在郡守下珠崖郡山南縣反上博謀羣臣欲擊之待詔賈捐之對曰臣聞堯舜聖之盛也禹入聖域而不優故孔子稱堯曰大哉舜曰韶盡美矣禹曰吾無間然矣以三聖之徳地不過數千里東漸於海西被於流沙北盡朔裔南暨聲教與聲教者則治之不欲與者不彊治殷周之時東不過江黄西不過氐羌南不過蠻荆北不過朔方而君臣歌徳頌聲並作及秦興兵逺攻貪外虛內而天下內叛孝文偃武行文時有獻千里馬者詔曰鸞旗在前屬車在後師行三十里為程騎行五十里為程朕乘千里馬獨安之乎乃還馬勅四方無來獻當此時天下無事斷獄數百及孝武皇帝西連諸國至於安息東過碣石至於樂浪北却匈奴數萬里南制南海為八郡兵革數起父戰於前子鬭於後女子乘亭鄣孤兒嗁於道老母寡婦飲泣街巷設虛祭於道旁招神魂於萬里之外擴地泰大征伐不休而天下斷獄餘數萬人今關東困乏至有嫁妻賣子此社稷之憂詩云蠢爾蠻荆大邦為讎言聖人起則後服中國衰則先叛自古而患之何況乃復南方萬里外之蠻乎駱越之人父子同川而浴相習以鼻飲於禽獸無異有之不足郡縣置也棄之不足惜也不擊之不損威臣竊以徃事羌軍言之暴師曾不滿一年兵出不逾千里費四十餘萬錢大司農錢盡乃以少府禁錢續之今陛下不忍悁悁之忿欲驅士衆捐之大海之中快心幽冥之地非所以拯饑饉全元元也方之徃古則不合施之當今又不便臣愚以為本非冠帶之國禹貢所不及春秋所不理皆可便宜廢之且無以為上以問丞相定國御史大夫陳萬年萬年以為當擊之定國以捐之議是上乃罷珠崖郡民欲內屬者處之不欲者勿彊上數見捐之言多納用後為石顯所毁稀復得見其後長安令楊興以才能幸於上捐之欲因求見謂興曰令我得見上言君蘭京兆尹立可得我前後所薦皆如其言興曰縣官嘗言興逾於薛大夫我易助也使君房為尚書令勝五鹿充宗甚逺捐之曰令我得代充宗君蘭為京兆尹京兆尹郡國之首尚書百官本也天下宜大治士則不隔矣興曰石顯上所信用今且以合意則得入矣捐之因與興共為奏稱薦石顯又薦興京兆尹顯聞其議白之乃下興捐之獄有司劾捐之興懐詐偽更相薦舉漏泄省中語罔上不道捐之棄市興減死夏四月己未茂陵白鶴館災本志以為白鶴館五里走馬之館不當在山陵昭穆之地天戒若曰去貴幸遊逸不正之臣勿在正位病石顯之象也赦天下夏旱立長沙焬王弟宗為王封故海昬侯賀子為侯六月詔曰朕惟衆庶之饑寒逺離父母妻子勞於非業之作衛於不居之宫其罷建章甘泉衛士令各就農詔丞相御史舉天下明隂陽者各三人四年春正月行幸甘泉宫郊泰畤三月行幸河東祠后土赦汾隂徒所過無出租賦賜民爵一級女子百户牛酒鰥寡孤獨帛皇后曽祖父濟南平陵王伯墓門梓柱更生枝葉上出屋本志以為王氏將興之象也五年春正月以周子南君為周承休侯次位諸侯王三月行幸雍祠五畤夏四月有星孛於參詔大官無日殺所供各減半乘輿秣馬無乏正事而已罷角觝戲上林宫館希幸御者齊三服官北假田官鹽鐵官常平倉博士弟子無置員以廣學者省刑罰凡七十餘事御史大夫陳萬年卒六月辛酉長信少府貢禹為御史大夫禹奏言古者民無賦算口錢今民生子三嵗則出口錢故民重加困産子輒不舉甚可痛之宜令今兒生七嵗去齒乃出口錢年二十乃算又奏言武帝時令人犯法贖罪入粟者補吏是以國亂民貧盜賊並起郡國畏法則擇便巧能欺上府者以為右職姦宄不勝則取勇猛苛暴能威服下者使居大位故無義而有財者顯於世欺謾而便巧者尊於朝悖逆而勇猛者貴於官行為犬豕財富勢足是為賢耳故謂居官而致富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之敗壞乃至於此宜除贖罪之法選舉不以實及有贓者輒行其罪無但免官則貴孝弟賤賈人進賢能亷直而天下治矣十有二月丁未貢禹卒丁巳長信少府薛廣徳為御史大夫初郅支單于怨漢擁䕶呼韓邪單于乃求其侍子漢遣衛司馬谷吉送之郅支單于乃殺吉遂依康居而居焉時諸葛豐為司𨽻劾舉無所廻避京師為之語曰間何闊逢諸葛上嘉之加豐光禄大夫侍中許章不奉法度賔客犯法章相連豐按劾章欲奏其事適逢章私出豐駐車舉節詔章下獄收章窘迫馳車去豐追之章因而入宫自歸於上豐亦上奏因收奪豐節司𨽻去節自豐始也前漢紀卷二十一
