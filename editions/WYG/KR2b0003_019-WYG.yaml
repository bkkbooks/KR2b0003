body:
  text: 前漢紀卷十九漢荀恱撰孝宣三神雀元年春正月行幸甘泉郊㤗畤三月行幸河東祠后上賜天下勤事吏及民爵鰥寡孤獨髙年帛所振貸貧民勿収行所過無出田租詔曰夫江海百川之大者今闕無祀其令祠官以時祠江海及洛水膠東王相張敞為京兆尹敞字子髙河東人先是敞為山陽太守郡内清治上書自請曰山陽戸九萬三千計盜賊未得者七十七人他課皆如此臣乆居閒處而忘國事非忠臣也請治劇郡時膠東盜賊並起長吏不能治乃拜敞為膠東王相至郡明設購賞開賊盜令相捕斬除罪吏追捕有功上名尚書調捕縣令者數十人國中清平王太后數遊獵敞上書諫曰臣聞秦王好淫聲華陽后為之不聽鄭衛之曲楚莊王好畋獵樊姬為之不食鳥獸之肉口非惡甘㫖耳非惡絲竹也所以抑心意絶嗜慾者將欲率二君全宗祀也禮君母出門則乗輜輧下堂則従傅母進退則鳴佩玉内飾則結綢繆此則至尊至貴所以自斂制不自縦恣之意也今太后姿質淑美慈愛寛仁諸侯莫不聞之而少以畋獵縦恣為名於是以此上聞亦未宜也唯觀覽於徃古全行於来今令后姫有法則臣下有所稱頌及為京兆尹長安多盜賊自趙廣漢後守尹皆不稱職敞到則求問長安父老偷長得數人居皆温厚出従僮騎閭里以為長者敞皆召見責問赦其罪令致諸偷偷長曰今君一旦召詣府恐諸偷驚散請一切受署敞皆補為吏遣歸休置酒諸小偷悉賀飲酒醉偷長隂以赭土汙其衣吏坐里門閲出衣赭汙者悉収一旦乃得數百人由此桴鼔稀鳴市無偷盜敞治京兆修廣漢之迹其方略耳目不及廣漢然頗以經術儒雅自輔其政不純用刑故能免於戮西羌反夏四月後將軍趙充國討西羌充國字翁孫隴西人也時年七十六初出兵上問誰可將者充國曰無逾老臣願陛下以兵屬老臣勿以為憂上笑曰諾充國既行甞以逺斥候為務行必有戰備止必堅營壁尤能持重愛士卒先計而後戰遂至西部都尉府日饗軍士虜數挑戰充國堅守於是酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虛勢不能久或曰至秋冬乃進兵此虜在境外之策也今虜朝夕為㓂胡地苦寒漢馬不能冬屯兵在武威張掖酒泉萬騎已上可以悉彂以七月上旬齎三十日糧分兵並出張掖酒泉合擊罕开在鮮水之上者虜以畜産為命今皆離散兵出雖不盡誅且奪其畜産虜其妻子復引軍還冬復擊之大兵仍出虜必震壊上下其書於充國充國以為武賢欲輕引萬騎為兩道出張掖酒泉回逺千里以一馬自䭾負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至虜必商軍進退稍稍引去逐水草入山林隨而深入虜必據前險守後阨以絶糧道必有傷危之憂而武賢以為可奪畜産虜妻子此殆空言非至計也又武威張掖皆當北塞有通谷水草臣恐匈奴與羌有謀且欲大入其郡兵尤不可悉發先零首為叛逆他種刧略故臣欲捐罕开闇昧之過隠而勿彰先行先零之誅以震動之宜悔過反善因赦其罪選良吏撫循和輯此全師保勝安邊之長策也上下其書公卿議者咸以為先零兵盛而負罕开之助不先破罕开則先零亦未可圖也上乃拜侍中許延夀為彊弩將軍即拜酒泉太守武賢為破羌將軍賜璽書嘉納其奏因以書勑切讓充國曰將軍不早及秋共水草之利爭其畜食欲至冬虜皆畜食多藏匿山林中依險阻將軍士卒寒手足皸瘃寧有利乎將軍不念中國之費而欲以歳數而勝微將軍誰不樂此者今詔破羌將軍武賢等撃罕开將軍其自引兵便道西並進雖不相及使虜聞東方北方兵並来分散其心意離其黨與雖不能殄滅當有瓦解者勿復有疑六月有星孛于東方秋七月大旱充國上書曰臣前奉詔告諭罕开宣天子至徳以解其謀罕开之属皆知明詔今先零已為寇日乆而罕开未有所犯今先撃罕开釋先零赦有罪誅無辜起一難就兩害誠非陛下本計也先零欲為背叛故與罕开解仇結約其心恐漢兵至而罕开背之先擊罕开而先零必救之以堅其交迫脅諸小種附著者稍集虜兵浸多用力數倍恐國家憂累繇十年數不一二歲而已臣之愚計先誅先零則罕开之属不煩兵而服之矣以今進兵誠未見其利上乃璽書報從充國計擊先零充國引兵至先零虜乆屯聚解弛望見大軍棄車重欲渡湟水水道阨狹充國曰此窮寇不可追也緩之則走不顧急之則還致死乃徐行驅之虜赴水溺死數百人降及斬首五百餘級虜遂敗走獲牛馬羊十萬餘頭車四千餘兩兵至罕开地令軍無燔燒聚落芻牧田中罕开羌聞之喜曰漢兵果不擊我豪靡忘使人来言願得故地充國以聞未報靡忘自来歸充國充國以聞賜飲食遣還諭種人罕开竟不煩兵而降上賜充國書令破羌將軍為充國副進兵撃先零時先零降者萬餘人充國度其必壊欲罷騎兵留屯田或諫曰將軍數不奉詔一旦繡衣来責將軍身且不能保何國家之能安今此利病之間又何足爭充國曰是何言之不忠也今漢兵久不決四夷卒有動揺相因而起雖有智者不能善其後事也諸君徒欲自營不為國計也吾固以死爭之明主可以忠言遂上屯田罷兵狀奏曰虜易以計破難以用兵臣愚以為擊之不便今吏士馬牛穀糧芻藳之費甚衆轉輸不能給願罷騎兵留屯田兵士屯要害處益畜積省大費謹上屯田處器用簿上報曰如將軍計虜何時伏誅兵當何時得決其熟計復奏充國上狀曰帝王之兵以全取勝今虜亡其美地茂草寄託逺遁骨肉離心人有叛志散師屯田以待其變此坐支解𦍑虜之具也臣謹條屯田便宜十二事分步兵九校吏士各萬人留屯田以為武備因田致穀威徳並行一也排抑羌虜使不得肥饒之地分破其衆成相叛之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以示胡虜揚威武折衝之具五也以閒暇時伐材木繕治郵亭充入金城六也兵出不乗危徼倖不出使虜因竄於風寒之地罹於疾疫霜露之患坐得必勝之道七也亡經險阻逺追死傷之患八也内無損威武之重外不令虜得乗間之勢九也又無驚動河南大小罕开使生他變之憂十也治湟陿中道橋令可至鮮水以制西域申威西極使師従枕席上過十一也既省大費徭役豫息以戒不虞十二也詔復報曰將軍獨不計虜兵將攻撓屯田者及殺略人民將何以止之大小罕开前言我告漢軍先零所在兵乆不徃得無不分别人而并擊我邪其意常恐今兵不出得無變生與先零為一熟計復奏充國奏曰虜失地逺客分散饑寒皆天子明詔令相捕斬之賞臣愚以為其勢自壊今留屯田地勢平易多髙山逺望之便部曲相保塹壘木樵便兵飭弩烽火相連勢足并力以逸待勞兵之大利騎兵雖罷虜見屯田為必擒之具必有土崩以歸之意宜不久矣今虜馬羸痩必不敢捐其妻子於他種中逺來為寇又見屯田兵精必不敢將其累重還歸故地若為小寇勢不足患臣聞戰不必勝不茍接刃攻不必取不敢勞衆釋坐勝之道従乗危之勢兵不見其利而内自疲敝貶重自損非所以示蠻夷也又大兵一出還不可復留湟中亦不可空如是徭役自復彂也且匈奴不可不備烏桓不可不憂今見轉運煩費傾國家不虞之用以贍一隅臣愚以為不便且校尉臨衆宣明威徳奉厚幣撫循罕开羌衆喻以明詔必無異心不足以疑故出兵臣今奉詔出塞引軍逺攻罷天子之精兵散車甲於山野雖無尺寸之功偷得避嫌之便而無後咎此人臣不忠之利非明主社稷之福也臣不敢避斧鉞之誅謹昧死以聞充國初奏事議臣非難充國十七人中十五人最在後十三人有詔詰前言不便者皆頓首服於是詔報聽之京兆尹張敞上書言充國兵在外已經夏彂隴西以北安定以西吏民給輸田事廢業無餘積雖羌虜必破来春民必困乏願令諸有罪非盜賊受財殺人犯不道者皆得以差入穀此八郡贖罪務益致穀以備預百姓之急事下有司左馮翊蕭望之曰民含隂陽之氣有仁義利慾之心在上之教化雖堯舜在上不能去民利慾之心而能令其利慾不勝仁義也雖桀紂在上不能去民好義之心而能令其好義不勝利慾也故堯舜桀紂之分在於義利而已矣故道民不可不慎也令民以粟贖罪則富者得生貧者獨死是貧富異形而法不一也人情父兄囚縶聞以財得生為人子弟者將不顧死傷之患敗亂之行以赴財利救親戚一人得生十人已死如此則伯夷之行壊公綽之名滅政教一傾不可卒復古者藏財於人不足則取之有餘則與之故詩云爰及矜人哀此鰥寡上惠下也又曰雨我公田遂及我私下惠上也今西邊之役民失作業雖戸賦口斂以贍其用古之通義百姓莫以為非以死救生恐未可也陛下布徳施教教化既成堯舜無以加也今議開利路以傷既成之化臣竊痛之上復下其議敞曰令罪人出錢減死便於煩擾良民横興賦斂又諸盜賊及殺人犯不道者皆不得贖首匿見知縦犯所不當得為之屬議者或頗言其法可蠲除今因此令贖其便甚明何化之可亂甫刑之罰小過赦薄罪贖有金選之品其所従来乆矣何賊之敢生今涼州方秋饒之時民尚饑乏況至来春必將大困不早慮振䘏必全之䇿而引常經以難常人可與守經未可與従權也望之復對曰先帝聖明賢良在位立憲垂法為無窮之基故金布令甲曰邊郡數被兵離饑寒夭絶天年父母相失天下共給其費固為軍旅卒暴之事臣聞天漢四年常使罪人贖罪出錢五十萬減死一等豪彊吏民請奪假借至為盜賊以贖罪姦邪並起臣以為使死罪贖之敗也故曰不便時丞相御史大夫以為羌虜且破轉輸略足相給遂不施行敞議賜大司農朱邑子黄金百斤以奉祭祀邑字伯卿廬江人身為列卿居處節約俸祿以供九族鄉黨家無餘財敦厚公正不可交以私上甚重之將死屬其子曰我故桐鄉嗇夫其民愛我必葬我桐鄉後世子孫奉祀不如桐鄉桐鄉民為起冡立祠歳時常祭之是歳韓増為大司馬車騎將軍封龍頟侯二年春正月乙丑甘露降鳳皇集於京師羣鳥従之有萬數夏五月西羌平斬其首惡大豪楊玉首以降置金城屬國以處降羌赦天下後將軍充國還所善浩星賜迎說充國曰衆人皆以破羌彊弩將軍出擊斬首獲降虜以破壊然有識者以為虜勢窮困兵雖不出必自服矣雖然将軍即見上宜歸功於二將軍充國曰吾年老矣爵位已極豈嫌伐一時之功哉兵勢國之大事當為後法老臣不以餘命一為陛下言兵之利害卒死誰當復言之者卒以其意對上然其計武賢由是怨充國上書告充國子中郎將卬前従軍在西羌時言車騎將軍張安世常不快上意上數欲誅之卬家將軍為上言安世事孝武皇帝數十年稱忠謹宜見全恕由是得免卬又坐禁止而入至充國幕府司馬中亂屯兵卬下吏自殺充國乞骸骨賜金安車駟馬免罷就第充國初以司馬従貳師將軍撃匈奴大為虜所困漢軍乏食數日死傷者多充國與壯士百餘人潰圍陷陣貳師引軍隨之遂得解身被二十餘創武帝歎之擢為車騎將軍長史本始之際與霍光定䇿安宗廟封營平侯秋匈奴大亂日逐王先賢撣單于来降時衛司馬㑹稽人鄭吉使䕶鄯善西南道以攻破車師日逐王請降於吉吉彂諸國兵五萬人迎日逐王口萬二千人小王將十二人及河曲頗有亡者吉追斬之遂將詣京師封日逐王為歸徳侯吉為安逺侯使吉并䕶車師以西北道故號都䕶都䕶之號自吉始也於是吉始中西域而立幕府治烏壘城鎮撫諸國漢之號令頒於西域始自張騫而成於鄭吉九月司𨽻校尉蓋寛饒下獄自殺寛饒魏人為儒學者所宗剛直公清數干犯上意在位乆不遷越先之者多寛饒自伐其行能意終不滿時上方用刑法任中書官寛饒奏封事曰方今聖道浸微儒術不行以刑餘為周召以法律為詩書又引易傳言五帝官天下三王家天下家以傳子孫官以傳聖賢若四時之運成功者去不得其人不居其位書奏上以寛饒為怨謗下其書時執金吾議以為寛饒㫖意欲求禪大逆不道遂下獄諫議大夫鄭昌上書曰司𨽻校尉食不求飽居不求安進有憂國之心退有死身之義上無許史之屬下無金張之託職在司察直道而行多仇少與上書諫國事下有司劾以大辟臣幸得與大夫之後官以諫為名不敢不言上不聽遂下廷尉寛饒引佩劒自殺寛饒為司𨽻京師肅清居貧子弟常步行自戍北邊然性頗深刻刺舉無所逥避貴戚大臣人人相與為怨平恩侯許伯入第丞相御史大夫中二千石皆賀寛饒不賀許伯請之乃徃従西階上東向特坐許伯自酌寛饒曰無多酌我我有酒狂丞相笑曰次公醒而如狂何必酒也坐皆屬目卑下之酒酣作樂長信少府檀長卿起舞為沐猴與狗鬭坐皆大笑寛饒不恱仰視屋而歎曰富貴無常忽輒易人此如傳舎所閲多矣唯謹慎者得乆君侯可不戒之因起趨出劾奏長信少府以列卿而猴舞失禮不敬上欲罪少府許伯為請乃止寛饒初為衛尉司馬先是司馬在部見衛尉拜謁甞為衛尉徭役市買寛饒案舊令遂揖衛尉衛尉私使寛饒寛饒以令詣府門謁辭尚書尚書責問衛尉由是不敢私使而司馬不拜寛饒為司馬斷其單衣令短躬案行士卒撫循之甚有恩信及歲盡交代上臨饗罷衛士卒數千人皆叩頭請留一年以報寛饒厚徳匈奴單于遣名王奉獻賀正始和親三年春起樂遊苑二月丙辰丞相魏相薨四月戊辰御史大夫邴吉為丞相吉起刑法小吏及為丞相以禮讓臨下掾吏甞有罪輒與長休假無案驗吉曰丞相府有案吏之名竊陋焉公府不案吏自吉始也馭吏嗜酒醉歐吐吉車茵西曹白命斥之吉曰以醉之失去士此人將安所容乎西曹忍之此不過汙丞相車茵耳後邊虜入塞彂奔命卒至此馭吏習邊事見驛騎持赤白囊知虜入塞遽白吉因曰恐虜復入長吏皆老不任兵馬宜可預視吉即案省未畢有詔召問吉具對御史大夫不能詳知所以得譴讓而吉見謂憂邊思職吉歎曰士無不可容向不聞馭吏之言何見勞勉之有吉甞逢見羣鬬死傷横道邊不問前行見人逐牛牛吐舌喘息吉使騎問逐牛行㡬里已喘掾吏獨謂丞相前後失問以譏吉吉曰人鬭相殺長安令京兆尹之職歳盡丞相課其殿最奏行賞罰而已丞相不親小事非所當道路問也方春少陽用事未可以暑恐牛近行用暑喘此時氣失節恐有所傷害三公典調隂陽職所當憂是以問之吉子顯為議曹掾従祀髙祖廟至夕牲日乃使出取齋衣吉怒曰宗廟至重而顯不敬亡吾爵者必顯也秋七月甲子大鴻臚蕭望之為御史大夫八月詔曰吏不亷平則治道衰今小吏皆勤事而俸禄薄欲無浸漁難矣其益吏百石已下俸五十斛是歳光禄大夫梁丘賀為少府賀字長翁琅邪人初以能心計為武騎後為郎上祠孝昭廟先驅旄頭大劒挺墜於地首䧟泥中刃向上乗輿馬驚於是上召賀筮之曰有兵不吉上還乃使有司代祠是時霍氏外孫任宣為代郡太守坐謀反誅宣子章為公車丞夜亡乃𤣥袪服入廟執㦸郎間欲為逆彂覺伏誅其後明而入廟自此始也賀以筮有應由是近幸為大夫至少府為人小心周宻上信重之賀明易賀子臨亦精於易為黄門侍郎講論於石渠四年春二月詔曰迺者鳳皇甘露降集京師嘉瑞並見修興五帝太一后土之祠鸞鳳翱翔降集於旁齋戒之暮神光顯著及薦鬯之夕神光交錯或登于天或降於地従四方来集於壇上帝嘉饗海内承福其赦天下賜民爵鰥寡髙年帛夏五月潁川太守黄霸以治行尤異秩中二千石賜爵闗内侯加賜黄金百斤潁川吏民有行義者爵人二級力田一級其貞潔順女賜帛霸為政先尚教化而後刑罰務農桑節用殖財去食穀馬聦明盡知下情甞使吏人有所案察吏還霸勞曰甚苦食於道旁乃為鳥所盜肉吏大驚以為神以霸具知其委曲毫釐不敢有隠民有鰥寡孤獨死者霸告吏曰某處大木可為棺某亭猪子可為祭吏徃皆如其言吏民不知所出皆稱神明姦人去入他境郡丞老病耳聾督郵白欲逐之霸不聽或問其故曰數易長吏送故迎新之費及為姦吏因縁公私費耗甚多皆出於民新長吏又未必賢凡治道去其太甚耳霸外寛内明得吏民心戸口歳増治為天下第一五月詔郡國舉賢良匈奴遣弟呼留若勝之来朝冬十月有鳳十一集杜陵十有一月河南太守嚴延年有罪棄市延年為治嚴酷冬月傳屬縣囚㑹府下流血數里河南號曰屠伯府丞年老頗悖素畏延年恐見中傷延年實親厚之而丞愈自恐自筮得死卦乃求告至京師上書言延年罪名十事拜奏因飲藥自殺以明不欺事下案驗有此數事延年坐誹謗政理不道先是延年母従東海来適見報囚母怒延年曰天道神明人不可獨殺行矣去汝東歸除掃墓地待汝耳母還歸復為宗族昆弟言之後歳餘而誅矣延年雖酷然敏於政事令行禁止郡國肅清先是為涿郡太守豪彊放縦盜賊横行吏民皆曰寧負二千石無負豪彊大家延年至則案誅大姓髙氏等所殺十人郡中畏慄道不拾遺初上即位延年為御史劾奏霍光擅廢立主上無人臣禮大不道奏雖寢朝廷肅然敬憚之延年兄弟五人皆有吏才至二千石大官東海賢嚴母號曰萬石嚴嫗延年次弟彭祖有才藝學春秋明經傳作註即名嚴氏春秋也官至左馮翊太子太傅不求當世為儒者宗或謂彭祖曰天時不勝人事君不修小禮曲意無貴人左右之助經義雖髙不至宰相矣願少自勉彭祖曰大凡通經術故當修先王之道何可委曲従容茍求富貴乎卒以太傅官終十有二月鳳皇集上林前漢紀卷十九
