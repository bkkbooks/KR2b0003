  - {type: variant, offset: 698, length: 221, content: 曾于雲間朱氏覽宋刻本眞天府閟笈也惜未祈借爲可悵懊乃今不可復覩矣後不逾月有持一編售者則朱氏本也先子傾嚢購焉將序刻未暇而先子已矣噫神物有歸幸獲張華之劒竒姿未耀敢私桓氏之珠輒復梓行以永流播愴焉述事聊承堂構之心率爾蕪辭豈盡作者之意可慨也巳嗚呼蓍策所以立公言也權衡所以立公正也書契所以立公信也然譽或倖得毀有外來心迹之間沉隱莫察㣲瑕掩瑜尺朱蓋紫自古然矣悲夫悲夫此仲豫所以有未克之談而彦伯所以有悢然之歎者也嘉靖歲戊申夏四月朔日士雅山人呉黃姬水譔前漢紀序漢祕, WYG: 官秘}
