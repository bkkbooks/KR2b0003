body:
  text: 前漢孝宣皇帝紀三卷第二十五鳳元年春正月上幸甘泉宮郊大畤皇太子冠賜列侯嗣子爵王大夫男子為父後者爵一級冬十有二月乙酉朔日有蝕之左馮翊韓延壽有罪棄市延壽字長公燕人也先是為東郡太守放散官錢奢僣逾制御史大夫蕭望之按驗之丞相邴吉以為更大赦不須考會御史當按問東郡事望之因令併得問之延壽聞之即按劾望之在左馮翊時放散稟犧官錢數十萬吏掠治急引與望之為姦延壽劾望之按殿門禁止望之望之自奏職在總領天下聞事不得不問而為延壽所拘持上由是不直延壽各令窮竟所考望之果無事實而御史按驗東郡具得延壽事事都肆試騎士治飾兵車畫龍虎朱雀延壽駕駟馬車羽葆鼓車歌車功曹引車駕駟馬載棨戟五騎為伍分左右部軍正假司馬十人持幢傍轂延壽坐射室騎吏持戟夾階列衛騎士兵車四面營陳被甲匙居馬上抱弩負籣又使騎士戲車弄馬又取官銅物候月蝕鑄作劍鉤鐸放效尚方取官錢帛私假徭役吏民及飾車騎甲用三百萬以上於是望之劾奏延壽上僣不道事下公卿公卿議以延壽前既無狀又誣訴典法大臣欲以解罪狡猾不道坐棄市死然延壽為治甚得吏民心吏民數千人送至渭橋老小扶持車轂莫不涕泣初延壽以父義諫燕刺王而死霍光顯賞其子擢延壽為諫議大夫遷潁川太守承趙廣漢之後初廣漢患郡俗名黨大族相依以憑凌長吏乃陰交構之以生其隙於是吏民多相怨讎風俗漓薄延壽乃道之以禮讓和輯其俗俾有制度為之禮節養生送死不逾禮法百姓遵用其教賣偶人車馬下埋為物者棄之市道徙為東郡太守政理大行吏民畏而愛之其或欺負之者延壽痛自刻責豈之何以至此吏民聞之自傷悔不復欺犯其縣尉至刺死及門下掾自剄人救之不死因失瘖不能言延壽聞之自傷對掾吏涕泣遣醫治之甚厚復其家延壽嘗出臨上車騎吏一人後至舼功曹議罰府門卒當車前願有所言因曰孝經云資於事父以事君而敬同今旦明府早駕久駐而不出騎吏父至府門騎吏趨出父適返會明府登車以敬父而受罰得無毀大化乎延壽車中舉手曰微子太守不自知過還舍召見府門卒遂特用之卒是老書生聞延壽賢故自隱於門下以延壽在東郡治為天下最及守馮翊行縣至高陵邑人有兄弟訟田自言者延壽大傷之深自責稱病不聽事臥傳舍而縣令丞三老亦自繫待罪於是訟者深自悔皆髡鉗肉袒謝罪請以田相讓及死不復敢爭延壽見勉勵之乃起視事郡中翕然轉相勸勵周二十四縣莫復以辭訟自言者推其至誠吏民不忍欺也治官茂矣二年春正月行幸雍祠五畤夏四月大司馬車騎將軍韓增薨增者故韓王信之曾孫安道侯説之子增為人寬和自守以溫顏遜辭承上接下歷事三主甚重於朝廷五月將軍許延壽為大司馬車騎將軍秋八月詔曰夫婚姻之道人倫之大者酒食之會所以行禮樂也今郡國二千石或擅為苛禁禁民嫁娶不得具酒食相賀召由是廢鄉黨之禮使民無所樂非所以導民也詩不云乎民之失德乾餱以愆勿為苛禁胸奴掘衍單于為其衆所叛兵敗而自殺於是胸奴大亂五單于爭立議者多云胸奴為害日久今可因其亂舉兵滅之蕭望之對曰春秋晉士丐興兵侵齊聞齊侯卒而還君子大其不伐喪以為恩足以服孝子義足以動諸侯前單于慕化和親夷狄莫不聞矣不幸為賊臣所殺而今伐之是乘亂而幸災也兵不以義動恐勞而無功宜遣使者吊問輔其微弱救其災患四夷聞之咸貴中國之仁義若遂蒙恩得復其位必稱臣服從此德義之盛也上從之壬午御史大夫蕭望之貶為太子太傅太傅黃霸為御史大夫是時邴吉年老上重之望之奏言三公非其人則三光不明今歲星少光咎在臣等上以望之意在輕丞相詰問望之望之免冠置對後丞相司直奏言故事丞相病明日御史大夫輒問病朝奏事會廷中差處丞相後丞相謝御史大夫稍揖進之今丞相數病望之不問會廷中與丞相均禮又望之自擅使守吏自給車馬至杜陵視家事小吏冠法冠為妻先引又使買賣私所附益凡十三萬三千上由此策貶之冬十有一月胸奴呼遫纍單于率衆來降封為列侯十有二月平通侯楊惲坐怨望不道腰斬惲丞相敞弟以發霍氏反事封光祿勳公廉好義讓千萬財分昆弟宗族然自伐其賢能性好刻害發人陰伏輕慢士人卒以此敗太僕戴長樂與惲有隙告之曰安昌侯乘車奔入北掖門惲曰嘗聞奔車抵殿門門關折馬死而昭帝崩今復如此惲觀西關上指桀紂畫像曰天子過此一二問其過可以得為師矣人有堯舜不稱而言桀紂又曰天久陰不雨春秋所記夏侯君所言上行必不至河東矣上以為戲語悖逆絶理下廷尉廷尉奏大逆不道請捕治之上不忍致法免為庶人居家治産業起室宅安定太守西河孫會宗智略之士也與惲書戒之以為大臣廢退當闔門恐懼不當治産業通賓客也惲報書曰自惟罪過已重長為農夫故修賈豎之事耕桑以給公上不意當復以此為譏也夫西河郡地魏文侯所興有段干木田子方遺風尚節儉明去就之分今足下離舊土臨安定山谷間昆戎舊壤子弟貪鄙豈習俗移人於今乃㶿子之志矣方今盛漢之隆願勉旃無多談惲兄子安平侯談為惲曰西河太守杜侯前以過絀今復徵為御史大夫侯罪薄又有功勞且復用惲曰有功何益縣官不定為盡力談曰縣官實然蓋司隸韓馮翊俱盡力吏皆坐事誅騶馬隈佐成告之下廷尉按驗得惲與會宗書上惡遂誅惲妻子徙合浦談坐不諫止惲與相應答有怨望語免為庶人公卿奏收朋黨友皆免官京兆尹張敞亦被奏獨寢不下會敞使捕賊掾吏絮舜有所按驗以敞當免曰五日京兆尹耳不肯為按事敞聞之即收舜強致之死罪舜家自告上欲令敞自便利即先下敞坐楊惲事免敞詣上印綬因從闕下亡命於是京兆吏民解施桴鼓起而冀州都中有大賊上思敞功效即下詔所在召敞拜冀州刺史廣川王同族劉調等為賊窟藏於王家敞自將吏民兵車數百兩圍王宮果得調等於殿屋重轑中乃斬調懸其首於王宮門因劾奏王上不忍致法削其戶冀州盜賊禁止遷太原太守郡中清淨所在治理荀悅曰天子無私惠王法不曲成若張敞之比以議能之法宥之可也使之亡非也三年春正月癸卯丞相邴吉薨諡曰定侯子顯嗣有罪上不忍絶削爵為關內侯二月壬辰御史大夫黃霸為丞相霸長於治民及為丞相綱紀風采不及魏相邴吉于定國三月行幸河東祠后土神光並見燭耀齊宮十有餘刻辛丑鳳凰集長樂宮文章五采留十餘刻吏民並㶿賜民爵一級鰥寡孤獨帛令民大酺五日時天下殷富數有嘉應益州刺史王褒欲宣風化於其民王褒作中和樂職宣布歌詩選好事童子何武等令依鹿鳴之聲習而歌之上召武等觀之皆賜帛曰此盛德之事吾何以當之益州刺史因奏王褒有逸才能為文上乃徵之待詔後召褒為頌頌聖主得賢臣之意褒對曰春秋五始之要在乎審己正統而已夫賢者國家之器用也所任賢則趣舍省而功施普器用利則事力少而成效多故工之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水淬其鋒越砥斂其鍔水斷蛟龍陸刺犀革忽若彗泛畫塗如此乃使離婁督繩公輸削墨雖崇臺五層延袤百尺而不溷者工用相得也故服絺綌之涼者不苦盛暑之鬱懊襲狐狐之暖者不憂至寒之悽慘何則有其具者易其備夫賢人君子亦聖主之所以易海內也昔周公躬吐握之勞故有周室之隆齊桓設庭燎之禮故有匡合之功由是觀之明君人者勤於求賢而佚於得人人臣亦然故世必有仁聖之王而後有賢明之臣故虎嘯而風起龍興而致雲蟋蟀候秋吟蜉蝣出以陰易曰飛龍在天利見大人詩曰思皇多士生此王國故聖王必待賢臣而弘功業雋士亦俟明主以顯其德上下俱欲歡然交欣千載一會愈悅無斁翼乎如鴻毛之遇順風沛乎若巨魚之縱大壑其得意如此則胡禁不止何令不行化溢四表橫被無窮遐夷貢獻萬祥必臻是以聖主不窺望而視以明不殫傾耳而聽以聰恩從祥風遨德與和氣遊太平之責塞優遊之望得遵遊自然之勢恬淡無為之場休徵自至壽考無疆何必偃仰屈伸若彭祖喣噓呼吸如喬松眇然絶俗離世哉詩云濟濟多士文王以寧信乎其以寧也是時上頗好神仙故褒對及之頃之拜褒為諫議大夫數為辭賦方士言益州有金馬碧塹之寶可祭致之使褒祠焉褒道病死六月辛巳西河太守杜延年為御史大夫安和寬裕論議持平稱為名臣是歲置西河屬國都尉以處胸奴降者四年春正月廣陵王胥有罪自殺胥好倡樂逸遊力能扛鼎空手搏羆豕猛獸動作無法度昭帝時數使巫祝詛上即位胥曰太子孫何以反得立復祝詛如前楚王延壽謀反胥與私通書延壽既誅辭連及胥有詔勿治後復祝詛胥宮中棘生十莖莖赤葉白如素池中水變赤魚死有鼠舞王後庭中後祝詛事發覺有司按驗胥惶恐自殺諡曰厲王其子為庶人胸奴單于臣道弟谷蠡王入侍以邊寨無寇減戍卒十二大司農丞耿壽昌為算能商功利奏言故事歲漕關東穀四百餘斛以給京師用卒六萬人宜糴三輔弘農河南上黨太原郡穀足給京師可以省關東漕卒半又奏邊郡皆築倉以穀賤時增價而糴以利農貴時減價出糶以贍貧民名曰常平倉民便之乃賜壽昌爵關內侯是時糴穀甚賤農人少利故設常平倉而蔡揆以好農而為使者勸農於郡國昔李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分減一為六萬頃治田勸農則畝益三斗不勸損亦如之增減轉為穀百八十萬石矣故農事不可以不勸糴甚貴則傷民糴甚賤則傷農民傷則離散農傷則國貧故甚貴甚賤其傷一也善為國者使民無傷而農益勸今五口之家治田百畝歲常不足以自供若不幸即有疾病死喪之費則至於甚困是以民不勸耕而糴至於甚貴也是故善平糴者必視歲上中下上熟自四中熟自三下熟自倍飢亦如之故上熟官糴三而舍一中熟官糴二而舍一下熟官糴一而舍一使民適足價平則止小飢則發小熟之所斂而糴之中飢則發中熟之所斂而糴之太飢則發太熟之所斂而糴之以相贍補故雖遭飢饉糴不甚貴而民不散穀價常平行之魏國魏國強富夏四月辛丑朔日有蝕之是謂正月朔慝未作春秋左氏傳以為重遣丞相御史掾吏二十四人循行天下舉冤獄察擅為苛禁深刻不改者甘露元年春正月行幸甘泉郊泰畤胸奴呼韓王單于遣子右賢王銖婁渠堂入侍而呼韓邪兄左賢王自立為郅支單于遣子入侍三月丁巳大司馬車騎將軍許延壽薨夏四月黃龍見新豐建章未央長樂宮鍾及筍虞銅人皆生毛長二寸許甲申太上皇廟災甲辰孝文廟災上素服五日冬呼韓邪單于遣弟左賢王朝賀二年春正月立皇太子囂為定陶王後徙為楚王詔曰乃者鳳凰甘露降集黃龍登興醴泉滂流枯稿榮茂神光並見咸受禎祥其赦天下減民算三十賜諸侯王丞相將軍二千石金錢各有差賜民爵女子百戶牛酒鰥寡孤獨高年帛朱崖郡亂夏四月遣護軍都尉張祿將兵擊之御史大夫杜延年賜安車駟馬免五月己丑廷尉于定國為御史大夫秋九月立皇子宇為東平王冬十月幸雲陽宮營平侯趙充國薨諡曰壯武侯以功德與霍光等圖畫相次於未央宮第一曰大司馬大將軍博陸侯霍光次曰衛將軍富平侯張安世次曰車騎將軍龍額侯韓增次曰後將軍營平侯趙充國次曰丞相高平侯魏相次曰丞相博陵侯邴吉次曰御史大夫建平侯杜延年次曰宗正楊德侯劉德次曰少傅梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功德知名當世以明著中興輔佐列於方叔邵虎仲山甫焉至成帝時西羌常有驚成帝思將帥之臣詔黃門侍郎揚雄即充國畫像而頌之曰明靈惟先戎有先零先零猖狂侵我西疆漢命虎臣惟後將軍整我六師是討是震既臨其域喻以威德有守矜功謂之弗剋請奮其旅于罕之羌天子命我從之鮮陽營平守節屢奏封章料敵制勝威謀靡亢遂剋西戎旅師于京鬼方賓服罔有不庭昔周之宣有方有虎詩人歌之乃列于雅在漢中興充國作武糾糾桓桓亦紹厥緒三年春正月行幸甘泉宮郊泰畤胸奴呼韓邪單于為郅支所破遂稱臣來朝上議其儀丞相霸御史大夫定國議以為聖主先諸夏而後夷狄其禮儀宜如諸侯王位次其下太子太傅蕭望之議曰單于夷狄禮儀非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上蠻夷稽首稱藩中國讓而不臣此羈縻之義謙厚之禮也書曰戎狄荒服言其來往荒忽無常如使胸奴後嗣不闕於朝饗不為叛臣信讓行乎蠻夷福祚延於無窮此萬世之長策也上令單于在諸侯王上贊謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黃金錦繡繒絮使有司導單于先行就邸荀悅曰春秋之義王者無外欲一於天下也書曰西戎即序言皆順從其序也道理遼遠人物介絶人事所不至血氣所不沾不告諭以文辭故正朔不及禮義不加非導之也其勢然也王者必則天地天無不覆地無不載故盛德之主則亦如之九州之外謂之藩國蠻夷之君列於五服詩云自彼氐羌莫敢不來王故要荒之地必奉王貢若不供職則有辭讓號令加焉非敵國之謂也故遠不間親狄不亂華輕重有序賞罰有章此先王之大禮故舞四夷之樂於四門之外不備其禮故不見於先祖獻其志意音聲而已望之欲待以不臣之禮加之以王公之上僣度失序以亂天常非禮也若以權時之宜則異論矣二月單于罷歸遣衛將軍車騎將軍騎都尉萬六千騎送單于單于歸幕南保光祿城而郅支單于遠遁胸奴遂定詔曰乃者鳳凰集新蔡衆鳥四面行列而立以萬數其賜汝南太守帛百匹新蔡長吏三老孝弟力田鰥寡孤獨帛各有差賜吏民爵二級無出今年租三月己巳丞相黃霸薨五月甲午御史大夫于定國為丞相初定國父于公為東海郯縣獄吏郡決曹掾決獄甚明理法者皆無恨郡中為之立生祠東海有孝婦少寡無子養老姑甚謹姑欲嫁之終不肯去姑告鄰人曰我年老久纍丁壯其後姑自剄而死姑女告婦殺我母吏驗治甚急孝婦自誣服具獄上府于公以為婦孝養姑十餘年以孝聞於天下必不殺也太守不聽于公爭不得乃抱具獄哭於府門上因辭病去郡中枯旱三年及後太守方召于公于公曰前有孝婦不當死枉誅咎儻在是乎於是太守殺牛自祭孝婦因表其墓天乃大雨于公其里門閭壞父老方共治之于公曰少高大令容駟馬高蓋我治獄多陰德子孫必興故人為之語曰于公高門以侍封嚴母除地以望喪定國少為文法吏及在卿位乃迎師學春秋身執經北面備弟子禮謙讓恭敬士雖貧賤徒步皆與均禮為廷尉八年持法平端朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉天下自不冤然好飲酒至一石不能亂益精明邴吉之薨也薦杜延年于定國陳萬年皆以次見用後太僕陳萬年為御史大夫萬年沛人也外行廉平內行修飾在位稱職然善事人邴吉疾病中二千石以下謁問疾吉遣家丞謝之已皆去唯萬年獨留昏夜乃歸好為曲意如此子咸剛直有異才萬年嘗召咸床下教戒之咸睡頭觸屏風萬年怒之咸叩頭謝曰且饒所言大人乃教咸諂也萬年乃不復言咸復御史中丞執法殿中公卿以下皆敬憚之頗言石顯長短為顯所奏坐漏泄省中語下獄減死後歷州郡所在令行禁止官至少府其治嚴酷倣嚴延年然性奢侈其廉不及詔諸儒博士講五經同異於石渠太子太傅望之平其議上親稱制臨決焉乃立梁丘易大小夏侯尚書穀梁公羊春秋左氏傳博士冬烏孫公主求歸年七十餘矣與烏孫男女二人俱來賜田宅奴婢朝見儀比於公主焉四年夏廣川王海陽有罪廢遷房陵冬十月丁卯未央宮宣室閣災黃龍元年春正月行幸甘泉郊泰畤胸奴呼韓邪單于來朝禮賜如初二月單于歸國詔曰朕既不明數申詔公卿大夫順民所疾苦今吏或以不禁姦邪為寬大縱釋有罪為不苛或以酷惡為賢皆失其中奉詔宣化如此豈不謬哉方今天下少事賦役省減兵革不動而民多貧盜賊不止其咎安在上計簿務為欺慢以避其課三公不以為意朕將何任御史計簿有疑不實者按之使真偽無相亂三月星孛于王良閣道入紫微宮是歲未央宮殿輅軨宮中雌雉化為雄毛衣變而不鳴無距冬十有二月甲戌帝崩於未央宮讚曰本紀稱孝宣之治信賞必罰綜核名實政事文學法治之士咸精其能至於伎巧器械之資後世鮮能及之亦足以知吏稱其職民安其業遭植胸奴乖亂推亡固存申威北狄單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興德侔殷高宗周宣矣漢武之世得賢為盛公孫弘倪寬以鴻漸之翼困於燕雀卜式發𨄍於牧羊之間非遇其時焉能致斯位乎孝武踐祚方用文武求賢如不及始以蒲輪迎枚生見主父偃而歎息群士慕義異人並出卜式試於芻牧桑弘羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦當時板築牧牛之徒明矣漢之得人於斯為盛儒雅則公孫弘董仲舒倪寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定律令則趙禹張湯文章則司馬相如滑稽則東方朔枚皋應對則嚴助朱買臣曆數則唐都洛下閎傠律則李延年運籌則桑弘羊奉使則張騫蘇武將帥則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及至孝宣承統繼修鴻業亦講論六藝招選茂異而蕭望之梁丘賀夏侯勝韋玄成嚴彭祖尹更始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相邴吉于定國杜延年治民則黃霸王成龔遂邵信臣韓延壽尹翁歸趙廣漢張敞之屬皆有功𨄍見於後世參其名臣亦其次也
