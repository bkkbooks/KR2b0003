body:
  text: 前漢孝成皇帝紀四卷第二十七元延元年春正月長安章城門牡自亡函谷關亦然谷永對曰章城門通露寢之門函谷關距山東之險城關守國之固固將去焉故門牡自飛壬戌王商復為大司馬衛將軍三月行幸雍祀五畤四月天清晏然無雲殷殷有聲如雷有流星其首如瓶長十餘丈皎然赤白從日下東南行四面或大如杵或如鷄燿燿而下如雨自晡及昏而止本志隕星而雨為王者失勢諸侯起伯之異赦天下秋七月有星孛于東井時谷永為北地太守方之官上使使問永所欲言對曰臣聞天生蒸民不能自治而立王者通理之方制海內非為天子列土封疆非為諸侯皆為民也垂三統列三正去無道開有德明天下者非一人之天下也陛下承八世之功業當陽九之標季涉三七之節紀遇無妄之卦運值六百之阨會加之以災異因之以饑饉內則有深宮後庭將有驕臣悍妾醉酒狂悖卒起之敗外則有諸夏下土將有樊並蘇令陳勝項籍之禍此臣所以為陛下破膽寒心也願陛下正君臣之義黜群小媟瀆之臣修後宮之政抑遠嬌妬之寵常近婉順之行加惠失意之人懷柔怨恨之士保至尊之重乘帝王之威朝覲法駕而後出陳兵清道而後行減損諸宮用度流恩廣施問民疾苦循行風俗宣布聖德以慰元元之心防大姦之隙至誠應天則異禍消伏何憂患之有竊恐陛下公意未專而私好尚存弗肯為耳上甚感其言復永為大司農而終黨於王氏每言無傷王氏之意專正上身與後宮而已四月光祿大夫劉向上奏曰易曰觀乎天文以察時變昔秦始皇之末及二世之初日月薄蝕山陵淪亡星辰出於四孟大白再經天無雲而雷枉失夜光熒惑襲月㜸火燒宮野禽戲庭都門內崩大人見臨洮長星孛於大角秦民以亡及項籍之敗亦孛於大角漢之入秦五星聚東井得天下之象也季夏有雨血日蝕於衝滅光星見之異孝昭有太山臥石自立上林苑中僵柳復起大星如月西行眾星隨之此為特異孝宣興起之表也天狗夾漢而西行天久不雨二十餘日昌邑不終之兆也故觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭然哉今日蝕奎婁星孛東井攝提炎及紫宮有識長老莫不振動此變之大也今同姓䟽遠母黨專政祿去公室權在外家非所以強漢之宗保守社稷安固後嗣也其事難一二而記臣謹案圖上猶須口說願賜清閑之讌指圖陳狀上納之而終不能用時上無繼嗣災異浸數向謂陳湯曰災異如此而外家日盛其漸必危劉氏吾幸同姓末屬累世家國厚恩身為宗室遺老歷事三王上以我為先帝舊臣當優禮吾吾不言誰當言者乃上封事曰臣聞人君莫不欲安而常危莫不欲存而常亡此皆失御臣之術也今王氏一姓而朱輪華轂者二十三人青紫貂蟬充牣宇內魚鱗左右大將軍秉事用權五侯驕奢僣盛並作威福出入不待報命擊斷自恣尚書九卿州牧郡守皆出其門管執樞機朋黨比周行汙而寄治身私而託公稱舉者登進忤恨者中傷遊談者為之說執政者為之言排擯宗室孤弱公族數稱燕王蓋主以疑上心避諱呂霍而不肯道內有管蔡之萌外假周公之論兄弟據重宗族盤牙歷自上古已以來未有其比物盛則必有非常之變先見其微象今王氏先祖墳墓在濟南者其梓柱生枝葉扶踈上出屋根插地中雖孝昭立石起柳之異無以過此之明也夫事勢不兩大劉氏王氏亦不並立陛下為人子孫守持宗廟而令國祚移於外親降為皂隸縱不為身柰宗廟何婦人外夫家而內父母家此亦非皇太后之福也夫明者起福於無形消禍於未然宜發明詔吐德音援近宗室黜遠外戚皆罷令就第使王氏永存保其爵位劉氏長安不失社稷所以褒睦內外子子孫孫為無疆之計也如不行此則田氏復起於今六卿復起於漢不可不深圖不可不早慮機事不密則害成矣奏上上召見向悲嘆謂曰君且休矣吾將思之以向為中壘校尉上欲用為九卿輒為王氏所排及在位大臣所抑故終不遷大位前後四十餘年年七十二卒向卒後十三年王氏篡封蕭相國後喜為酇侯時杜業說上繼絕侯之世曰昔唐虞恊和萬方致雍熙之政虞夏以多群后嚮恭已之治湯法三聖殷民太平周封八百重譯來貢是以內恕之君樂繼絕世隆名之主安存亡國至於武王伐紂不及下車德念深矣成王察牧野之剋顧群后之勤知其恩結於民心功光於天府故追先父之志錄遺老之策高其位大其宇愛敬勑厲命賜厚備大孝之隆於是為至其後世聖主嘆其功無民而不思所息之樹而猶不伐況其舊乎是以燕齊之後與周並傳子繼弟及歷載不隳豈無邪辟以祖宗之竭力故支庶賴焉漢初功臣亦皆剖符受山河之誓百餘年間而絕滅失姓枯骨孤棄於丘墓苗裔流絕於道路以往況今甚可悲傷雖難盡繼宜舉其隆功者於是封蕭何之後其餘未錄冬十一月乙未大司馬王商為大將軍辛亥商薨庚申王根為大司馬驃騎將軍張禹以光祿大夫特進居家為天子師甚見親任禹既年老自治塚塋奏請平陵肥牛亭地上許之徙亭於他地王根聞而爭之曰此地當平陵寢廟衣冠出遊之地又徙壞舊亭非所宜上不聽根由是害禹寵數毀惡之上逾敬厚禹禹疾上親臨問禹拜床下禹曰老臣有三男一女愛女甚於男遠嫁為張掖太守蕭咸妻不勝父子私請思與相近上即日徙咸為弘農太守禹小子未有官禹數視其小子即於床前拜黃門侍郎給事中長子閎官至太常第二子官至校尉國家每有大政與禹定時吏民多上書言災異諷切王氏者上意然之而未有以明也及是上乃車駕至禹家辟左右問禹以天變及民所言王氏事問禹禹自見年老子孫幼弱又與曲陽侯王根有隙恐為所害即謂上曰災異之事深遠難見故聖人罕言命性與天道子貢不得聞陛下宜以善應之與天下同福慶此經義意也淺見鄙儒亂道誤人宜無信用上雅愛信禹由是不疑王氏曲陽侯及諸王氏子弟聞禹言皆悅遂親禹焉故魯國博士朱雲上書求見公卿在前雲曰朝廷大臣皆尸祿素飡餐願賜臣尚方斬馬劍斷佞臣一人頭以勵其餘上問曰誰也曰安昌侯張禹上大怒曰小臣居下訕上庭辱師傅罪死不赦御史持雲下雲攀檻檻折雲曰臣得下從龍逢比干遊於地下足矣未知聖上何如主耳御史將雲去左將軍辛慶忌者武賢子也免冠解印綬叩頭殿下曰此臣素著狂直之名於世其言是不可誅其言非固宜容之臣敢以死爭叩頭流血上意乃解後將理檻上曰勿易因而輯之以旌直臣初元帝時五鹿充宗與石顯皆貴幸治梁丘易帝令諸易家考合異同充宗乘貴口辯諸儒莫敢與抗皆稱疾不會有薦雲能說易者雲攝齊升堂抗辭而請音動左右既論連拄充宗諸儒為之語曰五鹿嶽嶽朱雲折其角由是為博士杜陵槐里令以忤於貴戚遂稱疾廢因終於家是歲趙婕妤害後宮子時許美人生男婕妤大怒曰帝常與我言不從後宮中往來今許美人兒安從生乎以手自搏擊以頭觸壁戶柱從床上自投地涕泣不食上亦為之不食昭儀曰陛下常言不負汝今竟負約云何上曰要使天下無出趙氏上者無憂也後使中黃門靳嚴封綠囊書與許美人乃殺兒置葦篋中封發昭儀與上共視之復封函詔掖庭丞籍武埋屏處武取埋獄垣下又宮中學女史曹才官幸御上有脈生兒掖庭才官令舍人令中黃門田閎持詔記與武取才官令舍婦人新生兒及婢六人盡置暴室獄無問男女誰兒女也武迎置獄三日復令閎持詔問兒死未武對曰未有頃閎出上與昭儀大怒曰何不殺武叩頭泣即因閎奏封事曰陛下未有繼嗣子無貴賤宜皆留意奏入上令閎持詔與我夜上水五刻令持兒與中黃門王舜會掖門武以兒付舜舜受詔內兒殿中為擇乳母告養善視之無令漏洩時兒生八九日昭儀聞之大怒後三日詔賜才官藥令自殺才官曰我兒男也額上有壯髮類孝元帝今兒安在柰何令長信得聞之遂飲藥死及婢六人皆自殺後十餘日詔取兒去不知復何置之二年春正月行幸甘泉郊泰畤時三月行幸河東祠后土四月立廣陵孝王子憲為王冬行幸長楊宮從胡客大校獵初烏孫末振將殺大昆彌會病死漢誅未加於是遣右中郎叚會宗發戊巳校尉諸侯國兵即誅末振將太子番丘會宗恐大兵入烏孫驚番丘逃亡不可得即選精兵騎弩四十張徑至昆彌所在召番丘數其罪以手劍擊殺之小昆彌烏黎靡者末振將從兄子也勒兵數千騎圍會宗會宗謂言來誅之意今圍殺我如去漢牛一毛耳宛王郅支懸頭於藁街小昆彌曰何不豫告我令飲食之邪會宗曰豫告之恐亡匿為大罪即飲食之以付我恐傷骨肉之恩耳昆彌咸服號泣而罷會宗還賜爵關內侯會宗天水人也三年春正月丙寅蜀郡岷山崩擁江水竭逆流三日乃通劉向以為岐山崩三川竭而周幽王亡岐山周之所興也蜀郡本漢所興今所起之地山崩水竭殆必亡矣二月封侍中衛尉淳于長為定陵侯三月行幸雍祠五畤四年春正月行幸甘泉館二月罷司隸校尉官三月行幸河東祠后土甘露降於京師有石隕於關東二綏和元年春正月赦天下二月戊午御史大夫孔光貶為廷尉廷尉何武為御史大夫癸丑立定陶王昕為太子光祿師丹為太子太傅初王祖母傅太后陰為王求漢嗣私事趙皇后及昭儀及帝舅王根皆勸立定陶王於是引大臣入禁中議丞相方進大司馬王根右將軍廉褒後將軍朱博皆以為定陶帝弟之子也禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣孔光以為非禮立嗣以親中山王先帝之子帝之親弟也以尚書盤庚言之弟及王為比中山宜嗣上以禮兄弟不相入廟又皇后昭儀有言遂立定陶王光以議不合上意故左遷廷尉荀悅曰聖人立制必有所定所以防忿爭一統序也春秋之義立嫡以長立子以貴是以言嫡無二也貴有常也以弟及兄則貴有常矣兄弟之子非一也不可以為典雖立其長猶非正也且兄弟近而親所以繼父也兄弟子踈而卑所以承亡也俱非正統拾親取踈廢父立子非順也以弟繼父近于義矣春秋傳曰太子亡則立母弟無則立長立均以順義均則卜之道也立楚孝王孫景為定陶王封中山王舅馮參為宜鄉侯益封中山王三萬戶以慰王心詔求殷後封孔吉為殷紹陽嘉侯三月進爵為公及周承休侯皆為公各食邑百里行幸雍祠五畤夏四月乙丑大司馬驃騎將軍王根為大司馬罷車騎大將軍官御史大夫何武更為大司空封氾鄉侯益大司馬大司空位秩如左丞相是為三公先是武為廷尉奏言王者法天三光備三公官各為分職今丞相獨兼三公職所以久廢而不治宜建三公之官分職更任以為考功效至是乃置之武字君君公蜀郡郫人仁厚好進士疾朋黨絕請託其臨州郡無赫赫之名去後常見思初武兄弟五人皆為吏郡縣敬之弟顯家有市籍租顯數負其課市事嗇夫仇啇商捕辱顯家顯怒之武曰以吾家租稅不為眾先奉公吏不亦宜乎武即白於太守召之為吏州里服焉及為三公功名略比薛宣其才不及也而經術正直過之時司空掾平陽何並字子廉武高其志節舉為長陵令道不拾遺時邛城太后家貴寵王林卿為侍中通輕俠傾京師免官歸過長陵上塚因留數日並恐其犯法自造門謁曰誼以時歸先是林卿殺人埋塚舍下並陰知之非並時事不發覺林卿怨並遣之北渡渭橋令騎奴還拔刀剝寺門建鼓並即從吏兵追林卿行數十里林卿窘迫令奴冠已冠自身從間道馳去及追及冠奴遂收之奴曰我乃奴耳並心知已失林卿乃因曰王君困乃稱奴得免死邪並斬奴頭并所剝建鼓置都亭下書其罪吏驚駭以為林卿實死由是威名流行後為潁川太守潁川鍾元為尚書令領廷尉甚用事有權元弟威為郡掾犯罪贓千金並過辭廷尉廷尉為弟免冠請一等之罪並曰罪在身君弟與君法律不在太守既至郡威所犯多在赦前並敕吏驅使入函谷關無令汙民間不入關乃收之威留止洛陽吏遂格殺之及誅俠趙季李款等郡中清肅並廉潔妻子不到官終潁川遺令勿受賻賵椁足周棺棺足掩尸而已其治名次黃霸秋八月庚戌中山王興薨冬十月甲寅大司馬根病免十一月立楚孝王孫景為定陶王定陵侯淳于長大逆不道下獄死長與廢許后姊孊私通許后因孊賂遺長欲求復為婕妤長受許后金錢乘輿服御物前後千餘萬詐言欲白上立為左右皇后孊每入長信宮長輒與孊書戲侮許后慢易無所不言交通書記賂遺連年曲陽侯根輔政以久病免長次第當代根王莽害長寵因曰根曰長私與許貴人姊交通受其衣服又見將軍久病私喜對人議謁相署根怒令莽白之上怒免長官就國長素與涇陽侯立有隙及長就國因立子融厚賂立立為長固請上疑之下有司案驗吏捕融立令融自殺以滅口上愈疑遂遞長繫獄窮治其罪服戲謔長信宮謀立左皇后長死於獄妻子徙合浦長母歸故鄉立歸國許貴人賜藥死侍中光祿大夫莽以首發大姦拜大司馬時年三十八莽既拔出同列繼四父而輔政欲令名譽過前遂剋己忘倦招延賢良賞賜邑俸盡以享士身執謙約母病公卿列侯遣夫人問疾莽妻迎之衣不曳地著布蔽膝見者以為僮僕使人問乃知其夫人其飾名如此十二月罷刺史置州牧秩二千石是歲犍為得石磬十六枚議者以為善祥劉向說上曰宜設辟雍陳禮樂以風化天下雖不能具夫禮樂以養人為本就有過差是過於養人也刑罰之過或至死亡今禮樂雖非唐虞之典刑罰亦非咎繇之則而有司請定刑罰至於禮樂則曰不敢是敢於殺人而不敢於養人也有刑罰而無禮樂大不備也為其俎豆管絃之間小不備因是絕而不為是去小不備而就大不備也教化比於刑罰教化重而刑罰輕是舍所重而急所輕也且教化所恃以為治刑罰助治者也今廢所治而獨立其所助非所以治太平也夫承千歲之衰周繼妄秦之餘緒民漸漬惡俗不親大化終以不改上以向言下公卿立辟雍會向病卒丞相大司空營表長安城南將立辟雍未及作二年春正月行幸甘泉宮郊泰畤二月壬子丞相翟方進薨是時熒惑守心占者以為大臣當應之以塞災異上召方進告之方進不得已乃自殺上秘之加贈禮親臨喪赦天下大水平襄縣有燕生雀哺食至大俱飛去太僕廄馬生角在左耳前圍長各一寸八分行幸河東祠后土三月丙午帝崩於未央宮上素康壯無疾病向晨欲起因失音不能言晝漏十刻而崩眾皆歸罪於趙昭儀昭儀自殺富平侯張放素親幸放不奉法度太后及大臣以為言上涕泣而遣之就國及上崩放思慕哭泣而卒荀悅曰放非不愛上忠不存焉故愛而不忠人之賊也上崩辟雍遂不立左將軍孔光為丞相皇太后詔曰皇帝即位定郊祀已來未有皇子故復甘泉泰畤汾陰后土祠卒不蒙福其復南北郊於長安如前夏四月己卯皇帝葬延陵自崩及葬三十四日延陵在扶風去長安六十二里讚曰本記稱孝成帝善修容儀陞車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容貌也博覽古今容受直言公卿稱職威儀可述遭世承平上下和睦然沈於酒色趙氏內亂外家擅朝言之可為於邑建始已後王氏始執國命迄為哀平莽遂篡位蓋其威福所由來漸矣劉向朱雲之忠言明矣若得而用之福祚未已張禹不吐直言佞於垂死亦可痛哉
