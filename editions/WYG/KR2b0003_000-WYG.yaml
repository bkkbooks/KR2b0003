body:
  text: 漢紀編年類提要臣等謹按漢紀三十卷漢荀悦撰悦字仲預潁隂人獻帝時官秘書監侍中後漢書附見其祖荀淑𫝊稱獻帝好典籍以班固漢書文繁難省乃令悦依左氏𫝊體為漢紀三十篇詞約事詳論辨多美張璠漢記亦稱其因事以明臧否致有典要大行於世唐劉知㡬史通六家篇以悦書為左𫝊家之首其二體篇又稱其厯代寳之有踰本𫝊班荀二體角力爭先其推之甚至故唐人試士以悦紀與史漢為一科文獻通考載宋李燾跂曰悦為此紀固不出班書亦時有所刪潤而諫大夫王仁侍中王閎諫疏班書皆無之又稱司馬光編資治通鑑書太上皇事及五鳯郊泰畤之月皆舍班而從荀葢以悦修紀時固書猶未舛訛又稱其君蘭君簡端興譽寛竟諸字與漢書互異者先儒皆两存之王銍作两漢紀後序亦稱荀袁二紀於朝廷紀綱禮樂刑政治亂成敗忠邪是非之際指陳論著每致意焉反覆辨達明白條暢啟告當代而垂訓無窮是宋人亦甚重其書也其中若壺闗三老茂漢書無姓悦書云姓令狐朱雲請上方劍漢書作斬馬悦書乃作斷馬證以唐張渭詩願得上方斷馬劍斬取朱門公子頭句知漢書字誤資考証者亦不一近時顧炎武日知録乃惟取其宣帝賜陳遂璽書一條及元康三年封海昏侯詔一條能改正漢書三四字其餘則病其叙事索然無意味間或首尾不偹其小有不同皆以班書為長未免抑揚過當又曰紀王莽事自始建國元年以後則云其二年其三年以至其十五年以别於正統而盡沒天鳯地皇之號云云其語不置可否然不曰盡削而曰盡沒似反病其疎畧者不知班書莽自為𫝊自可載其偽號荀書以漢系編年豈可以莽紀元哉是亦非確論不足為悦病也是書考李燾所跋自天聖中已無善本明黄姬水所刋亦間有舛訛康熙中襄平􅃽國祥􅃽國祚與袁宏後漢紀合刻後附两漢紀字句異同考一卷今用以叅校較舊本稍完善焉乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書前漢紀卷一漢
  hash: sha256:ce1ee97da3f9a4c084689a96c6199fd963bb6f86889062d1e8bf6bf123f967c0
