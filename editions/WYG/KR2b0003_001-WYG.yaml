body:
  text: 荀恱撰髙祖一昔在上聖唯建皇極經緯天地觀象立法乃作書契以通宇宙揚於王庭厥用大焉先王以光演大業肆於時夏亦唯翼翼以監厥後永世作典夫立典有五志焉一曰達道義二曰彰法式三曰通古今四曰著功勲五曰表賢能於是天人之際事物之宜粲然顯著罔不能備矣世濟其軌不殞其業損益盈虛與時消息雖臧否不同其揆一也是以聖上穆然惟文之䘏瞻前顧後是紹是維臣恱職監祕書攝官承乏祗奉明詔竊惟其宜謹約撰舊書通而叙之緫為帝紀列其年月比其時事撮要舉凡存其大體㫖少所􅆙務從省約以副本書以為要紀未克厥中亦各其志如其得失以俟君子焉漢興繼堯之胄承周之運接秦之弊漢祖初定天下則從火徳斬蛇著符旗幟尚赤自然之應得天統矣其後張蒼謂漢為水徳而賈誼公孫𢎞以為土徳及至劉向父子乃推五行之運以子承母始自伏羲以迄於漢宜為火徳其序之也以為易稱帝出乎震故太皞始出於震為木徳號曰伏羲氏共工氏因之為水徳居水火之間霸而不王非其序也炎帝承木生火固為火徳號曰神農氏黄帝承之火生土故為土徳號曰軒轅氏帝少昊滅帝摰承之土生金故為金徳號曰金天氏帝顓頊承之金生水故為水徳號曰髙陽氏帝嚳承之水生木故為木徳號曰髙辛氏帝堯始封于唐髙辛氏衰而天下歸之號曰陶唐氏故為火徳即位九十載禪位于帝舜號曰有虞氏故為土徳即位五十載禪位于伯禹號曰夏后氏故為金徳四百四十二年湯伐桀王天下號曰殷為水徳六百二十九年武王滅紂王天下號曰周為木徳七百六十七年秦昭王始滅周而諸侯未盡從至昭王之曽孫政遂并天下是為始皇帝有天下十四年猶共工氏焉非其序也自周之滅及秦之亡凡四十九年而漢祖滅秦號曰漢故為火徳矣在昔陶唐之後有劉累者以御龍事孔甲為御龍氏在商為豕韋氏在周為唐杜氏其適晉國者為范氏别處秦者為劉氏當戰國時劉氏徙于魏遷于沛之豐邑處中陽里而髙祖興焉漢髙祖諱邦字季初昭靈后嘗息大澤之陂夢與神遇是時雷電晦冥太上皇視之見蛟龍臨之遂有娠而生髙祖隆準龍顔美須髯左股有七十二黑子寛仁愛人有大智度曽為泗水亭長嘗從王媪武負貰酒每飲醉留寢其家上嘗見光怪負等異之輒折契棄券而不責單父人呂公好相人有女以為貴避讎于沛沛令求其女不與及見髙祖狀貌公竒之因以女妻焉是為呂后生孝惠魯元公主嘗有老父過乞漿相呂后孝惠魯元公主皆大貴也及見髙祖乃大喜曰夫人兒子䝉君之力也君貴不可言也遂去不復見髙祖以亭長送徒驪山夜行經豐西澤中有蛇當道拔劍斬之遂過後人至者見一老嫗哭蛇曰此白帝子也向赤帝子遇而殺之嫗因忽然不見髙祖亡避吏於山澤中呂后常知其處云髙祖所在上有赤色雲氣占氣者山東有天子氣秦始皇帝乃東遊欲以厭之秦二世胡亥元年秋七月𤼵閭左屯漁陽陽城人陳勝字涉陽夏人吳廣字叔皆為屯長行至蘄㑹天大雨度已失期失期法當斬遂因天下之怨謀叛陳勝以繒為書置魚腹中曰陳勝王令人賣之士卒得魚者故已怪之矣又令吳廣夜於叢祠中構火作狐鳴曰大楚興陳勝王衆乃大驚遂殺其將尉號令徒屬稱大楚勝為大將軍廣為都尉攻掠城邑至陳衆數萬人勝自立為楚王大梁人張耳陳餘諫曰將軍出萬死之計為天下除殘賊今始至陳為王是示天下私也不如立六國後自為樹黨進師而西則野無交兵縣無守城誅暴秦安據咸陽以令諸侯天下可圖也勝不聴以陳人武臣為將軍耳餘為校尉北徇趙地當此之時楚將徇地者甚衆楚兵數千聚黨者不可勝數以吳廣為假王監諸將以周文為將軍衆十餘萬西至戲水蓋百二十萬矣秦令將軍章邯赦驪山作徒七十萬人以擊之是時吳廣别圍滎陽不能下將軍田臧等謀曰假王驕不可與計謀乃矯陳王命誅吳廣進兵而西是嵗太白再經天占曰法為大兵天下易王九月沛人殺其令髙祖為沛公蕭何為丞相曹參周勃以中㳙從夏侯嬰樊噲為舍人蕭何即沛主獄吏曹參沛獄掾嬰沛廏騶勃以織簿為産噲以屠狗為事皆公之舊也是時沛公在外黄兵衆數百人蕭何等欲應陳勝故召沛公立之収沛子弟得三千人而項籍亦起兵㑹稽籍字羽故楚將項燕之孫也羽初起時年二十四身長八尺二寸目重瞳子力能扛鼎與季父項梁避讎於吳梁好為辯說隂有大志吳中賢士大夫皆出梁下梁乃與籍殺㑹稽太守殷通佩其印綬自號為㑹稽將籍為禆將徇下邳縣張耳陳餘既至趙說豪傑曰秦為亂政虐刑殘賊天下北有長城之役南有五嶺之戍内外搔動百姓罷弊財匱力盡重以苛法使天下父子不相聊生陳王奮臂為天下唱始莫不響應於此時不成封矦之業者非人豪也因天下之力誅無道之秦報父兄之讎而成大業者此壯士之一時也皆然其言乃收兵數萬人遂下趙十餘城武臣自號為武信君進軍圍范陽范陽人蒯通為其令徐公說武信君曰范陽令欲以其城先下君而君不利之則諸守皆為金城湯池不可攻也君計莫若以黄屋朱輪以迎范陽令使馳騖乎燕趙之郊則邉城皆喜相率而降此由以下坂而走丸也武信君乃以侯迎徐公燕趙聞之降者三十餘城耳餘聞諸將徇地者多以讒得罪又怨陳王不以已為將軍乃立武臣為趙王陳王欲誅其家柱國房君賜諫曰秦王未亡而誅趙王家是復生一秦也不如因賀之令進兵擊秦勝從之耳餘與趙王謀曰王王趙非楚意也楚已誅秦必加兵於趙不如北徇燕地以自廣南據大河北有燕代楚雖勝秦不敢制趙若不勝秦必重趙趙承秦楚之弊可以得志於天下乃使韓廣北徇燕地燕人欲立廣廣曰母在趙不可也燕人曰夫以楚之强不敢害趙趙獨安敢害將軍之家廣乃自立為王而趙亦歸其家趙王略地燕界閒行為燕君所得囚之以求割地趙使請王燕輒殺之有厮養卒請使燕軍說燕將曰夫張耳陳餘與武臣俱杖馬䇿下趙數十城豈樂為人臣哉顧其勢初定且以長幼相次先立武臣以持趙心今趙地已服此二人名為求王實欲令燕殺之而分王其地夫以一趙尚陵弱燕今以兩賢王立左提右挈而齎直義破燕必矣燕乃遣趙王厮養卒為御而歸魏人周市為陳王定魏魏人欲立市市曰國家昬亂忠臣乃見乃請於陳王立故魏公子咎為魏王故齊王田氏之族儋亦殺縣令自立為齊王章邯敗楚軍殺周文於邯鄲殺田臧於敖倉楚將皆敗秦遂攻陳破之沛公二年冬十月秦將圍沛公於豐出與戰敗之十一月沛公引兵之薛令雍齒守豐趙將李良為章邯所招遂叛以兵襲武臣武臣死張耳陳餘出走十二月陳勝之御莊賈殺陳勝以降秦楚人葬之碭諡曰隠王勝故中涓人呂臣復收餘兵攻陳以殺莊賈是時勝先令將軍秦嘉掠地及勝死嘉立景駒為楚王初勝嘗與人傭耕相謂曰冨貴無相忘耕者笑曰汝今傭耕何冨貴也勝曰鷰雀安知鴻鵠之志哉及勝為王耕者叩門曰吾欲見渉勝見之出入輕慢益𤼵舒勝貧賤故毁傷威重勝斬之故人皆棄而去由是無親勝者以朱房為忠正胡武為司過以苛察為忠而勝任之是故諸將不親附此其所以亡也雍齒以豐叛降于魏春正月張耳陳餘收趙衆擊李良良敗走歸章邯耳餘乃立舊趙之後趙歇為趙王沛公將見景駒遇張良于留良韓人其先五世相韓及韓亡良弟死不𦵏悉以家財求客報讎彊秦秦始皇東游良募力士擊之誤中副車亡匿下邳游于圯上有一老父至直墮其履顧謂良曰孺子下取履良甚怪愕為其老乃取履跪而進之父曰孺子可教矣後五日與吾㑹此及期而良後至老父怒之凡三期而良先至老父乃喜遺書一編曰讀此即為王者師後十三年見我于濟北穀城山下黄石即我矣遂去不復見其書乃太公兵法也良乃以說沛公沛公善之良曰沛公殆天所授故遂屬焉項梁以八千人渡江聞陳嬰已下東陽欲與連和嬰者故東陽令史縣中欲立為王嬰母曰汝家世貧賤今暴得大名不祥不如以兵屬人事成猶得封侯事不成禍有所歸而易以亡嬰遂以兵屬梁黥布亦以兵屬梁焉布六人也少時客相之當黥而王及其黥也乃欣然而喜輸徒驪山遂亡走至江中聚徒屬而從項梁夏四月項梁殺景駒及秦嘉止薛沛公往從之梁益沛公兵遂攻豐拔之雍齒奔魏居巢人范増年七十餘說梁曰秦滅六國楚最無罪自懷王入秦不反楚人憐之故語曰楚雖三戸亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚􅑣起之將皆争附君者以君世世楚將為能復立楚後也梁乃求懷王之孫心心為人牧羊六月楚心立號曰懷王陳嬰為上柱國梁為大將軍號武信君封沛公為武安侯為碭郡長張良亦說項梁立韓公子成為韓王良為司徒略韓地章邯遣兵攻魏魏將周市請救于齊楚市以二國師不至章邯擊殺市遂圍臨濟魏王咎偽使其人納降而自殺章邯進伐齊殺田儋儋從弟榮收餘兵保東阿齊王建之弟田假自立為齊王田角爲相田簡為將軍章邯圍東阿沛公項梁救之大破章邯秋七月大雨霖至于八月田榮歸逐田假立儋子市為王己為相榮從弟横為將軍田假奔楚田角田簡奔趙項梁遂追秦軍使召齊王兵俱西榮曰楚殺田假趙殺角簡乃出兵梁曰田假窮來投我我不忍殺齊使曰夫虺蝮螫手則斷手螫足則斷足為其害體也夫田假角簡之在楚趙豈有手足之戚何故不殺梁不聴齊遂不肎出兵沛公項梁敗秦師于雍丘斬秦將李由而梁益輕秦有驕色故楚令尹宋義諫曰臣聞戰勝將驕卒惰者敗今卒少惰矣秦兵日盛臣為君畏之梁不聴使宋義于齊遇齊使者義曰武信君必敗公徐行即免疾行必及禍矣九月章邯大破楚於定陶項梁死齊使徐行不及禍也魏王咎之弟豹復收衆自立為魏王楚懷王都彭城約諸侯曰先入咸陽者王之章邯既敗項梁以楚不足憂乃北伐趙大破之趙王歇保鉅鹿秦將王離圍之章邯軍其南築甬道而輸之粟楚救趙以宋義為上將號曰卿子冠軍項羽為次將范増為下將遣沛公别西入闗於是灌嬰以中涓從嬰洛陽販繒者也是時曹參數有戰功封為執帛侯號建成君沛公三年冬十月齊將田都叛田榮將兵助楚十有一月楚師至于河上項羽謂宋義曰疾引兵渡河我擊其外趙應其内破秦軍必矣義曰不然今秦攻趙戰勝則兵罷我承其弊不勝則我鼓行而西必舉秦矣故不如鬭秦趙夫擊輕銳我不如公坐運籌䇿公不如我因令軍中曰猛如虎很如羊貪如狼彊不可令者皆斬遣其子襄相齊身送之至無鹽飲酒髙㑹羽曰將軍戮力伐秦而久留不行嵗饑民貧卒食半菽軍無見糧乃更飲酒髙㑹不因趙食與并擊秦乃曰承其弊夫以秦之彊攻新造之趙其勢必舉趙趙亡而秦益彊何弊之承且國兵新破王寢不安席埽境内而屬之將軍國家安危在此一舉今不䘏士卒而徇私非社稷之臣也羽乃晨朝宋義即入帳中斬宋義頭以出令軍中曰宋義與齊王謀反王隂令籍誅之乃使報命於王王以羽為大將軍十有二月項羽濟河沈船破釡燒廬舍令人持三日糧至則圍王離與秦軍遇九戰九勝絶甬道大破秦軍虜王離當此時諸矦救鉅鹿者十餘壁莫敢進及楚擊秦諸矦皆從壁上望楚戰士無不一當十又羽呼聲動天地諸矦軍人人莫不怖懼於是既破秦軍羽見諸矦上將入轅門膝行而前莫敢仰視羽者由是為諸矦上將軍兵皆屬羽焉於是羽威權遂振四海初宋義與項羽將五萬距秦三將當王離與羽大戰時精兵四十萬衆并章邯軍故也是時枉矢西流如火流星虵行若有首尾廣長如一匹布著天枉矢星墜至地即石也枉矢所觸天下所共伐也凡枉矢之行以亂平亂項羽伐秦之應沛公又敗秦軍于栗邑陳餘遺章邯書曰白起為秦將南拔鄢郢北坑馬服攻城略地不可勝計卒賜死于杜郵䝉恬北逐戎人開榆中之地數千里竟死于雲陽何者功多而秦不能封因以法誅之今將軍為將三年所亡失以十萬數而諸矦並起丞相趙髙専政日久今事急恐二世誅之必因以法誅將軍以塞責使人更代以免其禍將軍居外久多内隙有功必死無功亦死且夫天亡秦愚智皆知之今將軍内不能直諫外為亡國將孤立而欲長存豈不哀哉章邯狐疑隂與項羽約未決鉅鹿之圍陳餘以數萬人軍在鉅鹿北力不能救趙張耳令張靨陳釋召餘餘遣靨釋將五千人當秦軍皆没及罷圍耳責怒餘餘曰所以不進死欲報秦也今赴秦軍如以肉餧虎當何益也耳又以為餘殺靨釋餘怒曰不意君之望臣深也乃解印綬去耳取之遂收其軍餘與數百人之河上漁獵初耳餘為刎頸交俱隠身為里監門餘常父事耳由是有隙春二月沛公過髙陽酈食其為里監門年六十餘縣中謂之狂生乃求見沛公沛公方踞牀令兩女子洗足食其長揖不拜曰足下必欲舉義兵誅無道秦不宜踞見長者沛公輟洗謝之食其進計曰天下之郡陳留當衝四通五達之郊也又多積粟臣請使其令下公即不聴舉兵攻之臣為内應破陳留必矣於是沛公引兵隨而攻之遂取陳留號食其為廣野君食其言弟商以為將軍時商聚黨數千人以兵屬焉夏六月沛公攻宛韓王使張良從南陽太守呂齮保城不下沛公欲遂西張良曰彊秦在前宛兵在後此危道也乃圍宛宛急南陽太守呂齮擬自殺其舍人陳恢逾城出見沛公曰宛吏懼死皆堅守足下盡力攻之死傷者必衆引兵西去宛必隨之足下前則失咸陽之約後有彊宛之患不如降之封其守引其甲卒而西諸城未下者必開門而待足下矣沛公曰善秋七月封南陽太守齮為殷侯封陳恢為千戸侯引兵而西無不下者軍所過不虜掠秦民喜章邯遂降項羽盟于殷墟之上立邯為雍王置軍中長史欣為上將將秦降卒前行八月沛公攻武闗趙髙殺二世以請和求分王闗中沛公不聴髙乃立二世兄之子嬰為王嬰立誅滅趙髙遣兵距嶤闗張良曰秦兵尚彊未可輕也願益張旗幟諸山上為疑兵令酈食其持重寳以啗秦將秦將果欲連和俱西沛公欲聴之良曰今獨其將欲叛士卒恐不從不從必危不如因其懈而擊之乃擊秦軍大破之遂至藍田前漢紀卷一
