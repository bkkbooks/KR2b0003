body:
  text: 漢祕書監侍中荀恱凡漢紀十二世十一帝通王莽二百四十二年一祖三宗高祖定天下孝惠高后值國家無事百姓安集太宗昇平世宗建功中宗治平昭景稱治元成哀平歷世陵遲莽遂簒國也凡祥瑞黃龍見鳳凰集麒麟臻神馬出神鳥翔神雀集白虎仁獸獲寳鼎昇寳磬神光見山稱萬歲甘露降芝草生嘉禾茂玄稷降醴泉涌木連理凡災異大者日蝕五十六地震十六天開地裂五星集于東井各一太白再經天星孛二十四山崩三十四隕石十一星隕如雨二星晝見三火災二十四河漢水大汎溢爲人害十河汎一冬雷五夏雪三冬無氷二天雨血雨草雨魚死人復生男子化爲女子嫁爲人婦生子枯木更生大石自立建安元年上巡省幸許昌以鎭萬國外命亢輔征討不庭内齊七政允亮聖業綜練典籍兼覧傳記其三年詔給事中祕書監荀悅抄撰漢書略舉其要假以不直尚書給紙筆虎賁給書吏悅于是約集舊書撮序表志揔爲帝紀通比其事例繫年月其祖宗功勲先帝事業國家綱紀天地災異功臣名賢竒策善言殊德異行法式之典凡在漢書者本末體殊大略粗舉其經傳所遺闕者差少而求志勢有所不能盡繁重之語凡所行之事出入省要刪畧其文凡爲三十卷數十餘萬言作爲帝紀省約易習無妨本書有便於用其㫖云爾㑹悅遷爲侍中其五年書成乃奏記云四百有一十六載謂書奏之歲歲在庚辰昔晉之乗楚之檮杌魯之春秋虞夏商周之書其揆一也皆古之令典立之則成其法棄之則墜於地瞻之則存怱焉則廢故君子重之漢書紀其義同矣凡漢紀有法式焉有監戒焉有廢亂焉有持平焉有兵略焉有政化焉有休祥焉有災異焉有華夏之事焉有四夷之事焉有常道焉有權變焉有策謀焉有詭說焉有術藝焉有文章焉斯皆眀主賢臣命世立業群后之盛勲髦俊之遺事是故質之事實而不誣通之萬方而不泥可以興可以治可以動可以靜可以言可以行懲惡而勸善奬成而懼敗兹亦有國之常訓典籍之淵林雖云撰之者陋淺而本末存焉爾故君子可觀之矣
