body:
  text: 前漢紀卷五漢荀恱撰孝惠一皇帝五月丙寅即位年十六尊髙后曰皇太后凡帝母稱皇太后帝祖母稱太皇太后適稱皇后妾稱夫人又有美人良姉七子八子長使少使之號武帝制婕妤娙娥容華充衣而元帝加昭儀之號昭儀位視丞相爵比諸侯王婕妤視上卿爵比列侯娙娥視中二千石爵比闗内侯容華視真二千石爵比大上造美人視二千石比少上造八子視千石爵比中更充衣視九百石爵比左更七子視八百石比右庶長良姉視七百石比左庶長長使視六百石比五大夫少使視四百石比公乗又有五官視三百石順常視二百石涓和娯保林良使者皆視百石上家人子中家人子視有秩斗食賜吏民爵其喪事將軍已下至佐長吏賜金錢各有差六百石已下有罪當刑械者皆容繫之民年七十已上十歳已下有罪當刑者免之吏六百已上及故二千石家唯給軍賦役無有所預叔孫通為太常定園陵宗廟及髙祖廟奏武徳文始五行之舞武徳者髙祖所作以象天下樂已行武以除亂也文始舞者本舜韶舞也髙祖更名文始舞五行舞者本周舞也秦始皇更名五行舞太祝迎神于廟門外奏嘉至猶古降神之樂也皇帝入廟門奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌不以管絃欲使在位者遍聞之猶古清廟之樂也歌再終下奏休成之樂美神明既饗也皇帝既就東廂坐定奏永安之樂美禮已成也令郡諸侯王立髙廟元年冬改諸侯王相國為丞相十二月趙王如意薨謚曰隱王先是太后囚戚夫人于永巷髠鉗之令舂且歌曰子為王兮母為虜終日常舂兮與死同伍相去數千里誰可使告汝吕后聞之曰欲倚弱子邪召趙王欲誅之趙相周昌令王稱疾使者三反王不行吕后乃召周昌周昌至復使召趙王上知太后怒自迎王于霸上挾與起居數月上晨出苑中獵趙王不能早起太后鴆而殺之周昌乃謝病不朝見吕后乃斷戚夫人手足去眼熏耳飲以喑藥使居鞠室中名曰人豕召帝視之帝驚乃大哭因病歳餘不能起使人謂太后曰此非人所為臣不堪為太后子終不能治天下遂不聼政事賜民爵初元年故也凡賜民爵所以宣恩惠慰人心必有所由也徙淮陽王春正月城長安二年冬十月齊王来朝王上之庶兄也上與王讌飲太后前置王上坐如家人禮太后怒酌鴆酒令齊王為夀齊王起上亦起太后恐自反巵酒王怪之因偽醉而出齊内史令王獻城陽郡以尊魯元公主為湯沐邑太后嘉而許之乃遣王歸國春正月癸酉有兩龍見於蘭陵人家井中乙亥夕始不見本志以為其後趙王幽死之象隴西地震天開東北廣十餘丈長二十丈餘本志曰地動隂有餘天裂陽不足人主微之應夏五月大旱郃陽侯仲薨七月相國蕭何薨謚文終侯初何病上自臨問百歳之後誰可代君者對曰知臣莫若君上曰􅔟參何如對曰陛下得之矣何死不恨初何買田宅必居窮僻處為家不治園屋且曰後世賢師吾約不賢毋為勢家所奪癸巳齊丞相􅔟參為相國初參在齊召長老諸先生數百人問以時政長老諸先生言人人殊異膠西蓋公治黄老術曰治道貴清静而民自定參乃師蓋公齊國大治初田榮欲叛項羽劫齊處士不預者死齊處士東郭先生梁石君隱在劫中及榮敗二人媿之隱居深山蒯通謂􅔟參曰彼東郭先生隱居不出君未嘗卑禮下節以求士也願足下禮之參曰諾皆以為上客而齊人安期生甞干項羽項羽不用其䇿已而羽欲封之亦不肯受封􅔟參聞蕭何薨告其舎人曰趣治行吾且入相矣使者召參參始微時與蕭何善及為齊相有隙至何疾所推賢惟參參為相國遵何之政擇郡國吏謹厚者則除為丞相史其文刻深務聲名者輒斥去之日夜飲酒見人有細過専覆蓋之府中無事上怪而問參不治政事之意參對曰陛下聖徳孰與髙皇帝上曰朕安敢望先帝又問陛下視臣孰與蕭何上曰君似不及也參曰陛下言之是也髙皇時與蕭何定天下法令既具陛下垂拱臣等守職遵而勿失不亦可乎上曰善民歌之曰蕭何為法較若畫一􅔟參代之守而勿失載其清静民因寧謐三年春彂京師六百里内男女十四萬六千人築長安城三十日罷以宗室女為公主妻匈奴單于夏五月立閩越君繇為東海王初繇與諸粤俱佐諸侯伐秦繇功未錄故立為王都甌東號東甌六月彂諸侯王列侯徒屬一萬人城長安秋七月都廏災南越王尉佗稱臣奉貢殞石于緜諸一四年十月立皇后張氏帝長姊魯元公主女也太后欲為重親故配帝荀恱曰夫婦之際人道之大倫也詩稱刑于寡妻至于兄弟以御于家邦易稱正家道家道正而天下大定矣姊子而為后昬於禮而黷於人情非所以示天下作民則也羣臣莫敢諫過哉春二月舉民孝弟力田者復其身三月大赦天下除民挟書律長樂宫鴻臺災雨血于冝陽一頃本志以為血者洪範所謂赤祥也一曰凡雨血有大誅七月未央宫冰室災丙子織室災本志以為冰室奉供養之饋織室供宗廟衣服皇后之象也天誡若曰皇后無宗廟之徳云耳後嗣果絶其于洪範為火不炎上視不明之咎洪範者天人之變其法本于五行通於五事善惡吉凶之應於是在矣五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰従革土爰稼穡田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上好治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓飾城郭侵邊境則金不従革簡宗廟不禱祠廢祭祀逆天時則水不潤下五事一曰貌二曰言三曰視四曰聼五曰思木為貌貌曰恭恭作肅肅時雨若厥福攸好徳貌失厥咎狂厥罰常雨厥極惡時則有服妖時則有龜孽時則有雞禍時則有下體生於上之痾時則有青眚青祥惟金沴木金為言言曰従従作乂乂時𤾉若厥福康寧言失厥咎僭厥罰常𤾉厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟火沴金火為視視曰明明作哲哲時燠若厥福夀視失厥咎舒厥罰常燠厥極疾時則有草妖時則有蠃蟲之孽時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火水為聴聴曰聦聦作謀謀時寒若厥福富聦失厥咎急厥罰常寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黒眚黒祥惟土沴水土為思思曰心心曰叡叡作聖聖時風若厥福考終命思失厥咎霧厥罰常風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有腹心之痾時則有黄眚黄祥惟金木水火沴土皇之不極厥咎眊厥罰常隂厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行此洪範之大體也五年十月雷桃李杏棗實常燠也春正月彂京師六百里内男女十四萬五千人築長安城三十日罷三月上遊離宫叔孫通曰古者春常獻果今櫻桃始熟願陛下取獻宗廟諸果獻自此始初通秦時徴為待詔陳勝等起反二世詔問羣臣博士羣臣博士咸曰君親無將將而必誅宜急彂兵擊反賊二世怒通進曰今明主在於上法令具於下安得有反賊乎此真狗盗䑕竊耳二世乃按誅諸言反者而拜通為博士出曰㡬不免虎口乃遂亡後従漢及天下定通乃召魯諸生學者以定儀法魯有二人不肯行曰公為人臣不忠専面諛不諌茍免今兵革未休死傷者未收乃欲定禮樂公去矣無汙我通曰子真鄙儒不知時變乃去之漢諸禮儀皆通所定然猶草創未能具備矣夫禮樂聖人之所以興化致治太平之本也本志曰六經之道同歸而禮樂之用宜急治身者斯須忘禮則暴慢及之為國者一朝忘禮則荒亂及之人含天地隂陽之氣有善惡喜怒哀樂之情人稟異性而不能節也唯聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫正性情節萬事者也有男女之情有妒忌之心為制昬姻之禮有交接長幼之序為制鄉飲之禮有哀死思逺之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮喪有哭踊之節樂有歌舞之容正人足以副其情邪人足以防其失故昬姻之禮廢則夫婦之道闕而淫僻之罪多鄉飲酒之禮廢則長幼之序失而争訟之獄繁喪祭之禮廢則骨肉之恩薄而背死㤀生者衆矣朝覲之禮廢則君臣之位失而侵凌之漸起矣故孔子曰安上治民莫善於禮移風易俗莫善於樂禮節民心樂和民聲政以行之刑以防之禮樂政刑四達而不悖則王道備矣樂以治内而為同禮以修外而為異同則和親異則畏敬和親則無怨畏敬則不争揖讓而治天下者禮樂之謂也二者並行合為一體畏敬之意難見則著之於享獻辭受登降跪拜和親之說難形則發之於詩歌詠言鍾石管絃盡其敬意而不多其財賄盡其歡心而不留其聲音孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼔云乎哉言明王設禮樂之本也故知禮樂之情者能作識禮樂之文者能述作者謂之聖述者謂之明王者必因先王之禮樂順時施宜有所損益即人之心稍稍制作至於太平而大備周監於二代禮文尤具故稱經禮三百威儀三千於是教化浹洽民用和睦災害不生禍亂不作囹圄空虚三十餘年孔子美之曰郁郁乎文哉吾従周及其衰也諸侯縦横逾越法度惡禮制之害已去其篇籍遭秦滅學遂以亂亡夫樂可以善民心其感人深移人疾是故先王著其敎焉夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉是故纖微譙偯之音作而民憂思闡諧慢易之音作而民康樂麤厲猛奮之音作而民剛毅廉直正誠之音作而民肅敬寛裕和睦之音作而民慈愛流僻邪放之音作而民淫亂故先王制雅頌之聲本之情性稽之度數制之禮儀合生氣之和導五常之性使之陽而不散隂而不奪剛氣不怒柔氣不懾四暢於中而彂於外各安其位而不相奪足以感動民之善心不使邪氣得襲焉是先王立禮樂之方也黄帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作大韶禹作大夏湯作大濩武王作大武周公作勺咸池備矣六莖澤及根莖也五英茂也大章章之也韶繼也夏大也濩救也武言以武功定天下勺言酌先王之道自夏以徃其流不可得聞也殷頌猶有存者周詩既備而器用陳張周官具矣夫禮樂者威儀足以充目聲音足以動耳詩歌足以感心故聞其音而徳和省其詩而志正觀其數而法立是以薦之郊廟則鬼神享作之朝廷則君臣和立之學宫則萬民協莫不虛已竦神恱而承流是以海内通知上徳被服其風光耀日新化上遷善而不自知其所以然至於萬物化天地順而嘉應降故詩云鐘鼓煌煌磬管鏘鏘降福穰穰書云撃石拊石百獸率舞至於末世衰亂殷紂斷棄先祖之正樂乃作淫聲用變亂正聲以恱婦人周道既闕而王官失業雅頌相錯禮樂大壊諸侯設兩觀乗大輅大夫八佾舞于庭政遂陵遲而不變於是桑間濮上鄭衛宋楚之聲並出内則致疾短夀外則亂政傷民巧偽之人因而飾之以熒亂富貴之耳目庶人以求利列國以相間故秦穆公遺戎樂而由餘去齊人饋女樂而孔子行自此禮樂喪矣漢興乃復存之禮樂古事稍稍増集夏大旱江河水少谿谷水絶八月相國曹參薨謚懿侯九月長安城成十月安國侯王陵為右丞相陳平為左丞相賜民爵戸一級六年十月齊王肥薨謚悼惠王夏六月舞陽侯樊噲薨謚曰武侯留侯張良薨謚文成侯髙帝十四年留侯果得穀城山下黄石及薨與石并葬復置太尉官周勃為太尉太尉秦官掌武事自先王之立官名雖不同其致一也昔伏羲氏龍名神農氏火師火名黄帝雲師雲名少昊氏鳥師鳥名顓頊以来為民師民名有重黎勾芒祝融后土蓐収𤣥㝠之官唐虞致羲和四子十有二牧禹作司空平水土棄作后稷播種百穀契作司徒訓五品皋陶作士官正五刑垂作共工利器用益作朕虞育草木鳥獸伯夷作秩宗典三禮䕫作典樂和神人龍作納言出入帝命夏殷所聞略焉周官則備矣天官冡宰地官司徒春官宗伯夏官司馬秋官司㓂冬官司空是為六卿太師太傅太保坐參天子而議政事不統職又立三少為副曰少師少傅少保是為三孤兼卿而九秦兼天下建皇帝之號改立臣官漢因循而不革従簡易隨時之宜丞相金印紫緩有左右丞相佐天子助治萬機髙帝更名相國緑綬復為丞相御史大夫位上卿副丞相銀印青綬太尉有長史丞相置兩長史御史大夫置兩丞一曰中丞外督部刺史一曰内史掌秘書受公卿奏事舉掌劾章秩皆千石武帝置丞相司直掌佐丞相舉不法秩比二千石前後左右將軍掌武衛本周末官秦因之金印紫綬位上卿奉常掌郊廟祭祀禮樂典經景帝更名太常卿郎中令掌宫殿門戸宿衛屬官武帝更名光禄勲衛尉掌宫門衛士諸屯衞􅇋司馬太僕掌輿馬屬官廷尉掌刑辟典客掌諸侯歸義蠻夷景帝更名大行令武帝更為大鴻臚宗正掌視親屬官治粟内史掌穀貨景帝更名大農令武帝更改為大司農少府掌山海河澤之稅及供養内職屬官凡九卿秩皆中二千石丞皆千石廷尉無丞有正監秩比千石中尉掌徼巡京師位秩與卿同武帝更名執金吾太子太傅少傅古官也將作少府掌治宫室事景帝更名大匠詹事掌后太子家令長信詹事掌皇太后宫景帝更名長信少府平帝更名長樂少府將行官與詹事同并職景帝更名大長秋成帝省詹事并大長秋典屬國事掌蠻夷降者武帝省職并鴻臚内史掌京師景帝分置左右内史武帝更名内史為京兆尹左内史為左馮翊主爵中尉掌列侯景帝更名為都尉武帝更名為右扶風自太子太傅至右扶風秩比二千石丞六百石皆秦官唯内史為周官司𨽻周官漢為司𨽻校尉城門校尉掌京師城門屯兵中壘校尉掌北軍壘門内外及掌西域屯騎校尉掌騎士步兵校尉掌上林苑門屯兵越騎校尉掌馹騎馬長水校尉掌長水宣曲胡騎胡騎校尉掌池陽胡騎射聲校尉掌待詔射聲虎賁校尉掌輜重騎士皆武帝時置之西域都尉并加官以騎都尉使䕶西域有副校尉宣帝置也自司𨽻已下至副校尉秩比二千石有左右丞秩六百石五官中郎將左右將軍秩比二千石光禄大夫秩比二千石太中大夫秩比千石掌論議諫議大夫秩比八百石奉車都尉掌御乗輿駙馬都尉掌駙馬秩皆二千石侍中左右諸曹吏散騎中常侍皆加官皆列侯將軍大夫将都尉尚書太醫令太官令至郎中無常員多至數十人侍中中常侍皆加官得入禁中其後侍中或特綰諸曹吏綬尚書奏事諸吏問舉劾按不法散騎並乗車輿給事中黄門亦加官所加或大夫博士議郎掌顧問應對位次中常侍侍郎左右有給事中黄門侍郎位従將軍大夫官皆秦制也凡爵二十級一曰公士二曰上造三曰簪褭四曰不更五曰大夫六曰官大夫七曰公大夫八曰公乗九曰五大夫十曰左庶長十一曰右庶長十二曰左更十三曰中更十四曰右更十五曰少上造十六曰大上造十七曰駟馬車庶長十八曰大庶長十九曰闗内侯二十曰通侯以賞功勞皆秦制諸侯王髙帝初置之金印紫綬治其監官掌監郡縣秩比六百石後為刺史郡守掌治其郡郡都尉掌佐守典職皆有丞縣令長掌治其縣萬戸以上為令秩比千石下至六百石而不滿萬戸為長秩皆五百石皆有丞尉皆秦制列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道荀恱曰諸侯之制所由来尚矣易曰先王建萬國親諸侯孔子作春秋為後世法譏世卿不改世侯昔者聖王之有天下非所以自為所以為民也不得専其權利與天下同之唯義而已無所私焉封建諸侯各世其位欲使親民如子愛國如家於是為置賢卿大夫考績黜陟使有分土而無分民而王者緫其一統以御其政故有暴亂於其國者則民叛於下王誅加於上是以計利慮害勸賞畏威各兢其力而無亂心及至天子失道諸侯正之王室微弱則大國輔之雖無道不得虐於天下賢人君子有所周流上下左右皆相夾輔凡此所以輔相天地之宜以左右民者也故民主兩利上下俱便是則先王之所以能永有其世也然古之建國或小或大監前之弊變而通之夏殷之時蓋不過百里故諸侯微而天子彊桀紂得肆其虐紂脯邢侯而醢九侯以文王之上徳不免於羑里周承其弊故大國方五百里所以崇寵諸侯而自抑損也至其末流諸侯彊大更相侵伐周室卑微禍亂用作秦承其弊不能正其制以求其中而遂廢諸侯改為郡縣以一威權以専天下其意主以自為非以為民深淺之慮徳量之殊豈不逺哉故秦得擅其海内之勢無所拘忌肆淫奢行暴虐天下然十四年而滅亡故人主失道則天下遍被其害百姓一亂則魚爛土崩莫之匡救賢人君子復無息肩衆庶無所遷徙此民主俱害上下兩危漢興承周秦之弊故兼而用之六王七國之難作者誠失之於彊大非諸侯治國之咎其後遂皆郡縣治民而絶諸侯之權矣當時之制未必百王之法也凡長吏秩二千石上皆銀印青綬比六百石已上皆銅印墨綬比二百石已上皆銅印黄綬其後雖不及六百石其長相皆墨綬除八百石五百石秩荀恱曰先王之制禄也下足以代耕上足以充祀故食禄之家不與下民爭利所以厲其公義塞其私心其或犯逾之者則䋲以政法是以君子勸慕小人無怨若位茍禄薄外而不充憂匱是䘏所求不贍則私利之智萌矣放而聼之則貪利之心濫矣以法繩之則下情怨矣故位必稱徳禄必稱爵故一物而不稱則亂之本也今漢之賦禄薄而吏非員者衆在位者貪於財産規奪官民之利則殖貨無厭奪民之利不以為恥是以清節毁傷公義損闕富者比公室貧者匱朝夕非所為濟俗也然古今異制爵賦不同禄亦如之雖不及古度時有可嘉也七年春正月辛酉朔日有食之是謂正朔王者惡之夏五月日有食之秋八月帝崩于未央宫太后哭而淚不下侍中張辟彊者張良子年十五餘謂陳平曰太后泣不下淚者畏君等危吕氏宜請吕産吕禄為將監南北軍事太后必喜君等免禍平從之太后果喜而泣之淚下九月皇帝葬于安陵讃曰本紀稱孝惠内修親親外禮傅相優寵齊悼趙隠恩愛篤矣可謂寛仁之主遭吕太后虧損至徳枉濫横流甚可悲矣前漢紀卷五
