body:
  text: 前漢紀卷七漢荀悅撰孝文一初大臣迎王於代郎中令張武議曰大臣未可信王宜稱疾無行以觀其變中尉宋昌曰羣臣之議皆非也夫秦失其政豪傑並起然卒踐天子位者劉氏也天下絶其望一也髙帝王子弟犬牙相制所謂盤石之宗也天下服其彊二也漢興除秦苛政人人自安難搖動三也今大臣雖欲為變百姓不為使其黨豈能専一邪且内有朱虛東牟之親外有諸侯之彊必無異心矣髙帝子獨淮南王與大王大王又長賢聖聞於天下故大臣迎大王大王勿疑卜之兆得大横占曰大横庚庚余為天王夏啓以光王乃令舅薄昭見太尉周勃還王乃行羣臣迎于渭橋太尉周勃進曰請避左右以聞宋昌曰所言公公言之所言私王者無私勃乃跪上天子璽王謝曰至邸議之閏月朔之代邸王西向讓帝位者三南向讓者再遂即皇帝位拜宋昌為衛將軍領南北軍赦天下賜民爵一級酺五日元年冬十月皇帝見于髙廟車騎將軍薄昭迎皇太后于代封太尉周勃萬戸賜金五千斤丞相陳平將軍灌嬰邑各三千戸金三千斤朱虛侯章襄平侯通二千戸金千斤十有二月立趙幽王子遂為趙王徙琅邪王澤為燕王除収孥相坐法律春正月有司請早建太子上謙讓不聼有司固請上曰諸侯王功臣多有賢者而曰必子人其以朕忘賢與有徳者而專于其子非所以憂天下有司請曰立嗣必子所従来乆矣今適宜立而更求諸侯宗室非髙帝之志子啓最長敦厚慈仁請建以為太子上許焉而立之封將軍薄昭為軹侯三月立皇太子母竇氏為皇后初孝惠時出宫人以賜諸王各五人竇姬家在清河賂主者吏願至趙吏誤置代伍中竇姬泣嗁而行既至代幸於王生景帝而代王后及其四子皆先亡故竇姬為皇后兄長君弟廣國字少君家於長安絳侯等曰吾屬命乃懸於此兩人為選賢人令與居止由此皆為退讓君子詔曰今方春和草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人咸阽於死亡而莫之省憂朕為民父母將如何其議所以賑貸之於是出布帛米肉賜之其肉刑耐罪已上不用此令楚元王交薨丞相平病讓位於太尉周勃為左丞相位第一平為右丞相位第二大將軍灌嬰為太尉上問勃天下一歳決獄錢穀出入㡬何謝不知甚媿之上以問平平曰陛下即問決獄責廷尉問錢穀責治粟内史上曰君所主者何事對曰陛下不知臣駑下使臣待罪宰相宰相在上佐天子調理隂陽下遂萬物之宜外鎮撫四夷内親附百姓使公卿大夫各得其職上曰善勃出謂平曰君素不教我對平曰處其位獨不知任或謂勃曰君誅諸吕立代王威鎮天下受厚賞處尊位乆即禍及身矣勃謝病歸相印平轉為右丞相太中大夫陸賈使越上賜尉佗書曰朕頃以南越王自治之雖然王之號為帝兩帝並立竟無一乗之使以通其道路是爭也爭而不讓仁者不由也王之昆弟在真定已使人存問修治王先人冡墓願與王分棄前患従今已来與王通使如故故使賈喻意南越蠻夷大長老夫臣佗曰髙后聼信䜛臣别異蠻夷故改號聊以自娯自帝其國未敢有害於天下老夫夙興夜寐寢不安席食不甘味凡以不得事漢故也陛下幸哀憐臣通使如故老夫死骨不朽不敢為帝謹北面因使者奉獻夏四月齊楚地震山崩二十九所同日俱大彂潰水出本志曰為水沴土六月令郡國無来獻封衛將軍宋昌為壮武侯又令列侯従髙帝入蜀漢者皆増邑吏二千石已上従髙帝者皆食邑齊王襄薨二年冬十月丞相平薨諡獻侯十有一月乙亥周勃復為左丞相癸卯晦日有食之詔舉賢良方正直言極諫者是時上勤於政事躬行節約思安百姓身衣弋綈所幸慎夫人衣不曵地幃帳無文嘗欲為露臺計直百金曰此中民十家之産遂不為也太中大夫賈誼說曰管子有言倉廩實知禮節民不足而可治者未嘗聞也古人有言曰一夫不耕或受之饑一女不織或受之寒生之有時而用之無度物力必匱且歳有饑餓天之常行即不幸有方二三千里之旱國何以相䘏卒然邊境有急數百萬之衆國家何以饋之方今之務務在絶未伎遊食之巧驅民而歸之於農太子家令鼂錯復說上曰今土地人民不減於古無堯湯水旱之災而畜積不及古者何也以地有餘利民有遺力生穀之土未盡墾耕山澤之利物未盡出遊食之士未盡歸農夫饑寒切于肌膚慈母不能以保赤子君安能以有民夫金玉寳貨饑不可食寒不可衣然而衆貴之者以上用之故也其為物輕㣲易藏在於把握可以周流海内而無饑寒之患此令臣下輕倍其主而民易去其鄊盗賊有所勸而逃亡者得輕資矣粟米布帛生於地長於時聚於市非可一日而成一日不得則饑寒並至是故明王貴五穀而賤金玉今農夫五口之家其服作者不過二人其能耕者不過百畝百畝之収不過三百石春耕夏種秋収冬藏四時之間無日休息又給縣官供徭役憂病艱難其中勤苦如此然復時被水旱蝗蟲之災急政暴賦朝令暮得有者貴賣無者倍舉是賣田宅鬻子孫以償債者衆也而商賈大者積儲倍息小者坐列販賣故其男不耕耘女不蠶織衣必重綵食必重肉無農夫之苦有百千之得因其富厚交通王侯力過吏勢以利相傾乗良策肥千里遨遊此商人所以兼農人農人所以流亡也今漢法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故主之所貴俗之所賤法之所卑吏之所尊上下相反好惡相忤而欲國富法立不可得矣當今之務在於重農使民勸業而已欲人務農在貴粟貴粟之道在於使民以粟為賞罰今募天下入粟塞下即得拜爵得以除罪如此富人有爵農人有粟粟有所行而國用足矣不過三年塞下之粟必多矣上従之荀恱曰聖王之制務在綱紀明其道義而已若夫一切之計必推其公義度其時宜不得已而用之非有大故則不由之春正月詔開籍田漢初國家簡易制度未備衣食貲糧無限富者衍溢貧者或不足若蜀郡卓氏家僮千有餘人程鄭七八百人皆擅山川銅鐵之利運籌算上爭王者之利下錮齊民之業若宛孔氏之屬連車騎以交通王侯貿易貨賂雍容垂拱坐取百倍皆犯王禁陷於不軌荀恱曰先王立政以制為本三正五行服色厯數承天之制經國序民列官布職疆理品類辯方定物人倫之度自上已下降殺有序上有常制則政不頗下有常制則民不二官無淫度則事不悖民無淫制則業不廢貴不專寵富不獨奢民雖積財無所用之故世俗易足而情不濫姦宄不興禍亂不作此先王所以綱紀天下統成大業立徳興功為政之徳也故曰謹權量審法度修廢官四方之政行矣本𫝊曰先王之制自天子公侯卿大夫已下至於抱闗擊柝者其爵禄奉養死生之制各有差品小不得僭大賤不得逾貴夫然故上下有序而民志悉定於是裂土地之宜教之種殖畜養以時而用之有節草木未落斤斧不入於山林豺獺未祭羅網不布於野澤鷹隼未擊罾弋不施於蹊隧既順時而取物然而山不槎蘖田不伐夭豚魚麛卵咸有常禁所以順時宣氣蕃阜庶物畜足功用如此之備然後従四民因其土宜任其智力安其居樂其業甘其食而美其服欲寡而事節財足而不爭及至周室道㣲禮法隳壊諸侯刻桷丹楹大夫山節藻梲其流至於士庶莫不離制度稼穡之人少商賈之人多穀不足而貨有餘陵遲至於桓文之後禮義大壊上下相冒國異政家殊俗奢靡不制僭差無極於是商通難得之貨工作無用之器士設反道之行以追時好而取世資偽民倍實而要名姦夫犯難而求利簒殺取國者為王公刧奪成家者為侯伯禮義不足以制君子刑戮不足以威小人富者土木被文繡犬馬餧菽粟貧者裋褐不完食疏飲水俱為編戸齊民而以財力相窘雖為僕虜猶無愠色故夫飾變詐為姦宄自足乎一世之間守道隨理不免乎饑寒之患其化自上興由法度之無限也故易曰后以裁成輔相天地之宜以左右民備物致用立象成器以為天下利立制度之謂也太子太傅張相如免太中大夫石奮為太子太傅奮趙人也初為小吏事髙帝恭敬謹慎甚見親信於是以選傅太子立趙王遂弟辟彊為河間王朱虛侯章為城陽王東牟侯興居為濟北王立皇子武為代王參為太原王揖為梁王夏五月詔曰古有誹謗之木所以通諫者今法有誹謗妖言之罪是使衆臣不敢盡心而上無由聞其過今其除之秋九月初與郡守為銅虎竹使符三年冬十月丁酉晦日有食之十一月乙卯晦又食之詔曰前遣列侯之國辭未行丞相朕之所重其為朕率列侯之國遂免勃就國十二月太尉灌嬰為丞相罷太尉官四月城陽王章薨淮南王長殺辟陽侯審食其初髙帝八年過趙趙王獻美人幸有身生厲王長趙王不敢内之築外宫而處之及貫髙事盡捕王家厲王母亦在繫中其弟趙亷因辟陽侯言吕后吕后妒不肯白辟陽侯不彊爭厲王已生母以恚自殺趙亷奉厲王詣長安髙帝憐之令吕后母之厲王有才力力能扛鼎怨辟陽侯不赦其母乃造辟陽侯即自袖金椎椎殺之馳詣闕肉袒請罪上赦之不治五月匈奴寇北地河内丞相灌嬰擊之衛將軍軍長安上自至髙都因幸太原見羣臣故人皆賜之舉功行賞復晋陽中都民三歳租留太原遊十餘日濟北王興居聞上自擊胡乃彂兵反秋大旱七月上自太原還八月將軍柴武擊濟北王興居興居自殺赦諸與興居反者四年冬十二月丞相灌嬰薨諡隱侯正月御史大夫張蒼為丞相袁盎為御史大夫時御史大夫闕官是時上徴河東太守季布欲以為御史大夫聞其使酒乃不用遣歸郡夏五月復諸劉有屬籍者家無所與六月雨雪秋九月封齊悼惠王子七人為列侯絳侯周勃有罪逮繫詔獄勃在國常恐懼每郡守使丞尉行縣勃常被甲持兵人有告勃欲反下廷尉吏侵辱之勃以千金與獄吏吏乃止勃以公主為證公主孝文女太子勝尚之及薄昭為言薄太后因請上曰絳侯奉髙帝璽持兵於北軍此時猶不反今居一小縣乃反邪上赦勃復爵邑就國勃出曰吾嘗將百萬衆於北軍安知獄吏之貴哉作顧成廟五年春二月地震夏四月除盗鑄錢令更造四銖錢賈誼諫曰法使民得顧租鑄錢錢敢雜以鉛鐵他巧者其罪黥然鑄錢之情非殽雜為巧則不可得贏殽之甚微其利甚厚夫事有招禍法有起姦今令細民操造幣之勢各隱屏而鑄作因欲禁其厚利絶其微姦雖黥罪日報其勢不止農事棄捐採銅日多姦不可絶已潁川人賈山上書諫曰夫錢者無用之器而可用易富貴富貴者人主之操柄令為之是與人主共操柄不可長也上不聼又上書言前世之戒曰昔秦賦斂重數以奉奢侈起咸陽至雍離宫三百鐘鼓帷帳不移而具為阿房之殿髙十數仞東西五里南北千歩為宫室之盛乃至於此使其後世曽不得聚廬而託處焉為馳道於天下東窮燕齊南極呉楚江湖之上濵海之觀畢至道廣五十步三丈而樹又築其外隱以金椎樹以青松為馳道之麗乃至於此使其後世曽不得邪徑而託足焉葬於驪山吏徒數十萬人曠日十年下逹三泉采合金石冶銅錮其内漆塗其外被以珠玉飾以翡翠中成遊觀上成山林為葬埋之奢乃至於此使其後世曽不得蓬塊而託葬焉百姓不勝其役疲弊者不得休息饑寒者不得衣食無罪而死刑者無所告訴人與之為怨家與之為讐天下以壊宗廟將滅絶矣始皇居絶滅之中猶不自知乃東巡狩至㑹稽琅邪刻石紀功自以為過於堯舜以古諡法為少更以數為諡欲以一至萬世而死不盈數月天下四面攻之兵破於項羽地奪於劉氏豈不哀哉始皇不自知無輔弼之臣無進諫之士縦恣行誅是以道諛者偷合茍容比其徳則聖於堯舜論其功則賢於湯武天下已潰而莫之告也詩云匪言不能胡斯畏忌聽言則對訟言如醉此之謂也故聖王之制史在前書過失工誦箴諫瞽誦詩諫公卿比諫士傳言諫庶人謗於道商旅議於市然後君得聞其過而改之見義而従之所以永有天下也今陛下將興堯舜之道猶自勉以厚天下損食膳不聼樂減外徭止歳貢省廏馬以賦郡傳去諸苑以賦農夫出帛十萬匹以賑貧乏禮髙年平刑獄天下恱喜臣聞山東吏有布詔令民雖老病或扶杖而徃聼之願少湏臾無死思見徳化之所成功業之所就矣今聞或者陛下従方正賢俊之士與之射獵以傷大業臣竊悼之願止射獵以歳二月定明堂造太學修先王之道以成萬世之基上輒優游而納其言然明堂太學猶未能興是時呉王即山鑄錢而幸臣鄧通亦賜銅山得自鑄錢呉王鄧通錢甚盛矣通蜀人也上甞夢欲上天而不能有一黄頭郎推之顧見其衣後穿覺而求之漸臺見郎中鄧通衣後穿如夢中所見遂寵幸之通亦謹身媚上而已不得預政事有善相者相通云當貧餓死故賜通銅山得自鑄錢上甞親讌飲通家上病癰通甞吮之上曰誰最憐我者通曰莫若太子上令太子吮癰而色難得通前吮之太子慙由是心恚通及即位以通盗去徼鑄錢遂盡案沒入財物卒窮餓寄死人家徙代王武為懐陽王徙太原王參為代王六年冬十月桃李花十一月淮南王長謀反彂覺徙蜀郡道死於雍諡曰厲初長居國驕恣不用漢法出稱警入稱蹕自作法令上令將軍薄昭與長書責之曰大王以千里為宅居以萬人為臣妾此髙皇帝之厚徳今大王所行危亡之道髙皇帝之神靈必不廟食於大王之手矣昔周公誅管蔡以寕周室髙帝廢代王以便事濟北舉兵皇帝誅之以安漢故周行之於前漢用之於後今大王欲以親戚之意故望於上大王終不可得也宜急改行上書謝罪王得書不恱復令人使閩越匈奴與棘蒲侯太子柴竒謀反羣臣廷尉雜奏表請論如法制詔曰朕不忍致法其赦長死罪廢王有司請徙長蜀郡卭都於是盡誅所與謀者載長以輜車令縣次傳送給肉日五斤酒五升令美人才人得幸者十人従之長在道怨不肯食而死乃以民禮葬于雍置守墓三十家而誅諸縣送傳不謹者淮南王之徙也中郎將楚人袁盎諫曰淮南王為人剛彊行道有不遂陛下有殺弟之名奈何上曰吾將苦之耳令還之及長死上悲號甚恨盎曰陛下有髙世之名三此不足毁名陛下在代時太后甞病三年陛下目不交睫睡不解衣冠湯藥非陛下口所嘗不進夫曽參以布衣猶難之陛下親以王者行之孝過曽參逺矣諸吕用事大臣專制陛下従代来乗六乗之傳馳不測之淵雖賁育之勇不及陛下陛下至代邸西向讓天下者三南向讓者再夫許由一讓而名立陛下五讓過於許由四矣陛下遷淮南王欲使改過有司宿衛不慎故病死上意乃解上従霸陵欲西馳下峻阪盎進攬轡上曰將軍怯邪盎曰臣聞聖主不乗危陛下乗六騑馳不測之山比有馬驚車敗陛下縦自輕奈髙廟太后何上乃止上幸上林苑皇后慎夫人在禁中嘗同坐及坐郎署布席盎却慎夫人席慎夫人怒不肯坐上怒起盎因前說曰臣聞尊卑有序上下協和妾主豈可同坐哉陛下所幸慎夫人適所以禍之獨不見人豕乎上乃恱以語慎夫人夫人賜盎金五十斤宦者趙同數毁盎盎患之盎兄子種謂盎曰宜廷辱之使其毁不用後上出趙同參乗盎伏車前曰古者天子所與共六尺乗輿者皆天下豪俊今漢雖乏人陛下獨奈何與刑餘之人共載上笑推同下同泣下車七年夏四月赦天下六月辛酉未央宫闕罘罳災本志以為東闕所以朝諸侯之門也罘罳在外諸侯之象也僭大之咎也典客馮敬為御史大夫八年夏封淮南王子四人安為阜陵侯勃為安陽侯賜為周陽侯良為東城侯梁王太傅賈誼知上將復王之諫曰淮南王悖逆無道陛下幸赦而遷之疾病而死天下誰不以王死之為大當今復尊罪人之子適足以負謗於天下耳雖割之而王四子四子一心此非有白公子胥興於廣都之中必有專諸荆軻起於兩楹之間矣誼又上書言前世事曰大臣彊者先反欲天下之治安莫若衆建諸侯而少其力力少則易制國小則無邪心令海内之勢如身之使臂臂之使指莫不従制従制則天下安矣割地定則為若干國令諸侯王子孫各以次授先祖之分地其地衆而子孫少者建以為國空而置之須其子孫生者舉使君之示無所私焉今進言者皆曰天下已治臣獨以為未也夫抱火厝於積薪之下而寢其上火未及然因謂之安方今之勢何以異此今大國之王幼弱漢之傅相方握其事數年之後諸侯王皆冠血氣方剛漢之傅相稱疾而罷彼自丞尉已下徧置私人則難作矣射獵之娯與安危之機孰急以天子之位乗今之時尚為難治假使陛下居齊桓之處將能九合諸侯而一匡天下乎假使韓信彭越黥布此數公存者當此之時陛下即位能自安乎今為漢治者無勤勞之苦不乏鐘鼔之樂可使諸侯軌道天下順治也承奉宗廟至孝也以育羣生至仁也垂法立象至明也當時大治使後世誦聖徳使顧成之廟稱為太宗上配太祖與漢罔極以陛下之明逹因使少知治體者得在下風致此非難也陛下誰憚之而乆不為此今天下之勢方倒懸天子者天下之首蠻夷者天下之足夷狄徵令主上之操也天子供貢臣下之禮也足反居上首顧居下倒懸如此莫之能解甚為執事羞之陛下何不試以臣為屬國之官必繫單于頸而制之死命不獵猛敵而獵田豕臣竊為陛下不取又今賣童僕者為之文繡衣之絲屨富人嘉㑹以綺縠覆牆屋是古天子后服所以廟而不宴者也今庶人屋壁得為帝服倡優下賤得為后飾天下之不危者殆未之有也三代有天下之長而秦享世之短其故可知也古之王者太子始生而教固以行矣成王在襁褓之中召公為太保周公為太傅太公為太師太保保其身體太傅傅其徳義太師導之教訓又為置之三少皆上大夫少保少傅少師是與太子宴者也逐去邪人不使見邪行者皆選天下端士孝弟博聞有道術者以輔翼之使與太子居處出入故生則見正事聞正言行正道左右前後皆正人孔子曰幼成若天性習慣若自然及太子少長即入於太學承師問道既冠成人免於保傅之嚴則有記過之史徹膳之宰誹謗之木敢諫之鼓春朝朝日秋暮夕月所以明敬也養三老五更所以明孝弟也行以和鸞步中採薺趨中大夏所以明有度也其於禽獸見其生不忍其死聞其聲不食其肉故逺庖㕑所以長恩且明有仁也三代所以長乆者其輔翼太子必有此具也及秦即不然棄禮義辭讓而上告愬刑罰使趙髙傅胡亥而教之獄所習非斬劓人則夷三族故胡亥今日即位而明日射殺人忠諫者謂之誹謗深計者謂之妖言視殺人如刈草莞豈惟胡亥之性惡哉所以導之者非其理也人主之所慎在其所趨舎以禮義治民者積禮義以刑罰治民者積刑罰禮義積而民和親刑罰積而民怨倍教化行而民康樂法令行而民哀戚哀樂之感禍福之應也古者聖王制為等列而天子加焉故其尊不可及也亷恥節儉以治君子大臣有罪賜死而無戮辱古者大臣有大譴呵則白冠􅈊纓盤水加劒造請室而請罪於上不執縛繫引而行有大罪北面跪而自裁上不使人挫折而刑之曰子大夫自有過耳吾遇子有禮矣上設亷恥以遇其臣臣下則厲節行以報其上上善其言自是大臣有罪不及刑獄誼又以為代邊近匈奴而梁淮陽皆小不足以禦捍齊趙吳楚改封為強藩則無山東之憂萬世之利昔秦苦心勞力以除六國今陛下垂拱以成六國之禍不可以言智也雖及身無事萬年之後傳之弱子不可以言仁愛後止徙淮陽王武為梁王王四十餘城有長星出于東方九年夏大旱前漢紀卷七
