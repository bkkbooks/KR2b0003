body:
  text: 前漢高后紀卷第六初高后命孝惠張皇后取後宮美人子養之而殺其母以為太子立為皇帝皇帝年幼高后臨朝稱制立兄子台為楚王台弟產為梁王祿為趙王封諸呂六人為列侯高皇后將王諸呂問右丞相王陵王陵曰高皇帝定天下刑白馬而盟曰非劉氏而王者天下共擊之問左丞相陳平太尉周勃平勃對曰高帝定天下王諸劉今陛下稱制王諸呂無所不可后喜罷朝陵讓平勃曰諸君背要何面目見高帝於地下勃曰面折廷諍臣不如君安漢社稷君不如臣后乃左遷陵為帝太傅實奪之相權陵謝病免杜門不出冬十一月徙丞相陳平為右丞相辟陽侯審食其為左丞相食其沛人也初呂后獲於楚食其常以舍人侍得幸及為丞相不典治相監宮中事加郎中令群臣皆因決事先是或毀食其於惠帝惠帝欲誅之平原君朱建為說惠帝幸臣閎籍孺曰君幸於帝天下莫不聞者今辟陽侯幸于太后而下吏道路皆言君讒之今日辟陽誅明日太后含怒亦誅君耳於是籍孺懼入言於帝而出之朱建者故黥布相也布之反建諫止之高帝賜建號平原君建為人口辯初名廉直行不苟合辟陽侯欲交建建不肯及建母死家貧無以收葬陸賈乃見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何乃賀我賈曰平原君必不知君者為其母今其母死家貧無以葬之君誠能厚送葬之則彼為君死矣食其乃奉百金列侯貴人以食其故往贈送之凡百金而建受之及呂氏之誅其卒見全者皆建之力也後淮南厲王長誅食其建以食其客故事及之建自殺元年春正月詔曰孝惠帝欲除三族辠及妖言令議未決而崩今除之賜民爵戶一級夏五月丙申趙主宮中叢臺災立孝惠美人子五人強為淮陽王不疑為恒山王弘為襄城侯朝為軹侯武為壼關侯秋七月桃李花高后怒御史大夫趙堯之為趙王謀也高后免堯官抵罪高后上黨太守任敖為御史大夫二年春正月詔班序列侯功臣位次藏于高廟世世勿絕嗣二月乙卯晦地震羌道武都道山崩夏六月日蝕秋七月恒山王不疑薨立襄城侯弘為恒山王行五銖錢之制夏殷以前無文焉周制則有文凡錢外圓內方輕重以銖周景王以錢輕更鑄大錢文曰寶貨肉好外有周郭秦錢文曰半兩重如其文漢興復輕之齊悼惠王子章入宿衛封朱虛侯三年夏江水漢水溢流四千餘家秋星晝見伊水洛水溢流千六百餘家汝水溢流八百餘家其在洪範為水不潤下四年夏四月少帝出怨言知高后殺其母后乃幽之于永巷詔曰皇帝久病昏亂不能奉宗廟廢之五月立恒山王弘為皇帝五年春三月南越王尉佗自稱南越武帝是時禁南越關中市鐵器尉佗曰先帝與我通使勿絕今高后聽讒臣之言別異蠻夷此必長沙王計欲倚中國擊滅南越自以為功今自稱越帝欲攻長沙秋八月淮陽王強薨九月發河東上黨騎屯北地備匈奴六年春星晝見夏四月赦天下秩長陵令二千石六月匈奴寇狄道攻河陽行五分錢朱虛侯弟興居封東牟侯皆入宿衛七年冬十二月匈奴寇狄道春正月趙王友死于邸呂氏女為趙王后王后妬讒王於高后曰呂氏安得王太后百年後吾必擊之高后怒之至邸令衛士圍之不得食遂幽死以民禮葬之長安諡為幽王後徙梁王恢為趙王己丑晦日有食之既在營室九度為宮室之中高后惡之曰此為我也星傳曰日者德也月者刑也日食修德月食修刑則災異消矣詩云日月告凶不用其行四國無政曷用其良言人君失政則日月失行中道南曰黃道南至東井北至牽牛東至角西至婁夏至日至東井去極近故晷短立八尺之表而晷長一尺五寸八分冬至日至於牽牛去極遠故晷長立八尺之表而晷長一丈三尺一寸四分春分西至婁去極中秋分東至角去極中立八尺之表而晷長七尺三寸六分日為陽陽用事則日進而北晝進而長陽勝故為溫暑陰用事則日退而南晝退而短陰勝故為寒涼洪範曰日月之行則有冬有夏有寒有暑此之謂也至若南北失度晷進而長則為寒退而短則為暑人君急則日晷進而疾舒則日晷退而緩故曰急恒寒若暑恒燠若一曰晷長為潦若晷短為旱若奢為扶扶者邪臣進正直䟽君子不足姦人有餘月有九行黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東立春春分從青道立夏夏至從赤道立秋秋分從白道立冬冬至從黑道然一決之於房從中道若月失道而妄行出陽道則旱風出陰道則陰雨箕軫之星為風畢星為雨故月失度入箕軫則多風入畢星則多雨洪範曰星有好風星有好雨月之從星則以風雨詩云月離于畢俾滂沱矣言多雨也凡災異所起或分野之國角亢互韓鄭也房心宋也尾箕燕也斗牛吳也牽牛須女越也虛危齊也營室東璧衛也奎婁魯也胃昴畢趙也觜參魏也東井鬼秦也柳星張周也翼軫楚也荀悅曰凡三光精氣變異此皆陰陽之精也其本在地而上發於天也政失於此則變見於彼由影之象形響之應聲是以明王見之而悟敕身正己省其咎謝其過則禍除而福生自然之應也詩云上天之載無聲無臭其詳難得而聞矣豈不然乎災祥之報或應或否故稱洪範咎徵則有堯湯水旱之災稱消災復異則有周宣雲漢寧莫我德稱易積善有慶則有顏冉夭疾之凶善惡之效事物之類變化萬端不可齊一是以視聽者惑焉若乃稟自然之數揆性命之理稽之經典校之古今乘其三勢以通其精撮其兩端以御其中參五以變錯綜其紀則可以髣髴其咎矣夫事物之性有自然而成者有待人事而成者有失人事不成者有雖加人事終身不可成者是謂三勢凡此三勢物無不然以小知大近取諸身譬之疾病不治而自瘳者有治之則瘳者有不治則不瘳者有雖治而終身不可愈者豈非類乎昔虢太子死扁鵲治而生之鵲曰我非能治死為生也能使可生者生耳然太子不遇鵲亦不生矣若夫膏肓之疾雖醫和亦不能治矣故孔子曰死生有節又曰不得其死然又曰幸而免死生有節其正理也不得其死未可以死而死幸而免者可以死而不死凡此皆性命三勢之理推此以及教化則亦如之何哉人有不教而自成者待教而成者無教化則不成者有加教化而終身不可成者故上智下愚不移至於中人可上下者也是以推此以及天道則亦如之災祥之應無所謬矣故堯湯水旱者天數也洪範咎徵人事也魯僖澍雨乃可救之應也周宣旱應難變之勢也顏冉之凶性命之本也猶天廻日轉大運推移雖日遇禍福亦在其中矣今人見有不移者因曰人事無所能移見有可移者因曰無天命見天人之殊遠者因曰人事不相干知神氣流通者人共事而同業此皆守其一端而不究終始易曰有天道焉有地道焉有人道焉言其異也兼三才而兩之言其同也故天人之道有同有異據其所以異而責其所以同則成矣守其所以同而求其所以異則弊矣孔子曰好智不好學其弊也蕩末俗見其紛亂事變乖錯則異心橫出而失其所守於是放蕩反道之論生而誣神非聖之義作夫上智下愚雖不移而教之所以移者多矣大數之極雖不變然人事之變者亦眾矣且夫疾病有治而未瘳瘳而未平平而未復教化之道有教而未行行而未成成而有敗故氣類有動而未應應而未終終而有變遲速深淺變化錯于其中矣是故參差難得而均矣天地人物之理莫不同之凡三勢之數深不可識故君子盡心力焉以任天命易曰窮理盡性以至於命其此之謂乎呂產為相國呂祿為上將軍立營陵侯劉澤為瑯邪王澤高帝族昆弟本以將軍擊陳狶有功故封齊齊人田生嘗遊乏資以畫干澤澤以三百金為田生壽乃謂太后所幸中謁者張釋卿曰太后欲王諸呂及重自發之恐大臣不聽今釋卿最幸于太后何不諷大臣以聞太后太后必喜呂氏既王萬戶侯亦釋卿有釋卿從之諸呂已為王高后賜釋卿金千斤釋卿以其半進田生田生不受又說曰呂氏之王也大臣未服今劉澤於諸劉長大臣所信獨不見用常有觖望也今令太后裂地十餘縣以王之彼喜而去諸呂王益固矣遂封澤為瑯邪王夏五月尊昭靈夫人為昭靈后武哀侯為武哀王高帝姊宣成夫人為昭哀后六月趙王恢自殺呂產女為趙王后後宮皆諸呂女也擅權王不得自恣王有愛姬王后鴆而殺之王怒悲憂自殺呂后以為用婦人言故自殺無思奉宗廟之禮廢其嗣朱虛侯章怒呂氏專權侍宴高后令章為酒令章自請曰臣將種也請以軍法行酒令后可之酒酣章進起舞曰請為太后作歸田之歌皇太后笑曰汝安知田事試說之曰深耕穊稙立苗欲䟽非其類者鋤而去之高后嘿然有頃諸呂有一人亡酒章追斬之太后及諸左右大驚以前許章軍法無以罪也因罷自是諸呂憚章大臣皆依朱虛侯兄弟以為強是時大臣憂諸呂之亂陸賈說陳平周勃曰天下安注意相天下危注意將將相和則權不分今為社稷計在二君掌握耳何不能交太尉勃乎以千金為太尉結歡勃亦如之遂戮力同心平乃賜賈金五百斤僮百人八月燕王建薨南越侵長沙遣隆慮侯周竈將兵擊之八年春封中謁者張釋卿為列侯諸中宦者令丞皆賜爵關內侯食邑高后夢見物如蒼狗撠后腋忽然不見卜之云趙王如意為祟遂病腋傷夏江水漢水溢流萬餘家河內水溢流萬家秋九月辛巳高后崩于未央宮諸呂恐為大臣所誅謀作亂欲廢少帝而立呂產朱虛侯婦呂祿女密聞其謀告章章乃使人陰告其兄齊王嬰令發兵西章及興居欲從中與大臣為內應誅諸呂立齊王齊王令人誘瑯邪王欲令興二國兵瑯邪王既至因留之悉發瑯邪兵以中尉魏勃為將軍并將之呂產等遣大將軍灌嬰擊齊王嬰乃陰與齊王約留兵屯滎陽曲周侯酈商其子寄與呂祿善周勃陳平使人執劫商而令寄說呂祿曰高帝與呂后定天下劉氏所立九王呂氏所立三王皆大臣之義事已布告諸侯王諸侯王以為宜今太后崩少帝幼足下不急之國守蕃乃為上將將兵為大臣諸侯所疑何不速歸將軍印綬因以兵屬太尉請梁王亦歸相印與大臣盟而之國高枕而王千里此萬世之利祿然其計報產及諸呂多以為不便計未決祿信寄與俱出遊過其姑呂嬃嬃怒曰汝為將軍而棄軍呂氏今無類矣乃悉出珠玉寶器散之堂下曰無為他人守也八月太尉周勃復令寄謂祿曰帝使太尉守北軍欲令足下之國急歸將軍印綬辭去不然禍且起祿遂解印屬典客而以兵授勃勃入軍門行令軍中曰為呂氏者右袒為劉氏者左袒軍皆左袒勃遂統北軍兵而朱虛侯將率千人入未央宮斬呂產辛酉斬呂祿諸呂無問長幼皆斬之大臣謀以為少帝及諸王皆非惠帝子欲盡誅之立齊王議者曰王暴戾虎冠之代王母家薄氏君子也且代王親高帝子於今為長仁孝聞於天下以子則順以賢則大臣安乃迎代王東牟侯興居與太僕夏侯嬰陰共入宮中誅少帝於是告齊王令罷兵諸呂之始王也呂后畏大臣及有口辯者陸賈為太中大夫自度不能爭之乃謝病免於是以所使越時囊中裝千金以與五子各二百斤令為產業賈常安車駟馬從歌鼓瑟侍者十人與其子約曰過汝家給人馬酒食極歡十日有寶劍直百金所取家得寶劍一歲中往來及過他家卒不過再三遊於漢庭公卿之間名聲甚顯及誅呂氏立孝文賈頗有力本傳曰當孝文之時天下以酈寄為賣友賣友者謂見利而忘義若寄父為功臣而又被執劫雖權賣呂祿以安社稷義存君親可矣淮南丞相張蒼為御史大夫讚曰本紀稱孝惠高后之時海內得離戰爭之苦君臣俱無為故惠帝拱己高后女主制政不出房闥而天下宴然刑罰罕用民務稼穡衣食滋殖笑及福祚諸呂大過漸至縱橫殺戮鴆毒生於豪強賴朱虛周陳惟社稷之重顧山河之誓殲討篡逆匡救漢祚豈非忠哉王陵之徒精潔心過於丹青矣
