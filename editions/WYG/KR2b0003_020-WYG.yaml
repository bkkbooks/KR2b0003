body:
  text: 前漢紀卷二十漢荀恱撰孝宣四五鳳元年春正月上幸甘泉宫郊泰畤皇太子冠賜列侯嗣子爵五大夫男子為父後者爵一級冬十有二月乙酉朔日有蝕之左馮翊韓延夀有罪棄市延夀字長公燕人也先是為東郡太守放散官錢奢僭逾制御史大夫蕭望之按驗之丞相邴吉以為更大赦不湏考㑹御史當案問東郡事望之因令并得問之延夀聞之即案校望之在左馮翊時放散廪犧官錢數十萬吏掠治急引與望之為姦延夀劾望之移殿門禁止望之望之自奏職在緫領天下聞事不得不問而為延夀所拘持上由是不直延夀各令窮竟所考望之果無事實而御史案驗東郡具得延夀在東郡時試騎士治飾兵車畫龍虎朱雀延夀駕駟馬植羽葆鼓車歌車功曹引車皆駟馬載棨㦸五騎為伍分左右部軍正假司馬千人持幢傍轂延夀坐射室騎吏持㦸夾陛列衛騎士兵車四面營陣被甲鞮鞪居馬上抱弩負籣又使騎士戲車弄馬又取官銅物候月蝕鑄作劔鉤鐔放效尚方取官錢帛私假徭役吏民及飾車騎甲用三百萬以上於是望之劾奏延夀上僭不道事下公卿公卿議以延夀前既無狀又誣訴典法大臣欲以解罪狡猾不道坐棄市死然延夀為治甚得吏民心吏民數千人送至渭橋老小扶持車轂莫不涕泣初延夀以父義諫燕刺王而死霍光顯賞其子擢延夀為諫議大夫遷潁川太守承趙廣漢之後初廣漢患郡俗名黨大族相依以憑凌長吏乃隂交構之以生其隙於是吏民多相怨讐風俗漓薄延夀乃道之以禮讓和輯其俗俾有制度為之禮節養生送死不逾禮法百姓遵用其教賣偶人車馬下里偽物者棄之市道徙為東郡太守政理大行吏民畏而愛之其或欺負之者延夀痛自刻責豈其負之何以至此吏民聞之自傷悔不復欺犯其縣尉至刺死及門下掾自剄人救之不死因失瘖不能言延夀聞之自傷對掾吏涕泣遣醫治之甚厚復其家延夀嘗出臨上車騎吏一人後至敕功曹議罰府門卒當車前願有所言因曰孝經云資於事父以事君而敬同今旦明府早駕久駐而不出騎吏父至府門騎吏趨出父適反㑹明府登車以敬父而受罰得無毁大化乎延夀車中舉手曰㣲子太守不自知過還舍召見府門卒遂特用之卒是老書生聞延夀賢故自隠於門下時延夀在東郡治為天下最及守馮翊行縣至髙陵邑人有兄弟訟田自言者延夀大傷之深自責稱病不聽事卧傳舍而縣令丞三老亦自繋待罪於是訟者深自悔皆髠鉗肉袒謝罪請以田相讓至死不復敢爭延夀見勉勵之乃起視事郡中翕然轉相勸勵周徧二十四縣莫復以辭訟自言者推其至誠吏民不忍欺也治化茂矣二年春正月行幸雍祠五畤夏五月大司馬車騎將軍韓増薨増者故韓王信之曽孫安道侯説之子増為人寛和自守以温顔遜辭承上接下歴事三主甚重於朝廷五月將軍許延夀為大司馬車騎將軍秋八月詔曰夫昬姻之道人倫之大者酒食之會所以行禮樂也今郡國二千石或擅為苛禁禁民嫁娶不得具酒食相賀召由是廢鄉黨之禮使民無所樂非所以導民也詩不云乎民之失徳乾餱以愆勿為苛禁匈奴握衍單于為其衆所叛兵敗而自殺於是匈奴大亂五單于爭立議者多云匈奴為害日乆今可因其亂舉兵滅之蕭望之對曰春秋晋士匄興兵侵齊聞齊侯卒而還君子大其不伐喪以為恩足以服孝子義足以動諸侯前單于慕化和親夷狄莫不聞矣不幸為賊臣所殺而今伐之是乗亂而幸災也兵不以義動恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義若遂䝉恩得復其位必稱臣服從此徳義之盛也上従之壬午御史大夫蕭望之貶為太子太傅太傅黄霸為御史大夫是時邴吉年老上重之望之奏言三公非其人則三光不明今歳星少光咎在臣等上以望之意在輕丞相詰問望之望之免冠置對後丞相司直奏言故事丞相病明日御史大夫輒問病朝奏事㑹廷中差處丞相後丞相謝御史大夫稍揖進之今丞相數病望之不問㑹廷中與丞相均禮又望之自擅使守吏自給車馬至杜陵視家事小吏冠法冠為妻先引又使買賣私所附益凡十三萬三千上由此策貶之冬十有一月匈奴呼遫累單于率衆来降封為列侯十有二月平通侯楊惲坐怨望不道腰斬惲丞相敞弟以彂霍氏反事封為光禄勳公亷好義讓千萬財分昆弟宗族然自伐其賢能性刻害好彂人隂伏輕慢士人卒以此敗太僕戴長樂與惲有隙告之曰安昌侯乗車奔入北掖門惲曰甞聞奔車扺殿門門闗折馬死而昭帝崩今復如此惲觀西閣上指桀紂畵像曰天子過此一二問其過可以得師矣畫人有堯舜不稱而言桀紂又曰天乆隂不雨春秋所記夏侯君所言上行必不至河東矣以上為戲語悖逆絶理下廷尉廷尉奏大逆不道請捕治之上不忍致法免為庶人居家治産業起室宅安定太守西河孫㑹宗智略之士也與惲書戒之以為大臣廢退當闔門恐懼不當治産業通賔客也惲報書曰自為罪過已重長為農夫故修賈豎之事耕桑以給公上不意當復以此為譏也夫河西郡地魏文侯所興有段干木田子方遺風尚節儉明去就之分今足下離舊土臨安定山谷間昆戎舊壤子弟貪鄙豈習俗移人於今乃覩子之志矣方今盛漢之隆願勉旃無多談惲兄子安平侯譚謂惲曰西河太守杜侯前以過絀今復徴為御史大夫侯罪薄又有功勞且復用惲曰有功何益縣官不足為盡力譚曰縣官實然蓋司𨽻韓馮翊俱盡力吏皆坐事誅騶馬猥佐成告之下廷尉案驗得惲與㑹宗書上惡遂誅惲妻子徙合浦譚坐不諌止惲與相應荅有怨望語免為庶人公卿奏収惲黨友皆免官京兆尹張敞亦被奏獨寢不下㑹敞使捕賊掾吏絮舜有所案驗以敞當免曰五日京兆尹耳不肯為案事敞聞之即収舜彊致之死罪舜家自告上欲令敞自便利即先下敞坐楊惲事免敞詣闕上印綬因従闕下亡命於是京兆吏民解弛桴鼓數起而冀州部中有大賊上思敞功效即下詔所在召敞拜冀州刺史廣川王同族劉調等為賊窟藏於王家敞自將吏民兵車數百兩圍王宫果得調等於殿屋重轑中乃斬調懸其首於王宫門因劾奏王上不忍致法削其戸冀州盜賊禁止遷太原太守郡中清静所在治理荀恱曰天子無私惠王法不曲成若張敞之比以議能之法宥之可也使之亡非也三年春正月癸卯丞相邴吉薨諡曰定侯子顯嗣有罪上不忍絶削爵為闗内侯二月壬辰御史大夫黄霸為丞相霸長於治民及為丞相綱紀風采不及魏相邴吉于定國三月行幸河東祠后土神光並見燭燿齋宫十有餘刻辛丑鳳皇集長樂宫文章五采留十餘刻吏民並覩賜民爵一級鰥寡孤獨帛令民大酺五日時天下殷富數有嘉應益州刺史王㐮欲宣風化於其民令王褒作中和樂職宣布歌詩選好事童子何武等令依鹿鳴之聲習而歌之上召武等觀之皆賜帛曰此盛徳之事吾何以當之益州刺史因奏王褒有逸才能為文上乃徴之待詔後召褒為頌頌聖主得賢臣之意褒對曰春秋五始之要在乎審已正統而已夫賢者國家之器用也所任賢則趨舍省而功施普器用利則事力少而成效多故工之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水淬其鋒越砥斂其鍔水斷蛟龍陸剸犀革忽若彗汜畫塗如此乃使離婁督䋲公輸削墨雖崇臺五層延袤百尺而不溷者工用相得也故服絺綌之凉者不苦盛暑之鬱燠襲狐貉之煖者不憂至寒之悽慘何則有其具者易其備夫賢人君子亦聖主之所以易海内也昔周公躬吐握之勞故有圄空之隆齊桓設庭燎之禮故有匡合之功由是觀之明君人者勤於求賢而佚於得人人臣亦然故世必有仁聖之主而後有賢明之臣故虎嘯而風起龍興而致雲蟋蟀候秋吟蜉蝣出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故聖王必待賢臣而𢎞功業雋士亦俟明主以顯其徳上下俱欲歡然交欣千載一㑹愉恱無斁翼乎如鴻毛之遇順風沛乎若臣魚之縦大壑其得意如此則胡禁不止何令不行化溢四表横被無窮遐夷貢獻萬祥必臻是以聖主不徧闚望而視以明不殫傾耳而聽以聦恩従祥風翺徳與和氣遊太平之責塞優游之望得遵遊自然之勢恬淡無為之塲休徴自至夀考無疆何必偃仰屈伸若彭祖喣噓呼吸如喬松眇然絶俗離世哉詩云濟濟多士文王以寧信乎其以寧也是時上頗好神仙故褒對及之頃之拜褒為諫議大夫數為辭賦方士言益州有金馬碧雞之寳可祭致之使褒祠焉褒道病死六月辛巳西河太守杜延年為御史大夫安和寛裕論議持平稱為名臣是歳置西河屬國都尉以處匈奴降者四年春正月廣陵王胥有罪自殺胥好倡樂逸遊力能扛鼎空手搏羆豕猛獸動作無法度昭帝時數使巫祝詛上即位胥曰太子孫何以反得立復祝詛如前楚王延夀謀反胥與私通書延夀既誅辭連及胥有詔勿治後復祝詛胥宫中棘生十莖莖赤葉白如素池中水變赤魚死有䑕舞王後庭中後祝詛事彂覺有司案驗胥惶恐自殺諡曰厲王其子為庶人匈奴單于稱臣遣弟谷蠡王入侍以邊寨無寇減戍卒十二大司農丞耿夀昌善筭能商功利奏言故事歳漕闗東穀四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河南上黨太原郡穀足給京師可以省闗東漕卒過半又奏邊郡皆築倉以穀賤時増價而糴以利農貴時減價出糶以贍貧民名曰常平倉民便之乃賜夀昌爵闗内侯是時糴穀甚賤農人少利故設常平倉而蔡癸以好農而為使者勸農於郡國昔李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居三分減一為六萬頃治田勸農則畞益三斗不勸損亦如之増減轉為穀百八十萬石矣故農事不可以不勸糴甚貴則傷民糴甚賤則傷農民傷則離散農傷則國貧故甚貴甚賤其傷一也善為國者使民無傷而農益勸今五口之家治田百畝歳常不足以自供若不幸即有疾病死喪之費則至於甚困是以民不勸耕而糴至於甚貴也是故善平糴者必視歳上中下上熟自四中熟自三下熟自倍饑亦如之故上熟官糴三而舎一中熟官糴二而舎一下熟官糴一而舎一使民適足價平則止小饑則彂小熟之所斂而糶之中饑則彂中熟之所斂而糶之大饑則彂大熟之所斂而糶之以相贍補故雖遭饑饉糴不甚貴而民不散穀價常平行之魏國魏國彊富夏四月辛丑朔日有食之是謂正月朔慝未作春秋左氏傳以為重遣丞相御史掾吏二十四人循行天下舉寃獄察擅為苛禁深刻不改者甘露元年春正月行幸甘泉郊泰畤匈奴呼韓邪單于遣子右賢王銖婁渠堂入侍而呼韓邪兄左賢王自立為郅支單于遣子入侍三月丁巳大司馬車騎將軍許延夀薨夏四月黄龍見新豐建章未央長樂宫鐘及筍虡銅人皆生毛長二寸許甲申太上皇廟災甲辰孝文廟災上素服五日冬呼韓邪單于遣弟左賢王朝賀二年春正月立皇子囂為定陶王後徙為楚王詔曰乃者鳳皇甘露降集黄龍登興醴泉滂流枯槀榮茂神光並見咸受禎祥其赦天下減民算三十賜諸侯王丞相將軍二千石金錢各有差賜民爵女子百戸牛酒鰥寡孤獨髙年帛朱崖郡亂夏四月遣䕶軍都尉張禄將兵擊之御史大夫杜延年賜安車駟馬免五月乙丑廷尉于定國為御史大夫秋九月立皇子宇為東平王冬十月幸雲陽宫營平侯趙充國薨諡曰壯武侯以功徳與霍光等圖畫相次於未央宫第一曰大司馬大將軍博陸侯霍光次曰衛將軍富平侯張安世次曰車騎將軍龍頟侯韓増次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陵侯邴吉次曰御史大夫建平侯杜延年次曰宗正陽城侯劉徳次曰少傅梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功徳知名當世以明著中興輔佐列於方叔召虎仲山甫焉至成帝時西羌常有驚成帝思將帥之臣召黄門侍郎揚雄即充國畫像而頌之曰明靈惟宣戎有先零先零猖狂侵我西疆漢命虎臣惟後將軍整我六師是討是震既臨其域喻以威徳有守矜功謂之弗尅請奮其旅於罕之羌天子命我従之鮮陽營平守節屢奏封章料敵制勝威謀靡亢遂尅西戎旋師于京鬼方賔服罔有不庭昔周之宣有方有虎詩人歌之乃列于雅在漢中興充國作武糾糾桓桓亦紹厥後三年春正月行幸甘泉郊泰畤匈奴呼韓邪單于為郅支所破遂稱臣来朝上議其儀丞相霸御史大夫定國議以為聖王先諸夏而後夷狄其禮儀宜如諸侯王位次其下太子太傅蕭望之議曰單于夷狄禮儀非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上蠻夷稽首稱藩中國讓而不臣此羈縻之義謙厚之禮也書曰戎狄荒服言其来徃荒忽無常如使匈奴後嗣不闕於朝饗不為叛臣信讓行乎蠻貉福祚延于無窮此萬世之長䇿也上令單于在諸侯王上贊謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黄金錦繡繒絮使有司導單于先行就邸荀恱曰春秋之義王者無外欲一於天下也書曰西戎即序言皆順従其序也道里遼逺人物介絶人事所不至徳化所不沾不告諭以文辭故正朔不及禮義不加非導之也其勢然也王者必則天地天無不覆地無不載故盛徳之主則亦如之九州之外謂之藩國蠻夷之君列於五服詩云自彼氐羌莫敢不来王故要荒之地必奉王貢若不供職則有辭讓號令加焉非敵國之謂也故逺不間親狄不亂華輕重有序賞罰有章此先王之大禮故舞四夷之樂於四門之外不備其禮故不見於先祖獻其志意音聲而已望之欲待以不臣之禮加之以王公之上僭度失序以亂天常非禮也若以權時之宜則確論矣二月單于罷歸遣衛將軍車騎將軍騎都尉萬六千騎送單于單于歸幕南保光禄城而郅支單于逺遁匈奴遂定詔曰乃者鳳皇集新蔡衆鳥四面行列而立以萬數其賜汝南太守帛百疋新蔡長吏三老孝弟力田鰥寡孤獨帛各有差賜吏民爵二級無出今年租三月己巳丞相黄霸薨五月甲午御史大夫于定國為丞相初定國父于公為東海郯縣獄吏郡決曹掾決獄甚明罹法者皆無恨郡中為之立生祠東海有孝婦少寡無子養老姑甚謹姑欲嫁之終不肯去姑告鄰人曰我年老乆累丁壮其後姑自經而死姑女告婦殺我母吏驗治甚急孝婦自誣服具獄上府于公以為婦孝養姑十餘年以孝聞于天下必不殺也太守不聽于公爭不得乃抱具獄哭於府門上因辭病去郡中枯旱三年及後太守方召于公于公曰前有孝婦不當死枉誅咎儻在是乎於是太守殺牛自祭孝婦因表其墓天乃大雨于公其里門閭壊父老方共治之于公曰少髙大令容駟馬髙蓋我治獄多隂徳子孫必興故人為之語曰于公髙門以待封嚴母除地以望喪定國少為文法吏及在卿位乃迎師學春秋身執經北面備弟子禮謙讓恭敬士雖貧賤徒步皆與均禮為廷尉八年持法平端朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉天下自不寃然好飲酒至一石不能亂益精明邴吉之薨也薦杜延年于定國陳萬年皆以次見用後太僕陳萬年為御史大夫萬年沛人也外行亷平内行修飾在位稱職然善事人邴吉疾病中二千石以下謁問疾吉遣家丞謝之已皆去惟萬年獨留昬夜乃歸好為曲意如此子咸剛直有異才萬年甞召咸牀下教戒之咸睡頭觸屏風萬年怒之咸叩頭謝曰具曉所言大人乃教咸諂也萬年乃不復言咸後為御史中丞執法殿中公卿以下皆敬憚之頗言石顯長短為顯所奏坐漏泄省中語下獄減死後歴州郡所在令行禁止官至少府其治嚴酷倣嚴延年然性奢侈其廉不及詔諸儒博士講五經同異於石渠太子太傅望之平其議上親稱制臨決焉乃立梁丘易大小夏侯尚書穀梁公羊春秋左氏傳博士冬烏孫公主求歸年七十餘矣與烏孫男女二人俱来賜田宅奴婢朝見儀比於公主焉四年夏廣川王海陽有罪廢遷房陵冬十月丁夘未央宫宣室閤災黄龍元年春正月行幸甘泉郊泰畤匈奴呼韓邪單于来朝禮賜如初二月單于歸國詔曰朕即不明數申詔公卿大夫順民所疾苦今吏或以不禁姦邪為寛大縦釋有罪為不苛或以酷惡為賢皆失其中奉詔宣化如此豈不謬哉方今天下少事賦役省減兵革不動而民多貧盜賊不止其咎安在上計簿務為欺謾以避其課三公不以為意朕將何任御史計簿有疑不實者案之使真偽無相亂三月星孛於王良閤道入紫㣲宫是歳未央宫殿輅軨中雌雉化為雄毛衣變而不鳴無距冬十有二月甲戌帝崩於未央宫讃曰本紀稱孝宣之治信賞必罰綜核名實政事文學法理之士咸精其能至於技巧器械之資後世鮮能及之亦足以知吏稱其職民安其業遭值匈奴乖亂推亡固存申威北敵單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興徳侔殷髙宗周宣矣漢武之世得賢為盛公孫𢎞倪寛以鴻漸之翼困於燕雀卜式彂迹於牧羊之間非遇其時焉能致斯位乎孝武踐祚方用文武求賢如不及始以蒲輪迎枚生見主父偃而歎息羣士慕義異人並出卜式試於芻牧桑𢎞羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦當時板築牧牛之徒明矣漢之得人於斯為盛儒雅則公孫𢎞董仲舒倪寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定律令則趙禹張湯文章則司馬相如滑稽則東方朔枚皋應對則嚴助朱買臣厯數則唐都洛下閎協律則李延年運籌則桑𢎞羊奉使則張騫蘇武將帥則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及至孝宣承統繼修鴻業亦講論六藝招選茂異而蕭望之梁丘賀夏侯勝韋𤣥成嚴彭祖尹更始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相邴吉于定國杜延年治民則黄霸王成龔遂邵信臣韓延夀尹翁歸趙廣漢張敞之屬皆有功迹見於後世參之名臣亦其次也前漢紀卷二十
