  - {type: variant, offset: 11, length: 0, content: '', WYG: 三}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 篇詞約事詳論辨多美張璠漢記亦稱其因事以明臧否致有典要大行於世唐劉知㡬史通六家篇以悦書為左𫝊家之首其}
  - {type: page-break, offset: 12, content: '', id: KR2b0003_WYG_000-1b, image: WYG0303/WYG0303-0203b.png}
  - {type: variant, offset: 13, length: 2, content: 世十, WYG: 體篇又稱其厯代寳之有踰本𫝊班荀二體角力爭先其推之甚至故唐人試士以悦紀與史漢為}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 科文獻通考載宋李燾跂曰悦為此紀固不出班書亦時有所刪潤而諫大夫王仁侍中王閎諫疏班書皆無之又稱司馬光編資治通鑑書太上皇事及五鳯郊泰畤之月皆舍班而從荀葢以悦修紀時固書猶未舛訛又稱其君蘭君簡端興譽寛竟諸字與漢書互異者先儒皆两存之王銍作两漢紀後序亦稱荀袁二紀於朝廷紀綱禮樂刑政治亂成敗忠邪是非之際指陳論著每致意焉反覆辨達明白條暢啟告當代而垂訓無窮是宋人亦甚重其書也其中若壺闗三老茂漢書無姓悦書云姓令狐朱雲請上方劍漢書作斬馬悦書乃作斷馬證以唐張渭詩願得上方斷馬劍斬取朱門公子頭句知漢書字誤資考証者亦不一近時顧炎武日知録乃惟取其宣}
  - {type: page-break, offset: 16, content: '', id: KR2b0003_WYG_000-2a, image: WYG0303/WYG0303-0204a.png}
  - {type: page-break, offset: 16, content: '', id: KR2b0003_WYG_000-2b, image: WYG0303/WYG0303-0204b.png}
