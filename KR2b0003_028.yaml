body:
  text: 前漢孝哀皇帝紀上卷第二十八皇帝丙午即位年十九五月立皇后傅氏帝祖母定陶恭王太后從弟女也封皇后父晏為孔鄉侯傅太后稱尊號於是追尊定陶恭王為恭皇帝傅太后為恭皇太后帝母丁太后曰恭后各置左右詹事食邑如長信宮中官追尊傅太后父為宗德侯丁后父為褒德侯舅丁明封為安陽舅子滿為平周侯追諡滿父忠為懷德侯封趙太后弟欽為新城侯太傅師丹為左將軍賜爵關內侯丹諫曰天下者陛下之家也肺腑何患不富貴而多封爵外親及臣等不宜蒼卒如此不聽六月曲陽侯王根前定策封二千戶太僕安陽侯王舜有舊恩益封五百戶丞相孔光大司空何武各益千戶詔曰河間王良喪太后三年治喪為宗室儀表益封萬戶有司上奏王侯已下至庶人占田不得過三十頃賈人不得占田過科沒入縣官齊三服官禁民諸綺繡難成害女工之物皆止無作除任子令誹謗欺誣法掖庭宮人年三十以下出嫁之官奴婢五十以上免為庶人禁郡國無得貢獻名獸益吏三百石以下俸察使殘酷虐者以時退免有司不得舉赦前事博士弟子父母與寧假三年秋七月丁巳大司空王莽乞骸骨避丁傅賜黃金駟馬免庚午左將軍師丹為大司馬封高鄉亭侯八月庚申鄭通里男子王褒衣絳衣帶劍入北司馬門殿東門上前殿入非常室中解帳組繫劍佩之招殿前署長命曰天帝令我居此宮考問褒故公車大卒病狂忽忘不自知入宮狀下獄死九月庚申地震自京師到北邊郡國三十餘處壞城郭凡壓殺四百餘人冬十月大司空何武免癸酉大司馬師丹為大司空郎中令裒黃門令殷由等言定陶恭王太后恭皇后皆不宜復引定陶藩國之名以冠大號又宜為恭皇帝立廟京師上下其議皆以如裒等言師丹獨議曰今定陶恭皇后以定陶為號者母從子妻從夫之義今不宜復改禮為人後者為之子陛下既王承先帝宗廟之禮義不得復奉恭皇后祭入其廟今立京師令臣下祭之是無主也又親盡自當毀去一國太祖不隳之禮而就無主當毀不正之禮非所以尊厚恭皇后也丹由是不合上意會有上書者云古者以龜貝為貨今以錢易之民以故貧宜復故幣上以問丹丹對曰可改事下有司議者以錢行已久矣不可改丹老忘其前語從公卿議上以丹反覆二辭言無所守又丹使吏上書奏事吏私寫其草丁傅子弟聞之使人上書告丹漏泄省中語下廷尉遂奏免丹丹上書還大司空高樂侯印綬丹字仲公琅邪人廉正守道以儒術進既廢終於家曲陽侯王根成都侯王商皆有罪根就國商免為庶人歸故郡詔曰乃者河南穎川郡水泛處浸殺人民遣光祿大夫循行舉賜死者棺錢人三千其所傷縣邑及他郡國無出今年租賦博士申咸數言高陽侯薛宣為丞相時後母死不行三年喪不宜居相位宣子況為黃門侍郎賕客楊明欲令斫咸面使不復用會司隸校尉闕恐咸為之遂使明斫咸於宮門外斷鼻脣事下有司御史大夫衆等議以為況恐咸為司隸舉奏宣而公令明迫切宮闕創戮近臣於大道人衆中欲以隔塞聰明抑絶論議之官桀黠無所畏忌禮下公門軾路馬敬近臣謂其近主也況首為惡明手傷人功意俱惡明當以重刑況皆棄市廷尉以為況謀先定非恐為司隸造謀也本爭私變以父見謗無他大惡雖於掖門大道中與凡民道爭無異孔子曰必也正名乎明當以賊傷人況與謀者皆削爵減死為議且於先況減死罪一等徙燉煌宣免為庶人卒於家宣次子惠亦至二千石建平元年春正月有石隕於地十六是月大赦天下丁酉光祿大夫傅喜為大司馬喜太后從父弟初為右將軍太后預政事諫后故收喜右將軍印綬以光祿大夫養病大司空何武尚書令沛國唐林皆上書言喜行義修潔忠誠憂國夫忠臣社稷之衛也魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將文公側席而坐及其死也君臣相慶百端之衆不如一賢故秦行千金以間廉頗漢散金以踈亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之故復用之丁未有白氣著天廣處如一匹布長十餘丈西南行薨薨如雷一刻而止定襄有牡馬生駒三足隨群馬飲食本志以為馬武用其後大司馬董賢幼少見用之象也新都侯趙欽城陽侯趙欣皆有罪免為庶人徙遼西太皇太后詔外家王氏田非冢塋皆以賜民秋九月甲辰有石隕於虞二冬十月壬午京兆尹朱博為大司空中山王馮太后媛弟宜鄉侯參皆自殺時中山王疾上使中謁者張由將醫至中山由素有狂易疾發怒去歸長安尚書薄責擅去事狀由恐誣言中山王太后呪詛上及傅太后太后素怒中山太后遣御史按驗考訊卒無所得更使中謁者令史陳立與丞相長史大鴻臚丞親治其事立受傅太后旨冀得封侯治馮太后女弟習及寡弟婦君之等死者十餘人誣對言服呪詛立奏言呪詛謀反大逆無道責問馮太后無服詞立曰當熊之上殿何其勇也今何怯也后曰此欲陷殺我乃飲藥而死參家凡死十七人宗族歸故國張由歸賜爵關內侯立遷中大夫太僕馮參兄弟四人長兄野王為大鴻臚剛直不曲名重當世次逡次立皆二千石以治行稱參好為容儀進止恂恂甚可觀也矜嚴直操不屈於五侯貴寵之家十有二月有白氣出西南從地上至天出參下貫天廁廣如匹布長十餘丈十日而去二年春正月有星孛於牽牛七十餘日本志以為牽牛日月五星所從起曆數之元也彗孛加之改更之象丁丑大司馬傅喜免安陽侯丁明為大司馬大司空朱博奏言高皇置御史大夫位次丞相上下相監選授有序所以尊聖德重國相也今更司空與丞相同位中二千石未更為大夫而為丞相權輕非所以重國政也上從之罷司空官夏四月戊午大司空朱博為御史大夫論曰丞相三公之官而數變易非典也初丞相秦之制本次國命卿故置左右丞相無三公之官詩云夙夜匪懈以事一人一人者謂天子也自上已下必參而成位易曰鼎足以喻三公所以參事統職立官定制三公蓋其宜也乙亥丞相孔光免議太后失旨也御史大夫朱博為丞相少傅趙玄為御史大夫博奏言尊恭皇太后號曰帝太皇太后稱永信宮恭皇后曰帝太后稱永安宮立廟於京師赦天下徒罷州牧復刺史荀悅曰州牧數變易非典也古者諸侯之國百里而已故易曰震驚百里以象諸侯之國也夫國小人衆易統也古諸侯皆久其位視民如子愛國如家於是建諸侯之賢者以為牧故以考績黜陟不統其政不御其民惠無所積權無所并故牧伯之位宜合古也惟周制為不然大國不過五百里而公侯伯子男以次小焉今漢廢諸侯之制以為縣治民者本以強幹弱枝一統於上使權柄不分於下也今之州牧號為萬里總郡國威尊勢重與古之牧伯同號異勢當周之末天下戰國十有餘而周室寥矣今牧伯之制是近於戰國之迹而無治民之實刺史令為監御史出督州郡而還奏事可矣六月庚申太后丁氏崩葬定陶發濟陰陳留近郡五萬人穿土待詔賀良等奏天官曆包元太平經十二卷言漢家曆運中衰當再受命宜改元易號太平經者成帝時齊人甘忠詐造云天帝使真人赤松子教我此道時劉向奏言忠可殺假鬼神惑衆下獄治服未斷病死而賀良受其書劉歆以為不合五經不可施行司隸解光平陵李尋好之勸上從賀良等議時上多病乃赦天下改年為太初元年號陳聖劉太平皇帝刻漏以一百二十為度秋七月以渭城永陵賀良等又欲變亂政事大臣爭以為不可賀良等奏言大臣皆不知天命宜退丞相御史大夫以解光李尋輔政時上疾自若以其言無驗遂下賀良等議皆伏誅光尋等減死一等徙燉煌李尋字子良平陵人也治尚書好災異初以待詔問對曰陛下秉四海之衆曾無楨幹之臣朝廷無人則為亂賊所輕惟陛下執乾剛之德強志守度進用忠良無聽讒佞竭邪臣之態諸阿保乳母甘言悲辭之訴斷而勿聽勉大義絶小不忍尋雖失其議於賀良先言災異數中擢拜騎都尉言多忠切荀悅曰夫內寵嬖近阿保御豎之為亂自古所患故尋及之孔子曰惟女子與小人為難養性不安於道智不周於物其所以事上也唯欲是從唯利是務飾便假之容供耳目之好以姑息為忠以苟容為智以伎巧為材以佞諛為美而親近於左右玩習於朝夕先意承旨因間隨隙以惑人主之心求贍其私欲慮不遠圖不恤大事人情不能無懈怠或忽然不察其非而從之或知其非不忍割之或以為小事而聽之或心迷而篤信之或眩曜而不疑之其事皆始於纖微終於顯著反亂弘大其為害深矣其傷德甚矣是以明主唯大臣是任惟正直是用內寵便辟請求之事無所聽焉事有損之而益益之而損物有善而不居惡而不可避甘醴有鴆毒藥酒有治病是以君子以道折中不肆心則不縱體焉惟義而後已秋七月甲寅丞相朱博御史大夫趙玄孔鄉侯傅晏有罪博自殺玄減死二等論晏削邑三分去一傅太后欲稱尊號晏諂諛順旨而晏與博結謀立尊號博遂為丞相太后怨傅喜使晏諷博令免喜博素與晏交善許之御史大夫趙玄止之博曰已許孔鄉侯矣匹夫相要尚得相死何況至尊博亦有死耳玄遂許可奏免喜并孔鄉侯何武并免為庶人上疑博玄受諷旨即召玄尚書省問狀玄辭服有詔議其罪議者以為春秋之義姦以事上常刑不赦遂抵罪初博玄皆拜於上前有音如鍾殿中郎吏侍陛者皆聞上以問黃門侍郎李尋尋曰洪範所謂鼓妖者也人君不聰明為衆所惑空名而得進即有應而無形不知所從至其傳曰其歲月日之中則正卿受之今以四月加辰巳有其異是為中焉正卿謂執政大臣也宜退丞相御史大夫以應天變然雖不退不日期年其人自受其咎博杜陵人也始為冀州刺史行縣吏民夜遮道自言者數百人從事請留見自言事者畢乃發欲以觀試博博心知之告外趣駕博出駐車見自言者使從事明勑告吏民夫欲言縣丞尉者刺史不察黃綬各自詣郡欲言二千石墨綬長吏者行部還詣治所民為吏所冤欲言盜賊辭訟事者各使詣屬所部從事駐車決遣四五百人皆罷如神吏民大驚後博徐問果此老吏從事教民聚會博殺此吏自此州郡吏民畏服其威後為廷尉自以不曉文法恐官屬欺誣之乃召見正監典法掾吏曰試為廷尉撰前世決難知者十餘事得諸覆思之於是共條白十事召正監掾吏坐而問博處其輕重十中八九官屬服博才過人也博初起為亭長為人廉潔不好酒色食不重味案上不過三杯夜寢早起妻稀見面然好遊俠欲士宦者薦舉之欲報仇怨者解劍帶之其趣事待士如流而無大正卒以此敗是時茂陵原涉為州里大俠初涉父為南陽太守死官郡內賦斂千萬時俗皆通受之唯涉獨不受行喪三年由是名顯年二十治劇縣為谷口令不言而治居歲去官為季父報仇郡國豪傑有氣節者皆歸慕之人無賢不肖傾身相待所在闐門閭里盡滿然身衣服車馬甚節妻子內困專以振施貧窮赴急為務涉略似郭解外溫人謙遜內隱忍睚眥於埃塵獨死者甚衆王莽時以涉為鎮戎大尹荀悅曰天子建國諸侯立家自卿大夫已下至於士庶人為有等差是以民服其上而下無覬覦孔子曰天下有道政不在大夫百官有司奉治令以修所職失職有誅侵官有罪夫然故上下相順庶事治焉周室既衰禮樂征伐自諸侯出桓文之後大夫世權陪臣執國命陵遲以至於戰國合從連衡易政爭強由此列國公子魏有信陵趙有平原楚有春申齊有孟嘗皆藉王公之勢競為遊俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以周窮交拔魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆取重諸侯顯名天下扼腕遊談者以四豪為稱首於是背親死黨之義成守職奉上之道廢矣及漢興禁網踈闊未之匡正是以代相陳豨從車千乘而吳濞淮南皆招賓客以千數外戚魏其武安之徒皆競逐於京師希交遊於天下劇孟郭解之徒皆馳騖於閭閻權行州郡力折公卿衆庶覬其名迹榮而慕之雖陷刑辟自為殺身成名若季路仇牧死而不悔也故曾子曰上失其道民散久矣非明王在上示之以好惡齊之以禮法民何由知禁而反正乎古之正法五伯三王之罪人也六國五伯之罪人也夫四豪六國之罪人也況郭解之論以匹夫之細竊生殺之權罪已不容於誅矣然觀其溫良泛愛賙急謙退不伐亦有絶異之資惜乎不入道德苟放縱於末流殺身亡宗非不幸自魏其武安淮南之徒天子切齒至於衛霍改節然郡國豪傑處處皆有京師親戚冠蓋相望亦古今之常莫足言者唯王氏五侯賓客為盛而樓護為師諸公之間陳遵為雄桀閭里之俠獨涉為魁首九月光祿勳平當為御史大夫十月甲寅御史大夫平當為丞相京兆尹王嘉為御史大夫三年春正月立廣德夷王弟廣漢為廣平王九月帝母太后所居桂宮正殿災三月己酉丞相平當薨當字子思平陵人也以明經忠賢進初拜丞相以冬十月賜爵關內侯其春上召欲詔封當稱疾篤宗族皆謂當曰何不強起受侯印綬為子孫邪當曰吾在死大位已負素餐之責矣起受侯印還寢而死死有餘罪今不起者為子孫也後月餘卒子晏亦以明經位至大司徒封防鄉侯有星孛於河鼓夏四月丁酉御史大夫王嘉為丞相嘉字公仲平陵人也為九江河南太守治甚有聲名剛直弘毅有威上敬重之河南太守王崇為御史大夫九月立魯頃王子郚鄉侯閔為魯王冬十月汝南西平遂陽樗樹臥生枝葉如人形青黃色面白頭有髭髮凡長六尺一寸有耳十一月壬子復甘泉泰畤后土祠南北郊東平王雲有罪自殺雲后謁棄市是時無鹽邑山有石立自開道故汝南太守孫寵以遊說顯名與待詔河內息夫躬相結察事躬陰與寵誣言告東平王雲欲以獲封躬乃與中郎右師談因中常侍宋弘上變事告東平王依往時泰山石立而宣帝興雲與后日夜祝詛冀獲非望下有司按驗伏誅是歲零陵大樹偃仆地圍一丈六尺長十丈七尺民斷其根長七尺餘皆枯三月樹自立故處有大魚出於東萊長丈八尺高丈一七枚皆死京房易傳曰后妃專權厥妖木臥復立棄正作淫厥妖木斷復續海出巨魚邪人進賢人疏
