body:
  text: 前漢紀卷二十四漢荀恱撰孝成一皇帝以宣帝時生號曰世適皇孫宣帝愛之自名曰驁字太孫常置左右三歲而宣帝崩及為太子嘗被急召不敢絶馳道行元帝遲之以狀對帝悦乃著令令太子得絶道行自此始也六月乙未即皇帝位元舅侍中衛尉平陽侯王鳳為大司馬大將軍領尚書事有司奏言乗輿狗馬禽獸皆非禮不宜以葬奏可秋七月孝元皇帝葬渭陵冬十有一月大赦天下建始元年春正月乙丑皇曽祖悼考廟災本志以為悼考廟不正不宜立王鳳秉政不正之象也立故河間王弟良為河間王有星孛於營室罷上林詔獄二月賜諸侯王以下至吏二千石黄金吏千石以下至二百石宗室有屬籍者三老孝弟力田鰥寡孤獨錢帛各有差吏民五十户牛酒粟五斛大赦天下右將軍長史姚尹使匈奴還去塞百餘里暴風火起燒殺尹等十餘人封舅王崇為安城侯賜舅譚商立根逢時五人等爵闗内侯王鳳兄弟八人第二曰曼早亡不侯夏四月黄霧四塞終夜下著地如黄土塵上問羣臣諌議大夫楊興博士駟勝等以為隂氣侵陽氣之象髙祖之約非有功不侯今太后諸弟皆以無功而侯非髙祖之約故天為見異以譴失行上以為然鳳於是乃懼上書言陛下初即位思慕諒闇故詔臣鳳典領尚書事上無以明聖徳下無以益政治今有孛星赤黄之異咎在臣鳳伏願顯戮以謝天下今諒闇已畢大義皆舉宜親覽萬機以當天心因乞骸骨辭歸上報曰朕承先帝聖緒涉道未深不明事情是以隂陽錯繆日色無光赤黄之氣充塞天下咎在朕躬今大將軍引過自子辭尚書事歸大將軍印綬罷大司馬官是明朕不徳也朕委任將軍庶幾有成其專心固意輔朕不逮六月有蠅數萬集未央殿中朝者坐秋長信少府邵信臣奏罷上林宫館希幸御者二十五所又奏冬生菜彊加温火非時而生人不宜以供奉養信臣字翁卿九江人也始為南陽太守乃為民興利開通津渠水門灌溉三萬餘頃禁止嫁娶送終奢靡其化大行吏民親愛之曰邵父上賜信臣黄金四十斤遷河南太守治化當為第一遂入為少府八月戊午有兩月相承晨在東方京房易傳曰君弱而婦人彊為隂所乗則兩月並出九月戊子有流星大如瓠出於文昌宫光燭地長四五丈委曲虵形以貫紫微宫冬十有二月作長安南北郊罷甘泉汾隂祀匡衡之議也衡奏議曰帝王之事莫大於承天承天之序莫大於郊祀祭天於南郊就天之義也祭地於北郊即隂之象也往者孝武皇帝居甘泉宫即於雲陽立泰畤今行幸長安郊見皇天反北之太隂祠后土反東之少陽事與古制殊又至雲陽行谿谷中阨狹百餘里汾陽即渡大川有風波舟楫之危皆非聖主所宜數乗郡縣治道供帳吏人困苦百姓煩費勞所保之民行危險之地殊未合於承天之意也昔周文武郊於酆鎬成王郊於洛邑各因其居宜可徙郊長安又言郊柴饗帝之義埽而祭尚質也歌大吕舞雲門以候天神歌太簇舞咸池以竢地祗其牲用犢其席用藁秸其器用陶匏皆因天地之性以為神祗功徳至大雖修精微而備庶物猶不足以報功故尚質貴誠以彰天地之徳今甘泉紫壇有文章刻鏤黼黻文繡之飾及玉女樂石壇仙人祠瘞鸞輅騂駒偶人龍馬之屬皆宜勿修又雍鄜密上下畤及陳倉寶雞祠本秦侯以其意所立非禮也及北畤皆髙祖未定時立不宜復修奏可本志初秦文公獵於汧渭之間卜居而吉文公夢黄虵自天而下屬於地其口止於鄜衍文公問史敦史敦曰此上帝之徴君宜祠之於是作鄜畤郊祭白帝焉文公獲古石缶於陳倉北坂上祠之其神嘗以夜下光輝如流星從東南來集於祠壇至地則若雄雞其聲殷殷云野雉夜雊名曰陳寶其神或歲數來或嵗不至後秦宣公作密畤祠青帝後秦靈公於吳陽作上畤祠黄帝作下畤祀炎帝及髙祖自漢中東擊項籍入闗問羣臣曰吾聞天有五帝今所祠有四何也羣臣莫知其説髙祖曰吾知之矣乃待我而具五也乃立黒帝祠曰北畤而洪範八政三曰祀祀者所以昭孝事祖宗通神明也旁及四夷莫不修之下及鳥獸豺獺有祭是以皇王為之典禮故有神民之官各司其序使不相亂也民神異業敬而不黷故神降之嘉瑞災禍不至及乎末世饗祀無度昬黷齊明而神不蠲嘉瑞不降而災禍至矣昔共工氏霸有九州其子曰勾龍能平水土故祠為社烈山氏王天下有子曰柱能播殖嘉穀故祠為稷虞書曰肆類於上帝禋於六宗徧於羣神又巡於四岳而柴祭焉及殷之十三世帝武丁祭之明日有雉登鼎耳以雊武丁懼而修徳夢得傳説版築以為相殷道復興號曰髙宗其後五世帝乙慢神悖禮震死及至周公相成王郊祀后稷以配天宗祀文王於明堂以配上帝凡天子祭天下名山大川懷柔百神咸秩無文五嶽視三公四瀆視諸侯諸侯祭其疆内名山大川大夫祭其門户井竈中霤是謂五祀士庶人祭祖考而已淫祀有禁及季氏旅於泰山仲尼譏之曰務民之義敬鬼神而逺之先王正人事而已不茍求福於神祗不由其道則神不饗也又有八神祠一曰天主祠天齊居臨淄南郊山下二曰地主祠太山梁父三曰兵主祠蚩尤在東平陸監鄉四曰隂主祠三山五曰陽主祠之罘山六曰月主祠之萊山皆在齊北七曰日主祠成山成山斗入海最居齊東北以迎日出八曰四時主祠琅琊八祠所從來乆矣莫知其所起或曰齊太公以來作之八神祀上過則因祀之去則已長安作南北郊之日有大風㧞甘泉泰畤中木十圍已上者皆出二年春正月罷雍五畤二月辛巳上始郊祀長安南郊有神光並見閏月以渭城延陵亭為初陵詔舉賢良方正三月北宫井水溢出南流元帝時童謠歌曰井水溢滅竈煙灌玉堂流金門本志以為隂象春秋前有鸜鵒之謠後有來巢之驗卒有昭公居外之應井隂也竈陽也玉堂金門至尊之居隂盛而滅陽竊有宫室之象王氏之應又有童謠歌曰邪徑敗良田讒巧害忠賢桂樹花不實黄雀巢其顛故為人所羨今為人所憐本志謂桂樹色赤漢家之象不實無嗣也黄雀王氏之象巢顛將有漢室辛丑上始祀后土於北郊丙午立皇后許氏大將軍許嘉女也罷少府技巧官夏大旱東平王牟有罪削二縣秋罷太子博望苑賜宗室朝請者減乗輿廄馬丞相匡衡又奏郡國候神方士使者所祠凡六百八十三所其二百八所應祀或疑無明文不可奉祀其餘四百七十五所不應祀請罷之又奏髙帝武帝宣帝所立山川羣祠凡百二十餘所非典皆罷之候神方士使者副使待詔七十餘人皆罷歸三年春赦天下囚徒賜孝弟力田爵三級諸逋租賦賑貸勿收秋闗中大雨水四十餘日京師人無故相驚言大水至百姓奔走號呼長安中大亂上親御前殿召公卿議大將軍王鳳以為太后及上與後宫可御舟舩令吏民百姓上長安城羣臣皆從王鳳議王商者宣帝舅樂昌侯武之子曰自古無道之國水猶不冒入城郭今政治和平何為當有大水一旦暴至此為訛言不宜令民上城重驚百姓耳上乃止有頃長安中稍稍自定上歎美商之固守數稱其議鳳甚慙自恨失言渭城女子陳持弓年九歲走入城門入未央宫掖庭殿門門衛者莫見至勾楯禁中覺而得本志以為民以水相驚者隂氣盛也小女入宫殿者下人將因女寵而居有宫室之象也名曰持弓有似周家檿弧之祥易曰弧矢之利以威天下後有王莽簒天下陳氏之後也秋八月癸丑大司馬將軍許嘉賜金安車駟馬免御史大夫張譚坐選舉不實免冬十月光禄大夫尹忠為御史大夫十二月戊申朔日有蝕之其夜地震未央宫中詔舉方正直言極諫長安人谷永者衛司馬谷吉之子對䇿曰災異之𤼵各以象其類日蝕婺女之分地震宫牆之内二咎同日𤼵厥咎不逺意者陛下志在閨闈不䘏政事舉措失中内寵大盛誠留意於正身勉彊於力行損宴私之恩放淫溺之樂罷倡優之笑絶不饗之義循禮而動力行不倦無淫於酒色無逸於㳺畋未有其身正而臣下邪者也夫婦之際安危之機也昔舜釐正二妃以崇聖徳幽王惑於襃姒而周室淪亡誠修後宫之政明尊卑之序貴不專妒賤者咸進各得其職以廣繼嗣之統息白華之怨後宫親屬勿預政事以逺皇父之類損女黨之權未有閨門理而天下亂者也夫治逺自近始習善在左右昔龍作納言帝命惟允四輔既備成王靡有過事經曰亦惟先正克左右未有左右正而百官枉者也治天下者尊賢考功則治簡賢退功則亂誠審思知人之術論才選士必稱其職明度量以旌其能考功實以定其徳無以比周之虚譽無聴浸潤之譖愬則抱功修職之吏無蔽擁之憂比周邪偽之徒不得妄進小人日消英乂日隆經曰三載考績三考黜陟幽明未有功賞得於前衆賢布於官而不治者也堯遭洪水之災天下無乖叛之難者徳厚恩深無怨於天下也秦居平土一夫大呼而天下分崩離析者刑罰深酷吏行殘賊誠宜選温良尚徳之士以親百姓以治民命務省徭役不奪民時使咸安土樂業經曰懷保小民惠鮮鰥寡未有徳厚吏良而民叛者也此五者王政之綱紀臣聞災異皇天所以譴告人主猶嚴父之明誡經曰嚮用五福威用六極傳曰六沴作見若不恭御六沴既侵六極其下惟陛下留神大將軍武庫令杜欽對曰臣聞日蝕地震陽微隂盛臣者君之隂子者父之隂婦者夫之隂夷狄者中國之隂春秋傳日蝕三十六地震五或夷狄侵中國或政權在臣下或妻不承夫或臣子背君父事雖不同其類一也臣竊睹人事以考變異則本朝大臣無不自安之人外戚親屬無乖剌之心闗東諸侯無彊大之國邊陲夷狄無逆禮之節此殆為後宫日以戊申蝕時加未戊未土也宫中之部其夜地震未央宫殿中此必適妾將有爭寵相害而為患者陛下内推至誠深思其變則咎異何足消滅如不留神聴於庶事奢侈縱欲雖無變異社稷之憂也欽字子夏目偏盲與茂陵杜鄴同姓字俱好學以才能稱故京師謂欽為盲子夏欽乃作小冠以自别於是更謂欽為小冠子夏欽素依附王氏説鳳曰禮一娶九女所以極陽數廣繼嗣重祖宗者也必鄉舉求窈窕之女不問其色所以助治内也姪娣雖缺亦不復補所以養壽塞爭故后妃有貞淑之行則𦙍嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女徳無厭女徳無厭則夀命不究於髙年書云或四三年言逸欲之生害也男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其源不可以救而後來異態後來異態則正后自疑而支庶有間適之心是以晉獻公被納讒之謗申生受無辜之罪今聖主富於春秋未有適嗣將軍輔政宜因初始之隆遵九女之制為萬世之法夫少戒之在色小弁之作可為寒心鳳白太后太后以為故事無之鳳又不能立制度循故事而已越嶲山崩丁丑丞相匡衡免初封樂安侯田以閩陌為界初元元年誤以平陵陌為閩陌多四百頃積十餘年郡乃定國界上計簿言丞相府衡諷掾屬郡不從故所郡即復以四百頃付樂安鄉侯衡收租榖有司奏衡監臨守主專地盜土於是坐免為庶人衡字穉圭東海人父世為農夫家貧好學傭作以供資用又精力過絶人善説詩衡子咸亦明經術位歴九卿四年春正月癸夘有石隕於槀四隕於肥累二罷中書宦官初置尚書員五人三月甲申左將軍王商為丞相夏四月雨雪五月謁者丞陳臨殺司𨽻校尉袁豐於殿中秋桃李實大雨水十餘日河決東郡金隄沈溉兖豫入平原千乗濟南凡灌四郡三十三縣敗毁官寺民屋廬四萬所九月長安城南鼠巢樹上桐柏尤多巢中無子冬十有一月御史大夫尹忠以河決不憂職自殺壬戌少府張忠御史大夫河隄使者王延世以竹落長四丈大九圍盛石以兩船夾載而下之二十六日河隄成上嘉其功拜為光禄大夫賜爵闗内侯黄金百斤是歲京輔都尉王尊領京兆尹尊字子贛涿郡人也為人果勇初為䕶羌校尉送軍糧而羌反絶糧道羌兵數萬圍尊尊以千餘騎突羌虜得免後為益州刺史先是琅邪王陽為益州刺史行部至卭僰九折阪歎曰奉先人遺體奈何數乗此險後以病去及尊行部至阪上問吏曰此非王陽所畏阪邪叱其御者驅之曰王陽為孝子王尊為忠臣居部二歲徼外蠻夷皆歸附㑹坐事免官㑹南山羣賊數百人為吏民害𤼵校尉將射士千餘人捕逐歲餘不能擒於是以尊為京輔都尉領京兆尹事旬月之間盜賊清平乃以尊復為東郡太守河水盛溢尊殺白馬祠水神親執圭璧使巫筴祝暮因止宿隄上吏民數千人爭叩頭求之尊宿隄上終不去及水盛隄壞吏民皆走惟主簿汪在尊旁尊立不動而水波稍稍却上嘉尊勇節秩尊中二千石賜黄金二十斤河平元年春正月匈奴復秣纍單于遣右賢王伊邪莫演奉獻來朝正月既罷歸使者送至蒲阪伊邪莫演言欲降即不受我我自殺終不復還歸公卿議者咸言宜如故事受其降光禄大夫谷永議郎杜欽以單于屈體稱臣奉使朝賀無有二心而今反受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣絶慕義之君假如單于初立欲委身中國未知利害使人詐降以卜吉凶如受之虧徳沮善令單于自疏或使者詐偽反間欲因以生隙受之適合其契使得歸曲而責直此誠邊塞安危之源師旅動靜之首不可不詳不如勿受上從之問其降狀曰我病狂妄言耳遣歸復位如故又不肯令見漢使二月庚子泰山桑谷有鳶焚其巢巢然墮地有三鳶鷇燒死長安男子石良劉音相與同居有物如人狀在室中擊之為狗而走後有數人被甲持弓弩至良家良等格擊之或死或傷皆狗也自二月至六月乃止夏四月乙亥晦日有蝕之不盡如鉤在東井六度光禄大夫劉向曰四月交於五月同於孝惠日同於孝昭東井京師地具説其占恐害繼嗣大赦天下六月罷典屬國官并大鴻臚寺秋九月復太上皇廟園是時刑書煩多上詔曰周之甫刑大辟之屬有二百今大辟之刑千有餘條律令煩多欲以曉喻衆庶不亦難乎所以夭絶無辜豈不哀哉其議減死刑及可蠲除約省者令較然易知書不云乎惟刑之恤其審核之務惟古法朕將盡心覽焉時有司不能廣宣主恩建立法度徒學細微小事以塞詔書而已本志曰昔周五刑之典墨罪五百劓罪五百宫罪五百剕罪五百殺罪五百所謂刑平國用中典者至穆王命甫侯作五刑以詰四方墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百凡五刑之屬三千稍稍煩多矣及至戰國韓任申不害秦用商鞅起連坐之法造參夷之誅増加肉刑大辟為鑿額抽脅鑊烹之刑而法禁愈酷矣至髙祖初入秦約法三章號為寛略􅃠漏吞舟之魚然時尚有夷三族之令當三族者先黥劓斬左右止笞殺之梟其首菹其骨肉於市其誹謗詈詛者又先斷其舌故謂之具五刑髙后元年除三族罪至於孝文遂除肉刑而斬右趾者棄市斬左足者笞五百劓罪笞三百率不勝笞多死孝景詔定捶令笞者乃得全及孝武之時酷吏擊斷姦宄不勝於是使張湯趙禹之屬修定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅其後有姦猾巧法轉相比況死罪決事比至萬三千四百七十二事文書盈於机閣典掌不能徧觀是以郡國承用者班駮或罪同而論異姦吏因縁為市所欲活即傅生議所欲陷則與死比宣帝即位深悼之始置廷尉平元帝初立下詔曰夫法令者所以抑暴扶弱欲其難犯而易避今法律煩多自典者不能分明而欲以羅元元之不逮斯豈刑之中哉其議定出令及至孝成重下明詔及公卿卒不能定昔荀卿言曰俗説曰古有象刑無肉刑是不然矣以為古之人莫觸其罪邪豈獨無肉刑哉亦不用象刑矣若有重罪而直輕其刑是殺人者不死傷人者不刑罪至重而刑輕民無所畏亂莫大焉夫徳不稱位能不稱官賞不當功刑不當罪不祥莫大焉所謂象刑惟明言象天道而作刑荀卿之言既然今之除肉刑者本欲以全人也今去髠鉗一等轉而入於大辟以死㒺民失其本意矣故死者甚衆刑重之所致也至乎穿窬之盜忿怒傷人吏為姦􅂍若此之惡髠鉗之罰又不足懲也故刑者甚衆民既不畏又曾不恥刑輕之所生也死刑既重而生刑太輕民易犯之故俗之能吏公以殺盜為威専殺者勝任奉法者不治亂名傷制不可勝條是以􅃠密而姦不塞刑繁而民愈慢由刑不正之故宜原其本刪定律令正其大辟其餘罪次於古當生今觸死者皆可募行肉刑及傷人與盜吏受財枉法者皆從古刑詆欺文致細微之法悉蠲除之如此則刑可畏而禁易避吏不専殺法無二門輕重當民命全矣二年春正月沛郡鐵官鑄鐵不下隆隆如雷聲又如鼓音工十三人皆驚走音止乃還視地陷數尺爐分為十一爐中銷鐵散如流星飛去夏四月楚國雨雹大如釡六月封舅譚為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為髙平侯同日受封故世為五侯王氏子弟皆卿大夫侍中諸􅔟分據要職盈滿朝廷政事皆決左右常薦劉向少子歆通達有異才上召見甚悦之欲以為中常侍取衣冠臨當拜左右曰未知大將軍㫖意上曰此小事何須問大將軍左右叩首固爭之上於是語鳳鳳以為不可乃止當權用事如此公卿見鳳側目而視郡國刺史太守相皆出其門時五侯羣弟競為奢侈起治第室百姓歌之曰五侯俱起曲陽最怒壞決髙都連境外杜土山漸臺象西白虎其奢汰如此然皆通敏人事好士養賢傾財施與以相髙尚時谷永與齊人樓護俱為五侯上客各有所親不得左右惟護盡入其門各得其歡心交結士大夫無所不傾護醫者子也為人短小精辨議論常依名節聴之者皆竦時人為之語曰谷子雲之筆札樓君卿之脣舌言其甚見信用也及護母死送𦵏引車至二三千乗閭里為之語曰五侯治喪樓君卿為天水太守免歸家大司馬王商親枉車騎至其閭巷弔問之是時谷口有鄭子真西蜀有嚴君平皆修行自保非其食不食鳳慕其名以禮聘子真子真終不屈君平卜於成都市以卜筮為業而可以惠人人有非正之問則依蓍龜以言利害與人子言依於孝與人弟言依於順各因其勢導之以善曰從吾言者己過半矣或日閲數人得百錢足以自養則閉肆下帷而授老子經博覽無不通依老子之㫖著五十餘萬言李彊為益州牧將𤼵京師謂揚雄曰吾真得嚴君平為吏矣雄曰君備禮而待之其人可見不可屈也彊以為不然及見君平不可屈之歎曰揚子雲誠知人可謂哲矣前漢紀卷二十四
