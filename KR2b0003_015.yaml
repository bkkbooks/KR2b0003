body:
  text: 前漢孝武皇帝紀六卷第十五太始元年春正月因杆將軍公孫敖坐妻為巫蠱腰斬徙郡國吏民豪傑於茂陵空在雲陽己巳晦日有蝕之夏六月赦天下二年春正月行幸回中秋大旱九月募死罪入贖錢五十萬減死罪一等御史大夫杜周卒周南陽人也為吏深刻為廷尉詔獄繁多二千石繫者新故相因不減百餘人郡國一歲或千餘章大者連罪證案數百人小者數十人遠者數千里近者數百里會詔獄因責章告不服以掠笞而定之於是聞有罪者皆亡匿繫獄久者十餘年赦而相告言大抵盡誣以為不道廷尉及中都官詔獄罪至六七萬人吏所增加十餘萬人嘗冬獄未竟會立春有寬大令周踏地歎曰復假吾數十日足吾事矣其酷暴如此及為御史大夫兩子夾河為郡守資纍巨萬治民皆酷暴而少子延年字幼公行寬厚云光祿大夫暴勝之為御史大夫趙中大夫白公穿渠引涇水首起池陽谷口尾入擽陽渭中廣袤一百里溉田四千五百餘頃因名曰白渠民得饒歌之曰田於何所池陽谷口鄭國在前白渠在後舉鍤成雲決渠為雨水流竈下魚跳入釜涇水一石其泥數斗且溉且糞長我禾黍衣食京師百萬餘口言此兩渠之饒也鄭國昔韓國之小水土也韓患秦東伐欲罷勞之乃遣鄭國説秦令鑿渠引涇水自中山以西抵壺口為渠緣北山東注洛水三百餘里以溉田中作而情覺秦欲殺鄭國鄭國曰始臣為計然渠成亦秦之利臣為韓延數年之命而為秦建萬世之功秦以為然卒使就渠溉田四萬餘頃收皆一畝一鍾於是關中沃野無凶年之憂秦以富強因以名為鄭國渠昔魏文侯時西門豹為鄴令有令名至文侯曾孫襄王與群臣飲酒王祝曰令吾臣皆如西門豹之為臣也史起進曰魏氏之行田以百畝鄴獨以三百畝是惡田也漳水在傍西門豹不知用之若知而不興是不仁也若其不知是不智也夫仁智而豹未之盡何足法也於是以史起為鄴令遂決漳水溉鄴以富魏之河內民歌之曰鄴有令名為史公決漳水兮溉鄴傍終古斥鹵兮生稻糧百姓豐足民用寧康皆言水之大利也三年春正月行幸甘泉宮饗外國客二月令天下大酺五日行幸東海獲赤鴈幸琅邪祀日成山登之罘山稱萬歲冬賜行所過戶錢五千鰥寡孤獨帛人二匹四年春二月行幸泰山壬午祀高祖於明堂以配上帝因受計癸未祀孝景皇帝於明堂甲申修封禪丙戌禪石閭夏四月辛亥行幸不其山祀神於交門宮若有神饗坐拜者五月行還幸建章宮大置酒赦天下秋七月趙地有蛇自郭外入與邑中蛇群鬭孝文廟下邑中蛇死冬十月甲寅晦日有蝕之十有二月行幸雍祠五畤遂至安定北地征和元年春正月行還幸建章宮三月趙王彭祖薨諡敬肅彭祖巧佞足恭心刻好法律常以詭詐求相二千石言語微短輒書以迫劫之及汙以姦利二千石無能滿歲者輒被罪刑夏大旱冬十有二月發三輔騎士大搜上林閉長安城門索之十有一日乃解巫蠱起二年春正月丞相公孫賀下獄死是時朝廷多事督責大臣初賀頓首流涕不受印綬上不聽賀懼曰禍從此始矣賀子敬聲有罪下獄是時詔捕京師大俠陽陵朱安世不能得賀自請遂捕安世以贖子罪上許之果得安世安世大笑曰丞相禍及族矣遂從獄中上書告敬聲與陽石公主私通及使巫者祭祀馳道埋偶人呪咀上事下有司案驗賀窮治所犯遂父子俱死獄中而家族矣涿郡鐵官鑄冶銷金皆飛上天三月丁巳涿郡太守劉屈氂為丞相夏四月大風發屋拔樹閏月諸邑公主陽石公主皆坐巫蠱死行幸甘泉宮秋七月使使者江充掘巫蠱於太子宮巫蠱之禍始自朱安世成於江充充趙人也為敬肅王上客趙太子丹疑充以己陰事語王收捕充不得盡殺其父兄充亡入關上書告趙太子罪至死會赦得免充為人魁岸容貌甚壯初上見充望而異之謂左右曰燕國固多奇士以充為直指使者督三輔盜賊充從上至甘泉還逢太子家人乘車行馳道中充以屬吏奏沒入其車馬太子使人謝罪不聽遂奏上曰人臣當如是矣大見信用遷水衡都尉後上使充治巫蠱事充將胡巫掘地求桐人及為他姦怪徵驗輒收栲燒金鉗灼強服之民輒相引以巫蠱劾以大逆不道死者數萬人莫敢訟其冤充與太子有隙恐上一旦晏駕為太子所誅因言宮中有巫蠱氣上令案道侯韓説黃門蘇文等助充充先治後宮希幸以次及皇后遂及太子宮云得桐木人太子少傅石德謂太子曰上疾甚在甘泉皇后諸吏家請問皆不報上存亡未可知而姦臣如此太子獨不念秦扶蘇邪今無以自明乃收充窮治姦詐壬午太子詐令客為使者收捕充等韓説格死蘇文亡歸甘泉太子使人白太后太后發武庫兵長樂宮衛士太子親臨罵充曰趙亡虜亂趙國父子未足邪今乃亂吾父子遂斬充以徇告百官曰江充反炙胡巫於上林中長安擾亂言太子反上聞怒詔丞相發三輔近縣兵捕反者太子懼遣使者矯制赦長安中都官囚徙發武庫兵召監北軍使者任安發北軍兵安受節已而閉軍門不肯應太子太子因而驅四市人合數萬人逢丞相合戰五六日死者數萬人流血入溝中庚寅太子敗出走南奔覆盆城門得出皇后自殺司直田仁部不閉城門坐令太子得出丞相欲斬之御史大夫暴勝之曰司直二千石當先請之丞相乃止上聞之大怒責問勝之曰司直縱反者丞相斬之是也大夫何敢擅之勝之自殺任安坐受太子節懷二心與田仁皆腰斬諸太子賓客皆誅其隨太子發兵以反法族之吏士刻掠者皆徙燉煌荀悅曰任安之斬也是開後人遂惡而無變計也易曰不遠復無祗悔元吉太子在外始置屯兵長安城諸城門以太子持赤節故更節加以黃毛上怒甚群臣憂惶莫知所出壺關三老上書曰臣聞父猶天母猶地子猶萬民也天平地寧陰陽和調萬物乃茂父慈母愛室家得中子乃孝順陰陽不和則萬物夭傷父子不和則室家喪亡昔孝已孝而被謗伯奇仁而放流骨肉至親父子相疑何則積毀之所生也今皇太子為漢適嗣承萬世之業繼祖宗之重親皇帝之宗子也江充閭閻之隸臣耳陛下顯而用之御至尊之命以迫蹴太子造飾姦詐親戚隔絶太子進不得見上退則困於亂臣獨含冤結憤而無告訴不勝忿忿之心起而殺充恐懼遁逃子盜父兵以救難者欲自免耳臣竊以為無邪心詩云讒人罔極交亂四國往者江充讒趙太子天下誰不聞其罪固宜誅戮陛下不省察深過太子發盛怒舉大兵而攻之又使三公自將智者不敢言辨士不敢説臣竊痛之唯陛下寬心慰意無患太子之罪亟罷兵甲無令太子久亡臣不勝眷眷出一旦之命待罪建章闕下書奏上感悟之八月辛亥太子死於湖太子亡到主人家貧織屨以給太子太子有故人陰使求之發覺吏圍捕太子太子閉室自經男子張富昌為卒足踏戶開新安令李壽趨抱解太子主人公挌鬭死皇孫二人皆遇害後巫蠱事多不信上知太子之無罪也乃封李壽為抱侯張富昌為踏踶侯而高廟令田千秋復訟太子冤曰臣夢見一白頭翁教臣上言曰子弄父兵罪當可赦天子之子過誤殺人何罪哉上悟曰是高廟之靈臣使公覺朕也公當遂為吾輔佐乃擢拜千秋為大鴻臚而族江充家焚蘇文於橫橋上及湖加兵於太子皆族之天下聞而悲之癸亥地震九月大鴻臚商丘成為御史大夫立趙敬肅王小子偃為平干王胸奴入上谷五原殺略吏民三年春正月行幸雍祠五畤至安定北地胸奴入酒泉殺兩都尉二月二師將軍李廣利將十萬人出五原御史大夫商丘成將二萬人出西河重合侯馬通將四萬騎出酒泉城至峻稽山多斬首虜通至天柱山虜引去因招降車師皆引還廣利兵敗降胸奴夏五月赦天下六月壬寅丞相屈氂下獄腰斬屈氂者中山靖王子也二師初與屈氂辭曰願君早請昌邑王為太子太子若立君有何憂哉屈氂許諾屈氂女為廣利子妻而昌邑王李夫人子也故欲共立之上聞其言而惡之後屈氂妻坐為巫蠱呪咀屈氂腰斬妻梟首廣利妻子亦見收廣利聞之懼降于胸奴遂族矣秋大蝗四年春正月行幸東萊臨大海二月丁酉有隕石于雍二時天晴晏然無雲有紅氣蒼黃色若飛鳥集成陽宮南隕星于雍聲聞四百餘里墜而為石其色黑如醫三月上行幸巨鹿還幸泰山修封禪庚寅祠高祖于明堂癸巳禪石閭夏六月還幸甘泉丁巳大鴻臚田千秋為丞相千秋無他材能術學敦厚有智居位自稱逾於前後數公是時天子疲於兵革上亦悔之而搜粟都尉桑弘羊與丞相御史大夫奏言故輪臺以東皆故國處有溉灌田其旁小國少錐刀貴黃鐵綿繒可以易穀臣愚以為可遣屯田卒詣輪臺置校尉二人通利溝渠田一歲有積穀募民敢徙者詣田所就畜積為産業稍稍築亭連城而西以威西國輔烏孫為便事上上乃下詔深陳既往之悔曰前有司則欲益民賦以助邊用是困老弱孤獨也今又請田輪臺曩者朕之不明興師遠攻遣二師將軍古者出師卿大夫與謀參以蓍龜不吉不行乃者遍召群臣又筮之卦得大過爻在九五曰胸奴困敗方士占星氣大卜蓍龜皆為吉胸奴必破時不可失卜諸將二師最吉朕親發二師詔之必無深入今計謀卦兆皆反謬二師軍敗士卒離散略盡悲痛常在朕心今有司請遠田輪臺欲起亭燧是唯益擾天下非所以憂民也朕不忍聞當今務在禁苛暴止擅賦務本勸農無乏武備而已由是不復出軍封丞相為富民侯而勸耕農自是田多墾闢而兵革休息本志曰孝武之世圖利制胸奴患其兼從西國結黨南羌乃表河曲列四郡開玉門關通西域以斷胸奴之右臂隔絶南羌月支單于失援由是遠遁漢北而漠南無王庭遭直文景玄默養民五世天下殷富財力有餘士馬強盛故能積群貨覩犀象玳瑁則開犍為朱崖七郡感蒟醬竹杖則開牂牁越雋聞天馬葡萄則通大宛安息自是之後明珠文貝犀象翠羽之珍盈於後宮氍毹琪琉蒲萄龍文魚目汗血名馬充於黃門巨象獅子猛獸大雀之群實於外囿殊方異物四面而至於是廣開上林穿昆明池營千門萬戶之宮立神明通天之臺造甲乙之帳絡以隋珠荊璧天子負黼黻襲翠被憑玉几而居其中設酒池肉林以饗四夷之客作巴渝都盧海中碭極漫演魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足以榷酒沽管鹽鐵白金造皮幣算至船車租及六畜民力屈財貨竭因之以凶年群盜並起道路不通直指之使始出衣繡衣持斧鉞斬斷於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非聖人之所悔哉且通西域近有隴堆遠則䓤嶺身熱頭痛懸度之厄淮南杜欽揚雄之論皆以為此天地所以分別區域隔絶內外也書曰西戎即序禹但就而序之非威德之盛無以致其貢物也西戎諸國各有君長兵衆貧弱無所統一雖屬胸奴不相親附胸奴徒能得其馬畜旃罽而不能總帥與之進退與漢隔絶道里尤遠得之不為益失之不為損盛德在我無取於彼夫胸奴之為患久矣漢興已來忠言嘉謀之臣曷嘗不運籌算相與爭於廟堂之上乎然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害未究胸奴之始終也昔和親之論發於婁敬是時天下初定新遭平城之難故從其言孝惠高后遵而不違胸奴寇盜不為衰止單于反加驕慢逮至孝文與通關市妻以漢女厚賜其賂歲以千金而胸奴數背約束邊地屢被其害是以文帝中年感惟前後無益於邊乃赫然發憤遂身貫戎服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論師喟然歎息思古名臣此則和親無益之明效也仲舒親見四世之事猶欲復守舊文頗增其要約以為義感君子利動貪人又如胸奴者非可以仁義議也獨可説者以厚利結之於天耳故與厚利以敦其意與盟於天以堅其要質其愛子以纍其心胸奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之臣父兄緩帶稚子含哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知未有合於當時而有闕於後世也當武帝時雖征伐剋暴而士馬物故略與相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴之民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如此安肯以愛子為質乎此不合當時之言也若不置質空約和親是襲孝文既往之悔而長胸奴無已之詐也夫不選守邊境武略之臣修鄣隧備塞之具礪長戟徑弩之械恃吾所以待寇而務賦斂於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而冀胡馬之不窺不亦過乎及至後世胸奴衰弱乃遣子入侍而單于或棄其子苟貪財利不顧言約虜掠所獲歲億萬計而和親賂遺不過千斤安肯不棄質而重利也仲舒之言於是過也夫先王度中土立封畿分九州列五服均土貢制內外修刑政或昭文德遠近之勢異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左衽人面獸心其與中國殊章服異習俗食飲不同言語不通是以聖王禽獸畜之不與約誓不就攻伐約之則費賂而見欺攻之則師勞而致寇得其土不可耕而食得其民不可撫而畜也是以明王外而不內踈而不戚政教不及其民正朔不加其國來則懲以禦之去則備而守之其慕義貢獻則接以禮讓羈縻不絶使曲在彼蓋聖人制禦蠻夷之常道也秋七月辛酉晦日有蝕之不盡如鉤後元元年春正月行幸甘泉郊泰畤遂幸安定昌邑王髆薨諡曰哀王夏六月御史大夫商丘成有罪自殺侍中僕射馬何羅與弟重合侯通謀反侍中駙馬都尉金日磾奉車都尉霍光驃騎都尉上官桀討之初何羅與江充善而通以誅太子時有功封之及上滅充家何羅兄弟懼日磾視其志意非常陰察其動靜羅亦覺之不敢發上幸林光宮日磾疾臥廬中何羅與弟通及小弟安成謀殺使者矯節制以發兵明旦上臥未起何羅無何從外入日磾心動入坐戶內須臾何羅袖白刃從東廂入上見日磾色變走趨臥內欲入觸寶瑟而僵日磾得抱何羅因傳曰何羅反左右欲格之上恐并中日磾上曰勿格日磾捽投何羅殿下得擒縛之窮治皆伏辜秋七月地震往往踊出水二年春正月朝諸侯王宗室于甘泉宮賜宗室二月行幸盩厔五祚宮上疾篤侍中光祿大夫霍光問嗣焉上曰君未喻前畫意邪立少子君行周公之事矣先是上畫周公輔成王朝諸侯圖以賜光光頓首讓曰臣不如日磾日磾曰臣外國人將令胸奴輕漢三月乙卯拜光祿大夫司馬大將軍日磾為車騎將軍太僕上官桀為左將軍搜粟都尉桑弘羊為御史大夫皆拜床下與丞相田千秋俱受遺詔輔少主燕王旦廣陵王胥皆多過失不得為嗣少子弗陵者鉤弋夫人趙婕妤之子也初上巡狩過河間望氣者言此邑中有奇女子氣上使召之既至兩手皆捲上自捫之即時伸由是得號為捲夫人居鉤弋宮大有寵妊身十四月而生子上曰昔堯十四月而生鉤弋子亦然名其所生門曰堯母門初上欲立鉤弋子為太子以其母年少女主持政心難之會鉤弋有過乃譴以憂死乙酉立皇子弗陵為皇太子丁丑帝崩於五祚宮入殯於未央宮讚曰本紀稱漢承百王之弊高祖撥亂反正文景務在養民至於稽古禮文之事猶多闕焉孝武之初立卓然罷黜百家表章六藝遂疇咨海內舉其俊乂與立功興太學修郊祀改正朔定曆數協音律作禮樂建封禪禮百神紹國典發號令文章粲然可述後嗣得遵洪業而有三代之風如武帝之雄才大略不改文帝之恭儉以濟斯民雖詩書所稱何以加焉
