front:
  text: 三四年冬十月韓信將伐齊聞既和欲還蒯通說信曰將軍受詔擊齊未有詔止何以得無行乎且酈生一儒士伏軾下齊七十餘城將軍以數十萬衆乃下趙五十餘城勞苦將士數年反不如一豎儒之功乎信遂襲齊齊王以酈生為賣已乃􅖒之齊王走髙密項羽東伐外黄外黄數日乃降羽令男子十五已上詣城東欲悉坑之外黄令舎人兒年十三說羽曰彭越彊劫外黄外黄恐故且降以待大王大王又欲坑之百姓豈有所歸心哉従此以東梁地十餘城皆懼莫敢下矣羽赦之羽初之山東屬大司馬􅔟咎長史忻曰漢即挑戰慎勿與戰勿令得東而已我十五日必定梁地而漢果挑戰楚軍不出使人辱之數日咎怒渡兵汜水上士卒半渡漢撃破之盡得楚國寳貨􅔟咎長史忻皆自殺王遂進兵取成皋羽下梁十餘城聞􅔟咎破乃還羽於廣武間為髙俎置太公於其上曰漢不急下吾􅖒太公王不聼羽怒欲殺太公項伯曰夫為天下者不顧其家殺之無益但益怨耳羽従之使人謂曰願與王挑戰面決雌雄王笑謝之曰吾寧鬭智不鬭力羽令壯士挑戰漢使善射者樓煩射楚三人殺之羽大怒即自出瞋目叱之樓煩目不能視手不能彂走還入壁王使間問之乃羽也王大驚於是王與羽臨廣武間而語王數羽曰汝背約王我於蜀漢其罪一也矯殺卿子冠軍而自立其罪二也受命救趙不還報命擅劫諸侯入關其罪三也與懐王約入咸陽無暴掠汝燒秦宫室掘始皇冡多取財寳其罪四也殺秦降王子嬰其罪五也詐坑秦卒二十萬其罪六也皆王諸侯善地而徙逐其主令臣下爭叛其罪七也出義帝于彭城而自都之多自與己地其罪八也殺義帝於江南其罪九也夫為人臣自欲爭天下大逆無道其罪十也吾以義兵誅殘賊使刑餘罪人擊公何苦乃與公挑戰羽怒伏弩射王中胸王乃捫足曰虜中吾指王疾甚入成皋中尉周昌為御史大夫田横請救于楚十有一月楚使龍且救齊號二十萬衆與齊合軍或謂龍且曰漢兵逺戰窮㓂其鋒不可當齊楚自居其地兵易敗散不如深壁自守命齊王使其信臣招所亾城亾城聞王在楚来救必自叛漢漢二千餘里客居其間勢無所得食可無戰而降也龍且曰救齊而降之吾有何功今戰而勝之齊之半可得而有吾􅊭生時知韓信之為人易與耳遂將兵與韓信夾濰水而陣信乃夜令人為萬餘囊盛沙以壅水上流信引兵半渡擊龍且信佯不勝走還龍且追之渡水信使人決壅龍且軍大半不得渡即擊破之斬龍且虜齊王廣田横復立為齊王戰敗而亾信遂􅊭齊使人言于王曰齊國多詐請為假王以鎮之王大怒張良陳􅊭躡王足諫曰方漢不利寧能禁信之自王乎不如因而立之春二月遣張良立信為齊王徴其兵擊楚􅔟參為左丞相楚使武涉招信信曰吾甞事項王不見用事漢漢深信我我背之不祥武涉已去蒯通說信曰漢王敗滎陽傷成皋還走宛葉間此所謂智勇俱竭者也楚兵困于京索之間迫于西山而不能進三年于此矣銳氣挫于險塞糧用盡于内藏當今兩主之命懸于足下為足下計者莫若兩存之三分天下鼎足而居其勢莫敢先動以足下之賢有甲兵之衆據彊齊従燕趙出空虚之地以制其後因民之欲西向為百姓請命天下孰敢不聼足下案齊國之故有淮泗之地深拱揖讓以懐諸侯則天下君王相率而朝齊矣信曰吾豈可見利而背恩通曰常山王成安君為刎頸之交而卒相滅大夫種存亾越伯勾踐身死語曰野禽殫走狗􅖒飛鳥盡良弓藏敵國滅謀臣亡故以交友言之則不過陳張以君臣言之則不過勾踐大夫種推此二者足以觀之矣且臣聞之勇略震主者身危功蓋天下者不賞足下涉西河虜魏王擒夏說下井陘誅成安君之罪以令於趙脅燕定齊南擁楚人之兵數十萬之衆遂斬龍且西向以報此所謂功無二于天下而英略不世出者也足下挟不賞之功戴震主之威歸楚楚人不信歸漢漢人震恐足下欲持此安歸乎夫勢在人臣之位而有髙天下之名臣竊危之夫隨厮養之役失萬乗之權守擔石之禄闕卿相之位計成而不能行者事之禍也故猛虎之猶豫不如􅑣蠆之致螫孟賁之狐疑不如童子之必至矣夫功者難成而易敗時者難值而易失願足下無疑信猶豫不忍背漢又自以功髙漢終不奪我齊遂謝通通去乃佯狂為巫秋七月立黥布為淮南王八月初為算賦令軍士死者吏為衣衾棺斂傳送其家四方歸心焉漢王遣侯公說項羽求太公羽乃與漢約中分天下割鴻溝以西為漢以東為楚九月歸太公吕后封侯公為平國君項羽解而東歸漢王欲西張良陳平諫曰今漢有天下大半而諸侯皆附漢楚兵疲食盡此天亡之時也不如因其㡬而取之五年冬十月王追項羽至陽夏南與韓信彭越期皆不至㑹楚擊漢軍大破之王復深壘自守王謂張良曰諸侯不従奈何對曰大王能取雎陽以東北至穀城盡以王彭越従陳以東傅海與韓信則兩人必至而楚敗矣王従之信越皆至十有二月諸侯皆㑹垓下圍項羽數重夜聞漢軍四面皆作楚歌羽驚曰漢已盡得楚乎是何楚人歌之多也夜起飲帳中有美人曰虞姬有駿馬曰騅羽乃慷慨悲歌曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何羽遂上馬乃従八百餘騎直夜潰圍南出平明漢軍乃覺之命騎將灌嬰以五千騎追羽羽至隂陵迷失道路漢軍追及之至東城乃有二十八騎追者數千羽謂其騎曰吾起兵八歳矣身經九十餘戰所當者破未甞敗今困于此固天亡我非戰之罪也今日固決死願為諸君決戰於是引其騎因四隤山為圜陣漢軍圍之數重羽謂其騎曰吾為公取彼一將於是羽大呼馳下漢軍皆披靡遂取漢一將騎將揚喜追羽羽還叱喜人馬皆驚辟易數里羽分其騎為三處漢軍不知羽所在分軍為三處復圍之羽乃馳擊漢軍復取一都尉殺百人羽復聚其騎亡兩騎於是羽引軍東至烏江亭長曰江東雖小地方千里衆數十萬亦足以王也願大王急渡今獨臣有船漢軍至無以渡羽曰籍與江東子弟八千人渡江而西今無一人還者縦江東父兄憐而王我我何面目見之哉吾知公長者也吾騎此馬五歳常以一日行千里吾不忍殺之以賜公乃令騎皆去其馬短兵接戰復殺漢軍百人羽亦被十餘創乃自剄而死楚地悉平獨魯後降初懐王封羽為魯公故以魯為號葬羽於穀城山下漢王為之彂哀封項伯等四人為列侯賜姓劉氏本傳曰項羽背闗懐楚放逐義帝自矜功伐而不師古霸王之業始欲以力征經營天下五年卒亡身死東城尚不覺悟以為非己之罪豈不過哉春正月徙齊王韓信為楚王都下邳信乃賜所従食漂母千金召下鄉亭長曰公小人也為惠不終賜錢百萬召辱己少年曰壯士哉以為中尉赦天下殊死己下羣臣上皇帝尊號王辭讓而後受二月甲午皇帝即位于汜水之陽以十月為正従火徳色尚赤以應斬白蛇神母之符尊王后曰皇后太子曰皇太子追尊先媪曰昭靈夫人番君呉芮率百越佐諸侯立芮為長沙王越王無諸率閩中兵以佐滅秦立無諸為閩越王於是皇帝西都洛陽夏五月兵皆罷令人保其山澤者各歸其田里自賣為人奴婢者免為庶人上置酒南宫問羣臣曰吾所以得天下羽所以失之者何王陵對曰陛下使人攻城略地因以賞之與天下同其利項王嫉賢妒能有功者害之賢者疑之戰勝不䝉其功得地不獲其利所以失天下也上曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房鎮國家撫百姓給餉饋吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑也吾能用之所以取天下也羽有一范増賢而不能用此所以為我擒也上問韓信曰公相我能將㡬何信曰陛下不過能將十萬又問韓信公能將㡬何對曰臣多多益辦耳上曰何為為我臣信曰陛下雖不能將兵而善將將此所謂天授非人力也是時田横與賔客五百人亡在海中上遣使赦横罪曰横来大者王小者侯不来將加誅横曰臣􅖒酈食其今聞其弟酈商為將臣畏懼不敢奉詔帝乃詔商曰田横至敢有動者族誅横詣洛陽至尸鄉亭三十里謂其従者曰横與漢王並南面稱孤今漢王為天子而横為亡虜其辱己甚矣且横甞􅖒人之兄今與其弟並肩事主彼雖畏詔横獨不媿于心哉且陛下不過欲一見我面貌耳今斬我頭馳三十里容貌未及變乃沐浴自刎令客奉其首上曰嗟乎起自布衣兄弟三人更立為王豈不賢哉為之流涕而拜其二客為都尉以王禮葬之二客穿其冡旁皆自刎而従之上聞大驚以横客為皆賢聞其餘五百人在海島中使使召之聞横死亦皆自殺楚将季布亦以亾匿投濮陽周氏漢購之急周氏乃髠鉗布與家僮數十人至魯朱家而賣之朱家心知是季布因買之置田舎乃見滕公曰季布何罪臣各為其主用耳上始得天下以私怒求一人何示不廣也且季布之賢不南走越即北走胡夫忌壯士以資敵國此伍子胥所以鞭荆王之墓也夏侯嬰為言之上乃赦布拜為郎中後為中郎將布立然諾之信時人為之語曰得黄金百鎰不如季布一諾朱家者為任俠所藏活者甚衆豪士以百數不伐其功諸所甞施唯恐見之賑人先於貧賤衣不兼綵食不重味專以赴人之急及布尊貴朱家遂不復見之上欲都洛陽戍卒婁敬求見說上曰陛下都洛陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周室異周之先自后稷堯封之邰積徳十餘世公劉避狄居豳太王以狄伐故去豳杖馬策之岐國人爭歸之文王為西伯始受命武王伐殷八百諸侯不期而㑹孟津之上成王即位周公之屬傅焉乃營成周都洛邑以為此天下中四方納貢職道里均矣有徳則易以王無徳則易以亡凡居此者欲務以徳致人不欲阻險令後世驕奢以虐人及周之衰分而為二天下莫朝周不能制形勢弱矣今陛下用兵取天下大戰七十小戰四十使百姓肝腦塗地暴骨中野哭泣之聲未絶傷夷者未起而欲比隆周室臣竊以陛下為不侔矣夫秦地被山帶河四塞以為固卒然有急百萬之衆可具因秦之資膏腴之地此所謂金城天府之國陛下都闗中山東雖亂秦地可全而有也上問羣臣羣臣皆山東人咸言周七八百年秦二世而亡且洛陽東有成皋西有澠池背河向洛其固不敵此亦足恃也上疑焉問張良張良曰洛陽雖有此險其中小不過數百里四面受敵此非用武之國夫闗中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡宛之利阻三面而守獨以一面東制諸侯安定河渭漕輓足以西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國婁敬之說是也於是上即日車駕西入闗治櫟陽宫拜婁敬為郎中號奉春君賜姓劉氏六月壬辰大赦天下七月燕王臧荼反上自將擊燕九月虜臧荼立太尉盧綰為燕王綰與上同里同日生少相愛後以將軍従擊項羽有功故立為代王丞相張蒼從擊臧荼有功封北平侯蒼明習天下圖書善用算術故命以列侯居相府主郡國上計也六年冬命復天下縣邑或有告楚王信謀反上問左右左右皆曰彂兵以擊之陳平曰陛下用兵之精孰與韓信上曰無能過也平曰陛下將有敵信者無上曰莫能及平曰臣竊為陛下危之上曰奈何平曰信未知有告反者古者天子巡狩㑹諸侯陛下偽出遊雲夢㑹諸侯于陳信必郊迎因而執之此一士之力上従之遂執信執信反無驗黜信為淮隂侯田􅈕賀上曰甚善陛下得韓信而又王闗中也夫齊東有琅邪即墨之饒南有㤗山之固西有濁河之阻北有渤海之利地方二千里帶甲百萬衆此亦東秦非親子弟莫可使王齊者也上曰善賜􅈕金五百斤春正月丙午立劉賈為荆王王五十三縣髙帝兄弟四人長曰伯早卒追號為武哀侯封子信為刮羮侯初上微時數將客過嫂食嫂厭食之陽為羮盡刮釡上聞惡之故號其子為刮羮侯次兄曰喜字仲立仲為代王弟曰交字游好讀書有才藝従上征伐有功立交為楚王長庶子肥為齊王王七十三縣以􅔟參為齊相國徙韓王信于太原都晋陽封蕭何為酇侯父母兄弟封侯食邑者十餘人以蕭何舉宗従征伐故也封􅔟參為平陽侯張良為留侯陳平為戸牖侯後徙為曲逆侯周勃為絳侯樊噲為舞陽侯酈商為武成侯食其子疥従征伐以父故封疥為髙梁侯夏侯嬰為汝隂侯灌嬰為潁陽侯周昌為汾隂侯大功臣封者三十餘人其餘功未得行封上従南宫複道上望見羣臣徃往聚語上曰此何謂也張良曰陛下所封皆蕭􅔟故人所誅皆平生仇讎此屬畏不得封又恐過失及誅此相與謀反上憂之曰為之奈何良曰急封雍齒雍齒上最所憎惡羣臣共知後従征伐有功上即封雍齒羣臣喜曰雍齒且封我屬無患矣於是趣有司定功行封封王陵為定國侯陵始為縣豪上兄事之以其従上晚故後行封凡百四十有三人是時民人散亡居可得而數者纔十二三是以大侯不過萬戸小者不過五六百戸封爵之日誓曰使黄河如帶太山如礪國以永存爰及苗裔又申以丹書之信重以白馬之盟作八十侯之位次陳平之始封平辭曰非臣之功也上曰吾用先生之謀戰勝克敵非功而何對曰非魏無知安得進上曰若子可謂不背本矣乃復賞無知張良素多疾病乃稱疾曰臣家五世相韓及韓亡不愛萬金之資為韓報讐彊秦天下震動今以三寸舌為王者師封萬戸位為列侯此布衣之極於臣足矣願棄人間事欲従赤松子遊耳乃學道不食穀遂不仕良為人容貌美麗如婦人女子初季布異父弟丁公為楚將逐上上迫急顧謂丁公曰兩賢豈相戹哉丁公引兵而還天下既定斬丁公以徇軍曰自今以後為人臣者莫效丁公也以蕭何功最髙羣臣皆曰臣等被甲執兵多者百餘戰攻城略地各有等差蕭何無有汗馬之勞徒持文物論議而已今居臣等上何也上曰諸君知獵乎彂縦指示獸者人也追得獸者狗也諸君徒能走得獸功狗也蕭何彂縦功人也及奏位次羣臣咸曰􅔟參宜第一謁者闗内侯鄂千秋進曰􅔟參雖有野戰之功此特一時之事耳夫上與楚相距五年失軍亡衆跳身遁者數矣蕭何甞従闗中遣軍補其處非上所詔命而數萬之衆㑹上乏絶者數矣楚漢相距滎陽數年軍無見糧蕭何常轉漕給食陛下雖亡山東蕭何常存闗中以待陛下此萬世之功也奈何以一旦之功而加萬世之功哉於是令何為第一帶劒上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖髙待鄂君迺得明於是因鄂千秋所食闗内侯邑二千戸封為安平侯其吏二千石従入蜀漢定三秦者皆世世復其家上置酒衆辱隨何曰為天下安用腐儒哉何曰陛下彂步卒五萬騎五千能以取淮南乎上曰不能何曰以二十人使淮南王至如陛下之意是臣之功賢于步卒五萬騎五千也上曰吾方圖子之功以何為䕶軍中尉上五日一朝太公太公家令說公曰天無二日土無二王皇帝雖子乃人主也太公雖父乃人臣也奈何令人主朝人臣如此威重不得申後上朝太公太公擁篲迎門却行欲拜上大驚下扶太公太公曰帝人主奈何以我亂天下法上善家令言賜黄金五百斤荀恱曰孝經云故雖天子必有尊也言有父也王者必父事三老以示天下所以明有孝也無父猶設三老之禮況其存者乎孝莫大於嚴父故后稷配天尊之至也禹不先鯀湯不先契文王不先不窋古之道子尊不加於父母家令之言於是過矣夏五月丙午詔曰人之至親莫大於父故父有天下傳歸於子子有天下尊歸於父此人道之極也朕平暴亂以安天下斯皆太公之教訓也尊太公為太上皇秋七月匈奴圍太原韓王信於馬邑信降匈奴七年冬十月上自征太原匈奴冒頓單于拒漢漢使者闚匈奴者十輩皆曰易擊上使婁敬徃還曰匈奴見羸弱似有伏兵不可擊上怒曰齊虜妄言阻吾軍械繫之上至平城匈奴果圍上於白登七日用陳平謀說匈奴閼氏夫人得開圍一角上乃遁出其計祕世莫得聞也士卒歌之曰平城之下禍甚苦七日不食不能彎弓弩上既還謝敬曰不用公言以困平城乃斬前使者十餘軰封敬二千戸號建信侯先是有月暈圍于昴參畢七重本志以為昴畢之間為天街北羌胡也街南中國也昴為匈奴畢為邊兵平城之應云匈奴攻代代王喜棄國歸洛陽廢為郃陽侯辛卯立皇子如意為代王春二月上自平城還見蕭何治宫室於長安甚盛上怒曰何治之過度對曰天子以四海為家非壮麗無以重皇威且無令後世有以過也乃遷都長安是時威儀未設羣臣爭功醉呼或拔劒撃柱上患之博士叔孫通請制禮儀上曰度吾所能行者通乃與弟子百餘人共起朝儀大朝㑹長樂宫陳車騎旌旗兵衛羣臣列位百官執職成禮而罷莫不祗肅於是上歎曰吾乃今日知為皇帝之貴拜通為奉常賜金五百斤弟子皆為郎中夏四月行如洛陽婁敬進計和匈奴請以魯元公主妻單于單于因之為女婿有子則為外孫後世可以漸臣也上將行之吕后涕泣固請留之乃止更以宗室女為公主妻單于結和親歳致金幣賂遺之
