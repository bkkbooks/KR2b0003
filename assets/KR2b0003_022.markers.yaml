  - {type: variant, offset: 2807, length: 1, content: 盜, SBCK: 盗竊之民皆在本也詩云京邑翼翼四方是則今長安天子之爲丞相左扶風鄭弘爲御史大夫弘所在著名迹法度條教爲後世所稱三月壬戌朔日有蝕之六月詔曰元元之民困於饑饉朕爲民父母德不能覆而加其刑甚自傷焉其赦天下時災異數發上問言事得失者博士匡衡上䟽曰夫朝廷者天下之楨榦公卿大夫相與修禮恭讓則民不爭好仁樂施則民不􅁀上義高節則民興行寛柔和順則衆相愛此四者明王所以不嚴而治也朝有變色之言則下有爭闘之患上有自專之士則下有不讓之人上有尅勝之佐則下有傷害之心上有好利之臣則下有盗}
