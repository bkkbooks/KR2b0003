body:
  text: 前漢孝成皇帝紀二卷第二十五三年春正月楚王囂來朝詔曰囂孝弟仁慈在國二十餘年纖介之過未嘗聞書不云乎用德彰厥善其封囂子勳為廣戚侯二月丙戌犍為地震山崩擁江水逆流秋八月乙卯晦日蝕光祿大夫劉向校中祕書謁者陳農使使求遺書於天下故典籍益博矣劉向典校經傳考集異同云易始自魯商瞿子木受於孔子以授魯槁庇子庸子庸授江東馯臂子弓子弓授燕人周醜子家子家授東武孫虞子乘子乘授齊國田何子裝及秦焚詩書以易為卜筮之書獨不焚漢興田何以易授民故言易者本之田何焉菑川人楊叔傳其學武帝時為大中大夫由是有楊氏學梁人丁寬受易田何為梁孝王將軍距吳楚著易說三萬言寬授槐里田王孫王孫授沛人施讎東海孟喜琅邪梁丘賀讎為博士喜為丞相掾由是有施孟梁丘之學此三家者宣帝之時立之京房授易於梁人焦延壽獨得隱士之說託之孟氏劉向校易說皆祖之田何唯京房為異黨不與孟氏同由是有京氏學元帝時立之東萊人費直冶易長於筮無章句徒彖象繫辭十篇文言解說上下經沛人高相略與費氏同專說陰陽災異此二家未立於學官唯費氏經與魯古文同尚書本自濟南伏生為秦博士及秦焚書乃壁藏其書漢興伏生求其書亡數十篇得二十九篇文帝欲徵伏生時年九十餘不能行遣晁錯往授之千乘人歐陽伯和傳其學而濟南張生傳尚書授夏侯始昌始昌傳族子勝勝傳從兄子建建又事歐陽氏頗與勝異由是為大小夏侯之學宣帝時立之魯恭王壞孔子宅以廣其宮得古文尚書多十六篇及論語孝經武帝時孔安國家獻之會蠱事未列於學官詩始自魯申公作古訓燕人韓嬰為文帝博士作詩外傳齊人轅固生為景帝博士亦作詩外內傳由是有魯韓齊之學趙人有毛公為河間獻王博士作詩傳自謂得子夏所傳由是為毛詩列於學官禮始於魯高堂生傳士禮十八篇多不備魯人徐生善為禮容文帝時為禮官大夫宣帝時為少府后倉最為明禮而沛人戴聖戴德傳其業由是有后倉大小戴之學其禮古經五十六篇出於魯壁中猶未能備歆以周官十六篇為周禮王莽時歆奏以為禮經置博士樂自漢興制氏以知雅樂聲律世在樂官但紀鏗鏘鼓舞而已不能言其義河間獻王與毛公等共采周官與諸子樂事者乃為樂記及劉向校祕書得古樂記二十三篇與獻王記不同春秋魯人穀梁赤齊人公羊高各為春秋作傳景帝時胡母子都與董仲舒治春秋公羊皆為博士瑕丘人江公治穀梁與仲舒議春秋不及仲舒武帝時遂崇立公羊而東平嬴公受其業昭帝時為諫議大夫授魯國眭孟孟授東海嚴彭祖彭祖授顏安樂由是有顏嚴之學沛人蔡千秋治穀梁與公羊家並議帝前帝善穀梁說擢千秋為諫議大夫遂立穀梁始魯人左丘明又為春秋作傳漢興張蒼賈誼皆為左氏訓劉歆尤善左氏平帝時立左氏春秋毛詩逸禮古文尚書後復皆廢及論語有齊魯之說又有古文凡經皆古文凡書有六本謂象形象事象意象聲轉注假借也有六體謂古文奇字篆書隸書蟲書也秦時獄官多事省文從易施之於徒隸故謂之隸書昔周之末孔子既歿後世諸子各著篇章欲崇廣道藝成一家之說旨趣不同故分為九家有儒家道家陰陽家法家名家墨家縱橫家雜家農家儒家者流蓋出於司徒之官明教化者也道家者流蓋出於史官明成敗興廢然後知秉要持權故尚無為也陰陽家者流蓋出於羲和之官敬順昊天以授民時者也法家者流蓋出理官也名家者流蓋出於理官名位不同禮亦異數故正名也墨家者流蓋出於清廟之官茅屋采椽是以尚儉宗祀嚴父是以右鬼神養三老五更是以兼愛選士大射是以尚賢順四時五行是以非命以孝示天下是以尚同縱橫家者流蓋出行人之官遭變用權受命而不受辭雜家者流蓋出於議官農家者流蓋出於農稷之官各引一端高尚其事其言雖殊譬猶水火相滅亦相生也捨所短取所長足以通萬方之略矣又有小說家者流蓋出於街談巷議所造及賦誦兵書術數方伎皆典籍苑囿有采於異同者也劉向卒上復使向子歆繼卒父業而歆遂撰群書而奏七略有輯略有詩賦略有六藝略有諸子略有兵書略有術數略有方伎略凡萬三千二百六十九卷自是以來稍稍復增集荀悅曰經稱立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義陰陽之節在於四時五行仁義之大體在於三綱六紀上下咸序五品有章淫則荒越民失其性於是在上者則天之經因地之義立度宣教以制其中施之當時則為道德垂之後世則為典經皆所以總統綱紀崇立王業及至末俗異端並生諸子造誼以亂大倫於是微言絕群議繆焉故仲尼畏而憂之詠歎斯文是聖人篤文之至也若乃季路之言何必讀書然後為學棘子成曰君子質而已矣何以文為夫潛地窟者而不覩天明守冬株者而不識夏榮非通炤之術也然博覽之家不知其穢兼而善之是大田之莠與苖並興則良農之所悼也質樸之士不擇其美兼而棄之是崑山之玉與石俱捐則卞和之所痛也故孔子曰博學於文約之以禮亦可以弗畔矣夫孝武皇帝時董仲舒推崇孔氏抑絀百家至劉向父子典校經籍而新義分方九流區別典籍益彰矣自非至聖之崇孰能定天下之疑是以後賢異心各有損益中興之後大司農鄭眾侍中賈逵各為春秋左氏傳作解注孝桓帝時故南郡太守馬融著易解頗生異說及臣悅叔父故司徒爽著易傳據爻象承應陰陽變化之義以十篇之文解說經意由是兗豫之言易者咸傳荀氏學而馬氏亦頗行於世爽又著詩傳皆附正義無他說又去聖久遠道義難明而古之尚書毛詩左氏春秋周官通人學者多好尚好之然希各得立於學官也是時夜郎王興與勾町王及各諸外國更相攻伐遣大中大夫張匡持節以和解之興不承詔命刻木為漢使而射之於是以臨邛陳立為牂柯太守立喻告興興不從命立奏請誅之而未報立從數千人出行縣至興國且同亭召興興以從邑各數百人詣立立責數興因斬興頭巴君曰將軍誅無狀請出曉士眾皆釋兵降勾町王等其王震怒乃入粟牛羊以勞士眾立還歸郡興妻父翁指與興子務邪收餘兵迫脅旁邑立奏募諸蠻夷與都尉長吏攻翁指等蠻夷共斬其首以降西夷遂平會巴蜀郡多盜賊徙立為巴郡太守秩中二千石爵左庶長後徙天水太守勸耕農為天下最賜黃金四十斤四年春正月匈奴單于來朝引見白虎殿丞相王商坐未央廷商為人有威重長八尺餘身體盛大容貌絕人單于見商謁拜商起離坐與言單于仰視商容貌遷延卻退甚畏敬之赦天下二月單于罷歸三月癸丑朔日有蝕之遣光祿大夫博士孟嘉等行次河所傷敗不能自存者賑貸收葬之壬辰長陵臨涇岸崩壅水夏四月壬寅丞相王商免王鳳既以議水事恨商而瑯邪郡有災害商按太守楊肜鳳為肜請商不聽遂奏免肜而按果寢不下鳳由是重怨商乃令人誣告商與父侍婢姦商女弟淫逸使奴殺其夫又疑商教殺之上欲勿治鳳固爭之遂收丞相印綬商免三日發病而歐血死荀悅曰王商言水不至非以見智也非以傷鳳也將欲忠主安民事不得已而鳳以為慨恨馮婕妤之當熊非欲見勇也非欲求媚也非以高左右也惻怛於心將以救上而傅昭儀以為隙皆至於死真可痛乎夫獨智不容於世獨行不畜於時是以昔人所以自退也雖退猶不得自免是以離世深藏以天之高而不敢舉首以地之厚而不敢投足詩云謂天蓋高不敢不跼謂地蓋厚不敢不蹐哀今之人胡為虺蜴本不敢立於人間況敢立於朝乎自守猶不免患況敢守於時乎無過猶見誣枉而況敢有罪乎閉口而獲誹謗況敢直言乎雖隱身深藏猶不得免是以甯武子佯愚接輿為狂困之至也人無狂愚之慮者則不得自安於世是以屈原怨而自沉鮑焦憤而矯死悲之甚也雖死猶懼形骸之不深魂神之不遠故徐衍負石入海申屠狄蹈甕之河痛之極也悲夫以六合之大匹夫之微而一身無所容焉豈不哀哉是以古人畏患苟免以計安身撓直為曲斲方為圓穢素絲之潔推亮直之心是以羊舌職受盜於王室蘧伯玉可卷而懷之以死易生以存易亡難乎哉夏六月丙午光祿大夫張禹為丞相禹字子文河內人上為太子時禹為博士以論語孝經授上而博士鄭寬中以尚書授上皆賜爵關內侯禹為人謹厚然內殖貨財多買田至四百頃皆涇渭溉灌極高腴上賈財物皆稱是庚戌楚王囂薨山陽火生石中改元為陽朔陽朔元年春二月丁未晦日有蝕之三月赦天下冬京兆尹王章下獄死章泰山人也好節義敢直言元帝時為左曹中郎將為石顯所排免上即位大將軍王鳳專權舉章為司隸校尉貴戚皆敬憚之以選為京兆尹章雖為鳳所舉疾鳳專權不親附鳳乃奏封事召見言鳳誣罔不忠不堪任用上悟謂章曰微京兆尹直言吾不聞吾社稷計且惟賢知賢君試為朕求可以自輔者因薦瑯邪太守馮野王上欲以代鳳時鳳弟侍中王音私聽之告鳳鳳懼稱病就第乃上書乞骸骨辭旨甚哀切太后聞之流涕不食上少而親鳳亦不忍廢鳳復起視事先是鳳進小婦弟為美人己嘗適人章以為羗胡尚殺首子以盪腸以正世而鳳進己出之女不忠不敬於是尚書劾奏章知野王前以王舅出補吏而薦欲令在朝阿附諸侯又比上於夷狄非所宜言罪至大逆死獄中妻子徙合浦初章學長安疾病無被臥牛衣中與妻子辭訣涕泣其妻怒之曰仲卿京師尊貴在朝廷者誰逾仲卿也今疾病困厄不自激卬乃反涕泣何其鄙也及上封事妻止之曰人當知足獨不念牛衣中事邪章曰非女子所知也及章下獄妻子皆收繫章小女年十二夜起號泣曰我君死矣獄上呼囚常至九今八而止我君素剛先死者必我君也章果已死眾庶愍而痛之先是王尊為京兆尹及章死王吉子駿為京兆尹皆有能名故京兆為之語曰前有趙張後有三王九江人梅福以布衣因縣道上書言變事曰故京兆尹王章質性忠直非有反逆之辜而戮及妻子折直士之節結諫臣之舌君臣皆知其非罪然不能爭天下以言為戒此最國家之大患也群臣順旨莫有執正何以明其然也試取民所上書陛下之所善者試下之廷尉必曰非所宜言大不敬以此卜之可見矣方今君命圯絕而主威奪外戚之權日以盛隆漢興以來社稷三危呂霍上官皆母后之家親親之道全之為右當以賢師良傅教以孝弟之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也後福又上書曰臣聞不在其位而謀其政者越職也位卑而言高觸罪也越職觸罪危言世患雖伏鑕橫分臣之願也守職不言沒齒全身死之日尸未腐而名滅雖有齊景之位伏櫪千駟臣不貪也故願一登文石之階陟丹霄之途當戶牗之法坐展平生之愚慮雖無益於當時有遺於後世此臣寢所以不安食所以忘味也昔武王伐紂未及下車而存五帝之後封殷於宋紹夏於杞明著三統示不獨有春秋經曰宋殺其大夫穀梁傳曰其不稱名氏以其存祖位尊之也此言孔子故殷後也雖非正統封其子孫以為殷禮亦宜之傳曰賢者子孫宜有土地而況聖人又殷之後哉今仲尼之廟不出闕里孔氏子孫不免編戶以聖人之德而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天無極何則追聖人之素功封其子孫未有法也若能為之後世必以為法不滅之名可不勉哉福自以踈遠又譏切王氏前後數上書輒不見納及後王莽專政福一朝棄妻子去九江人傳以為僊去其後有人見福於會稽變姓名為市門吏二年春寒失節三月赦天下御史大夫張忠卒夏四月丁卯侍中太僕王音為御史大夫五月除吏八百石五百石秩秋關東大水八月甲戌定陶王康薨三年三月有石隕於東郡八夏六月潁川鐵官徒申屠聖等百八十人殺長吏盜庫兵自稱將軍經歷郡國遣丞相長史丞逐持以軍興從事皆伏辜秋八月丁巳大司馬大將軍王鳳薨鳳病篤上臨問執其手垂泣曰將軍而有不諱平陵侯譚次將軍矣鳳頓首泣曰譚等雖於臣至親行皆奢侈不如御史大夫音謹飾臣敢以死爭之初譚嘗倨不肯事鳳而音恭敬鳳薦之鳳薨音為大司馬車騎將軍秉政而譚鎮城門兵音以從舅越次小心親職上嘉焉封安陽侯而譚見音越度與音有隙不受城門職而薨上閔悔之乃令成都侯立作特進領城門兵得舉吏如大將軍府郎中魏都杜業說音曰恩深者其養謹愛至者其報祥夫戚而不見異親而不見殊孰能無怨此棠棣角弓之所為作也昔秦伯有千乘之國而不能容其母弟春秋譏焉周邵則不然忠以相輔義以相匡不以聖德獨兼國寵分職於陜並為輔弼故內無怨恨之隙外無輕侮之嫌俱饗天佑兩荷高明蓋以此也竊見成都侯明詔所以優寵將軍宜承順聖意加異往時每事凡誼必與及之昔魏文侯悟大鴈之獻而父子益親陳平供一飯之饌而將相加歡所接雖在楹陛俎豆之間其為國折衝厭難豈不遠哉音甚納其言而業後為涼州刺史冬十月丁卯光祿勳于永為御史大夫四年春二月赦天下夏四月雨雪秋九月壬申東平王宇薨閏月壬戌御史大夫于永卒鴻嘉元年春正月癸巳少府薛宣為御史大夫二月壬午行幸初陵赦作徒以新豐戲鄉為昌陵縣奉初陵賜天下民爵一級女子百戶牛酒鰥寡孤獨高年帛逋貸不入者勿收三月庚戌丞相張禹賜金安車駟馬免夏四月庚辰御史大夫薛宣為丞相宣東海人也為人清淨有恩好威儀進止雍容甚可觀也然經術淺薄長於政事初為不其丞瑯邪太守趙貢者廣漢兄子謂宣曰薛君丞相德也我兩子亦中丞相史察宣孝廉遂歷州郡所在樹名迹眾職修治及為丞相頗號煩碎而趙公兩子除為丞相史京兆尹王駿為御史大夫詔民年未滿十歲賊鬭殺人及犯殊死者上請廷尉以聞得減死冬黃龍見真定二年春行幸雲陽二月博士行鄉飲酒禮有雉飛集于庭歷階昇堂而雊後集諸府又集丞明殿門屋上大司馬音上書言災異天戒後日上詔音曰朕聞捕得雉毛羽頗摧折類拘執者得無人為之邪對曰皇天見災異欲以戒人主不知誰為佞諂之計詿誤聖德左右阿諛者甚眾不待臣音臣音復諛如是而使陛下不覺悞大禍且至臣音當先受誅陛下即位十五年繼嗣不立而日夜出遊外有微行之害內有疾痛之憂而終不改天尚不能感動陛下臣何敢望獨有極言待死而已是時上好為微行谷永諫曰易稱得臣無家言王者得臣天下故無私家也今陛下棄萬乘之至貴樂家人之賤事厭高美之尊號好匹夫之卑字崇聚僄輕無義之人以為私客置私田於民間畜私奴婢車馬北宮數挺身獨行與小人晨夜相隨烏集醉鮑吏民之家亂服共坐混淆無別典門戶奉宿衛之臣執干戈於空宮公卿百僚不知陛下所在積數年昔虢公為無道有神降曰賜爾土田言將以庶人受土田也諸侯聞曰猶為失國而況王者畜私田財物為庶人之事乎時太后及諸舅皆憂上無繼嗣數為微行故推谷永令切諫而為之內應詔舉敦厚行義能直言者夏徙郡國豪傑資五百萬以上五千餘戶於昌陵五月癸未有石隕於杜郵三六月立中山憲王孫宏為廣德王三年夏四月赦天下大旱五月乙亥天水冀南山大石鳴聲隆隆如雷有頃乃止聞於平襄二百四十里野雉皆鳴石長一丈三尺廣厚略等民俗名曰石鼓石鼓鳴有兵云秋八月乙卯孝景廟北闕災冬十有一月甲寅皇后許氏廢許后聰慧善史書自為妃至上即位常寵於上後宮希得進時數有災異谷永杜欽等皆陳咎在於後宮上然其言於是省咸掖庭後宮椒房用度皇后上疏自陳以為上誠太迫急上於是採言事者之意以報之曰建始元年正月白氣出營室者後宮也正月於尚書為皇極皇極王氣之極白氣者西方之氣也於春當廢今正於皇極之月興廢氣於後宮著繼嗣之微賤人將起也至其九月流星出於文昌貫紫微宮臨鉤陳此又彰顯前災著其內也其後則北宮井溢南流逆理數郡水出流殺人民訛言相驚僮女入宮此陰氣盛溢違綱紀之應也鼠巢於野樹鳥焚其巢於泰山之域易曰鳥焚其巢旅人先笑而後號咷喪牛於易凶言王者處民之上如鳥之處巢不卹百姓百姓叛而去之若鳥之自焚其巢也雖先快意恍笑後必號咷而無及也百姓喪其君若亡牛耳故稱凶泰山易姓告代之處今正於岱宗之山甚可懼也夏四月己亥朔日有蝕之於東井東井京師地也己土也亥水也明陰氣盛咎在內也虧君體於戊巳著絕世於皇極於東井者禍敗及京都也變怪眾備未來益重成刑之禍月以迫切不救之患日侵屢深咎敗灼灼若此豈可以忽哉書曰惟先格王正厥事皇后其剋心秉德稱順婦道深惟無忽是時后宮多新愛而皇后寵益衰后姊安平侯夫人謁等為后求媚道呪詛後宮妊娠者太后大怒下吏考問謁等誅死而后廢處昭臺宮內親屬皆歸故都山陽本志以為是後趙飛鷰為皇后姊為昭儀姊妹專寵卒害皇子果絕嗣後上暴崩昭儀自殺皇后亦誅此災異之應非許后之咎也一曰王氏貴戚將生易代之禍云趙婕妤譖愬班婕妤挾媚道呪詛上考問對曰妾聞死生有命富貴在天為善尚不蒙福為邪欲何以望若使鬼神有知不受不臣之愬如其無知愬之何益故不敢為也上善其對而憐之賜黃金百斤班婕妤恐終必見危求供養太后於長信宮上許焉初上遊於後庭嘗欲班婕妤同輦載辭曰觀古之圖書賢聖之君皆有賢臣在側三代末主乃有嬖女今欲同輦得無近褒姒之幸乎上善其言而止婕妤兄伯為光祿大夫侍中上嘗設燕飲坐及率群諸侍皆引滿座中與伯談笑大謔時帷坐屏風畫紂醉據妲己上指問伯紂為無道乃至是乎伯對曰書云乃用其婦人之言何有倨婦於朝所謂眾惡歸之不如是之甚也上曰苟不若此此圖何戒對曰沉湎于酒微子所以告去式號式呼大雅所以留連詩書淫亂之戒原皆在於酒上慨然嘆曰嗟乎吾久不見班生今日復聞讜言因罷坐太后聞之為涕泣而言曰班侍中本大將軍所舉宜寵異之益求其比以輔聖德伯弟遊博學有雋才為右曹中郎將以選進讀群書上器其能賜以秘書之副有子曰嗣顯名當世遊弟穉少為黃門郎屬國都尉廣漢男子鄭躬等六十餘人攻官寺募囚徒盜庫兵自稱山君
