body:
  text: 前漢紀卷十四漢荀恱撰孝武五五年冬十月行幸雍祠五畤遂登隴崆峒而還十一月辛巳朔旦冬至始立泰畤於甘泉夏四月丁丑晦日食諌議大夫終軍使者安國少季使南越欲令入朝比内諸侯軍自請願受大冠衣長纓必羈越王之頸致之闕下軍既至越王聴命上大恱賜南越王大臣印綬令一用漢法使者留鎮撫之王太后皆裝嚴將入朝越相呂嘉不欲内屬初尉佗言事天子期無失禮要之不可以怵好言入見亡國之勢也故佗欲入朝而不果王太后置酒請使者及嘉等欲因使者權謀因以誅嘉使者相倚仗莫敢𤼵嘉覺之則趨出稱疾隂謀作亂令國中曰王少年太后中國人與使者安國少季私通專欲内屬無顧我越民社稷萬世之計遂攻殺太后及王盡殺使者齊相卜式上書願父子將兵死南越以盡臣節上不遣而賢之賜爵闗内侯黄金四十斤田十頃布告天下丁丑晦日有食之秋有蛙蝦蟇闘闕下上遣伏波將軍路博德樓舩將軍楊僕戈舩將軍嚴為下瀨將軍祖廣明因擊南越别道出咸陽㑹番禺城下九月列侯坐獻黄金酎祭宗廟不如法奪爵者百六人樂通侯欒大坐誣罔腰斬西羌衆十萬人反與匈奴通使攻故安圍抱罕匈奴入五原殺太守六年冬十月遣將軍李息征西羌上將幸緱氏左邑桐鄉聞南越破因改桐鄉為聞喜縣春至汲新中鄉得呂嘉首因以中鄉為獲嘉縣以南越地為南海蒼梧鬱林合浦交阯九真日南珠崖儋耳九郡又遣將軍韓說平西南夷以其地為武都牂牁越嶲沈黎文山五郡秋東越王餘善反遣横海將軍韓說等擊之又遣浮沮將軍公孫賀出九原匈河將軍趙破奴出令居擊匈奴皆出塞二千餘里不見虜而還乃分武威酒泉郡置張掖燉煌徙民以實之是嵗齊相卜式為御史大夫元封元年冬十月上自帥師巡邊置十二部將軍勒兵十八萬騎連旌旗徑十餘里歴上郡西河五原出長城北登單于臺望朔方臨北海威震匈奴遣使者邴吉告烏維單于曰南越王頭已懸於漢矣今天子自將待邊單于能戰亟來不能則臣服何但逃伏漠北寒苦之地為單于讋焉單于怒囚吉遷之北海上然終不敢出上還祠黄帝於橋山廼歸甘泉東越殺其王餘善以降遷其民於江淮之間遂空其地春正月行幸緱氏登崈髙聞聲稱萬嵗者三羣臣吏卒莫不稱皆聞之於是封太室以三百戶為奉邑禁民無伐其山木復其民遂東巡海上御史大夫卜式貶為太子太傅内史兒寛為御史大夫夏四月癸卯上遂登封太嶽初議封禪諸儒對者五十餘人未有所定先是司馬相如病故有遺書言封禪事上以問内史兒寛寛曰陛下躬𤼵聖德統緝羣元宗祀天地薦禮百神精神所嚮徵兆必報天地並應瑞符著明封太山禪梁父昭姓考瑞帝王之盛節也將舉大事優游數年使羣臣人人自畫終莫能成唯天子建中和之極兼總條貫金聲玉振以順承天慶垂萬世之基上乃自制禮儀採儒術以文焉拜寛為御史大夫從封禪行自太山復東巡海至碣石自遼西歴北邊九原歸於甘泉初梁相有褚大通五經為博士時兒寛為弟子及御史大夫缺上徵褚大自以為得御史大夫至洛陽聞寛為之褚大大笑及至與寛議封禪於上前大不能及寛乃退而服曰上誠知人賜太山所過民年七十已上及孤老帛秋無出租算賜天下民爵女子百户牛酒五月歸甘泉秋有星孛於東井又孛於三台本志以為其後衞太子亂之應齊王閎薨無子國除二年冬十月行幸雍祠五畤春正月行幸緱氏遂至東萊夏四月祠太山至瓠子臨決河令從臣等將軍已下皆負薪塞河作瓠子之歌赦所過徒賜孤獨髙年米行還築通天臺於甘泉作飛廉館於長安公孫卿言仙人可見陛下每在常處故不見故作通天臺以候神朝鮮王反殺遼東太守募天下死罪擊朝鮮朝鮮本秦時屬遼東漢興以為其逺難守故以遼水為塞盧綰之反也燕人衛滿亡命聚黨千餘人在遼居秦故地稍稍侵屬其東小蠻夷而王之地方數千里保塞外為臣傳子到孫至右渠抗命不賓故於是而伐之六月甘泉宫中生芝草九莖上嘉之乃赦天下作芝房之歌秋作明堂於太山下遣樓船將軍楊㒒左將軍荀彘將應募罪人擊朝鮮又遣將軍郭昌等平西南夷未服者以為益州郡三年春作角觝戲以享外國朝獻者三百餘里内人皆觀夏朝鮮斬其王右渠以降以其地為樂浪臨屯𤣥菟真番四郡楊僕坐失亡多免為庶人荀彘坐爭功棄市秋七月膠西王端薨端數犯法有司請誅端上不忍凡再削國去大半端怨讟端杜其南門從一門出入宫室府庫壞漏財物以巨萬計盡腐終不復收省吏二千石欲以法治端端輒求其罪詰之無罪者藥之所殺傷二千石甚衆無子國除武都氐人反分徙酒泉郡十二月雨雹如馬頭四年冬十月行幸雍祠五畤通回中道遂北出蕭闗至代而還行幸河東春三月祠后土有神光集於靈壇一夜三見夏大旱民多渴死秋匈奴寇邊遣將軍郭昌屯朔方五年冬上南巡至於盛唐望祀虞舜於九嶷登灊天柱山自潯陽浮江親射蛟魚於江中獲之遂北至琅邪傍海所過禮祀名山大川春三月還至泰山増封甲子祀髙祖於明堂以配天因朝諸侯王列侯受郡國計夏四月赦天下賜鰥寡帛貧窮者粟所幸縣無出租賦大司馬大將軍衛青薨諡曰烈侯青既尊貴而平陽侯􅔟孛有惡病就國薨長公主問列侯誰賢者左右皆言大將軍公主笑曰此常騎從我奈何左右曰於今尊貴無比於是主諷太后太后白之上乃詔青尚平陽公主與主合葬起冢像廬山初置刺史部十三州詔曰蓋有非常之人必有非常之功非常之功必待非常之人故馬或奔踶而至千里士或有負俗之累而立成功名其令州郡察吏民有茂才異等可為將相及使絶國者以聞六年冬幸回中春作首山宫三月行幸河東祠后土赦汾隂殊死已下賜天下貧民帛益州昆明反遣將軍郭昌擊之夏京師民觀角觝于上林秋大旱蝗太初元年冬十月行幸太山十有一月甲子朔旦冬至祠上帝於明堂乙酉柏梁臺災夏侯始昌先言其災日始昌魯人也明於隂陽以術進而為梁王太傅上甚重之以為昌邑王太傅十有二月䄠髙里祠后土東臨渤海望祀蓬萊還受計於甘泉宫春二月起建章宫夏五月正律厯以寅月為正首色尚黄數用五定官名正律厯協音樂昔夏以寅月為正殷以丑月為正周以子月為正承三統十一月乾之初九其位在子天氣始起生隂陽之化故子為天統六月坤之初六其位在未隂受陽任成剛柔之形其衝在丑故十二月為地統正月乾之九二萬物湊出於地人奉之而承之故寅為人統自夏殷及周三變而復故漢用夏正天統始施化於子半日萌生而色赤地統受之於丑始化而色黄至丑半日色化而白人統受之於寅始孽成而黒至寅半日生色青故夏色尚黒殷色尚白周色尚赤律厯一曰備數二曰和聲三曰審度四曰嘉量五曰權衡參伍以變錯綜其數校之氣物和之心耳以逹自然之數以順性命之理數者一十百千萬也本起黄鍾之數始於一積之無窮以周備事物之數職在太史掌之聲者宫商角徵羽所以諧八音正情性移風俗也八音者土曰缶匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鐘木曰柷敔角者觸也物出於地載芒角也徵者祉也物盛而緐祉也宫者中也商者量也物盛而可量度也羽者宇也物聚而覆宇之也合之五行則角為木於五常為仁於五事為貌商為金為義為言徵為火為禮為視羽為水為智為聴宫為土為信為思為心宫為君商為臣角為民徵為事羽為物六律律法也以統氣類物子曰黄鍾寅曰太族辰曰姑洗午曰㽔賓申曰夷則戌曰無射六吕吕助也以助陽宣氣未曰林鍾酉曰南吕亥曰應鍾丑曰大吕卯曰夾鍾巳曰中吕黄鍾黄中色也鍾種也言以中色布種物也大吕旅助陽也太族族湊也言湊地達物也夾鍾夾輔陽也姑洗姑固也洗潔也言固潔物也中吕隂始起未𤼵居中而助陽也㽔賓㽔繼也賓導也言陽導物而繼之也林鍾林君也言隂受陽任君種物也夷則夷傷也則法也言陽正法使隂夷當傷之物也南吕南任也隂受陽任成物也無射射厭也陽究隂成終而復始無厭已也應鍾隂應陽而後鍾物也五聲之本生於黄鍾黄鍾之律長九寸為管或損或益以定五聲九六相生隂陽之應故三分黄鍾損一下生林鍾三分林鍾益一上生太族三分太族損一下生南吕三分南吕益一上生姑洗三分姑洗損一下生應鍾三分應鍾益一上生㽔賓三分㽔賓損一下生大吕三分大吕益一上生夷則三分夷則損一下生夾鍾三分夾鍾益一上生無射三分無射損一下生中吕隂陽相生自黄鍾始而左轉八八六十四為位其法皆用銅職在太樂太常掌之度者分寸尺丈引也所以度長短也本起於黄鍾之長以秬黍之中者一黍廣度之九十分黄鍾之長一黍為一分十分為一寸十寸為尺十尺為丈十丈為一引而五度審矣職在内官廷尉掌之量者籥合升斗斛也所以量多少本起黄鍾之籥以秬黍之中者千有二百實為一籥十籥為合十合為升十升為斗十斗為斛而五量嘉矣籥者興也合者合也升者登也斗者聚也斛者角也職在太倉大司農掌之權衡者所以平輕重銖兩斤鈞石也本起黄鍾之重籥容千有二百黍重十二銖二十四銖為兩十六兩為斤三十斤為鈞四鈞為石銖者從微至見可殊異也兩者兩鍾之重也二十四氣之象斤者明也三百八十四銖為易二篇之爻隂陽變動之象十六兩為斤斤者四時乗四方之象也鈞者以平均物也三十斤一月之象也石者大也權之大者也四鈞四時之象也重一百二十斤十二月之象也而五權備矣物與權均而生衡衡運而生規規圎而生矩矩方而生繩繩直而生物定矣是謂五則君臣用焉以定國禮百工由焉以為法式職在大行鴻臚掌之夫推厯生律制器權衡規矩準繩度量探賾索隠鉤深致逺莫不用焉匈奴單于好殺伐左右大都尉欲殺單于以降漢於是使因杅將軍公孫敖築受降城於塞外事覺左右大都尉誅死秋八月行幸安定發天下謫民遣貳師將軍李廣利征大宛大蝗自東方飛至燉煌二年春正月戊申丞相石慶薨慶即奮之小子世以淳厚為行奮四子皆以孝謹位至二千石故景帝并其號曰萬石君萬石君過宫門闕必下車步走見路馬必軾子孫勝冠者在側雖燕必冠申申如也童僕訢訢如也唯謹爾上賜食於家稽首俯伏而食如在上前其執喪哀戚而子孫遵教亦如之以敬謹聞於郡國奮長子建為郎中令建奏事事下建讀之而馬字少一㸃建驚恐曰死罪矣其畏懼如此有言於上屏人言極切廷見若不能言慶為太僕從出上問車中幾馬慶以鞭數馬畢乃舉手曰六馬慶於兄弟最為輕易然猶如此諸孫皆孝唯建最甚萬石君卒建在喪扶杖乃能行嵗餘亦死初慶為齊相齊國慕其家行不言而治及為丞相厚謹而已太僕公孫賀為丞相三月行幸河東祠后土令天下大酺五日膢五日祠門户比臘夏五月籍吏民馬補車騎馬秋蝗遣浚稽將軍趙破奴將二萬騎出朔方擊匈奴為匈奴八萬騎所圍遂没其軍破奴居匈奴中十餘年後亡歸漢冬十有二月御史大夫兒寛卒初寛以儒學進家貧受業博士嘗為弟子都養時行賃作帶經而鉏休息輒誦讀為廷尉卒吏以不習吏事除為從史徙之北地視畜數年還廷尉適有疑奏已再見卻矣掾吏莫知所為寛言其意事即得可後上問張湯前奏事非掾吏所為誰為之湯對曰臣從史兒寛湯由是以寛為奏讞掾徙為侍御史見上問尚書經義數事為太中大夫遷左内史民甚信重之後有軍𤼵左内史粟負租課殿當免吏民聞之輸租襁負不絶課更以最三年春正月行巡狩海上膠東相王延廣為御史大夫夏四月還修封泰山禪石閭遣光禄大夫徐息築五原塞外列城西北到盧朐山遊擊將軍韓說將兵屯之彊弩將軍路博德築居延城秋匈奴黎湖塗單于入定襄雲中殺略數千人入張掖酒泉殺都尉四年春正月貳師將軍李廣利斬大宛王首獲汗血馬初廣利將騎六千步兵數萬人至貳師城下取善馬西至郁夷城當道小國各城守不肎給食食乏而還徃來二嵗到燉煌士卒十遺二三上書請罷兵上大怒乃益發兵卒六萬人負從者不與牛十萬馬三萬驢騾馲駝以十萬數多齎糧轉運奉軍天下騷動廣利遂進兵當道小國皆送迎給廩食徑到大宛城圍宛三十餘日宛中貴人共殺其王母寡奉其首出食給軍悉出善馬漢擇取其善馬數十匹中馬三千餘匹乃共與立宛貴人昧察為王與盟而還諸所過小國皆遣子弟從入獻見因為質焉還玉門闗入者萬餘人馬數千餘匹行乏食戰死甚多將吏貪不愛士卒故死亡者多上以為萬里而伐不録其過乃封廣利為海西侯封騎士趙弟殺郁城王為新畤侯拜卿三人二千石數百人千石以下千有餘人廣利者李夫人兄也廣利弟延年性知音善歌舞上愛之乃為新聲變曲聞者莫不感動而李夫人亦善舞甚姣麗有寵李夫人病篤上自臨候之夫人蒙被上問而謝曰妾聞婦人貌不修飾不見君父妾不敢宴媠見上曰夫人病甚殆將不起宜見我囑託兄弟乎將加賜千斤而與兄弟尊官乎李夫人荅曰尊官在帝不在一見上固欲見之夫人遂轉向壁歔欷不復言於是上不恱而起姊妹讓之曰貴人獨不見囑託兄弟邪何為恨上如此夫人曰所以不見帝者乃所以深託兄弟也夫以色事人者衰則愛弛愛弛則恩絶上所以戀戀者乃以為平生容貌今見我顔色毁壞必有吐棄我意尚復肎追思憫録其兄弟哉及夫人卒上以后禮葬之圖畫其形於甘泉宫而尊重其兄弟廣利為將軍延年為協律都尉上思念李夫人不已有方士少翁言能致其神乃夜張燭設帷幄陳酒食而令上居他帷遥見好女子如李夫人還帳坐而眇然不得就視初上𤼵䜟書曰神馬當從西北來後得烏孫好馬名曰天馬及得宛馬馬汗血言其先天馬子也名曰天馬更名烏孫馬曰西北極馬上甚好宛馬每使使者相望於道率十輩大者數百人小者百餘人一嵗中使多者十餘輩少者五六輩逺者八九嵗近者五六嵗而還不能無侵盗幣物及使失㫖者輒案重罪以激怒之因復求使自贖由是使無窮已而輕犯法募吏民自占使者無問所從來皆遣之而漢使窮河源矣外國朝貢並至上乃悉從外國客巡行至海上大都多人民則過之觀民人府庫之饒厚賞賜作角觝戲出竒戲酒池肉林以觀示之秋起明光宫冬行幸回中徙𢎞農都尉治武闗稅出入者以給吏卒食大宛既破外國振恐上欲遂困匈奴下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆齊襄公復九世之讎春秋大之於是復圗匈奴矣遣中郎將蘇武至匈奴匈奴留武不得歸武固執漢節不肎降天漢元年春正月行幸甘泉郊泰畤三月行幸河東祠后土匈奴使使來獻天雨白氂夏大旱五月赦天下秋發謫戍屯五原監軍御史穿北軍壘垣以為賈區宇軍正丞胡建欲誅之隂約其從卒監軍御史與諸校尉列坐建趨至拜謁因令卒引御史斬之諸校尉驚愕不知所謂建遂上奏曰監軍御史穿北軍垣以為賈利使文吏議不至重法髙皇帝法曰壁壘已定穿踰不由路是謂姦人姦人者殺之臣謹案軍法曰正無屬將軍將軍有罪以聞二千石以下行軍法焉臣謹案以法斬上壯其節制書荅曰國容不入軍容軍容不入國容何文吏也建有何疑焉是嵗濟南太守王延年為御史大夫二年春行幸東海還幸回中夏五月貳師將軍李廣利將三萬騎出酒泉擊匈奴斬首虜萬餘級因杅將軍出西河騎都尉李陵將步卒五千出居延與鞮汗單于戰斬首萬餘級陵兵敗降匈奴陵者李廣孫敢兄當戶之子上使陵為貳師將軍督輜重陵稽首曰願得自當一隊上曰吾無騎與汝陵曰不用騎願以少擊衆步兵五千人涉單于庭上壯而許之陵至浚稽山與單于相遇以騎三萬攻陵陵千餘弩俱𤼵應弦皆倒虜還走上山陵追擊之殺數千人單于大驚召左右賢王馳兵八萬騎攻陵陵且戰且却南行數日抵山谷中復大戰斬首三千餘級引兵東南五日抵大澤葭葦中虜從上風縱火燒陵陵亦令軍縱火以自救南行至山下單于在山上使其子將騎擊陵陵自歩闘樹木間復殺虜數千因𤼵連弩射單于下走是日捕得生口言單于曰此漢精兵也日引吾南行近塞得無有伏兵乎諸君長皆曰單于自將數萬騎擊漢數千人不能勝後無以復使邊臣令漢益輕匈奴匈奴復力戰山谷間尚四五十里得平地不能破乃還是日戰數十合復力戰殺傷虜二千餘人虜不利欲去㑹陵軍中候管敢為校尉所辱亡降匈奴具言軍無後救射矢且盡單于大喜進兵使騎並擊漢軍疾呼曰李陵韓延年趨降遂遮道攻陵四面射矢下如雨陵矢且盡即棄軍去士卒尚三千餘人徒斬車輻持之軍吏持尺刀抵入山谷單于入遮從山上墜石下士卒多死不得行陵曰兵敗吾死矣軍吏或勸陵降陵曰吾不死非壯士也陵歎曰使人有數十矢足以免矣今無兵復戰令軍士人持三升糒一片冰令各散去遮虜鄣相待陵與延年俱上馬壯士從者數十人虜千騎追之延年死陵曰無面目以報陛下遂降士卒分散脫至塞者四百餘人陵敗處去塞百餘里單于以大女妻陵立為右校王上聞陵降大怒大臣憂懼太史公司馬遷上言陵功以陵之不死宜欲得當以報漢也初上遣貳師將軍出時令陵為助兵及陵與單于相持而貳師無功上以遷欲沮貳師為陵遊說後捕得匈奴生口言陵教單于為兵法上怒乃族陵家而下遷腐刑陵聞之曰教單于為兵者乃緒也非陵也李緒者故塞外都尉先是降匈奴陵痛其家以緒誅乃使人刺殺緒司馬子長既遭李陵之禍喟然而歎幽而𤼵憤遂著史記始自黄帝以及秦漢為太史公記後為中書令尊寵任職益州刺史任安與遷書責以不推賢貢士遷報書曰僕賴先人緒業得待罪輦轂下二十餘年矣嘗厠下大夫之列陪外庭末議不能引綱維盡思慮今以虧形在闒茸之間尚何言哉昔衛靈公與雍渠載孔子適陳商鞅因景監見趙良為之寒心同子參乗袁絲變色自古而恥之奈何使刀鋸之餘薦天下之豪傑哉僕少負不覊之氣長無鄉曲之譽幸得奉薄技出入周衛而事乃有大􅍝夫僕與李陵趨舎異路素非相善也然觀其為人事親孝與士信臨財廉取與義嘗思奮不顧身以徇國家之急僕以為有國士之風夫人出萬死不顧一生之計赴公家之難斯亦竒矣今舉事一不當而全軀保妻子之臣隨而媒糵其短僕誠痛心且李陵提步卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑彊胡挫億萬之師虜救死扶傷不給悉舉引弓之民一國共攻之轉闘千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍軍士無不奮躬流涕沫血飲泣張空弮冒白刃北首爭死敵場雖古名將不見過也身雖陷敗其所摧破亦足㬥功於天下僕以為陵之不死直欲得當報漢也時主上聞陵敗食不甘味聴朝不怡憂懼不知所出僕竊不自量欲效其欵欵之愚因推此意以言之欲以廣主上之意上以僕非沮貳師而為陵遊說遂下之於吏拳拳之忠終不能自明列身非木石獨與法吏為伍深幽囹圄之中誰可告愬者僕聞太上不辱先其次不辱身其次不辱色其次不辱辭令且臧獲婢妾猶能引決僕所以隠忍茍活身陷糞土之中而不辭者私心有所不盡疾没世而名不稱於後世也昔西伯拘而演周易仲尼厄而作春秋屈原放逐乃賦離騷左丘明失明厥有國語孫子臏足兵法修列㒒竊不自量託於無能之辭欲網羅天下放逸舊文亦欲以究天人之際通古今之變成一家之言僕誠以著此書藏之名山傳之後人雖萬被戮豈有悔哉太史公記凡百三十篇五十餘萬言遷父談亦為太史公自敘其先重黎之後世掌天地官也本傳曰司馬遷據左氏春秋國語採世本戰國䇿逮楚漢春秋接其後事迄於天漢其言秦漢詳矣至於採摭經傳分散百家之事甚多疏略或有抵忤又其是非頗謬於聖人論大道則先黄老而後六經序游俠則退處士而進姦雄述貨殖則崇姦利而羞貧賤此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辯而不華質而不野其文直其事核不虚美不隠惡故謂之實録泰山琅邪羣盗徐勃等阻山攻城斷道路遣直指使者㬥勝之等衣繡衣仗斧鉞分部逐捕刺史郡守已下皆伏誅三年春二月御史大夫王延年有罪自殺執金吾杜周為御史大夫初搉酒酤三月上行幸太山修封禪祠明堂因受計還北海祠恒山瘞𤣥玉夏大旱四月赦天下所過無出田租秋匈奴入鴈門太守坐畏懦棄市四年春正月朝諸侯王於甘泉宫貳師將軍李廣利將六萬餘騎歩兵七萬人出朔方因杅將軍公孫敖將萬騎步兵三萬人出鴈門遊擊將軍韓說將步兵三萬人出五原彊弩將軍路博德將步兵萬餘人與貳師將軍㑹與匈奴戰不利皆引還夏四月立皇子髆為昌邑王秋九月令死罪人贖錢五十萬減死一等前漢紀卷十四
