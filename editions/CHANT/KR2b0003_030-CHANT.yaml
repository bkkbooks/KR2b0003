body:
  text: 前漢孝平皇帝紀卷第三十皇帝壬寅即位九歲大司徒孔光為太傅左將軍甄豐為少傅右將軍馮宮為大司徒太皇太后臨朝大司馬王莽秉政百官總己以聽之孝成趙皇后孝哀傅皇后皆以前驕恣廢自殺莽以孔光名儒歷相三主太后所敬天下所信伏於是盛尊事光莽素所不悅者皆傅治其罪為請奏光光不敢不上莽白太后皆可其奏皆免官徙諸遠方平阿侯仁莽之從父兄也中正直言紅陽侯立莽叔父莽恐其害己從容言於太后皆奏遣就國於是附順者皆拔擢之忤恨者誅滅之以王邑為腹心甄邯甄豐主訣斷平宴典機事劉歆主文章孫建為爪牙豐子尋歆子棻涿郡崔發南陽陳崇皆以才能稱得幸於莽並在顯職莽色厲而言方欲有所為微見風采黨與承旨而顯奏之因固謙讓示不得已上以惑太后下以取信於眾庶元始元年春正月越裳氏重譯獻白雉一黑雉二莽令益州諷使之也群臣奏言莽功德比周公宜賜號安漢公益封三萬戶莽因辭封孔光等以定策安宗廟皆益封二月丙辰太傅孔光為太師車騎將軍王舜為太保大司空左將軍甄豐為少傅立故東平王雲太子開明為王孫故桃鄉頃侯子成都為中山王封宣帝玄孫信等三十六人為列侯自漢初至此王子侯者凡四百八十人令諸侯王關內侯列侯無子有孫者若同產子皆得為嗣三月置羲和官秩二千石外史閭師秩六百石班教化朔方廣牧女子趙春死棺歛六日出在棺外自言見死夫與父曰年二十七不當死本志曰死者又生至陰為陽下人為上丙辰義陵寢神衣在匣中自出在外床上夏五月丁巳朔日有食之赦天下尊帝母中山孝王姬為后帝舅衛寶寶弟玄爵關內侯帝女弟四人號皆曰君食邑各二千戶封周公後公孫相如為褒魯侯孔子後孔均為褒成侯追謚孔子為褒成宣尼公六月長安女子生兒兩頭異頸面相向四臂共胸俱前向尻上有目長二寸本志以為凡妖之作以譴失正各象其類二首上不一也手多下僣濫也足少不勝任也下體生於上不敬也上體生於下媟瀆也人生而大速成也生而能言好虛也群妖推此類或人不改乃成凶秋九月赦天下徒二年春黃支國獻犀牛三月癸酉大司空王舜病死夏四月立代孝王玄孫之子如意為廣宗王江都易王後盱眙侯宮為廣川王廣川惠王曾孫倫為廣德王封周勃霍光樊噲後皆為列侯酈商等子孫一百三十人爵關內侯食邑丁酉少傅甄豐為大司空夏大旱蝗青州尤甚安漢公四輔公卿大夫吏民為百姓困乏獻田宅者二百三十人以賦貧民罷安定池苑以為安民縣六月有石隕於鉅鹿二秋九月戊申晦日有蝕之赦天下是歲光祿大夫孫寶為大司農寶字子嚴潁川人也初御史大夫張忠欲令授子經寶自劾去忠謝固之後以為主簿或問寶曰高士不為主簿而子為之何也寶曰大夫薦用一府不以為非者人安得獨自高前日君男欲學文而移寶自近禮聞來學義無往教道不可屈身屈何傷且不遇者何所不為況主簿乎忠聞之甚慚薦為議郎後為丞相司直紅陽侯立與南郡太守李尚共為姦利寶按劍劾立尚尚下獄死立雖不坐後卒以是廢後為京兆尹處士侯文常稱疾剛直不肯仕寶以禮自請文為布衣交會立秋曰文自請受署督郵有杜稚季者大俠也善定陵淳于長長深以託寶文欲誅之寶問其次文曰豺狼當道安問狐狸寶默然不應稚季聞之杜門不出外穿後墻為小戶旦暮自持鋤治園不敢犯法越嶲郡上言黃龍游江中大臣稱莽功德比周公寶曰周公上聖召公大賢尚尤不悅今有一事郡臣同聲得非不美者乎時大臣皆失色而寶不變坐免官終於家三年春詔博采二王後及周孔世卿列侯在長安適子女王氏女多在選中莽恐與己女爭位上書言莽女不宜與諸女並采太后以為至誠乃下詔曰王氏女朕之外家皆勿采於是吏民守關上者千餘人願得以安漢公女為天下母太后不得已獨采莽女群臣卿士僉曰安漢公女宜為后參以蓍龜咸曰元吉乃考定娶禮正十二女之宜夏安漢公奏車服制度之宜吏民養生送死嫁娶奴婢田宅器械之品郡國學校教訓之禮陵陽任橫等稱將軍盜庫兵攻宮寺皆伏誅秋八月天雨草狀如莎相樛結如彈丸莽世子宇非莽隔絕衛氏恐帝長大後怨即私於帝舅衛寶勸令帝母上書求入朝莽白太后不聽宇與其妻兄呂寬及師吳章議其故章以莽不可諫而好鬼神章因推類而說莽令歸政於衛氏宇使寬夜持血灑莽第門吏發覺之執宇送獄及妻皆死衛氏盡誅滅窮治其事呂寬所連及郡國豪傑素非己者殺於市門海內震焉吳章者大儒所教千有餘人莽悉欲禁錮其門人門人改名他師時司徒掾平陵侯李敞獨自劾為吳章弟子收葬章尸王舜聞而義之比之欒布表為諫議大夫四年春正月郊祀高祖以配天宗祀文帝以配上帝改殷紹嘉公曰宋公周承休公曰鄭公詔婦人非自犯法男子八十已上十歲已下家非坐不道詔所召捕皆得繫其當驗聞者則驗問二月丁未立皇后王氏赦天下遣太僕王惲等八十人置副假節巡行天下觀風俗賜九卿已下至六百石宗室有屬籍者爵各有差賜民爵一級鰥寡孤獨高年帛時吏民上書者八千餘人咸曰伊尹為阿衡周公為太宰七子皆封有司以為宜如所言遂假安漢公號為宰衡位上公賜莽大夫人號顯君食邑二千戶黃金印赤紱子男皆封列侯太后親臨前殿莽拜於後如周公故事莽奏立明堂辟雍尊孝宣廟為中宗廟莽欲悅太后意乃以郅支功尊孝元廟為高宗為學者築舍萬區所益博士員經各五人徵天下有才能及小學異藝之士前後至者數千人群臣奏宰衡位在諸侯王上初置西海郡徙天下犯法者處之時莽遣多持金帛誘塞外羌豪等獻地請降曰聞太后聖明安漢公至仁天下太平近歲已來羌人無疾苦故思樂內屬莽因奏言謹按已有東海未有西海請以羌獻地為西海郡又賂匈奴令上書曰聞中國譏二名故名囊知互斯今更名智以順制作梁王有罪徙廢漢中自殺分京師置前輝光後丞烈二郡更公卿大夫八十一元士名位次及十二州名分界郡國所屬冬大風吹長安城東門屋瓦且盡莽所遣使者八人行風俗還言天下郡國齊同詐為郡國造歌謠頌功德凡三萬言又奏市無二價官無獄訟民無盜賊野無饑人道不拾遺男女異路交致太平五年春正月祫祭明堂詔太上皇已來族親各以世氏郡國致宗師以糾之致教訓焉考察不從教令有冤失職者宗師因郵亭上書宗伯以聞夏四月乙未太師孔光薨大司徒馮商為太師是時吏民上書薦莽者前後四十八萬七千五百七十二人及諸侯王公卿見者皆叩頭言宜加賞於安漢公於是詔策加莽九錫之命羲和劉歆等四人治明堂辟雍王惲等八人使行風俗宣明德化皆封為列侯閏月立梁孝王九世孫音為梁王冬十月乙亥高原廟殿門災本志以為高廟長安城中原廟在渭北不宜立初惠帝為出遊長樂宮方築復道在高廟道上叔孫通曰子孫奈何乘高廟道上行帝懼遂急毀之叔孫通曰人君無過舉願陛下因為原廟渭上衣冠出遊之處立廟太后導而臨朝任莽非正之象也冬十有二月長樂少為大司徒丙子帝崩於未央宮時元帝統絕宣帝有孫五畏其長也言兄弟不得相為後乃徵元帝玄孫廣戚侯子嬰三歲託以為卜相最吉而立之前輝光謝囂奏言武功亭長孟宗浚井得白石丹書言安漢公為皇帝符命之興自此始也莽遂謀為居攝以周公故事皆如天子之制明年改元為居攝元年莽奏言帝母丁姬祖母傅太后葬不應禮皆發其冢既開傅太后冢崩壓殺數百人臭聞數里發丁姬冢有火出四五丈群燕銜土投冢上讚曰孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徵嘉應頌聲並作至於異見於上民怨於下莽亦不能文也居攝元年春二月立嬰為皇太子號曰孺子夏四月安眾侯劉崇與丞相張紹謀曰安漢公必危劉氏吾帥宗族為先海內必和之遂合黨萬餘人攻宛城不能入而敗紹者張竦之從弟竦與崇族父劉嘉詣闕自歸莽赦之不罪竦為嘉作奏曰建初元壽之間大統幾絕陛下聖德拯救國命復延臨朝統政動以宗室為始登用九族為先故亂則統其理危則致其安禍則引其福絕則接其繼幼則代其任夙夜孜孜不已凡以為天下厚劉氏也建辟雍立明堂班大法流聖化天下顒顒引領而嘆頌聲洋洋滿耳人無愚賢男女皆喻旨意而劉崇獨懷悖惑之心操畔逆之慮惡不忍聞罪不容誅誠子臣之仇宗室之讎也是故親屬震落而告其罪民人潰叛而棄其兵進不跬步退不伏殃臣聞叛逆之國既以誅討則瀦其宮以為汙池納垢濁焉名曰凶墟雖生菜茹而民不食四墻其社覆上棧下著以為誡臣不勝憤憤之情願為宗室唱始父子兄弟持畚荷鍤馳到南陽瀦崇宮室令如古制及崇社宜如亳杜盛稱功德莽大悅封為師禮侯七日皆賜爵關內侯封竦淑德侯長安為之語欲得封過張伯松力戰鬭不如巧作奏自後反者皆汙池云群臣復白太后劉崇等所以謀反者莽權輕也宜尊莽以鎮海內五月甲辰莽稱假皇帝冬十月丙辰日有食之是歲西羌龐恬傅幡反遣護羌校尉竇況平之二年春竇況破西羌夏四月更造貨錯刀一直三十契刀一直五百大錢一直五十與五銖並行九月東郡太守翟義立嚴鄉劉信為天子東平王雲子也翟義方進小子也義將起兵謂其姊子上蔡陳豐曰莽必代漢吾父子受國厚恩當為國討賊假令時不成死國埋名猶可以不慚先帝汝其從我乎豐年十八壯勇許諾遂與東郡劉宇嚴鄉侯劉信信弟璜結謀初信兄開明立為王無子而信子匡嗣立為東平王故義并東平王而立信義自為大司馬柱天大將軍以東平王傅蘇隆為丞相丹為御史大夫東平王孫卿素有智略以明兵法在京師義乃詐移書以重罪傳逮慶移書郡國言莽毒殺平帝攝天子位欲以絕漢今天子已立恭行天罰郡國振動比到山陽眾十餘萬莽惶恐抱孺子禱郊廟作筴告遣諫議大夫桓譚等告諭天下當反政之意乃收族義家後母及兄宣皆死遣王邑孫建等十八人將兵擊義又置腹心七將軍屯關中以自備冬十有二月王邑等破翟義斬劉璜義與信棄軍亡義捕得傳尸長安磔陳都市信卒不得初聞兵茂陵以西二十三縣賊盡發趙明霍鴻等自稱將軍劫掠吏民眾十餘萬火見未央宮殿前其三年春地震大赦天下明鴻等皆破莽自以威德遂盛獲天人助乃謀即真之事秋七月莽母功顯君死意不在喪為緦縗服而加麻環絰如天子弔諸侯之禮自以為攝天子位不敢服其私親也凡一弔會葬皆如初令新都侯崇為主服喪三年廣饒侯劉京上書言齊郡臨淄縣亭長卒當薨見人曰天公使我告亭長居攝皇帝當為真不信我庭中當有新井亭長起視亭中有新井百尺又太保臧洪奏新井亭長符命言雍巴郡得銅符帛圖文曰天告帝符獻者封侯莽於改居攝三年為初始元年期門郎張充等交謀共劫莽立楚王發覺誅死梓潼人哀章作銅匱為兩檢其一曰天帝行璽金匱圖其二曰赤帝璽某傳與黃帝莽金策書某者高皇帝名也言莽為真天子圖書莽大臣八人有王盛王興哀章因自竄其名凡十一人皆署官爵為輔佐以付高廟僕射以聞戊辰莽到高廟拜受金匱遂即天子位改正朔易服色以十二月為正以鷄鳴時為朔色尚黃初高帝時得秦玉璽因服命之名傳國璽莽令王舜從太后求之太后怒罵舜汝不顧義我漢家寡老婦旦暮且死用此璽俱葬終不可得太后因號泣而言左右莫不垂涕舜悲不自勝良久乃白太后曰臣等已無可言莽必欲得之太后寧能終不與邪太后恐欲劫之乃出投之於地曰我老已死矣知汝兄弟不久滅族矣乃尊太后為新室文母莽以十月癸酉朔為建國元年春大赦天下乃筴命孺子曰咨爾嬰昔皇天佑乃太祖歷代十二享國二百一十載天之曆數在于予躬詩不云乎侯服于周天命靡常封爾為定安公永為新室賓於戲敬天之休往踐乃位無廢朕命以平原安德漯陰鬲重丘合凡萬戶為安定公國立漢祖宗之廟於其國與周後並行其正朔服色讀筴畢莽親執孺子手流泣歔欷曰昔周公攝位終得復子明辟今予獨迫皇天威命不得如意哀歎良久中傅將太子下殿北面稱臣百僚陪位莫不感動以孝平皇帝后為安定太后復更號曰黃皇室主欲嫁之主不聽莽案金匱輔臣皆封拜王舜為太師平晏為太傅劉歆為國師哀章為國將是為四輔甄邯為大司馬王尋為大司徒王邑為大司空是為三公甄豐為更始將軍王興為衛將軍孫建為立國將軍王盛為前將軍是為四輔將軍凡十一人以應符命之名孺子居其邸使者監護勑阿保乳母不得與語至壯大不能名六畜莽定諸侯王皆稱公及四夷皆更為侯更作小錢徑六分文曰小錢與大錢一直五十者為二品並行夏四月徐鄉侯劉快結黨千數起兵於其國快兄殷故漢膠東王時改為扶公國在即墨快攻杸殷閉城拒快敗走死莽增殷國為萬戶復井田制遣五威將軍王奇等班符命四十二篇於天下以著代漢之符赦天下五威將軍皆乘乾文軍駕坤六馬背負鷩鳥之毛服飾甚偉各置左右前後中帥凡五帥衣冠各如其方色將軍持節稱大一之使帥持幢稱五帝之使各雷桐華真定劉都等謀起兵發覺誅真定常山大雨雹其二年莽之九月戊巳校尉史陳良終帶共殺校尉刁護劫略吏士自稱漢大將亡入匈奴十有二月雷更名單于號曰降奴服于知時多作符命以得封侯其不為者戲曰獨天帝無除書自是莽乃禁之初甄豐劉歆王舜等建安漢宰衡之號非復令莽居攝也及即真歆舜內懼而豐性剛形於顏色豐子尋復作符命故漢氏平帝后黃皇室主為尋妻莽發怒收尋皆死連者數百人詞及揚雄時校書在天祿閣使者欲收之雄恐懼自投閣下幾死莽聞之曰雄素不豫事何故在此間請問其故乃歆子棻從雄問奇字有詔勿問莽之為人大口蹶顄露眼赤睛大聲如嘶長七尺五寸好厚履高冠反膺仰視或云所為鴟目虎喙豺聲也故能噉人亦為人所噉莽聞而誅之王舜自莽即位病悸而死其三年遣謁者持節安車印綬拜楚國龔勝為太子師友祭酒秩上卿使者之郡太守縣邑長吏三老官屬行義諸生千人入勝舍致詔書勝因稱病篤使者以印綬加勝輒推去使者自上請留守勝以秋涼發勝知不免謂門人高暉等曰吾蒙漢之厚恩豈以一身事二姓遂不食十四日而死有父老弔哭甚哀曰嗟乎薰以香自燒膏以明自消龔生竟夭天年非吾徒也遂出莫知其誰勝字君賓與同郡龔舍字長倩友善故世稱兩龔並著名節勝哀帝時為諫議大夫薦龔舍甯壽皆徵勝曰竊見國御巫醫尚為駕御賢士宜有駕於是詔從之壽稱疾不至舍至拜諫議大夫以疾免即就家拜太山太守使者到縣請舍到庭受拜舍曰王者以天下為家何必於宮遂就家拜之至官數月以疾乞骸歸兄子曼容亦養志自修為官不肯過六百石輒自免去莽以安車迎齊薛方曰堯舜在上下有巢許今則主上方隆唐虞之德亦猶小臣欲守箕山之節莽悅而聽之隃糜郭欽杜陵蔣詡字元卿皆以郡守刺史以廉恥著名齊國栗融字客卿北海禽慶字子夏蘇章字山陽曹竟字子期皆大儒俱不仕莽池陽有小人影長尺餘或乘車馬或步行操持萬物小大皆自稱三日乃止海濱蝗河水汎清河以東數郡莽徵能治河者至以百數大略者長水校尉平陵關並言河決率嘗於平原東郡左右其地形下而土䟽惡也聞禹治河本空此地以為南北不過百八十里河空此地不為官亭民室而已大司馬掾張式言水性就下行疾則自刮成空而稍深河水重濁號一石水六斗泥今西方諸郡及京師民引河渭水以溉田春夏少水時故河流遲貯淤而稍淺雨多小暴至則溢決而國家數隄塞之稍益高於平地猶築垣墻而貯水也可順從其性無復以灌溉則水道通利無溢決之害矣臨淮韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王璜言河入渤海地高於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出浸數百里九河地悉為海水漸矣禹之行河水本從西山下東北去周書曰定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜卻徙完平處更開空使緣西山足乘高地東北入海乃無水災事亦無施行者其四年夏赤氣出東方竟天東北西南皆反亂侵邊其五年二月文母皇后崩葬渭陵與元帝合而溝水絕之立廟於長安新室世世獻祭元帝配食坐於床下莽為后服喪三年西域焉耆國叛殺都尉冬十有一月孛星出其六年三月壬申晦日有蝕之四月殞霜殺草木六月黃霧四塞秋七月大風拔樹木北闕城門瓦飛雨雹殺牛羊莽以周官王制之文置卒正連帥大尹職如太守屬長職如都尉置州牧其禮如三公郡監二十五人位上大夫各主五郡皆世其官分長安六卿置六師各一人分三輔為六尉郡河東河南河內弘農潁川南陽為六隧郡置大夫職如太守屬正職如都尉及它官名悉改大都至分為六郡縣以亭長為名者三百六十其後數變更一郡至五易名而旋復其故吏民不能記每下詔書輒繫其本名而兼言之令天下小學以戊子代甲子為六旬首其七年春日中星見民訛言黃龍墮地死黃山宮中百姓奔走觀者萬數莽制禮作樂說六經公卿旦入暮出連年不決十一公分布勸農桑班令於天下中郎綉衣執法在郡國乘權勢更相奏舉案章交錯道中召會吏民逮補證左白黑紛亂貨賂相冒守宮闕告訴者甚眾莽自以專權得漢政故咸自㩜眾務常御燈火至明不能治有司受成苟免因緣為姦而已上書者連年不決縣宰郵者至數年兼領一切競為貪苛拘繫縣獄者至連年逢赦乃得出衛士不交代者數年冬以郡縣災害率減吏祿終不得祿者各因職為姦利以自給穀糴常貴百姓窮困起為賊盜邯鄲以北大雨水出流殺人其八年春二月大雨雪深者二丈柏竹咸枯死地震莽詔曰地者有動有震震者為害動者不害故易稱曰坤動而靜辟脅萬物萬物生焉其好自誣飾皆此類也長平觀西岸崩壅涇水涇水不流郡臣上壽以為土填水匈奴滅亡之兆也臣下從諛亦如之秋七月丁酉霸陵城災戊子晦日有蝕之翟義黨王孫慶捕得莽使大醫尚方巧屠共刳剝之量度五藏以竹挺尋脈知所終始云可以治病其九年瑯琊女子呂母為子報仇黨眾浸多至數萬人號曰赤眉莽親至南郊作威斗威斗者以五石銅為之形若北斗長二尺五寸欲以厭兵令有司命人負之其十年正月朔北軍南門災莽一切收長吏家財五分之四以助邊令吏得告將許奴告主欲禁姦姦愈甚樊崇刁子都等以饑餓相聚於瑯邪眾皆數萬其十一年令太史更推三萬六千歲歷紀六歲一改元布告天下時匈奴寇邊莽乃大募發丁男死罪囚吏民奴一切稅吏民皆三十取一傳募有伎術者待以不次之位上言便宜者以萬數矣或言能渡水不用舟楫連馬接車濟百萬之師或言不持斗儲食藥物馬不飢或言能飛一日千里莽輒試之取大鳥翮作翼頭與身皆著毛通引鐶鈕飛數百步輒墮莽知其不可用苟欲獲其名皆拜大將軍賜以車馬待詔發遣大司馬武建伯嚴尤與將軍廉丹擊匈奴皆賜姓王大凡十三部將四十萬眾齎三百日糧欲同時並出塞追匈奴內之丁零因分其地立呼韓邪十五子嚴尤諫曰匈奴為害久矣周秦漢皆征之然皆未得上策者周得中策漢得下策秦無策焉當周宣王之時玁狁內侵命將驅之盡境而反其視夷狄之侵譬猶蚊蚋之害驅之而已故天下稱明是為中策漢武帝選將練兵齎糧深入雖有剋獲之功胡輒報之兵連禍結四十餘年中國罷耗匈奴亦創艾而天下稱武是為下策始皇不忍小忿而輕民力恢長城之固延袤萬里輸轉之行起於負海疆場未定中國內竭以喪社稷是為無策今天下遭陽九之厄比年饑饉而北邊尤甚今發四十萬眾齎三百日之糧東據海岱南取江淮然後能備計其道理一年尚未集合兵先至者聚居暴露師老械朽勢不可用此一難也邊城空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日食用米十八斛非牛力不能勝牛又當自齎食加二十四斛重矣胡地沙鹵多乏水草以往事揆之軍出不滿百日牛必死盡且餘糧尚多人不能勝此三難也秋冬甚寒春夏則多風齎釜鑊薪炭重不可勝食糒飲水以歷四時師有疾疫之憂勢不能久此四難也輜重自隨則輕銳者少不得疾行虜徑遁逃勢不相及幸而逢虜則累輜重如遇險阻銜尾相隨虜邀遮前後危殆不測此五難也大用民力功不可必立臣伏憂之莽不聽又復引古者名將樂毅白起不用之意及諭邊事凡三篇及當出師庭議尤固爭之宜先憂山東莽怒策尤為庶人以董忠代之師久屯不行運轉不已天下搔動翼平連率田況奏言民貲不實莽復三十稅一以況忠言憂國進爵為伯眾皆罵之夙夜連率韓博上言有奇士巨母霸長一丈六尺大九圍來至臣府曰欲奮擊匈奴出於蓬萊東南五城西北軺車不能勝即以大車駟馬載霸詣闕願陛下作大甲高車賁育之衣遣大將軍一人虎賁百夫迎之於道京師門不容者開太高之欲以示百蠻意欲以諷莽莽聞而惡之留霸新豐更其姓曰巨母霸謂因文太后霸王符也博以非所宜言棄市其十二年大順時之令春夏斬人都市二月壬申月正黑七月大風毀玉露臺杜陵便殿乘虎文衣載在室匣中自出立於外堂上良久乃委地莽欲示萬世之基乃營長安城南隄封百頃以起九廟黃帝虞舜陳胡王齊敬王濟百閔王凡五廟不毀云濟南伯王元城孺王陽頃王新都顯王黃帝廟東西南北各四十丈高十七丈餘各半之金銀雕飾窮極工巧費用巨百萬卒徒死者以萬數鉅鹿馬適求舉燕兵以誅莽發覺誅死南郡張霸江夏羊牧王匡等起兵於綠林下江共皆萬餘人武功中水鄉民舍墊為池其十三年更州牧為監如刺吏莽子臨與莽侍婢通恐漏洩乃謀殺莽發覺自殺秋隕霜殺菽關東大饑莽問郡臣擒賊方略故左將軍公孫祿徵來與議祿曰太史令宗宣誣天文以凶為吉太傅唐遵飾虛偽以取名國師劉歆顛倒五經毀壞師法明學男張邯地理侯孫陽造井田使民棄業羲和唐匡設六管以勞工商說符侯崔發阿諛以取容令下情不得上通宜誅此數子以慰天下莽怒今虎賁扶祿出時民皆饑愁州縣不能慰安又不得擅發兵故盜賊浸多唯翼平連率田況發四萬人授以兵車與刻石為約赤眉聞之不敢入界況自劾奏莽切責況擅發兵赦罪詭以擒賊況自請出擊賊所向皆破莽使況領青徐二州牧況請無出大將選牧尹以下明其賞罰收合離散小國徙其老弱置大城中積穀并力固守賊攻城不得勢必不能聚所過乏食以此招之則降擊之則滅今出大將軍郡縣苦之乃甚於賊宜盡徵還乘傳使者以休息郡縣委任臣二州盜賊必平莽畏惡況陰為發代賜況書將代監其兵況隨使者還齊地遂敗其十四年閏月霸橋災數千人沃之不滅關東民相食蝗蟲蔽天自東來至長安入未央宮發吏民設購賞以捕之時下江兵盛新市朱鮪平林陳收皆復聚眾莽遣大將軍孔仁嚴尤陳茂擊之前州遣太師王匡更始將軍廉丹擊赤眉匡丹皆敗莽知天下潰叛乃分遣使除六管諸禁詔令民不便者皆收還之時世祖與伯升起兵與平林合攻棘陽十有二月有星孛於張箕其十五年二月辛巳劉聖公立為更始皇帝即世祖之族兄也莽遣大司徒王尋大司空王邑將兵號百萬擊更始二公兵敗於昆陽關東震恐道士西門君惠謂莽從兄王涉曰讖云漢復興劉秀為天子天子國師劉歆是也先是歆依讖改名秀涉以語大司馬董忠共語歆歆於天文人事東方必成歆亦怨殺其二子又畏大禍將至遂謀與忠劫莽東降忠等誅死歆涉以親近莽惡其人聞遂隱誅歆涉自殺莽師徒外破大臣內叛無所復信憂懣不能食性好小數但為厭勝之事遣人壞漢園陵罘罳云無使民復思漢如此類也崔發言國有大災則哭以厭之莽乃率群臣至南郊大哭告天下諸生小民旦夕會哭甚者除為吁嗟郎漢兵至遂發莽先人墳墓燒其棺槨焚其九廟火照城中十一月戊申朔漢兵入城城中人皆降避火前殿莽猶按式廻席隨斗柄而坐曰天生德於予漢兵其如予何庚戌乃昇漸臺執威斗抱符命群臣從者尚千餘人王邑兵盡乃還父子守莽下晡時兵眾上臺邑等戰死邑者成都王商之子也莽藏室中地隅間校尉公孫賓就斬莽頭軍人爭莽身支紛節解肌肉臠切遂傳首詔更始于宛孝平后曰何面目復見漢家遂投火而死后婉嫕有志操自劉氏廢稱疾不朝會莽欲改嫁之今立國將軍孫建子將醫問疾后大怒鞭其旁侍者發怒不起莽遂不敢逼之鍾武劉望聚眾汝南稱尊號嚴尤陳茂投之尤為大司馬茂為丞相十餘日望兵敗尤茂并死司命孔仁以兵降漢乃嘆曰吾聞食人食者死其事乃自刎死本傳曰王莽始起外戚折節力行以安名譽宗族稱孝朋友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者莽既不仁而有邪佞之材又乘四父歷世之權遭漢中微國統三絕而太后壽考為之宗主故得肆其姦慝而成篡奪之禍推此言之亦有天時非人力也及其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自謂唐虞復出乃始恣睢奮其威滔天虐民窮凶極惡毒被諸夏亂起蠻貊未足逞其欲焉故海內囂然喪其樂生之心內外怨恨遠近俱發城池不守支體分裂遂令天下城邑為墟丘壠發掘害徧生靈延及朽骨書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚也昔秦燔詩書以立私議莽誦六經以文姦言同歸殊塗俱用亡滅此皆亢龍之絕氣非命之運會紫色繩聲餘分閏位為聖王之驅除云爾王莽既敗天下雲擾大者建州郡小者據縣邑公孫述稱帝於蜀隗囂據隴擁眾收集英雄班彪在焉彪即成帝婕妤之弟之稚子也囂問彪曰往者周亡戰國並爭天下分裂數代然後始定昔者縱橫之事復起於今日乎將乘運迭興在一人也願先生論之論曰周廢興與漢稍異昔周立爵五等諸侯從政根本既微枝葉強大故其末流有縱橫之事其勢然也漢家承秦之制郡縣治民臣無百年之柄至於成帝假借外家哀平祚短國嗣三絕危自上起傷不及下故王氏之貴傾擅朝廷能竊其位不卹於人心是以即位之後天下莫不引領而嘆十餘年間中外騷動遠近俱發假號雲合咸稱劉氏不謀同辭方今豪傑帶州域者皆無七國世業之資詩云皇矣上帝臨下有赫監觀四方求民之瘼今民皆謳吟思漢鄉仰劉氏已可知矣囂曰先生之言周漢之勢可至於見愚人習識劉氏而謂漢家重興疏矣昔秦失其鹿劉氏逐而得之時民復知漢乎彪感其言又閔禍患之不息乃著王命論以救時難其辭曰昔在帝堯之禪曰咨爾舜天之曆數在爾躬舜亦以命禹暨於稷禼咸佐唐虞光濟四海奕世載德至於湯武而有天下雖遭遇異時而禪代不同至於應天順民其揆一也是故劉氏承堯之後氏族之世著於春秋唐據火德而漢運紹之始起豐沛神母夜號以彰赤帝之符由是言之帝王福祚必有明聖顯應之德豐功厚利積累之業然後精誠通於神明流澤加於生民故為神明所福饗天下所歸往未見亡命功德不紀而能崛起於此者也世俗見高祖起於布衣不達其故以為適曹暴亂得奮其劍遊說之士比於逐鹿捷者幸而得之不知神器有命不可以智力求也悲夫此世俗所以多亂臣賊子也若然豈徒晻於天道又不覩於人事也夫饑饉流離單寒道路思短褐之襲擔石之畜所願不過一金終於轉死溝壑何也則貧窮亦有命也況乎天子之貴四海之富神明之祚可得而妄處哉故雖遭罹阨會竊其權柄勇如信布強如梁籍成如王莽然卒就鼎鑊伏鑕烹煮分裂又況么麼不及數子哉而欲晻干天位者乎是駑蹇之乘不騁千里之塗燕雀之儔不奮六翮之用楶梲之材不荷棟梁之任斗屑之子不秉帝王之量易曰鼎折足覆公餗言不勝任也當秦之末豪傑並起共推陳嬰而欲王之嬰母止之曰自吾為汝家婦汝世貧賤卒得富貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項羽必亡知劉氏將興是歲陵為漢將獲於楚有漢使來陵母見之曰告吾子漢王長者必得天下爾謹順事之無有二心遂對漢使伏劍而死以固陵心其後果定漢陵為相封侯夫以匹婦之明猶能推事理之致探禍敗之機傳宗祀於無窮垂策書於春秋而況丈夫乎是故窮達有命吉凶由人嬰母知廢陵母知興審此四者帝王之分決矣蓋在高祖其興也有五一曰是堯舜之苗裔二曰體貌多奇異三曰神武有徵應四曰寬明而仁信五曰知人善任使加之以誠信好謀達於聽受見善如不及用人而由己從諫如順流趣時如響起當食吐哺納子房之策拔足揮洗揖酈生之說悟戍卒之言斷懷土之情高四皓之名割肌膚之愛舉韓信於行陣收陳平於亡命英雄陳力群策必舉此高祖之大略也所以成業焉若乃靈瑞符應又可略聞夫初劉媼妊高祖夢與神遇雷電晦冥有龍虵之怪及長而多靈有異於眾是以王媼武負感物而折劵呂公覩形而進女秦皇東遊以厭其氣呂后望雲而知其處始受命則白蛇分西入關則五星聚故淮陰留侯謂之天授非人力也歷古今之得失驗行事之成敗稽帝王之世運考五者之所謂趣舍不厭斯位符應不同斯慶而苟昧權利越次妄據外不量力內不知命則必喪保家之主失天年之壽遇折足之凶伏斧鑕之誅英雄誠知淵覺悟畏禍戒超然遠覽昭然深識收嬰陵之明分絕信布之覬覦距逐鹿之瞽說審神器之受授無貪不可幾者為二母之所笑則福祚流於子孫天祿永終矣彪知囂不寤乃避難於河西河西大將軍竇融訪問焉舉茂才為徐令彪子固字孟堅明帝時為郎據太史公司馬遷史記自高祖至於孝武大功臣紹其後事迄於孝平王莽之際著帝紀表志傳以為漢書凡百篇述其帝紀其辭曰皇矣漢祖纂堯之緒實天生德聰明神武秦人不綱網漏於楚爰茲發迹斷蛇奮旅神母告符朱旗乃舉越蹈秦郊嬰來稽首革命創制三章是紀應天順人五星同晷項氏畔奐絀我巴漢西土宅心戰士憤怨乘釁而起席卷三秦割據山河保此懷民股肱蕭曹社稷是經爪牙信布腹心良平恭行天罰赫赫明明述高紀孝惠短世高后稱制罔顧天顯呂宗以敗述惠紀太宗穆穆允恭玄默化民以躬率下以德農不供貢罪不收孥官不新館陵不崇基我德如風民應如草國富刑清登高漢道述文紀孝景蒞政諸侯方命克伐七國王室以定匪怠匪荒務在農桑著于甲令民用寧康述景紀世宗曄曄思弘祖業疇恣熙載髦俊並作厥作伊何百蠻是攘恢我疆宇外博四荒武功既抗乃迪斯文憲章六學統一聖真封禪郊祀祭秩百神協律改正享茲永年述武紀孝昭幼沖冢宰惟忠燕蓋譸張實叡實聰罪人斯得邦家和同述昭紀中宗明明夤用刑名時舉傅納聽斷惟精柔遠能邇燀燿威靈龍荒朔漠莫不來庭丕承祖烈尚於有成述宣紀孝元翼翼高明柔克賓禮故老優容亮直外割禁苑內損御服離官不衛山陵不邑閹尹之疪穢我明德述元紀孝成皇皇臨朝有光威儀之盛如珪如璋壼闈恣趙朝政在王炎炎燎火亦允不揚述成紀孝哀彬彬克㩜威神凋落洪枝顛倒鼎臣婉孌董公惟亮天功大過之困實橈實凶述哀紀孝平不造新都作宰不周不伊喪我四海述平紀凡漢有天下地東西萬九千三百二里南北萬二千三百六十八里隄封萬萬四千五百一十三萬六千四百五頃除邑居道路山林川澤郡國不可闢者定墾田八百二十七萬五百六十七頃郡國三事三十縣一千三百一十四道三十三侯國二事四十一戶千二十三萬三千六百一十二口五千六百五十九萬四千九百九十八人此在國家強盛之時凡漢紀其稱年本紀表志傳者書家本語也其稱論者臣悅所論粗表其大事以參得失以廣視聽也惟漢四百二十有六載皇帝撥亂反正統武興文永惟祖宗之洪業思光啟于萬嗣闡綜大猷命立國典以及群籍於是乃作考舊通連體要以述漢紀易稱多識前言往行以畜其德詩云古訓是式中興已前一時之事明主賢臣規模法則得失之軌亦足以監矣撰漢書百篇以綜往事庶幾來者亦有監乎此其辭曰茫茫上古結繩而治書契爰作典謨云備明德惟馨光於萬祀其在中葉實有陶唐丕顯伊則配天惟明蕩蕩厥猷有煥其章至于有周對日重光於赫大漢統辟元功穆穆惟祗二祖六宗明明皇帝纂承洪緒遭國閔凶困於荼蓼實天生德應運建主矯矯俊臣惟國作輔綏我思成有德思祐撥亂反正大建惟序武功既列迺贊斯文禮惟前軌命我小臣爰著典籍以立舊勳綜往昭來永監後昆侍中悅上王莽一萬字莽攝政三年即真十五年合十八年
