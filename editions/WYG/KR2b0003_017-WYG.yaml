body:
  text: 前漢紀卷十七漢荀悦撰孝宣一皇帝初生數月遭巫蠱事幽於郡邸獄廷尉監魯國邴吉字少卿治巫蠱事於郡邸獄憫曽孫之無辜擇女徒謹厚者使保養曽孫置閒燥處望氣者言長安獄中有天子氣於是武帝遣使者分條中都官獄中繫者欲盡殺之及使者至郡邸獄吉閉門拒使者曰皇孫在此他人無辜死猶不可况親曽孫乎使者自夕至明不入還以聞因劾奏吉武帝亦悟曰天使之然也赦天下郡邸獄巫蠱者亦不决曽孫拘繫五年吉私給衣食占視甚有厚恩後收養於掖庭掖庭令張賀嘗事衛太子奉養曽孫甚謹以私財供給之既壯為取㬥室嗇夫許廣漢女為妻因依廣漢兄弟及祖母家史氏受詩於東海澓中翁髙才好學足下有毛居止數有神光照耀每買餅所從買家輒大售亦以此自怪秋七月庚申徴入未央殿封武陽侯遂即皇帝位見於髙廟年十八八月己巳丞相楊敞薨九月大赦天下戊寅御史大夫蔡義為丞相年老短小兩吏扶夾乃能行衆庶咸曰大將軍茍用可専制者光聞之曰以為天子師宜為丞相何謂云云初義以詩授昭帝其人守學无咎而已戊辰左馮翊田廣明為御史大夫冬十有一月立皇后許氏羣臣方議所立上乃求微時故劒羣臣知其㫖乃奏立許媫妤為皇后父廣漢自以刑人不宜居位封為昌城君後封平恩侯皇太后歸長樂宫長樂宫初置屯衛本始元年春正月遣使者持節詔諸郡國謹牧養民以風徳化大將軍霍光稽首歸政上謙讓不聽遂委任焉事皆先聞光然後奏御益封光萬七千户賞賜黄金七千斤錢六千萬雜綵繒三萬匹奴婢百七十人馬三千匹甲第一區將軍張安世益封萬戸其餘各以次受封夏四月庚午地震五月鳳皇集膠東千乗赦天下賜吏民爵勿收田租賦六月詔曰故太子在湖未有謚號嵗時祀其議諡具置田邑有司奏請禮為人後者為人之子故降其父母不得祭尊祖之義也陛下為孝昭後承祖宗之祀制禮不踰閑臣愚以為親諡父宜曰悼考母曰悼后比諸侯國置奉邑三百户故皇太子曰戾園置奉邑三百家史良姊號曰戾夫人置守冡四十家園置長丞周衛奉守如法太子有妃有良姊有孺子凡三等子皆稱皇孫史良姊者魯國人也兄曰恭有三子曰髙曽𤣥後皆封列侯悼后王氏涿郡人兄曰無辜封平昌侯次曰武封樂昌侯賜外祖母號曰博平君食邑萬一千户追尊外祖父乃始為思成侯詔涿郡治冡置園邑四百家長丞奉守如法秋七月立燕刺王太子建為廣陽王廣陵王胥少子𢎞為髙密王廷尉史鉅鹿路温舒上書曰臣聞齊有無知之禍桓公以興晉有驪姬之難文公用霸近世趙王不終諸吕作亂而孝文為太宗由是觀之禍亂之作以開有徳也昭帝即世無嗣大臣憂懣昌邑即位淫亂而廢是乃皇天所以開至聖也夫繼變亂之後必有雋異之徳此聖人所以推天命也臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正受始之統蕩滌煩文除民疾苦存亡繼絶以應天意夫獄者天下之大命書曰與其殺不辜寧失不經今治獄之吏莫不利人之死上下相􅇌以刻為明深者獲功名平者多後患故治獄者皆欲人死非憎之也自安之道在人之死也夫人之情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾妄辭以示之吏治者利其然則指導以明之上奏畏卻則鍜鍊而周密内之葢奏者當成之時雖咎繇聽之猶以為死有餘罪何則文致之法明也語曰畫地為獄誓不入刻木為吏議不對此皆嫉吏悲痛之辭故曰天下之患莫甚於獄上善其言遷廣陽王私府長史後為臨淮太守治有異迹二年春大司農田延年有罪自殺延年齊人也以定策安社稷封陽城侯時官僦民牛車三萬乗載沙便橋下送置陵上車直錢一千延年詐増車直二千坐盗益三千萬御史大夫田廣明謂霍光曰春秋之義以功覆過當廢昌邑王時非田子賔大事莫成今縣官出三千萬錢與之何苦乎光曰然子賔實勇士當發大義時震動朝廷光因舉手撫心曰使我至今日病悸曉大司農通往就獄得與公卿議之延年曰幸得縣官寛我耳何面目入牢獄遂自刎而死夏四月詔有司議孝武廟樂六月庚午尊孝武廟曰世宗奏盛徳文始四時五行之舞凡武徳昭徳盛徳之舞所以尊祖宗也諸帝廟皆常奏文始四時五行之舞武帝巡狩所幸郡國皆立廟告祠祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢廟復有鴈五采集殿前西河郡立世宗廟有神光興於殿側又興於房中如鐙火狀廣川郡立世宗廟殿上有鐘音房户自開夜有光殿上盡明初議立世宗廟長信少府夏侯勝以為武帝多殺士衆竭民財力奢侈無度不宜立廟勝坐毁謗詔書毁先帝不道及丞相長史黄霸阿不舉劾皆下獄久繫霸欲從勝受業勝辭死罪霸曰朝聞道夕死可矣勝賢其言遂授霸尚書繫更再冬講不怠㑹赦勝出為諫議大夫給事中薦霸揚州刺史霸字次公淮陽人勝字長公夏侯始昌之族子勝為人質朴無威儀見上時誤謂上為君或自稱字上前上更以是親信之嘗見出道上語上聞而讓之勝曰陛下言善臣故揚之堯言布於天下至今誦之臣以可𫝊故耳朝廷每有大議上謂勝曰先生通正言無懲前事初皇太后聽政霍光奏令太后從勝受尚書及勝卒太后縞素五日儒者以為榮三年春正月癸亥皇后許氏崩初霍光夫人顯有小女欲貴皇后當産疾顯隂使醫淳于衍行毒藥後有人上書告諸醫治疾無狀者皆收繫顯恐急具狀諮光因曰既已失計為之無令吏急衍光驚愕黙然後奏上置衍勿論事不發覺夏大旱五月御史大夫田廣明為祁連將軍與蒲類將軍趙充國虎牙將軍田順度遼將軍范明友前將軍韓增凡兵十五萬與校尉常惠持節䕶烏孫兵並擊匈奴初匈奴數侵邊又西伐烏孫武帝欲與烏孫共擊匈奴故以江都王建女細君為公主妻烏孫昆彌昆彌以馬千匹為聘禮漢為公主備屬官内官侍御數百人公主自為宫室居嵗時與昆彌飲食言語不通公主悲愁上聞而憐之間嵗遣使者遺之甚厚細君卒復以楚王戊之孫女解愁為公主以繼之於是匈奴復侵烏孫昆彌昆彌與公主上書請共擊匈奴烏孫自將五萬騎常惠與烏孫獲匈奴父行與㛮名王都尉已下四萬餘級牛馬駱駝七十餘萬頭烏孫皆自取其虜獲時匈奴聞漢大出兵皆將老弱驅畜産逺遁逃故漢軍所得少而祁連將軍虎牙將軍有罪皆自殺常惠封長羅侯匈奴由是人民畜産死亡者衆而國虚耗矣其冬單于自將擊烏孫㑹天大雨雪一日深一丈餘匈奴人民畜産凍死還者十無一二於是丁零乗弱攻其北烏丸入其東烏孫入其西又重以饑餓死者十三匈奴大困諸國羈屬者皆瓦解攻盗不能治匈奴遂弱矣六月乙丑丞相蔡義薨甲辰長信少府韋賢為丞相大司農魏相為御史大夫四年春正月遣使賑貧民減大官損膳省宰樂府減樂人三月乙亥立皇后霍氏光女也賜丞相已下至郎吏金帛各有差赦天下夏四月壬寅郡國四十九地震或山崩泉出宗廟隳落上素服避正殿五日大赦鳳皇集北海安丘秋廣川王去有罪廢徙上庸自殺去者惠王越之孫初事師受易師數諫正之去後以師為内史掾師數使内史禁切王家欲以禮正之去怒隂使人殺師父子不發覺其後用幸姬昭信等之讒殺姬昭平等二人恐語泄復殺婢三人昭信又曰夢見昭平等去曰虜乃敢復見不畏我邪掘尸皆燒之為灰後立昭信為后又隂譖幸姬陶望卿疑與郎吏有私去即祼望卿令諸姬各持燒鐵共灼之望卿走投井未死割其脣鼻斷其舌昭信與去共支解之置大鑊中又取桃灰毒藥并煮之連日復殺其女弟都後去數召姬榮愛與之飲酒昭信讒之投井中出之未死燒刀灼潰兩眼生割兩股銷鉛錫灌口中愛死支解以棘埋之諸得幸者昭信見讒殺凡十四人皆埋宫中昭信又謂去曰諸姬淫佚難禁請閉諸舎門無令得妄出入使其大婢為僕射主外永巷盡閉封諸舎門上鑰於王后王后置酒乃召見昭信與去從十餘婢𫝊歌游戲望卿母求二女尸昭信令奴殺之後捕奴得辭伏狀内史相劾狀奏之有司請捕誅去上不忍致法廢徙之蜀昭信棄市地節元年春正月有星孛於西方太白二丈本志云太白為天之將軍彗孛加之埽滅之象也三月假郡國貧民田夏六月詔宗室屬籍未盡而罪絶者復屬使得自新冬十有一月楚王延夀謀反自殺十有二月癸亥晦日有食之二年春正月庚午大司馬將軍霍光疾病上自臨問為之涕泣及薨皇太后親自臨喪太中大夫御史持節䕶喪事中二千石治幕府墓冡上賜金錢繒絮繡被百領衣五十篋璧玉珠璣玉衣梓棺便房黄腸題湊各一具樅木外藏椁一十五具東園温明祕器皆如乗輿制度載光柩以輼輬車黄屋左纛發材官輕車北軍五校士軍陳至茂陵以送𦵏諡曰宣成侯疇其爵邑復其後世如蕭相國子禹嗣為左將軍復使光兄子雲為侍中奉車都尉雲弟樂平侯山領尚書事示不専政以優崇霍氏也夏四月戊辰立皇太子大赦天下霍光既薨光夫人顯改光生時所造塋制而更奢大之起三出闕築神道北臨昭靈南出承恩盛飾輦道通屬永巷而幽良人婢妾以守之廣治第舎作乗輿駕輦加畫繡茵馮黄金塗韋絮薦輪侍婢以五綵絲輓顯於第中游戲與光所幸監奴馮子都淫而禹山等繕治第宅走馬馳逐及山兄冠軍侯雲當朝謁數稱疾私出遊獵或遣蒼頭代朝謁莫敢譴者而顯及諸女晝夜出入長信宫殿中無度及上立太子顯怒不飲食歐血三日曰此乃民間子安得立后有子反當為王邪後教皇后鴆太子皇后數召太子賜食阿保必先嘗之后挾毒藥不得行霍氏與御史大夫家爭道欲蹋大夫門御史叩頭謝奴乃去其放縱如此御史大夫魏相上書言霍氏驕奢恐浸大不可得制宜少損奪其盛權以固萬世之基全功臣之後又故事上書皆有二封其一封錄尚書事者當先發所言不善輒不奏相復白去副封以防壅塞上善之詔相給事中相字弱翁濟隂人也於是上親政事羣臣得以徑奏封事上五日一聽朝丞相以下各依職奏事采納其言考試功能侍中尚書雖功勞當遷輒厚加賞賜不數改易樞機周密品式具備是以上下相安莫有茍且之意及拜刺史郡守輔相輒親見問觀其所由進而考察其行以質其言有名實不相應者必知其所以然上嘗曰庶民所以安於田里而無怨恨太息之心者政平訟理也與我共此者其惟良二千石乎以為長吏者民之本也數變易則下不安民知其上久不敢欺罔則民從化故二千石不可數遷徙有治理之效者輒璽書勉勵増秩賜金或爵至闗内侯公卿缺輒選所長而遷次用之故民安其土吏勸其業矣時頗修武帝故事宫室車服盛於昭帝時任用能吏諫議大夫王吉上書曰今世俗吏治民者非有禮義仁信科指可世世通行者也徒設刑以守之欲以為治者不知其所由意以為穿鑿各取一切是以百里不同風千里不同俗國異政人殊俗詐偽萌生刑罰無極質朴日消恩愛浸薄孔子曰安上治民莫善於禮非虚語也願陛下承天心發大義與大臣公卿延及儒生述禮樂明王制驅一世之民致於仁夀之域則治何以不若成康夀何以不若髙宗竊見當世趨務不合於道者謹以條奏吉又以世俗嫁娶太早未知為人父母之道而有子是以教化不明而人多夭聘妻送女無節則貧人恥不相及故有不舉子者又得任子弟為官失舉賢之義又漢家列侯尚公主諸侯則國人承翁主使男事女夫屈於婦逆隂陽之位皆宜改正時上不納吉言乃謝病歸荀悦曰尚公主之制人道之大倫也昔堯釐降二女於媯汭嬪於虞易曰帝乙歸妹以祉元吉春秋稱王姬歸於齊古之達禮也男替女凌則淫暴之變生矣禮自上降則昬亂於下者衆矣三綱之首可不慎乎夫成大化者必稽古立中務以正其本也凡吉所言古之道也三年春正月詔曰膠東相王成勞來不怠流民自至者八萬餘口治有異等其秩成中二千石賜爵闗内侯夏四月戊辰車騎將軍光禄勲張安世為大司馬車騎將軍如故京師大雨雹大行治禮丞蕭望之上疏願口陳災異上在民間時素聞蕭長倩名曰此東海蕭生邪問其狀對曰春秋魯昭公三年大雨雹是時季孫専權卒逐昭公向使魯公察其變宜無此害附枝大者敗本心私家盛者公室危陛下以聖徳居位思政求賢此堯舜之用心也然祥瑞未臻隂陽不和是大臣任政一姓専權之所致也惟明主親萬機舉賢良以為腹心公道立則姦邪塞姦邪塞則私權廢矣對奏拜望之為謁者是時招賢良納直言多上書言便宜者輒下望之問狀或用或罷所獻奏皆可望之遷諫議大夫丞相司直嵗中三遷初霍光秉政長史邴吉薦王仲翁與望之等數人時吏民見光者皆露索去刀兵兩吏挾持之望之獨不聽自引出閤光令吏勿持既見責曰將軍輔翼㓜君將流大化是以天下之士延頸企踵爭願自效今士見者皆露索挾持恐非周公輔相成王之禮致白屋之意也於是光獨不用望之而仲翁等皆補大將軍史二嵗間仲翁至光禄大夫給事中而望之以對策甲科為郎署小苑東門長仲翁出從𫝊呼甚寵顧謂望之曰不肯碌碌反抱闗木望之曰各從其志望之復失郎至是乃得用焉是時光兄子中郎將冠軍侯雲樂平侯山皆以過就第山陽太守張敞上書曰臣聞公子季友有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其官位延及子孫後田氏簒齊趙氏分晉季氏専魯仲尼作春秋迹盛衰譏世卿尤甚今朝臣皆明言陛下襃寵大將軍以報功徳足矣宜罷王侯皆就國明詔以恩徳不聽羣臣以義固爭之久而後許之天下必以陛下為不忘功徳而以朝臣為知禮今朝廷不聞直聲而令明詔自親其文非策之得者也今兩侯已出人情不能相逺也以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也上善其言五月甲申丞相韋賢以老病錫金鞍車駟馬薨於家子𢎞為太常丞賢以𢎞當為嗣太常職當陵廟煩劇多過敇令自免𢎞懷讓不去官及賢病篤𢎞坐宗廟事繫獄未决室家問賢當為後者賢恚恨不肯言於是門下生與賢宗家計議共矯賢令使家丞上書言大行以小子河南都尉𤣥成為後𤣥成聞當嗣即徉狂驗不得已乃受封爵上髙其行以𤣥成為河南太守𢎞為大都尉遷為東海太守後𤣥成為列侯侍祠孝惠廟雨淖不駕駟馬車而騎馬至廟下削爵為闗内侯𤣥成自傷貶父爵乃為詩自責曰惟我小子不肅㑹同媠彼輿服黜此附庸赫赫顯爵自我墜之微微附庸自我招之誰為忍愧寄之我顔孰將遐征從之夷蠻於赫三事匪俊匪作於蔑小子終焉其度誰謂華髙跂其齊而誰謂徳廣厲其庶而嗟我小子不貳其尤墜彼令爵申此擇辭四方羣后我監我視威儀輿服唯肅是履六月壬申御史大夫魏相為丞相太子太傅邴吉為御史大夫少傅東海疎廣字仲翁為太子太傅平恩侯許伯為太子少傅以太子尚㓜伯欲使其弟舜監護太子家事上以問廣廣對曰太子國儲副君官屬師友必取天下英俊不宜獨親外家且太子有太傅有少傅官屬已備今復取舜監䕶家事非所以廣太子徳於天下也上善其言而止廣兄子受為太子家令亦恭謹而好禮上幸太子宫受迎謁應對及置酒侍宴奉觴上夀辭禮間雅上甚歡悦頃之拜受為少傅父子並為師傅每朝太傅在前少傅在後朝廷以為榮九月壬辰地震冬十月詔舉方正直言極諫之士罷車騎將軍右將軍屯兵詔池苑未幸御者假與貧民郡國宫館勿修治流民還鄉者假公田貸種食且勿算事十有一月詔郡國舉孝弟有行義者各一人十有二月初置廷尉平四人秩六百石諫議大夫鄭昌上疏言今明主躬垂明聽雖不置廷尉平獄將自正若開後嗣不若刪定律令律令一定愚民知其所避畏姦吏無所㺯權柄今不正其本而救其末世衰法則廷尉平招權而為亂首矣省汶山郡并蜀郡前漢紀卷十七
