body:
  text: 前漢紀卷二十三漢荀恱撰孝元三二年春正月行幸甘泉郊泰畤三月行幸河東祠后土益三河郡太守秩中二千石户十二萬為大郡夏四月赦天下六月立皇子興為信都王興母媫妤為昭儀閏月丁酉太皇太后上官氏崩冬十有一月齊楚地震大雨雪深五尺樹折屋壞魏郡太守京房棄市房字君明東郡人也為郎中以言災異屢中上親幸房嘗宴見問上曰幽厲之君何以危所任何人也上曰君不明也而任巧佞房曰知其巧佞而任之邪將以為賢也上曰賢之房曰今何以驗其不賢上曰以其時亂君危而知之房曰齊桓公秦二世亦嘗聞二君而非笑之時任竪刁易牙趙髙治政日亂何不以幽厲卜之而覺悟乎上曰惟有道者能以往知來耳臨亂之君各賢其臣令皆覺悟安得危亡房因免冠頓首曰春秋紀二百四十二年災異以示萬世之君今陛下即位以來災異並出人民飢饉盜賊不禁視今為治邪亂邪所任者誰與房旨謂石顯上亦知之曰然幸其愈於彼又以為不在此人房曰夫前世之君亦皆然矣臣恐後之視今猶今之視昔也是時房奏考功課吏法上令房上弟子曉考功者欲試用之房薦上弟子姚平任良願以為刺史臣得通籍殿中為奏事以防擁隔石顯等進言用弟子不若師上欲以房為刺史顯等知刺史當得徑奏事因言為刺史恐太守不與同心宜以為郡守房自請歲盡得乗傳奏事上許之房既拜上封事曰辛酉以來䝉氣衰去太陽清明臣獨欣然以為陛下有所定也然少隂倍力而乗消息臣疑陛下猶不得如意臣出之後恐為執事者所蔽身死而功不成及辛巳䝉氣復乗太陽侵色此上大夫侵陽之氣而上意疑也己夘庚辰之閒必有隔絶臣令不得乗傳奏事者房未發顯果白詔止房無乗傳奏事房至新豐復上奏曰臣以六月言遯卦不效法曰道人始去寒涌水為災至七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也今涌水出道人當逐死尚復何言臣獨謂曰陛下與臣尤厚雖死臣猶言也平又謂曰房可謂小忠未可謂大忠也昔秦之時趙髙用事有正先者非刺髙而死髙威自此而成故秦之亂也正先趣之也今臣守郡竊恐未效而死惟陛下無使臣塞涌水之災異當正先之必死為姚平所笑房至陜復上封事曰乃者丙戌小雨丁亥蒙衰去然少隂并力而乗消息戊子益盛至壬辰五十分霧氣復起此消息欲正雜卦之黨并力而爭安危之機不可不察己丑有還風盡辛夘而太陽復侵色至癸巳日月相薄此邪隂用事而太陽為之疑也臣去朝稍逺太陽侵奪願陛下察焉房去月餘竟徵下獄房妻父張博淮陽王之舅也欲為淮陽王求入朝謂房曰淮陽王入朝可以為助因使房為淮陽王求入朝奏章又房為上道幽厲之事出對御史大夫鄭𢎞道之顯告房張博誹謗朝廷詿誤諸侯闚導以邪意漏泄省中語博腰斬房棄市時年三十一房治易事梁人焦贑贑為外黄令以伺候先知姦邪盜賊不得𤼵嘗曰得我道以亡身者京生其説長於災變分為六十四卦更直日用事有占驗焉鄭𢎞坐與房言免光祿勲匡衡為御史大夫三年夏令三輔都尉及大郡都尉秩皆二千石六月甲辰丞相韋𤣥成薨秋七月御史大夫匡衡為丞相戊辰衛尉李延夀為御史大夫副校尉甘延夀陳湯矯制𤼵戊巳校尉屯田吏士及西域羌胡兵攻郅支單于冬斬郅支首傳詣京師時郅支彊暴東擊烏孫西脅大宛諸國漢遣使三軰至康居求谷吉等尸郅支不肯奉詔而困辱漢使上書驕慢曰康居困危已乆願歸彊漢於是湯與延夀等謀曰郅支單于威名逺震陵烏孫脅大宛欲降伏康居如得此三國北擊伊婁西取安息南排月支數月之間城郭諸國危矣郅支分離所在絶逺無城郭彊弩之守如𤼵兵直詣城下彼亡則無所之守則不足以自保千載之功可一朝而定延夀以為然欲奏請之湯曰國家與公卿議大䇿非衆所見事必不從㑹延夀乆病湯獨矯制𤼵諸國兵延夀聞之起大驚欲止之湯按劍叱延夀曰大衆己集豎子欲沮吾衆邪延夀遂從漢兵合四萬餘人延夀湯上疏自劾奏矯制陳言形勢兵狀即引兵分為六校尉其三校尉從南道逾葱領經大宛其三校尉從北道入赤谷過烏孫經康居康居萬餘騎救之數奔營不利輒却漢兵遂燒木城城中人皆入土城漢兵四面推櫓楯竝入土城單于被創死得漢使節及谷吉等所賫帛書凡斬閼氏太子名王以下千五百級生虜百四十五人降虜五千餘人上議其功丞相匡衡大夫李延夀及石顯皆以為延夀湯擅興師矯制幸得不誅不宜加爵土又遣吏訊驗湯私盜金事皆不與湯故宗正劉向上疏曰郅支單于殺漢使吏士以百數事暴於外國傷威毁重陛下赫然欲討之意未嘗忘延夀湯承聖㫖倚神靈總百蠻之軍攬城郭之兵出萬死之計入絶域之地遂陷康居屠三重城搴歙侯之旗斬郅支之首懸旌萬里之外揚威崑山之西而掃谷吉之恥立昭明之功蠻夷率服稽首來賔羣臣之功莫有大焉昔周大夫方叔尹吉甫為宣王誅玁狁而百蠻從之其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威易曰有嘉折首獲匪其醜今延夀湯所誅威振天下雖易之折首詩之雷霆不能及也吉甫之歸周厚賜之其詩曰吉甫燕喜既多受祉來歸自鎬我行永乆千里之鎬猶以為逺況萬里之外齊桓先有匡周之功後有滅項之罪君子計功補過近事貳師李廣利損五萬之衆糜億萬之費經四年之勞而厪獲駿馬四十匹雖獲宛王之首不足復費而私罪甚衆孝武以為萬里之伐不録其過厚加封賞今康居之國盛於大宛郅支之號重於宛王殺漢使甚於留馬延夀湯不煩漢使不費斗儲比於貳師功徳相百倍且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆列土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則髙於長羅安逺大功未著小惡數布臣竊痛之上於是赦湯等矯制貪穢小罪封延夀為宜城侯湯為關内侯食邑各三百户延夀為長水校尉湯為射聲校尉延夀北地人也本為羽林士超逾羽林亭樓以材力進湯字子公山陽人也家貧無行初富平侯張敞舉湯為茂才湯待遷父死不奔喪坐下獄論敞舉非其人削户二百㑹敞薨諡曰謬侯湯立功西域世以為張敞知人初宣帝時前將軍韓増舉馮奉世以為衞候使持節送大宛諸國客時莎車王與諸國共殺漢所置莎車王萬年并殺漢使者奚充國匈奴發兵攻車師城不能下而莎車遣使揚言曰北道諸國已降匈奴於是攻劫南道與之盟而背漢鄯善以西皆絶不通奉世以莎車日彊其勢難制必危西域乃矯以節告諭諸國王各發其兵合萬五千人追擊莎車莎車王自殺傳其首詣長安諸國遂平威振西域宣帝謂韓増曰賀將軍舉得人也議封奉世以為侯丞相將軍皆曰大夫出彊有可以安國家定社稷專之可也宜加爵位少府蕭望之以為奉使有所指而擅矯制違命今封奉世闗内侯後奉使者競逐利要功夷狄漸為國家生事不可長也宣帝從望之議及甘延夀之封也杜延年子欽上疏追訟奉世前功曰比罪則郅支薄量功則莎車衆用師則奉世寡制勝則奉世於邊境為功多慮危則延夀於國家為禍深其違命生事則與奉世同延夀割地而封奉世獨不見録臣聞功同賞異則勞臣疑罪均刑别則百姓惑願陛下下有司議之上為前世事不録荀悦曰核其功義足封追録前可也春秋之義毁泉臺則惡之舍中軍則善之各由其宜也夫矯制之事先王之所慎也不得已而行之若矯大而功小者罪之可也矯小而功大者賞之可也功過相敵如斯而已可也權其輕重而為之制宜焉四年春正月以討郅支單于功告祠郊廟赦天下夏六月甲申中山王竟薨藍田地沙石擁灞水安陵岸崩壅涇水涇水逆流五年春二月赦天下賜民爵一級女子百户牛酒三老孝弟力田鰥寡孤獨帛夏六月庚申復戾后園壬申晦日有食之秋七月庚子復太上皇寢廟園原廟昭靈后武哀王衛思后昭哀后廟園上寢疾夢祖宗譴罷郡國廟園上少弟楚孝王亦夢焉上召問丞相匡衡議欲復衡言不可衡乃禱髙祖孝文孝景廟陳言禮正咎在臣衡當受其咎皇帝宜䝉福祐盡禱諸廟上疾乆不平皆復修舊祀如故山陽社中大槐樹吏民伐斷之其夜樹自復立故處竟寧元年春正月匈奴呼韓邪單于來朝單于請妻漢女以自請賜單于待詔掖庭王嬙字昭君為閼氏單于上書願保塞請罷邊備塞上下有司議皆以為便郎中令侯應以為不可許上詰問狀對曰臣聞北邊塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冐頓單于依阻其中治作弓矢是苑囿也至孝武出師征伐斥奪其地攘之於漠北建塞徼起亭隧築外城而設屯戌以守之然後邊境得少安漠北地平少草木多大砂匈奴來寇抄無所藏隠從塞以南徑深山大谷往來差難邊境長老言匈奴失隂山後過之無不哭如罷備邊戍卒示夷狄之大利不可一也今聖徳廣被單于稽首來臣夫夷狄之情困則卑辱彊則驕逆天性然也前以罷外城省亭隧今纔足候望通烽火而已古者安不忘危不可復罷二也中國有義禮之則刑罰之禁愚民猶犯禁又況單于能必其衆不犯約哉三也自中國尚設闗梁以制諸侯所以絶臣下之覬覦也設塞徼置屯戍非獨為單于而已亦為諸屬國降民本故匈奴之人恐其思舊逃亡四也近西羌保塞與漢交通吏民貪利侵盜其畜産妻子以此怨恨起而背叛世世不絶今罷乗塞則生慢易忿爭之漸五也往者從軍多沒不還者其子孫貧困一旦走出從其親戚六也又邊人奴婢怨苦欲走者多自知匈奴中樂無奈邊候急切然時有出塞者七也盜賊桀黠羣輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落谿谷水門稍稍平之徒卒築治費功乆逺不可勝計臣恐議者不深慮其始終欲以一切息徭役十年之後百年之内卒有他變障塞敗壞亭戍滅絶當𤼵戍屯治繕累世之功不可卒就九也若罷戍卒省候望單于自以保塞守衛必深德漢請求無已小失其意則不可測開夷狄之隙以虧中國之固十也非所以永持至安威制百蠻之長䇿上乃使車騎將軍口喻單于曰中國亦有闗梁非徒以備外亦以防中國之姦邪放縱出為寇害故為制度以専衆心遂不罷塞焉皇太子冠初定陶恭王有才藝曉音樂而太子頗有酒色之失王皇后無寵上有意欲立定陶王為太子數稱其才樂陵侯史丹者悼皇后之兄史恭之孫為侍中護太子家於是丹進曰所謂才者敏而好學温故知新皇太子是也若乃器人於絲竹鼓鼙之間是則陳惠李微髙於匡衡可為相國也於是上黙而笑後上疾甚數問景帝時立膠東王故事丹涕泣因以死爭之上亦以太子先帝所愛卒不易二月御史大夫李延夀卒三月丙寅太子太傅張譚為御史大夫癸未復孝惠寢廟園孝文太后孝昭太后寢廟園等夏五月壬辰帝崩于未央宫匡衡復奏言前以上體不平故復諸祀卒不䝉福請悉罷於是毁太上皇孝惠孝景帝廟罷孝昭太后昭靈太后武哀王昭哀后寢廟園丞相御史大夫奏石顯及其黨皆免官顯徙居故鄉濟南憂懣不食道病死顯之歸也留其器物什數百萬以與故所厚萬章章不受曰石氏之禍萬氏反當為福邪章者長安大俠為京兆尹門下督嘗從至殿中侍中諸貴人爭趨揖章莫與京兆尹言者後京兆尹不復從章章既游俠亦得顯力及王遵為京兆尹誅豪桀乃殺章荀悦曰自漢興以來至於兹祖宗之治迹可得而觀也髙祖開建大業首闢元功度量規矩不可尚也時天下初定庶事草創故韶夏之音未有聞焉孝文皇帝克己復禮躬行𤣥黙遂至昇平而刑罰幾措時稱古典未能悉備制度𤣥雅禮樂之風闕焉故太平之功不興孝武皇帝規恢萬世之業安固後嗣之基内修文學外耀武威延天下之士濟濟盈朝興事創制無所不施先王之風燦然復存矣然猶好其文不盡其實發其始不要其終奢侈無限窮兵極武百姓空竭萬民疲敝當此之時天下騷動海内無聊而孝文之業衰矣孝宣皇帝任法審刑綜核名實聴斷精明事業修理下無隠情是以功光前世號為中宗然不甚用儒術從諌如流下善齊肅賓禮舊老優容寛直其仁心文徳足以為賢主矣而佞臣石顯用事隳其大業明不照姦決不斷惡豈不惜哉昔齊桓公任管仲以霸任豎刁以亂一人之身惟所措之夫萬事之情常立於得失之原治亂榮辱之機可不慎哉楊朱哭多岐墨翟悲素絲傷其本同而末殊孔子曰逺佞人詩云取彼讒人投畀豺虎疾之深也若夫石顯可以痛心泣血矣豈不疾之哉初宣帝任刑法元帝諫曰陛下宜用儒術宣帝不聴乃歎曰亂我家者必太子也故凡世之論政治者或稱教化或稱刑法或言先教而後刑或言先刑而後教或言教化宜詳或曰教化宜簡或曰刑法宜略或曰刑法宜輕或曰宜重皆引為政之一方未究治體之終始聖人之大徳也聖人之道必則天地制之以五行以通其變是以博而不泥夫徳刑並行天地常道也先王之道上教化而下刑法右文徳而左武功此其義也或先教化或先刑法所遇然也撥亂抑彊則先刑法扶弱綏新則先教化安平之世則刑教並用大亂無教大治無刑亂之無教勢不行也治之無刑時不用也教初必簡刑始必略則其漸也教化之隆莫不興行然後責備刑法之定莫不避罪然後求密未可以備謂之虐教未可以密謂之峻刑虐教傷化峻刑害民君子弗由也設必違之教不量民力之未能是陷民於惡也故謂之傷化設必犯之法不度民情之不堪是陷民於罪也故謂之害民莫不興行則毫毛之善可得而勸也然後教備莫不避罪則纖芥之惡可得而禁也然後刑密故孔子曰不莊以涖之則民不敬也莊以涖之動之不以禮未善也是言禮刑之並施也吾末如之何言教之不行也可以勝殘去殺矣言刑之不用也周禮曰治新國用輕典略其初也春秋之義貶纎芥之惡備至密也孔子曰行有餘力則可以學文簡於始也繪事後素成有終也夫通於天人之理達於變化之數故能達於道故聖人則天賢者法地考之天道參之典經然後軌於正矣讚曰本紀稱孝元皇帝多才藝善史書鼓琴吹洞簫自度聲曲分别節度窮極要妙少好儒術及即位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優㳺不斷然寛𢎞盡下出於恭儉號令温雅有古人之風烈前漢紀卷二十三
