body:
  text: 前漢孝文皇帝紀下卷第八十年冬上行幸甘泉將軍薄昭有罪自殺張釋之為郎十年不得調用欲歸袁盎賢之言於上以為謁者僕射上幸上林苑釋之從登虎圈上問上林尉禽獸簿尉不能對虎圈嗇夫代尉對響應無窮上曰為吏不當如此邪詔釋之拜嗇夫欲為上林令釋之進曰陛下以周勃張相如何如人上曰長者也釋之曰此兩人稱為長者言事曾未出口豈若嗇夫喋喋利口捷給哉且秦任刀筆吏爭以苛察相高故政陵遲至於土崩今以嗇夫口辯而超遷之臣恐天下隨風而爭口辯無實上之化下疾於影響舉錯不可不察上曰善乃止拜釋之為公車令時梁王來朝與太子共載入朝不下司馬門釋之禁止不得入朝劾奏不敬上乃免冠謝太后曰教兒子不謹太后使使承詔赦太子及梁王乃得入朝後為中郎將從上至霸陵上望北山悽然傷懷謂群臣曰嗟乎以北山石為椁用紵絮斮漆其堅豈可動哉左右皆曰善釋之進曰使其中有可欲雖錮南山猶可隙使其中無可欲者雖無石椁又何戚焉上稱善十一年冬十有一月上行幸代春正月上至自代夏六月梁王楫薨無子國除楫上之少子也好讀書上愛之故以賈誼為傅王墮馬薨誼自傷為傅無狀旦暮哭泣歲餘亦卒誼時年三十初河南太守吳公以誼為門下吏吳公以治郡第一徵入為廷尉薦誼為博士至太中大夫時年二十餘表陳政事建立制度上以誼才任公卿絳侯灌嬰等害之上乃䟽之後誼為長沙王太傅誼過湘水作賦以辭弔屈原為傅數年上復思誼乃徵之上方坐宣室感鬼神事與誼言至半夜移席就之既罷上曰吾久不見賈生自謂勝之今見不如也以為梁王太傅賈誼謂漢土德所著述凡五十八篇匈奴寇邊狄道十二年冬十有二月河決東郡酸棗潰金堤春正月賜諸侯王女邑各二千戶二月出孝惠後宮美人令得嫁三月詔曰孝弟天下之大順也力田為生民之本也三老眾民之師也廉直吏民之所表也朕甚嘉此二三大夫之行其遣謁者勞賜各有差及問民所疾苦是歲吳有馬生角在耳前上向右長三寸半左角長二寸半圍皆二寸本志以為吳後舉兵為逆之象也十三年夏除祕祝之官詔曰祕祝之官祕過於下朕弗取其除之名山大川其在諸侯封內各有自奉祠天子之官不領齊及濟南國廢令太祝歲時至祠夏五月詔除肉刑時齊太倉令淳于公有罪當刑淳于公有女五人無男嘗罵其女曰生女不生男緩急無有益小女緹縈自傷泣乃隨父到長安上書曰妾父為吏齊國皆稱廉平今坐法當刑妾聞夫死者不可復生刑者不可復贖雖欲改過自新其道無由妾願沒身為官奴以贖父刑使得自新天子悲憐其意遂下令曰夫訓導不純而愚民陷焉或欲改行為善其道無由也夫刑者至斷支體刻肌膚終身不復何其刑之痛而不得理也其除肉刑有以易之遂改定律六月詔除民田租荀悅曰古者什一而稅以為天下之中正也今漢民或百一而稅可謂鮮矣然豪強富人占田逾侈輸其賦太半官收百一之稅民收太半之賦官家之惠優於三代豪強之暴酷於亡秦是上惠不通威福分於豪強也今不正其本而務除租稅適足以資富強夫土地者天下之本也春秋之義諸侯不得專封大夫不得專地今豪民占田或至數百千頃富過王侯是自專封也買賣由己是自專地也孝武時董仲舒嘗言宜限民占田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施行然三十頃有不平矣且夫井田之制宜於民眾之時地廣民稀勿為可也然欲廢之於寡立之於眾土地既富列在豪強卒而規之並有怨心則生紛亂制度難行由是觀之若高帝初定天下及光武中興之後民人稀少立之易矣就未悉備井田之法宜以口數占田為立科限民得耕種不得買賣以贍民弱以防兼并且為制度張本不亦宜乎雖古今異制損益隨時然紀綱大略其致一也本志曰古者建步立畝六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之一夫一婦受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍出入相交佇望相接疾病相救民受田上田夫百畝中田夫二百畝下田夫三百畝歲更之換易其處其家眾男為餘夫亦以口受田如此士工商家受田五口乃當農夫一人有賦有稅稅謂公田什一及工商衡虞之人也賦謂供車馬兵士徒之役也民年二十受田六十歸田種穀必雜五種以備災害田中不得有樹以妨五穀力耕數芸收獲如寇盜之至還廬種桑菜茹有畦瓜瓠果蓏殖於疆畔鷄豚狗豕無失其時女修蠶織五十則可以衣帛七十可以食肉五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉萬二千五百戶比長位下士自此已上稍登一級至鄉為卿矣於是閭有序而鄉有庠序以明教庠以行禮而視化焉春令民畢出於野其詩云同我婦子饁彼南畝田畯至喜則冬畢入於邑其詩云嗟我父子曰為改歲入此室處春則出民閭首平旦坐於右壟比長坐於左壟畢出而後歸夕亦如之入者必持薪樵輕重相分斑白不提挈冬則民既入婦人同巷夜績女工一月得四十五功必相從者所以省費燭火同巧拙而合習俗也男女有不得其所者因而相與歌詠各言其情是月餘子以在序室八歲入小學學六家四方五行書計之事十五入大學學先王禮樂而知君臣之禮其秀異者移鄉學學於庠序之異者移於國學學乎小學諸侯歲貢小學之異者移於天子之學學于太學命曰造士然後爵命焉孟春之月群后將散行人振木鐸以徇於路以採詩獻之太師比其音律以聞於天子三年耕則餘一年之畜故三年有成成此功也故王者三載考績三考黜陟九年耕餘三年之食進業日升謂之升平三升曰泰二十七年餘九年食謂之大平而王業大成刑措不用王道興矣故語曰如有王者必世而後仁書曰天秩有禮天罰有罪故聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之眾因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為眾眾十為同同方百里同十為封封十為畿畿方千里故四井為邑邑四為丘丘十六井有戎馬一匹牛三頭四丘為甸甸六十四井有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人干戈備具是謂司馬之法一同百里隄封萬井除山川坑塹城池邑居園囿街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫菜地之大者是謂百乘之家一封三百六十六里隄封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者謂之千乘之國天子畿方千里隄封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘戎馬車徒干戈素具春振旅以蒐夏茇舍以苗秋治兵以禰冬大閱以狩皆於農隙以講事焉五國為屬屬有長十國為連連有率三十國為卒卒有正二百一十國為州州有牧牧有連卒比年簡車徒卒正三年簡輿徒群牧五年大簡輿徒此先王制土定業班民設教立武足兵之大法也上過渭橋有人在橋下乘輿馬驚捕之屬廷尉釋之訊之曰遠縣人也聞蹕匿橋下久已為行過即出見車騎即走耳釋之奏犯蹕罰金上怒曰此人親驚吾馬馬賴和柔即令他馬固不傷敗我乎釋之奏曰法者天子之所與天下共之今如重之是法不信於民廷尉天下之平今一傾天下用法皆為之輕重民安措其足乎上曰善廷尉當如是也其後有人盜高廟坐前玉環者下廷尉奏當棄市上大怒曰此人無道乃盜先帝器吾欲置之族矣釋之曰法如是足矣而有萬一愚人取長陵一杯土陛下何以加其法上乃許之曰廷尉當如是也釋之以議法公平甚重於朝廷嘗公卿大會立庭中有王生者年老矣善為黃老言以處士召見顧謂釋之曰為我結韤釋之跪而結之既罷或以責王生王生曰吾老矣且賤自度終無益於張廷尉張廷尉方為名臣故使結韤欲以重之十四年冬匈奴老上單于寇邊以十四萬騎入蕭關殺北地都尉卬遂至彭城使騎兵入燒回中宮候騎至雍起烽火通甘泉上遣王將軍屯隴西北地上郡中尉周舍為衛將軍郎中令張武為車騎將軍軍渭北單于乘騎卒十萬上親勞軍勒兵車令賜吏卒上欲自征匈奴群臣諫不聽皇太后固止之乃止東陽侯張相如為大將軍內史欒布皆為將軍擊匈奴出塞師還時上輦過郎署見郎署長馮唐年七十餘矣問曰父老何自為郎家安在對曰臣趙人上曰吾居代時尚食監高祛數謂我言趙將李齊之賢戰於鉅鹿下吾每餟食意未嘗不在鉅鹿下也父老知之對曰齊尚不如廉頗李牧之為將也臣大父趙時為將卒善廉頗臣父為代郡將時善李牧故知其為人也上曰嗟乎吾得廉頗李牧之為將豈憂匈奴哉唐曰陛下雖得之不能用上怒起入禁中良久召唐曰公眾辱我獨無閑處也何以言之吾不能用也唐謝因對曰臣聞古之王者之遣將也跪而推轂曰自閫以內寡人制之自閫以外將軍制之軍功爵賞皆決於外李牧為趙將居邊軍市之租皆自用饗士卒賞賜決於外不從中覆也委任而責成功牧乃得展其智力北逐單于破東胡滅澹林西抑強秦南距韓魏當此之時趙幾霸會趙王遷立用郭開讒而殺李牧是以為秦所滅今臣聞魏尚雲中守軍市之租盡以給士卒出私養錢五月一殺牛以饗士卒軍人是以匈奴遠遁不敢近雲中之塞虜嘗大入尚率車騎擊之所傷殺甚眾上功幕府誤差六級文吏以法繩之陛下下之吏削爵罰及之其賞不行吏奉法必用臣愚以為陛下賞太輕罰太重由此言之陛下雖得頗牧弗能用也上悅是日令唐持節赦魏尚復以為雲中守拜唐為車騎都尉主中尉及郡車騎士至景帝時為楚相卒為名臣荀悅曰以孝文之明也本朝之治百寮之賢而賈誼見逐張釋之十年不見省用馮唐白首屈於郎署豈不惜哉夫以綘侯之忠功存社稷而猶見疑不亦痛乎夫知賢之難用人不易忠臣自古之難也雖在明世且猶若茲而況亂君闇主者乎然則屈原赴湘水子胥鴟夷於江安足恨哉周勃質朴忠誠高祖以為安劉氏者必勃也既定漢室建立明主眷眷之心豈有異哉狼狽失據塊然囚執俛首撫襟屈於獄吏豈不愍哉夫忠臣之於其主猶孝子之於其親盡心焉盡力焉進而喜非貪位退而憂非懷寵結志於心慕戀不已進得及時樂行其道故仲尼去魯曰遲遲而行孟軻去齊三宿而後出境彼誠仁聖之心夫賈誼過湘水弔屈原惻愴慟懷豈徒忿怨而已哉與夫苟患失之者異類殊意矣及其傅梁王梁王薨哭泣而從死豈可謂不忠乎然人主不察豈不哀哉及釋之屈而思歸馮唐困而後達有可悼也此忠臣所以泣血賢俊所以傷心也上方憂匈奴太子家令晁錯上書言兵事曰臣聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石山川丘阜草木所在此步兵之地也車騎二不當一土山平陵漫衍相屬平原廣野此車騎之地也步兵十不當一平易相遠山谷幽澗仰高臨下此弓弩之地也短兵百不當一兩陣相近平地淺草可前可後此長戟之地也劍楯二不當一雚葦竹蕭草木蒙籠枝葉接茂此矛鋋之地也長戟二不當一曲道相伏險阨相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趨利不及避難不畢前擊後解與金鼓之指相失此多不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及遠與短兵同射不能中與無矢同中不能入與無鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒與敵也卒不可用以其將與敵也將不知兵以其主與敵也君不擇將以其國與敵也此四者兵之要也臣又聞小大異形強弱異勢險易異備夫畢身以事強小國之形也以蠻夷攻蠻夷中國之形也今匈奴地形伎藝與中國異上下山坂出入谿澗中國之馬弗與也險道傾側且馳且射中國之騎弗與也風雨疲勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎此匈奴之眾易撓亂也勁弩長戟射䟽及遠則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官驟發矢道同的則匈奴之革笥木薦弗能支也下馬地鬭劍戟相接去就相薄則匈奴之足弗能給也此中國之長技也匈奴之長技三中國之長技五陛下興數十萬之眾以誅數十萬之匈奴眾寡之計以一擊一之術也雖然兵者凶器戰者危事以大為小以強為弱在俛仰之間耳夫小人之死爭勝跌而不振則悔之無及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸義者其眾數千人飲食長技與匈奴同可賜之堅甲絮衣勁弩利矢益以邊郡之良騎令明將能知其習俗和輯其心者以將之即有阻險則以此當之平地通道則以輕車材官制之兩軍相當表裏各用其技橫加之以眾此萬全之術傳曰狂夫之言而明主擇焉臣錯愚陋昧死上狂言唯陛下裁擇上嘉之而賜璽書寵答曰皇帝敬問太子家令所言兵體聞之書曰狂夫之言而明主擇焉今則不然言者不狂而擇者不明是以萬聽而萬不當也錯復上言云遠方之士守塞一歲而更不知胡人之能不如選常居之者令室家田作具以備之以便為之高城深壍其外復為一城其內城間百五十步要害之處通山川之道調立城邑毋下千家為中國造籬落先為屋室次其田器及募罪人及免徒復作令居之不足募以一奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜高爵復其家予冬夏衣裳廩食能自給而止郡縣之民得買其爵以自增其無夫若無妻者縣官買與之人情非有匹敵不能久安其居塞下之人祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半與之縣官為贖其民如是則邑里相救助赴胡不避死亡非以德上也欲全親戚而利其財此與東方之戎卒不習地勢而心畏胡者功相萬也上從之錯復言古之徙遠方以實空虛也相其陰陽之和審其土地之宜然後營立邑城通田作之道正阡陌之界先為之築室家有一堂兩內門戶之開閉置器物焉民至者有居作有所用此民所以輕去故鄉而勸之新邑也為之致醫巫以救疾病以修祭祀男女有婚姻死生相卹墳墓相從室家完安此使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假率十連一邑邑有假侯皆擇其邑之賢才習地形知民情者居則習於射法出則教民於應敵故卒伍成於內則軍正定於外服習以成勿令遷徙幼則同遊長則共事夜戰則聲相知足以相救晝戰則眼相見足以相識歡愛之心足以相死然後勸之以重賞威之以重罰則死不旋踵矣春三月詔曰昔先王遠施不求其報望祠不祈其福右賢左戚先民後己至明之極也今聞祠官祝釐皆歸福於朕躬不為百姓朕甚愧之是重吾不德也其令祠官致敬無有所祈魯人公孫臣上書言秦為水德從所不勝漢當為土德其符當有黃龍見丞相張蒼好律歷以漢為水德河水決金隄其符也公孫臣言非是以罷之於是從蒼議色尚外黑內赤以此從水德十五年春黃龍見於成紀上召公孫臣為博士從土德也夏四月上幸雍始郊見五帝修名山大川之祀秋九月舉賢良直言上策之曰有司舉賢良明於國家之大體通於人情之終始及能直言極諫者二三大夫之行當此三道朕甚嘉之故登大夫於朝親諭朕志大夫其上三道之要永惟朕之不德吏之不平政之不宣民之不寧四者之闕悉陳其志無有所隱著之於篇朕親覽焉太子家令晁錯對曰臣聞五帝神聖其臣莫能過故自親事動靜上配天下順地中得人眾生之類無不覆也根著之徒無不載也昭以光明無偏異也德上及飛鳥下及水䖝草木諸產皆被其澤然後陰陽調萬物茂妖孽藏符瑞出澤潤天下光被四海此治國大體之功也臣聞三王臣主皆賢故合謀相附政達於人情人情莫不欲壽三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王寧而不危也人情莫不欲逸三王節其力而不盡也其為法令合於人情而後行之動眾使民出於人情而後為之情之所惡不以強人情之所欲不以禁民是以天下樂其政而歸其德百姓和親國家安寧此明於人情終始之功也臣聞五霸不及其臣故屬以國任之以政五霸之佐謹身履法奉公無私見賢不居其上受祿不過其量興利除害明賞慎罰直言極諫補主之過德匡天下威正諸侯此人臣極諫直言之功也臣聞秦之衰世任法戮而信讒賊宮室過度嗜欲無極法令煩僭刑罰暴酷姦邪之吏乘其亂法以成其威上下瓦解內外咸怨故絕嗣亡世為異姓福此吏不平政不宣民不寧之禍也對奏擢為太中大夫齊王肥薨無子國除十六年夏四月上郊祀五帝於渭陽趙人新垣平以望氣見上言長安東北有神氣成五采色若人冠冕焉天下此瑞宜立祠祠上帝以合符應於是始作渭陽五帝廟同宇五殿五門各如其帝色上親郊祀有輝光然屬天於是拜平為上大夫五月分齊為六國立齊悼惠王子六人將閭為齊王志在濟北王辟光為濟南王賢為淄川王卬為膠西王雄渠為膠東王立淮南厲王三子安為淮南王勃為衡山王賜為廬江王建成侯良薨無後秋九月得玉杯刻曰人主延壽新原平令人獻之詐言闕下有神玉氣令天下大酺是歲淮陽相申屠嘉為御史大夫後元年冬十月新原平詐發覺遂謀反誅夷三族春三月孝惠皇后張氏薨二年夏上幸雍還幸棫陽宮六月代王參薨匈奴和親八月戊辰丞相張蒼既免相年老口中無齒以女子為乳母年百餘歲卒著書八十篇言陰陽律歷事蒼之妻妾百數人庚午御史大夫申屠嘉為丞相開封侯陶清翟為御史大夫有天狗下梁野天狗如大流星有聲在其地類狗光炎如火照數頃地三年春正月行幸代秋大雨晝夜不絕四十五日藍田山水出流一百餘家漢水出壞民室八十餘家所殺三百餘人四年夏四月丙寅晦日有食之五月赦天下免諸官奴婢為庶人上幸雍五年春正月行幸隴西三月行幸雍六月齊城門下有狗生秋七月行幸代六年冬匈奴三萬騎入上郡三萬騎入雲中車騎將軍李勉屯飛狐口將軍蘇隱屯勾注將軍張武屯北地周勃子亞夫為將軍次細柳將軍劉禮次霸上將軍徐厲次棘門以備胡單于退遠上自勞軍至霸上及棘門軍直馳入大將軍以下出入以騎送迎拜謁已而之細柳軍軍吏被甲執銳彀弓弩持滿天子先驅曰天子將至軍尉曰軍中但聞將軍令不聞天子詔有頃上至不得入於是使使持節召將軍亞夫曰吾欲入勞軍亞夫傳言開壁門尉謂車騎曰將軍令軍中不得驅馳於是天子按轡徐行至中營將軍亞夫持兵揖曰介冑之士不拜請以軍禮見天子為之改容式車使人稱詔謝皇帝敬勞將軍成禮而去既出軍門群臣驚上曰嗟乎此真將軍也霸上棘門如兒戲耳月餘三軍皆罷拜亞夫為中尉上戒太子曰即有急緩周亞夫可任將軍夏大旱蝗令諸侯無入貢弛山澤減諸服御損郎吏員發倉庫以賑貧民令得買爵七年春正月辛未朔日有食之夏六月封竇廣國為章武侯拜中軍尉周亞夫為車騎將軍己亥帝崩于未央宮遺詔曰蓋聞萬物之萌生靡有不死死者天地之理物之自然奚可甚哀當今之世咸喜生而惡死皆厚葬以破其業重服以傷其生吾甚不取且朕以不德獲保社稷託君王之上二十餘年當畏過行以羞先帝之遺德永惟年之不長懼于不終今乃幸以天年得終時復供養高廟朕之不明與嘉之其奚悲哀之有其令天下吏民臨三日皆釋服無禁娶婦嫁女祠祀飲酒食肉當給桑事服臨者皆無跣足絰帶無過三寸無布車及兵器無發民哭臨殿中當臨者皆以旦夕各十五舉聲禮畢罷非旦夕臨無得擅哭服大功十五日小功十四日纖七日釋服它不在令者皆以此令此數從事布告天下使明知朕意霸陵山川宜因其故無有所改所幸慎夫人已下至少使得令嫁己巳皇帝葬霸陵荀悅曰書云高宗諒闇三年不言孔子曰古之人皆然三年之喪天下之通喪由來者尚矣今而廢之以虧大化非禮也雖然以國家之重慎其權柄雖不諒闇存其大體可也乙卯故韓王信之子頹當及孫嬰率其眾來降封頹當為弓高侯嬰為襄城侯讚曰本紀稱孝文皇帝宮室苑囿車馬御服無所增益有不便輒弛以利民身衣弋綈慎夫人雖幸衣不曳地幃帳無文繡以示敦朴愛費百金不為露臺及治霸陵皆瓦器不得以金銀銅錫為飾因其山不起墳南越王尉佗自立為帝以德懷之匈奴背約令守邊備不發兵深入無動勞百姓吳王詐病不朝賜以机杖群臣袁盎等諫說雖切常假借之張武等受賂金錢重加賞賜以愧其心專務以德化民是以海內殷富興於禮義斷獄數百幾致刑措登顯洪業為漢太宗甚盛矣哉揚雄有言文帝親屈帝尊以申亞夫之軍令曷為不能用頗牧彼將有所感激云爾
