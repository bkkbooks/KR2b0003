body:
  text: 前漢紀卷十二漢荀悦撰孝武三元光六年冬初算商車春穿漕渠通渭匈奴入上谷殺畧吏民遣騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門車騎將軍衛青出上谷衛青者衞夫人子夫之弟也父鄭季河東平陽人也初季與主家僮衛媪私通生青青冐姓為衛氏青長姊君孺即公孫賀妻也嘗有相者曰貴人也當封侯青曰人奴之生得無笞罵足矣安得封侯乎及子夫自平陽公主家僮得幸於上立為夫人陳皇后妒之大長公主捕囚青欲殺之公孫敖為騎郎與壯士簒青上聞乃召青為建章監侍中子夫女弟貴故與陳掌通上乃召貴掌及公孫敖衛青之寵始隆矣其時諸將皆無功唯青頗斬首虜賜爵關内侯而李廣為匈奴所生得單于聞李廣賢令曰得李廣必生致之廣初被創胡騎置兩馬間絡囊盛之廣偽死漸漸騰而上馬抱胡兒而鞭馬南馳匈奴數百騎追之廣取胡兒弓射殺追騎遂得免後下吏贖為庶人夏大旱蝗六月行幸雍秋匈奴盜邊遣將軍韓安國屯漁陽元朔元年冬十有一月詔曰夫十室之邑必有忠信三人竝行厥有我師今或至闔郡不薦一人是化不下究而積行之君子壅於上聞也且進賢受上賞蔽賢䝉顯戮古之道也其議不舉賢者罪有司奏議曰古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵二則黜地三則黜爵地畢夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不進賢者退此所以勸善黜惡也不舉孝不奉詔當以不敬論不察廉不勝任也當免奏可十有二月江都王非薨諡曰易王非好勇有氣力治宮室招四方豪傑驕奢甚盛春三月甲子立皇后衛氏赦天下秋匈奴入遼西殺太守入漁陽鴈門敗都尉遣將軍衛青出鴈門將軍李息出代獲首虜數千級東夷穢貊君南閭等口二十八萬人降以為蒼海郡魯王餘薨諡曰恭王餘好治宮室苑囿狗馬長沙王發薨諡曰定王王母唐姬故程姬侍者景帝召程姬程姬有所避而夜進其侍者景帝醉不知而幸之遂有身及生子因名發以母㣲無寵故王居卑溼貧國二年冬賜淮南王淄川王几杖無朝春正月令諸侯王得以邑土分子弟於是藩國子弟畢侯矣是時主父偃説上曰古者諸侯不過百里今諸侯或連城數十地方千里緩則驕淫急則怨叛以法割削則邪逆萌生近鼂錯是也今諸侯子弟或十數適嗣代立餘無尺土願陛下令諸侯得推恩分子弟彼人人喜得所願實不分其國而久久稍弱又曰茂陵初成天下豪傑兼并之家可使徙茂陵内實京師外銷姦猾匈奴入上谷漁陽遣將軍衛青李息出雲中西至符離獲首虜數千級收河南地北置朔方五原郡封青為長平侯校尉蘇建有功封平陵侯建築朔方城校尉張次公有功封岸頭侯三月乙亥晦日有食之夏募民徙朔方十萬户徙郡國豪傑於茂陵秋燕王定國有罪自殺無後國除定國與父康王姬姦生子男一人奪弟妻為姬與子女三人姦故誅齊王次昌自殺無後國除先是主父偃常求納女於王宮王太后不聽時王内淫亂主父偃言之於上上拜偃為齊相以正其事偃驗王後宮宦者辭及王與姉妹姦偃使人以此動王王年少恐懾自殺公孫𢎞以為齊王以憂死無後偃本首惡非誅偃無以謝天下遂族偃偃齊人也初遊説山東不遇乃曰丈夫生若不五鼎食死即當五鼎烹即西入關旣獲貴寵賔客輻輳及其死也莫之收視唯孔奢葬之上閒之謂孔奢為長者三年春罷蒼海郡三月赦天下夏匈奴伊雅斜單于入代殺太守入鴈門殺畧千餘人六月庚申皇太后崩御史大夫張歐免内史公孫𢎞為御史大夫秋罷西南夷屯公孫𢎞以為疲弊中國以奉無用之地請罷之築朔方城令人大酺五日四年冬行幸甘泉夏匈奴入代定襄上郡殺數千人五年春大旱車騎將軍衛青將三萬騎出髙闕驍騎將軍公孫賀遊擊將軍蘇建彊弩將軍李蔡出朔方將軍李息將軍張次公出右北平凡十餘萬騎擊匈奴右賢王右賢王方飲酒以為漢兵逺不能至也衛青徑夜至圍右賢王右賢王大驚乃將數百騎馳潰圍北遁僅以身免得右賢王禆將十餘人衆男女萬五千餘人畜産數千萬還師屯於塞上詔即軍中拜青為大將軍益封八千七百户而封青三子為列侯青固辭子封上不聽將軍公孫賀李蔡護軍都尉公孫敖校尉李朔趙不虞戎奴都尉韓説皆以功封列侯衛青旣登大將軍貴寵甚盛自公卿以下莫敢不拜唯汲黯與亢禮或以責黯黯曰夫以大將軍之尊而有揖客反不重乎大將軍聞而賢之夏六月詔禮官勸學明禮崇化舉遺逸以厲賢才秋匈奴入代殺都尉冬十有一月乙丑丞相薛光免御史大夫公孫𢎞為丞相封平津侯丞相無不以侯拜者至𢎞始拜而封丞相封侯自𢎞始也荀悦曰丞相始拜而封非典也夫封必以功不聞以位孔子曰如有所譽必有所試矣譽必待試況於賞乎易曰鼎折足覆公餗其刑剭凶若不勝任覆亂鼎實刑將加之況於封乎初𢎞牧豕於海上年四十餘乃學春秋嘗為博士使匈奴不稱上意罷後應賢良舉上甚賢之起徒步數年位至宰相年八十矣𢎞於是起客館延賢人與參謀議請博士置弟子員學者益廣故人賔客皆仰衣食身為布被脱粟飯一肉食家無餘財主爵都尉汲黯數面詰𢎞於上前曰𢎞每與臣等議事至上前即背之以從欲大不忠上問𢎞𢎞曰知臣者以為忠不知臣者以為不忠黯又曰公孫𢎞位為三公而為布被是詐也上問𢎞𢎞曰臣聞管仲相齊有三歸之奢桓公以霸上不僭於君晏子相齊食不重肉妾不衣帛齊因以治下不比於民今𢎞布被誠詐也欲以為名且無黯之忠陛下安聞此言上以𢎞為有讓益厚待之𢎞為人慎厚事後母孝謹辯論有理習文法吏事縁飾以儒術每朝㑹議開陳其兩端令人主自擇不肯面折廷爭然外寛内深意忌主父偃偃嘗與𢎞有郄竟報其私𢎞與仲舒同學不如仲舒仲舒以𢎞為諛膠西王縱恣數害長吏乃言仲舒使相膠西王王素聞仲舒賢善待之仲舒正身率下所居而治六年春二月大將軍衞青左將軍公孫賀前將軍趙信右將軍蘇建後將軍李廣彊弩將軍李沮凡十餘萬騎出定襄斬首虜三千級還休士馬於定襄雲中鴈門赦天下夏四月衛青復出将六將軍逾絶漠北大尅獲蘇建趙信以三千騎獨遇單于戰敗信遂降匈奴建獨以身免歸大將軍議其罪議郎周霸等曰自大將軍出未曾斬一禆將今建棄軍可斬以明軍威軍正閎長史安曰不然兵法小敵之堅大敵擒也建以數千當單于數萬力戰百餘士盡死無二心自歸而斬之是示後人無返意也青曰善青幸得以肺附待罪行陣之間不患無威而霸説我以明軍威甚失人臣意且以臣之尊寵不敢擅誅於外其歸天子天子自裁之於是以諷人臣不敢專權不亦可乎將吏皆曰善遂囚建上至長安赦之贖為庶人憂死六月詔曰朕聞五帝不相復禮三代不相同法所由殊路而建德一也今中國一統而北邊未安朕甚悼之其置武功賞官以寵戰士校尉張騫從衛青有功封博望侯騫者漢中人也初為郎應募使月氏時匈奴殺月氏王遂西徙故漢欲與月氏擊匈奴騫行為匈奴所得留騫十餘嵗與妻有子然騫常持漢節不失後亡到月氏月氏未有報匈奴意騫留月氏嵗餘乃還竝南山從羌中来歸復為匈奴所得留之嵗餘會單于死國内亂騫乃與其胡妻来歸漢拜為太中大夫初騫行百餘人十三年乃歸唯騫與唐邑氏奴二人得還騫身所到大宛大月氐大夏康居而傳聞其旁國名具為上言之西域本三十六國後分為五十四國皆在匈奴之西婼羌國沮沫國精絶國戎盧國渠勒國皮山國烏秅國西夜國蒲犂國依耐國無雷國捐毒國桃槐國休循國疏勒國尉頭國烏貪國卑陸國渠類谷國郁立師國單桓國蒲類國西沮彌國劫日國狐胡國三山國車師國凡二十七國小國也小者七百户上者千户也扜彌國于闐國難兜國莎車國温宿國龜兹國尉棃國危須國鄢耆國凡此九國次大國小者千餘户大者六七千户南北有大山東則接漢阨以玉門陽關西則限以葱嶺中山中央有大河其河有兩源一出葱嶺一出于闐于闐在南山下河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤去陽關三千餘里廣長三四百里其水停居冬夏不増減皆以為潛行地下南出於積石山為中國河云自玉門陽關出西域有兩道行從鄯善旁出南山西行至莎車為南道南道西逾葱嶺則出大月氏安息自車師旁北山西行至疏勒為北道北道西逾葱嶺則出大宛康居奄蔡鄢耆西域諸國大率土著有城郭田畜與匈奴異俗皆役屬匈奴匈奴賦税之取給焉皮山國去長安萬五千里自皮山以西至大頭痛山小頭痛山身熱赤土之坂令人身熱無色頭痛嘔吐驢畜盡然又有三池盤石懸渡之坂狹者尺七寸長者徑三十里臨崢嶸不測之淵行者步騎相持繩索相牽引三千餘里烏孫王號昆彌治赤城去長安八千九百里户十二萬口六十萬大國也地方五千餘里東接匈奴西界大宛南與城郭諸國接其俗與匈奴同其處土多雨寒而國多馬故屬匈奴後稍彊盛徒羈縻而已不肯徃朝會罽賓國王治循鮮城去長安萬二千里土地平坦温和有苜蓿雜果竒木種五穀稻多蒲桃竹漆治園池民雕文刻鏤治宮室織罽刺文繡好酒食有金銀銅錫以為器有市肆然以銀為錢文為騎馬曼為人面出封牛水牛犀象大狗沐猴孔雀珠璣珊瑚琉璃其他畜與諸國同安息國王治潘兜城去長安萬二千六百里地方數千里城郭數百有車船商賈書革旁行為書記其俗與罽賓國同亦以銀為錢文為王面曼為夫人面一王死輒改其錢出大馬雀大宛國王治貴山城去長安萬二千五百五十里户四十萬與安息同俗出蒲萄苜蓿以蒲萄為酒富人藏酒至萬餘石數十年不敗出馬馬汗血言其先天馬子也大月氏本匈奴同俗居燉煌祈連山間匈奴老上單于殺月氏王以其頭為飲器月氏乃逺去西過大宛擊大夏而臣之國都媯水其土地與安息同俗其餘小衆不能去者保南山號小月氏焉大夏本無大君長徃徃置小君長有五翕侯一曰休宻翕侯二曰雙靡翕侯三曰貴霜翕侯四曰肸頓翕侯五曰髙附翕侯康居國在烏孫西北去長安萬二千三百里户十三萬口六十萬與大月氏同俗奄蔡國在康居西北去長安萬二千里與康居同俗臨大澤無津涯盖北海河也烏弋國去長安萬五千三百里出獅子犀牛其錢文為人頭曼為騎馬自烏弋行可百餘日至條支國臨西海出善幻人有大鳥卵如甕長老傳聞條支西有弱水西王母所居亦未嘗見條支西行可百餘日近日入處禹本紀言河出崑崙崑崙髙萬二千五百餘里日月所以相避隱為光明自張騫使大夏之後窮河源惡覩所謂崑崙者乎故言九州山川尚書近之矣禹本紀山經有所考焉十有一月癸酉晦日有食之元狩元年冬十月行幸雍祠五畤獲白麟一角而五蹄有竒木衆枝旁出復合於上上以問羣臣謁者終軍對曰昔武王中流未濟白魚入於王舟今郊禮未見於神祗而獲獸以饋此天所以示饗而上通之符合也盖六鶂退飛逆也白魚登舟順也夫明闇之徵上亂飛鳥下動淵魚各以類推今野獸并角明同本也衆枝内附示無外也若此之應殆將有解編髮削左衽襲冠帶要衣裳而慕化者焉可恭已而待之宜因昭時令日改定吿元苴白茅於江淮發嘉號於營丘以應緝熙使著事者有所紀焉由是改元朔為元狩是嵗北地匈奴名王率衆来降十一月淮南王安衡山王賜謀反誅之安好讀書招致賓客方術之士數千人作内書二十一篇外書甚衆又有中書八卷言神仙黄白之事上以安屬諸父甚尊重之初安朝上使作離騷賦旦受詔食時畢上每與燕㑹昬暮乃罷建元六年彗星見或謂安曰天下兵當大起安心以為上未有太子天下有變諸侯竝爭隂治戰攻具積金錢賂遺郡國遊士羣臣賓客江淮間人輕薄妄以妖言阿䛕安又以厲王遷徙感激之後安以壅閼求奮擊匈奴者雷被等廢格明詔當棄市官削三縣安由是怨望反謀益甚初將作亂召中郎伍被欲與計事呼之曰將軍伍被曰王安得此亡國之言邪昔者子胥諫吳王吳王不用曰吾今見麋鹿遊於姑蘇之臺今臣將見王宮中生荆棘而露霑衣也於是繫被父母囚之三月王復召被曰將軍許寡人乎被曰否臣將為大王劃計耳王曰天下治乎亂乎被曰竊觀朝廷紀綱之叙皆得其理上之舉錯遵古之道雖未太平然猶為治也王曰公以為大將軍何如人也被曰臣聞大將軍遇士大夫以禮與士卒有恩衆皆樂為用騎上下山谷若飛材力絶人常為士卒先須休乃敢舍穿井得水乃敢飲軍罷士卒已逾河乃渡上所賜金錢盡以賞賜雖古名將不能過也王不悦復曰公以呉王之起兵非也被曰吳王賜號為劉氏祭酒受几杖而不朝王四郡之衆地方數千里舉兵而西破敗而還身滅祀絶為天下笑夫以吳衆不能成功者何誠逆天違理而不見時也王曰男子之所死者一言耳且吳王何知反今我令樓緩輕兵先要成皋之口周被下潁川之兵塞轘轅守伊闕之道陳定發南陽之兵守武關河南太守獨有洛陽耳何足憂人言絶成皋之口天下不通據三川之險招天下之兵公以為何如被曰臣見其禍未見其福後王恐謀泄謂被曰吾欲遂發兵天下勞苦有間矣諸侯頗有失行者皆自疑我舉兵而西向必有應者無應則還畧衡山勢不得不發被曰畧衡山以致廬江有潯陽之船守下雉之城結九江之浦杜豫章之口彊弩臨江而守以禁南郡之下東保㑹稽南通勁越屈彊江淮之間可以延嵗月之壽矣未見其福王曰陳勝吳廣奮臂大呼比至戲衆百二十萬今吾國雖小精兵可二十萬公何言無福被曰臣不敢避子胥之誅願王無為吳王之聽徃者秦為無道殘賊天下殺儒術之士燔詩書棄禮義任刑法轉海濱之粟致乎江西當此之時男子疾耕不足於糧餽女子紡績不足以盖形遣䝉恬築長城東西數千里暴兵露師嘗致千百萬僵尸滿野流血千里於是百姓力屈欲為亂者十室而五又使徐福入海求神仙多齎童男女三千餘人五種百工而行徐福至平原大澤止王不来於是百姓怨痛欲為亂者十室而六又使尉佗逾五嶺攻百越佗知中國勞極乃止王南越行者不還徃者莫返於是百姓心離瓦解欲為亂者十室而七興百萬之衆作阿房之宮收大半之賦發閭左之戍父不寧子兄不安弟政苛刑慘民皆引領而望側耳而聽悲號仰天叩心怨上欲為亂者十室而八於是勝廣大呼劉項竝㑹天下響應百姓願之若枯旱之望雨故能起行陣之間以成帝王之業今大王見髙祖得之易獨不見近世之吳楚乎當今陛下臨制海内一齊天下口雖未言聲疾雷電令雖未發行化如神心有所懷威動千里下之應上猶影響也大將軍材能非直章邯楊熊也且大王之兵衆未能十分吳楚之一天下安寧又萬倍於秦時王以陳勝論之臣竊以為過矣臣聞箕子過故國而悲泣作麥秀之歌痛紂之不用比干也孟子曰紂貴為天子死曽不如匹夫是紂先自絶於天下矣非死之日天去之也臣竊悲大王棄千乗之君將賜絶命之書為羣臣先身死於東宮也被因流涕而起後復召被曰茍如公言不可徼幸邪被曰必不得已被有愚計方今諸侯無異心百姓無怨氣朔方之地廣美徙者不足以實其地可偽為丞相御史詐書詔徙郡國豪傑及耏罪已上赦令除家産五十萬已上皆徙朔方郡益發兵卒急其會日又偽為左右都尉司空上林都中官詔獄官書罪諸侯太子及幸臣如此則民怨諸侯懼因使辯士隨而説之儻可以徼幸王曰如此可也然吾以為不至於此詐作皇帝玉壐丞相御史大夫中二千石將軍都官令丞及旁近郡太守相都尉印綬因漢使持節法官欲如伍被計又使人偽得罪而西事大將軍丞相一旦發兵則刺殺大將軍衛青而説丞相𢎞已下如發䝉耳又曰汲黯喜直諫守節死義唯憚黯也欲發國中兵恐丞相二千石不聽謀偽失火宮中丞相二千石救火因殺之又欲令人持羽檄從南方来呼曰南越兵入又欲因以發兵後王更以他事大臣多逮繋獄者無所任未敢發兵伍被知事已發覺詣吏自告與淮南王謀反蹤跡如此上以被雅辭多稱漢美欲勿誅廷尉張湯爭之曰被首為反計罪無赦遂族被而淮南王自殺黨與死者數萬人初嚴助之使南越淮南王與相結及淮南王来朝厚賂遺助交私論議廷尉張湯以為助腹心之臣而外交諸侯當誅助坐棄市有司以衡山王淮南王親弟請追捕衡山王上曰諸侯各以其國為本不當相坐㑹衡山王謀發覺初衡山王隂知淮南王謀畏淮南王并其國以為淮南王發西欲起兵江淮間而有之隂與淮南王約束作反具公卿請遣宗正大行治衡山王王聞之自殺十有二月大雨雪民凍死夏四月赦天下乙卯立皇太子據遣謁者巡行天下賜民年九十已上及鰥寡孤獨三老孝悌力田帛各有差五月乙巳晦日有食之從旁左太史占曰凡日食從上失君從旁失臣從下失人匈奴入上谷殺數百人前漢紀卷十二
