body:
  text: 前漢紀卷二漢荀恱撰髙祖二漢元年冬十月五星聚于東井從嵗星也東井秦之分野五星所聚是謂易行有徳者昌無徳者殃沛公至霸上秦王子嬰素車白馬繫頸以組奉皇帝璽降于枳道旁沛公執之以屬吏於是秦遂亡矣本𫝊曰賈生之過秦曰秦孝公據崤函之固擁雍州之地君臣固守以闚周室有席卷天下并吞八荒之心當此之時商君佐之内立法度務耕織修守戰之備外連横而鬭諸侯於是秦人拱手而取西河之外及惠文武昭襄䝉故業因遺䇿南取漢中西取巴蜀東割膏腴之地收要害之郡諸侯恐懼㑹盟而謀弱秦合從締交相與為一常以十倍之地百萬之軍仰闗而攻秦秦人開闗延敵九國之師逡巡而不敢進秦無亡矢遺鏃之費而天下已困矣於是從散約敗争割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂櫓因利乘便宰割天下分裂山河彊國請伏弱國入朝及至始皇奮六國之餘烈振長䇿而御宇内吞二周而亡諸侯履至尊而制六合南取北粤之地以為桂林象郡百越之君頫首繫頸委命下吏乃使䝉恬北築長城而守藩籬卻匈奴七百餘里然後踐華為城因河為池據億丈之峻臨不測之深以為固良將勁弩守要害之地信臣精卒陳利兵而誰何天下已定始皇之心自以闗中之固萬世之業也於是廢先王之典焚百家之言以威力為至道以權詐為要術百姓失望而天下懷怨矣故陳涉起於行陣之間將數萬之衆轉鬭而攻秦斬木為兵揭竿為旗天下雲合響應嬴糧而影從山東豪傑並起而亡秦族矣夫秦以區區之地致萬乘之權然後以六合為家崤函為宫一夫作難而七廟隳身死人手為天下笑者何也仁義不施而攻守之勢異也沛公入咸陽宫室婦女珍寳犬馬之飾甚盛欲留之張良諌沛公曰秦為無道故使沛公得至於此今始至秦即安其樂此助桀為虐也乃還軍霸上諸將皆爭取秦寳貨蕭何獨悉收秦圖書十有一月沛公與秦人約法三章殺人者死傷人者刑及盜抵罪吏人皆安堵如故民爭獻牛酒又讓不受於是民知徳義矣沛公乃遣兵距闗欲王闗中是時項羽率諸侯兵四十萬衆號百萬衆西至新安卒心不服出怨言羽乃夜擊之坑秦降卒二十餘萬人十有二月遂至鴻門欲擊沛公項羽季父項伯告張良令出良曰今事急亡去則不義乃告沛公令見項伯自解于項羽沛公遂見羽於鴻門亞父范増欲擊沛公羽不聴范増謂項莊曰汝入以劍舞因擊沛公項莊既舞項伯常以身蔽沛公於是甚急賢成君樊噲聞之杖劍楯衝門而入立於帳下羽曰壯士哉賜之卮酒豚肩既飲酒拔劍切肉肉盡因責讓羽曰沛公先定闗中以待大王今大王聴讒臣之言乃欲誅沛公臣恐天下解心疑大王也所以遣兵守闗者以備他盜也羽黙然遂無誅沛公乃還霸上范増怒曰吾屬今為沛公虜矣羽遂殺子嬰收其寳貨婦女而東燒秦宫室火三月不滅韓生說羽令都闗中羽曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人曰沐㺅而冠果然羽聞之怒殺韓生羽所過殘賊秦人失望春正月羽陽尊懷王為義帝徙之長沙都郴羽自立為西楚霸王王梁楚地九郡都彭城立沛公為漢王王巴蜀漢中四十一縣都南鄭三分闗中立秦三將章邯為雍王司馬忻為塞王董翳為翟王黥布為九江王徙趙王歇為代王立張耳為常山王徙魏王豹為西魏王徙燕王廣為遼東王燕將臧荼為燕王徙齊王市為膠東王齊將田都為齊王趙將司馬卭數有功立為殷王瑕丘申陽先下河南迎楚王於河上立陽為河南王吳芮率百越佐諸侯立芮為衡山王義帝柱國共敖别將擊河南功多立敖為臨江王舊齊王建之孫田安初以濟北數城降立為濟北王田榮背項梁陳餘不從入闗故皆不王然素聞餘賢封南皮三縣為鄱君别將枚鋗功多封十萬戸侯夏四月諸侯皆就國漢王欲叛楚蕭何諫曰雖王漢中之惡不猶愈於死乎且語稱天漢其稱甚美夫能屈於一人之下則伸於萬人之上湯武是也願大王王漢撫其民以致賢人收用巴蜀還定三秦天下可圖也乃就國賜曹參爵為建成侯樊噲為臨武侯張良燒絶棧道示無還心良因絶棧道而還於韓於是沛公遂至南鄭封呂公為臨泗侯淮隂人韓信為治粟都尉初信家貧常寄食於下鄉亭長亭長妻厭之乃自絶而去釣於下邳城下有漂母憐信食信數十日信曰富貴我必厚報母母怒曰大丈夫不能自食吾豈求報乎淮隂市有少年衆辱信曰能死殺我不能死出我跨下信遂俛而出其跨下市人大笑之信母死家貧無以𦵏乃行營髙敞𦵏地令其傍可置萬家者後事項羽為郎中羽不能用而去歸於漢坐事當斬已伏鑕仰視乃見夏侯嬰曰王不欲取天下邪而斬壯士太僕嬰言之於王赦之不誅以為都尉蕭何知其賢王不能用信亡蕭何遽自追之不及以聞三日乃至王怒曰何之何曰追亡者耳王曰諸將亡者十輩公無所追追信詐也何曰諸將易得耳大王必欲定天下非信無可用者王乃以為大將軍何曰大王性素慢人每拜大將軍若召小兒此信所以去也宜立壇場齋七日設九賓禮而拜之既拜信衆咸驚焉信見王曰今東向爭天下豈非項王也王曰然信曰大王自料勇悍仁彊孰與項王王曰不如也信再拜曰唯信亦以為大王不如也然項王喑嗚叱咤千人皆靡然不能屬任賢將此特匹夫之勇耳項王與人恭敬人有疾病流涕與之分食至於封賞恡而不能與此特匹婦之仁耳雖王天下不居關中都彭城又背義帝約而以親疎王諸侯不平所過無不殘滅百姓不附雖名為伯實失天下心故曰其强易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不勝且三秦王詐其衆降諸侯項王詐坑秦降卒二十餘萬人唯邯忻翳等三人得脫秦人父兄怨此三人痛入骨隨大王入闗秋毫一無所取除秦苛法吏人無不欲得大王王秦於諸侯之約大王當王闗中王失職之蜀秦人無有不恨者今大王舉兵而東三秦可𫝊檄而定也於是王大喜自以為得信晩也五月與韓信俱東蕭何留守蜀王進兵襲雍王章邯敗走廢丘令將軍樊噲圍之王遂東田榮怨項羽不肎王已又不令市徙膠東市畏楚亡之國六月田榮殺市自立為齊王而擊田都都亡走楚田榮與彭越將軍印綬令反徇梁地越者昌邑人也初少年相聚百餘人請越為長與期㑹十餘人後至越曰請斬最後至一人衆皆笑曰何至如是越遂斬之立約束而盟徒屬皆驚而不敢仰視後衆萬餘人在鉅野中無所屬乃受榮印綬擊殺濟北王安榮遂并三齊之地遼東王韓廣不肎徙之國故燕王臧荼殺廣并其地塞王忻翟王翳來降項王殺韓王成以張良從漢入秦故也以故吳令鄭昌為韓王距漢張良遺項羽書曰漢失職之蜀欲得闗中如約則止不敢反也又以齊反書遺羽曰齊欲滅楚國羽以故不南而北擊齊兵九江王稱疾遣四千人助楚是嵗實乙未也二年冬十月項羽使九江王布殺義帝于郴陳餘既怒張耳且怒項羽之不王已也乃請兵于齊以伐趙破常山趙王張耳欲走楚齊客有甘公者說耳曰漢王入秦五星從嵗星於東井其占曰當以義取天下漢入秦可謂能義矣楚雖彊後終屬於漢耳乃走漢漢以故秦柱下史陽武人張蒼為常山太守陳餘迎趙王歇反之於趙立餘為代王餘以趙王弱乃使夏說為國相居代餘相趙張良間行歸漢漢以為成信侯河南王韓王來降十有一月立舊韓王孫信為韓王使諸將略地若一郡降者封萬戸侯王使人招陳餘陳餘曰漢殺張耳乃從漢乃求人類耳者送其首餘將從漢聞耳詐死乃止春正月項羽伐齊殺田榮齊降於楚羽焚其城郭殺降卒繫虜老弱齊復叛楚降漢漢王立社稷於長安施恩惠賜人爵蜀漢人從軍者家復租稅二嵗闗中人從軍者復租一嵗人年五十已上能善道教訓者復徭役常以十月賜民牛酒蕭何守闗中治櫟陽宫定約束轉漕給軍専任闗中事是時沛人王陵聚黨數千人在南陽始來從漢項羽得陵母漢使至楚羽使母招陵陵母見使者曰為我告陵漢王長者也終事之無二心因伏劍死三月魏王豹降陳平因魏無知始來陳平陽武人也家貧好讀書少時嘗為里中社宰分肉甚平均父老善之平曰嗟乎使平宰天下亦如此肉矣事魏王及項羽不能用歸漢漢王與參乘令典䕶諸將諸將皆怒曰大王一旦得楚之亡卒乃命監䕶長者王愈益任用之王至洛陽新城三老董公說王曰臣聞順徳者昌逆徳者亡兵出無名事故不成明其為賊敵乃可服項王殺義帝是天下之賊也夫仁者不以勇義者不以力若三軍之衆為之素服以告諸侯而事東伐此湯武之舉也王善之乃與義帝𤼵喪大臨三日素縞以告諸侯夏四月田横立榮子廣為齊王横為相止城陽項羽與齊戰漢王率諸侯之師凡五十六萬人東襲楚至外黄彭越將三萬人歸漢漢拜為相國令定梁地王遂入彭城悉收楚美人寳貨置酒髙㑹羽聞之留其將擊齊自以精兵三萬人歸晨襲漢軍於濉水上從旦至日中殺漢士卒十餘萬人皆入濉水濉水為之不流漢軍大敗圍王三帀㑹天大風揚沙晝晦楚軍大亂而王得與數十騎遁去道逢孝惠魯元公主載行楚追急輒推墮之夏矦嬰嘗收載之遂得免而太公呂后被獲于楚時諸矦皆復歸楚楚進兵而西蕭何悉𤼵闗中卒詣軍韓信亦收餘兵與王㑹擊楚于京索間大敗之騎將灌嬰又敗楚騎于滎陽東故楚師不能復進陳平為亞將屬韓信或曰陳平雖美丈夫如冠玉耳未有所知也平居家盜婬其嫂在官受金王以讓魏無知無知曰大王所知者行也臣所言者能也頋其計誠足以益國耳又何疑王以平為䕶軍中尉盡監䕶諸將諸將乃不敢言王謂羣臣曰誰能為我說九江王令背楚項羽必留必留三月我之取天下可以萬全有儒者隨何請使至九江三日不得見何說太宰曰今臣所言是邪大王所欲聞非邪何等二十人伏斧鑕於淮南市以明大王背漢而與楚也太宰言之於王而見之何曰竊見大王之與楚何也王曰寡人北面而臣事之何曰大王臣事楚者以為可託國也項王伐齊身自負版築以為士卒先大王宜悉舉淮南之衆身為先鋒乃𤼵四千人以助楚夫北面而臣事人者固若是乎漢王戰於彭城項王未出齊也大王宜埽淮南之衆日夜㑹戰今無一人渡淮者垂拱而觀其孰勝夫託國於人固若是乎大王提空名以向楚而欲厚自託臣竊危之夫楚兵雖彊負不義之名以其背盟約而殺義帝也漢王收諸矦之兵還守成皋滎陽下獨深溝髙壘分卒守徼乘塞楚人還兵間行以梁地深入敵國八九百里楚欲戰則不得攻城則力不能老弱轉輸千里之外漢堅守不動進則不得前退則不得解楚亦不足恃也楚勝則諸矦自危懼而相救夫楚之彊適足以致天下之兵耳臣非以淮南之衆足以亡楚也今大王舉兵而背攻楚楚王必留數月漢之取天下可以萬全大王不與萬全之漢而自託於危亡之楚臣竊惑之布隂許之㑹楚使至方急責布𤼵兵何直入曰九江王已歸漢楚何得以令𤼵兵布甚愕何因令布殺使者而起兵項羽使龍且擊淮南而身攻下邑六月漢王歸櫟陽引水灌廢丘章邯自殺壬午立子盈為太子赦罪人闗中大饑米斗錢五千人相食秋八月如滎陽使酈食其說魏王豹豹曰漢王侮慢人罵詈諸矦王如奴虜耳吾不忍復見也食其還王問魏大將軍誰也曰柏直也王曰此將其口尚乳臭不能當韓信騎將馮敬不能當灌嬰步將項他不能當曹參吾無患矣乃以韓信為左丞相與曹參灌嬰俱擊魏韓信聞魏不以周叔為大將軍乃喜遂進兵偽陳船欲渡臨晉魏聚伏兵以距之信乃伏兵從下陽以木罌缶渡軍襲安邑虜魏王豹初豹有姬曰薄姬許負相之當生天子豹恃此而反豹敗王遂納薄姬是生文帝三年冬十月韓信張良及曹參等破代擒夏說進伐趙獲趙王歇斬成安君陳餘韓信之伐趙也廣武君李左車說成安君陳餘曰漢兵乘勝逺鬭其鋒不可當也臣聞千里餽糧士有饑色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣竒兵三萬人從間路絶其輜重足下深溝髙壘勿與戰彼前則不得鬭退則不得還野無所掠不十日兩將之頭可懸于麾下矣陳餘曰韓信兵號數萬千里徑來襲我亦不罷勞今我二十萬避而不擊後有大者何以距之諸矦謂吾怯而輕來伐我不聴韓信使人闚之知其不用廣武君計乃敢進兵未至井陘口三十里止舍夜半選輕騎二千人人持一赤幟從間道萆山而望趙軍信戒曰趙見我走必空壁逐我汝疾入拔趙幟立漢赤幟乃使萬人先行背水為陣平旦信建大將旗鼓出井陘口趙開壁擊之大戰良久於是信耳佯不勝偽棄旗鼓走還水上軍趙空壁爭漢旗鼓逐信耳於是二千騎馳入趙壁皆拔趙幟立漢赤幟二千趙軍不能敗水上軍乃還見漢赤幟大驚以為漢皆已破趙衆矣遂亂而走趙將雖斬之不能禁於是漢兵夾擊大破之既而諸將問信曰兵法右背山陵前左水澤今將軍令臣等反背水陣何也信曰置之死地而後生此兵法也且信非得素拊循士大夫也所謂驅市人而戰故置之死地既人人自為戰即與生地皆走尚安得而用之乎諸將皆服曰非所及也信令軍中曰生得廣武君購千金信得之乃東面師事之問曰吾欲北攻燕東伐齊何如對曰敗軍之將不可以語勇亡國之大夫不可以圖存又何問焉信曰向使成安君聴子之計則信亦將為子擒矣固問之對曰足下威振諸矦名聞海内然士卒罷勞其實難用今足下舉倦弊之兵頓之燕堅城之下情見力屈曠日糧竭若燕不拔齊必距境以自彊二國相持則劉項之權未有所分也不如按甲休兵日饗士卒大夫北首燕路然後使一乘之使奉咫尺之書燕不敢不從燕從而臨齊齊雖有智者亦不能為齊計也兵法固有先聲而後實者此之謂也信曰善乃𤼵使使燕燕聴命於是請立張耳為趙王以拊循趙衆甲戌晦日有食之十二月九江王布及隨何至布為楚所攻敗故間行而來王拒楚於成皋與酈食其謀撓楚權食其曰昔湯伐桀封其後于杞武王伐殷封其後于宋秦滅六國使無立錐之地大王誠復六國之後彼皆戴仰大王徳義願為大王臣妾徳義已行南面稱伯楚必斂衽而朝王曰善趨刻印未行張子房至王以問之良曰大事去矣漢王方食良曰臣請借前箸以籌之昔湯武封桀紂之後者度能制其死命也今大王能制項籍之死命乎其不可一矣武王入殷表商容之閭釋箕子之囚封比干之墓今大王能乎其不可二矣𤼵鉅橋之粟散鹿臺之財以賑貧窮今大王能乎其不可三矣偃革為軒倒戢干戈示不復用武今大王能乎其不可四矣休馬華山之陽示無所為今大王能乎其不可五矣息牛桃林之埜示天下不復輸積今大王能乎其不可六矣天下游士離親戚捐墳墓去故舊從大王遊者日夜望尺寸之地今乃立六國後遊士各歸事其主從親戚及故舊大王誰與取天下乎其不可七矣且楚唯無彊六國復撓而從之大王安得復臣之哉其不可八矣誠用此計大事去矣漢王輟食吐哺罵酈生曰豎儒幾敗乃公事令趨銷印荀恱曰夫立策决勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之宜也進退之機也情者言其心志可否之意也故䇿同事等而功殊者何三術不同也初張耳陳餘說陳涉以復六國自為樹黨酈生亦說漢王所以說者同而得失異者陳涉之起也天下皆欲亡秦而楚漢之分未有所定時天下未必欲亡項也且項羽率從六國攻滅彊秦之時勢則不能矣故立六國於陳涉所謂多己之黨而益秦之敵也且陳涉未能専天下之地也所謂取非其有以與人行虛恵而獲實福也立六國于漢王所謂割己之有以資敵設虛名而受實禍也此同事而異形也及宋義待秦趙之斃與昔卞莊刺虎同說者也施之戰國之時鄰國相攻無臨時之急則可也戰國之立其日久矣一戰勝敗未必以存亡也其勢非能急於亡敵國也進乘利退自保故累力待時乘敵之斃其勢然也今楚趙所起其與秦勢不並立安危之機呼吸成變進則成功退則受禍此同事而異勢者也伐趙之役韓信軍于泜水之上而趙不能敗彭城之難漢王戰于濉水之上士卒皆赴入濉水而楚兵大勝何則趙兵出國迎戰見可而進知難而退懷内顧之心無必死之計韓信軍孤在水上士卒必死無有二心此信之所以勝也漢王深入敵國飲酒髙㑹士卒逸豫戰心不固楚以彊大之威而喪其國都項羽自外而入士卒皆有憤激之氣救敗赴亡之急以决一旦之命此漢之所以敗也且韓信選精兵以守而趙以内顧之士攻之項羽選精兵以攻而漢以怠惰之卒應之此同事而異情者也故曰權不可預設變不可先圖與時遷移應物變化設策之機也陳平進謀曰項王大臣不過數人大王能捐數萬斤金間楚君臣使相疑惑可以破楚必矣乃與陳平金四萬斤不問出入平多行反間謂項羽曰諸將功多矣而終不得裂地而王欲與漢為一以滅楚分王其地項王疑之夏四月楚圍漢王于滎陽厯陽矦范増欲急擊滎陽項羽不信増怒乞骸骨歸未到彭城疽𤼵背而死五月紀信謂王曰臣請誑楚可以間出紀信乃乘王車出東門曰漢王降楚楚軍皆稱萬嵗之城東觀漢王得與數十騎出城西門令御史大夫周苛與魏王豹守滎陽周苛曰反國之王難與共守苛乃殺魏豹項羽見紀信非漢王乃大驚怒燒殺紀信王自西入闗收兵復東轅生說曰今出武闗項王必引兵而南大王深壁勿與戰項羽用兵疾如雷電令成皋滎陽間且得休息使韓信等輯河北趙地連燕齊君王乃復屯滎陽如此則楚所備者多力分于漢王得休息後與之戰破楚必矣漢王從之王復出軍宛葉間項羽果引而南漢兵深壘自守是時彭越等擊楚得項聲薛公于下邳殺之羽乃自擊彭越越敗走羽乃引兵還拔滎陽獲周苛謂苛曰吾方以公為將軍封萬戸矦能為我盡節否苛瞋目罵之羽怒乃烹之遂圍成皋下之所殺亦無數秋七月有星孛于大角大角為王坐本志以為楚王亡之徵也八月王饗師河南欲復戰郎中令鄭忠說曰王髙壁深壘勿與戰王乃使從兄劉賈與盧綰將兵入楚地佐彭越焚楚積聚復擊破楚師於燕西下梁地十七城九月東擊彭越令大司馬曹咎長史欣守成皋酈食其說王曰夫敖倉天下轉輸久矣臣聞其下乃有積粟甚多楚人不堅守敖倉乃引兵而東令士卒分守成皋此天所以資漢也且兩雄不俱立楚漢久相持不决百姓搔動海内揺蕩農夫失耒紅女下機天下之心未有所定願大王急復進兵收滎陽據敖倉之粟塞成皋之險杜太行之道距飛狐之口守白馬之津以示諸矦形制之勢則天下知所歸矣今燕趙已定唯齊未下雖數十萬之師未可以嵗月破也臣請得奉明詔說齊王使為漢稱東藩臣王曰善乃進兵復守敖倉食其說齊王曰知天下所歸即齊國可得而有也齊王曰天下何歸曰漢王定三秦出武闗而誅殺義帝之賊收天下之兵紹諸矦之業降城即以矦其將得賂即以分其士卒與天下同其利豪傑俊才皆樂為之用諸矦之兵四面而㑹蜀漢之粟方船而下項王有殺義帝之名有背約之負於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫敢用事為人刻印刓而不能授積財而不能散故天下叛之賢才怨之故天下歸漢可坐而策也夫漢王𤼵蜀漢定三秦涉西河之外授上黨之兵北破趙魏誅成安君此黃帝之兵非人之力天之所授也今已據敖倉之粟塞成皋之險守白馬之津杜太行之坂距飛狐之口天下後服者先亡矣王疾下漢社稷可得而保也齊王以為然乃罷守兵與食其日縱酒焉前漢紀卷二欽定四庫全書前漢紀卷三漢荀悅撰髙祖
