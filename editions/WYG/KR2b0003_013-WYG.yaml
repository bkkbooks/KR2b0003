body:
  text: 前漢紀卷十三漢荀恱撰孝武四二年冬十月行幸雍祠五畤春三月戊寅丞相公孫𢎞薨壬辰御史大夫李蔡為丞相張湯為御史大夫驃騎將軍霍去病將萬騎出隴西逾烏盭討遫濮陟狐奴歴五國生獲匈奴單于子轉戰六日過鄢耆山千有餘里合短兵鏖皋蘭下斬盧侯王執渾邪王子及相國都尉收休屠王祭天金人去病者衞青姊少兒子也父霍仲孺為縣吏給事平陽公主家與少兒私通生去病去病初以侍中為票鷂校尉從衞青擊匈奴有功封冠軍侯及至是役増封二千二百戶夏馬生余吾水中南越獻馴象能言鳥將軍去病公孫敖出北地二千餘里過居延斬首虜三萬餘級匈奴入鴈門殺略數百人遣衞尉張騫郎中令李廣將兵出右北平廣將四千餘騎副之與張騫異道匈奴數萬騎圍廣廣軍士震恐廣乃使其子敢從數十騎直貫突胡騎中出其左右而還謂廣曰胡騎易與耳軍士心乃安乃為圜陣外向胡急擊之矢下如雨漢兵死者過半射矢且盡廣乃持滿無𤼵廣身自以大箭射其禆將殺數人胡虜稍稍解去㑹日暮吏士無人色而廣意氣自如明旦復力戰而張騫以萬騎至匈奴乃解去廣騎略盡獨得以身免亦殺虜三千餘人廣既歸以其所殺獲自當無罪無賞張騫以後期當斬贖為庶人廣亦為庶人廣嘗夜遊田間飲還霸陵尉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也止廣宿亭下居無幾何匈奴入遼西召拜廣右北平太守廣請尉俱至軍所而斬之江都王建有罪自殺初易王薨建居服外舎召易王所幸淖姬等凡十人及女弟徵臣等與姦通建遊章臺令四女子乗小船建蹈覆其船四人皆溺二人死復遊雷陂天大風建使郎二人乗小船入波中船覆郎溺投水乍見乍没建臨視之大笑以為樂卒皆死宫人女子有過輒裸令擊鼓或置樹上乆者三十日乃得衣或縦狼嚙殺之建觀而笑之或閉人令餓死凡殺人無辜者三十五人建欲令人與禽獸交而生子令宫人與羝羊及狗交自知罪多國中人欲告之建遂謀反作黄屋蓋刻皇帝璽作漢節賂閩越約有急相助建時載其父所賜天子旌旗出入後事發覺有司奏建無道雖桀紂之惡不至於是當以謀反法誅廷尉宗正即問建建自殺本傳云魯哀有言寡人生於深宫之中長於婦人之手未嘗知憂未嘗知懼信哉斯言雖欲不危亡不可得也是以古之人以宴安為鴆毒無德而富貴謂之不幸漢興諸侯王率多驕淫失道何則沈溺於放恣之中居勢使之然也自凡人猶繫於習俗何况哀公之倫乎夫唯大雅卓爾不羣河間獻王近之矣膠東王寄薨淮南王謀反時寄漸聞其事私作戰守備及後治淮南王事上令下吏辭出之寄後自傷悔𤼵病死不敢置祠後上立寄長子賢為王秋昆邪王率衆四萬餘人來降封為列侯單于怒昆邪王休屠王數為漢所破單于欲誅之故二王謀降漢休屠王後悔昆邪殺之并其衆以降合四萬餘人置五屬國以處之以其地為武威酒泉郡而休屠王子曰日磾與母閼氏及弟倫俱没入官輸黄門養馬休屠王祭天作金人故曰金氏上遊後庭視馬後宫滿廏掌養事數十人莫不竊視磾獨不敢視馬又肥好日磾長八尺二寸容貌甚嚴麗上異而問之以狀對即日拜為馬監後為光禄大夫侍中上甚信愛之賞賜纍千金出則參乗入則侍帷幄貴戚左右皆曰陛下安得一胡兒而反貴重之上益厚焉日磾母教二子有法度母病死上圗母形於甘泉宫日磾每朝見母畫像嘗拜泣而後去日磾二子皆為上弄兒其後弄兒壯大不謹自殿下與宫人戲日磾見之即殺之上大怒日磾言其狀上為泣而心敬日磾侍左右數十年未嘗忤視上賜以宫女不敢近之其謹慎如此三年春有星孛於東方夏大旱五月赦天下立膠東康王少子慶為六安王慶寄之愛子也上憐焉故立之封蕭何曽孫慶為酇侯先是慶父則嗣有罪免故以弟子勝嗣有罪免侯故以兄子慶嗣何後秋匈奴入右北平定襄殺略千餘人遣謁者舉吏民能假貸貧民者以名聞是時昆邪王新降縣官費衆倉庫空竭貧民流徙皆仰給貸於縣官縣官無以賑之河南人卜式以錢二十萬與太守助廩貧民時富民多匿財者唯式願出家財上召拜為中郎賜爵左庶長復田十頃布告天下以諷百姓式以田畜為事有羊千餘頭先是時擊匈奴式上書願輸家財半以助邊上問式欲官乎對曰不願又問家有寃乎曰無也以為天子誅匈奴賢者宜盡節有財者宜輸之則匈奴可滅也時丞相公孫𢎞以為此非人情不軌之臣不可以為化不許之及式為中郎上乃使式牧羊上林苑中羊肥息上見問而善之式曰非獨羊治民亦猶是以時起居惡者輒去之無令敗羣上竒其言拜緱氏令吏民便之減隴西北地上郡戍卒半是嵗𤼵謫吏卒穿昆明池四年冬有司言闗東流民凡七十二萬五千口縣官無以衣食賑廩用度不足請收銀錫以白鹿皮造白金及皮幣以足用是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺縁以繢為皮幣直四十萬王侯宗室朝覲必以皮幣薦璧然後得行又以銀錫為白金三品其一重八兩圎之其文龍名白撰直三千其二差小而方之其文曰馬直五百其三復小橢之其文曰龜直三百銷半兩錢更鑄三銖錢重如其文又盗鑄作幣罪死於是孔僅為大司農丞領管鹽鐵桑𢎞羊洛陽賈人子以能心計年十三為侍中言利事皆析秋毫而始算緡錢及車船矣其後𢎞羊請置大司農部丞數十人分主郡國各得徃置均輸鹽鐵官令逺方各以其物如商賈所販賣為賦而相灌輸置平準官於京師都受天下委輸諸物官盡籠天下之貨物貴則賣之賤則買之富商大賈無所牟大利物皆反其本而物不得踊貴故抑天下之物名曰平準又請令民得以粟補吏罪人得以贖死及入粟為吏復各有差於是民不益賦而國用饒足乃賜𢎞羊爵左庶長黄金二百斤㑹天大旱上令百官請雨太子傅卜式言於上曰縣官當衣食租稅而已今𢎞羊令吏坐市列肆販賣求利獨􅖒𢎞羊天乃雨是時董仲舒說上曰古稅民不過什一使民嵗不過三日民財用内足以養老盡孝外足以事上供稅下足以畜妻子故民恱而從上至秦則不然用商鞅之法改帝王之道除井田之制富者田連阡陌貧者無立錐之地又專川澤之利管山林之饒荒淫越制邑有人君之尊里有王侯之富小民安得不困又加月為更卒征衞屯戍一嵗力役三十倍於古田稅口賦二十倍於古或耕豪民之田見稅什五故嘗衣馬牛之衣食犬豕之食又重以貪㬥之吏刑戮妄行民無所聊生逃亡山林並為盗賊斷獄一嵗以十萬數漢興遵而未改古井田法雖難卒行宜少近古限民占田塞兼并之路鹽鐵皆歸於民去奴婢除專殺之威薄賦斂省徭役以寛民然後可治也其言未施行春有星孛於東北夏有長星出於西北大將軍衞青將四將軍出定襄將軍去病出代各将五萬騎步兵數十萬青到漠北圍單于斬首萬九千級單于遁走追至顛顔山乃還去病與左賢王戰斬首虜七萬餘級封狼居胥山乃還前將軍李廣後將軍趙食其皆後期廣自殺食其贖死廣與大將軍别道迷而後期大將軍遣長吏責問廣令詣幕府對謂其麾下曰廣結髪與匈奴大小七十餘戰今迷而失道豈非天邪且廣年已六十餘終不能使復對刀筆吏矣遂自刎死百姓聞之知與不知莫不垂泣廣初文帝時以良家子從軍文帝竒其才曰使廣遭髙帝萬戶侯豈足道哉及吳楚反時戰昌巴下顯名後為上郡太守匈奴入上郡上使中貴人助廣擊匈奴中貴人將數十騎出見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走告廣廣曰此必匈奴射鵰者乃從百餘騎馳射殺二人生得一人匈奴數千騎望見廣以為誘騎驚出兵上山而陣廣直前來至匈奴二里止令皆下馬解鞍有白馬將軍出護兵廣射殺之復還解鞍縱馬胡兵怪之卒不敢擊㑹日已暮胡以為漢有伏兵乃夜遁走嘗獵見草中石以為伏虎射之入石没羽視之石也他日射之終不能入廣之軍吏士卒多以軍功封侯者而廣終不得封初西羌反廣誘降者八百餘人而同日盡殺之望氣者王朔曰禍莫大於殺已降此將軍所以不封侯也五年春三月甲午丞相李蔡有罪自殺賜葬地陽陵二十畝盗取長陵三畝又侵神道壖地一畝葬其中行五銖錢徙天下姦猾吏民於邊闗内侯郎中令李敢怨衞青之恨其父也乃擊青傷之諱而匿之居無幾何敢從上甘泉霍去病怨敢傷青射殺敢上為諱云鹿觸殺之夏四月乙丑太子太傅嚴青翟為丞相六年冬十月雨水無冰夏四月乙巳廟立皇子閎為齊王賜䇿曰惟元狩六年夏四月乙巳皇帝使御史大夫張湯廟立皇子閎為齊王曰嗚呼小子閎受兹青社朕承天序唯稽古建爾國家封於東土世為漢藩輔嗚呼念之哉共朕之詔唯命不於常人之好德克明顯光厥有不臧無乃凶於乃國害於爾躬嗚呼保國乂民可不慎歟王其勗哉立皇子旦為燕王胥為廣陵王皆賜䇿六月乙卯詔遣博士六人分巡天下存孤寡恤廢疾賑窮乏勸孝悌舉獨行之君子秋九月大司馬驃騎大將軍霍去病薨發屬國𤣥甲軍陳長安至茂陵為冢塋象祁連山諡曰景桓侯去病為將敢深入赴利不顧其難然士卒或乏糧食上嘗教之孫吳兵法對曰顧方略如何耳不蹈用古兵法上為治第對曰匈奴不滅臣何以家為去病後甚貴寵而衞青稍衰賓客故人皆去青而事去病唯故益州刺史任安不肎去初去病既壯大乃自知為霍仲孺子㑹為驃騎將軍擊匈奴道出河東乃迎見仲孺大為置田宅奴婢而去還復過之仲孺小子光字子孟年十餘嵗因將光西入闗任光為郎遷侍中去病死後光為奉車都尉光禄大夫出則侍車入侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親信元鼎元年夏五月赦天下大酺五日六月得寶鼎於河東汾水上薦見於宗廟藏於甘泉宫鼎大八尺一寸髙三尺六寸羣臣伏賀曰陛下得周鼎侍中光禄大夫吾丘壽王獨曰非周鼎上怒召而問之對曰周有明德上天報應鼎為周出故為周寶今陛下恢崇大業天瑞並至昔秦始皇出鼎於彭城而不能得天祚有德而寶鼎自出此天所以與漢乃漢寶非周寶也上曰善賜金五十斤初公孫𢎞奏禁民無持弓弩曰一賊彎弩百吏不敢前此盜賊所以蕃也上下其議壽王對曰大射之禮自天子逹於庶人三代之道也臣聞聖人合射以教人不聞弓矢之為禁也攻奪之罪死而猶不止大姦之於重誅固不避也臣恐邪人挾之吏不能止良民自衛而抵罪犯禁是擅賊威而奪民救也竊以為無益於禁姦而令學之者不得修其業不甚便上以難𢎞𢎞屈服焉壽王字子贑涿郡人也後坐事誅濟東王彭離有罪廢徙上庸博士徐偃使循行天下郡國矯制使膠東魯國鼓鑄鹽鐵御史大夫張湯劾奏偃法至死偃對以為春秋之義大夫出疆有可以安社稷利國家存萬民者專之可也湯不能屈其義有詔使中謁者終軍問其狀終軍詰偃曰古者諸侯國異政家殊俗安危之勢呼吸成變故有專已之義今天下為一春秋之義王者無外偃巡封域之中而辭以出境何也且鹽鐵郡有餘藏正二國廢不足為害而以安社稷為辭何也偃以前三奏不許而直矯制作威福此明王所必加誅也凡偃鑄鐵欲及春耕種贍民器今魯之鼓鑄當先具其器備至秋乃能舉火此言與實倍也枉尺直尋孟子猶稱不可今所犯罪重所就者少偃自以為必死而為之邪將幸誅不加欲以採名也偃辭屈下御史大夫服罪終軍濟南人也年十八選為博士到府受遣太守賢而友之軍揖太守而去徒步入闗闗吏與繻曰還當合符軍曰大丈夫西遊終不徒還棄繻去及軍為謁者使行郡國建節東出闗闗吏識之曰此使者前棄繻生也二年冬十有一月御史大夫張湯有罪自殺御史中丞李文與湯有郄湯所厚吏魯謁居隂使人上變告文姦事事下湯治論殺文而德厚謁居謁居病湯親為之摩足趙王素怨湯上書告湯大臣乃與吏謁居摩足疑與為大姦丞相長史朱買臣等素怨湯亦言湯且欲為請奏所愛幸賈人田信等輒先知之居物致富與湯分之上以問湯湯不服罪於是上使使廹責湯湯為書謝因曰陷臣者三長史也遂自殺昆弟諸子欲厚葬之湯母曰湯為大臣被惡言而死何厚葬之有載以牛車有棺無椁上聞之曰非此母不生此子乃盡誅買臣等初湯好文涉深刻與太中大夫趙禹共定律令禹官至少府亦深刻然禹意在奉公孤立而湯佞智以諛世主接士大夫造請諸公不避寒暑以得聲譽上甚信用之每朝奏事日旰忘食丞相充位而已天下事皆決於湯湯嘗病上親問疾匈奴嘗求和親羣臣議上前博士狄山以和親為便湯曰此愚儒無知山曰臣固愚忠不若湯詐忠也上作色曰吾使山居一郡能無使虜入盜乎山曰不能曰居一縣又曰不能復曰居一鄣山自度窮且下吏因曰能遣山椉一鄣至月餘匈奴斬山頭而去自是羣臣畏湯莫敢言矣湯子安世少為郎給事尚書精勤於職休沐未嘗出行後上方幸河東亡書三篋詔問莫能知唯安世識之具作其事後購得本書以相校無所遺失上竒其才擢為尚書郎中令安世寛仁與父行異十有二月丞相嚴青翟下獄死春起柏梁臺三月大雨雪辛亥太子太傅趙周為丞相夏大雨水闗中餓死者以千數秋九月詔曰仁不異逺義不辭難江南饑寒下巴蜀之粟致之江陵遣博士分循行吏民有能救饑困者具舉以聞三年冬十月徙函谷闗於新安以故闗為𢎞農縣十有一月令民有告緡者以其半與之春正月戊子陽陵園災夏四月雨雹闗東郡國十餘飢人相食常山王舜薨諡曰憲王王子㪍嗣有罪廢徙房陵立憲王中子平為真定王徙代王義為清河王四年冬十月行幸雍祠五畤東行幸汾隂十有一月甲子立后土祠於汾隂禮畢行幸滎陽還至洛陽詔問周王後得孽子嘉封為周子南君以奉周祀春二月中山王勝薨諡曰靖王勝樂酒好内色有男子百二十餘人夏封方術士欒大為樂通侯位上將軍欒大膠東人也以方術言於上曰臣嘗徃東海中見安期羡門之屬臣師曰黄金可成河水決可塞不死之藥可得仙人可致也然臣恐效文成將軍則方術之士掩口不能言矣文成將軍者齊人也姓李字少翁以方術進拜為文成將軍上以客禮待之於甘泉宫中畫太乙諸鬼神像常設祭祀欲以致其神嵗餘其方不效乃為帛書以飯牛偽言牛腹中有竒書殺而視之上識其手書問之果服乃誅上既殺文成而悔之及得欒大甚喜而大敢為大言處之不疑上使驗小方鬬棊棊自相觸大言能致其師陛下必欲致之則貴其使者令有親屬以客禮待之上乃拜大為五利將軍天士將軍地士將軍大通將軍凡四將軍四印賜列侯甲第僮千人乗輿廏馬帷帳器物以充其家以衞長公主妻之齎黄金萬斤上親至其家自公主大臣將軍卿相已下皆致酒其家刻玉印曰天道將軍使者衣羽衣夜立白茅上大亦衣羽衣立白茅上受印綬以示不臣於是五利將軍嘗夜祠其家欲下其神後裝欲入東海中云求其師至大山不敢入海上使人隨而驗之皆妄言不效先是方士李少君乃言能致物却老少君嘗至武安侯家有老人年九十餘少君乃言與老人大父遊獵處老人為兒時識其家處一坐盡驚上有古銅器以問少君少君對曰此器齊桓十年陳於柏寢下案其刻銘果齊桓公器時皆謂少君數百嵗人也少君言祠竈可致物如丹砂可化為黄金黄金成以為飲食器則益壽而蓬萊仙人可得見也見之以封禪則不死黄帝是也其後方多不效而少君病死道士以為化去不死也齊人公孫卿言黄帝得寶鼎而神化登於天䜟書言漢興正當黄帝之運漢之聖德者在髙祖之孫上曰嗟乎誠得如黄帝吾視去妻子如脫屣爾拜卿為郎使候神於太室是時言神怪方術者以萬數入海求仙人者數千人上幸東萊夜見大人長數丈就之則不見見大人迹諸方士後皆無驗上益厭倦然猶羈縻不絶冀望其真上嘗疾病有巫為上致神君貴者曰太乙其次曰太禁司命之屬皆從之云非可見但聞其言言與人音等也時去則若風肅然嘗以夜至或以晝至或居室帷幄中上禮之然後入因巫為主人闗通飲食所欲言又置壽宫張羽旗設祭具以祀神君所言使人記之其言世俗所知亦無絶殊者而上心甚善之其事祕世莫傳也而信以為神矣荀恱曰易稱有天道焉有地道焉有人道焉各當其理而不相亂也過則有故氣變而然也若夫大石自立僵柳復起此形神之異也男子化為女死人復生此含氣之異也鬼神髣髴在於人間言語音聲此精神之異也夫豈形神之怪異哉各以類感因應而然善則為瑞惡則為異瑞則生吉惡則生禍精氣之際自然之符也故逆天之理則神失其節而妖神妄興逆地之理則形失其節而妖形妄生逆中和之理則含血失其節而妖物妄生此其大㫖也若夫神君之類精神之異非求請所能致也又非可以求福而禳災矣且其人不自知其所然而然况其能為神乎凡物之怪亦皆如之春秋傳曰作事不時怨讟起於民則有非言之物而言者當武帝之世賦役煩衆民力彫弊加以好神仙之術迃誕妖怪之人四方並集皆虚而無實故無形而言者至矣於洪範言僭則生時妖此蓋怨讟所生時妖之類也故通於道正身以應萬物則精神形氣各返其本矣秋馬生渥洼水中九月辛巳丞相趙周下獄死丙申御史大夫石慶為丞相立常山憲王舜少子商為泗水王前漢紀卷十三
