body:
  text: 前漢孝惠皇帝紀卷第五皇帝五月丙寅即位年十六尊高后曰皇太后凡帝母稱皇太后帝祖母稱太皇太后適稱皇后妾稱夫人又有美人良姊七子八子長使少使之號武帝制婕妤娙娥容華充衣而元帝加昭儀之號昭儀位視丞相爵比諸侯王婕妤視上卿爵比列侯娙娥視中二千石爵比關內侯容華視真二千石爵比太上造美人視二千石比少上造八子視千石爵比中更充衣視九百石爵比左更七子視八百石比右庶長良姊視七百石比左庶長長使視六百石比五大夫少使視四百石比公乘又有五官視三百石順常視二百石涓和娛保林良使者皆視百石上家人子中家人子視有秩斗食賜吏民爵其喪事將軍已下至佐長吏賜金錢各有差六百石已上有罪當刑械者皆容繫之民年七十已上十歲已下有罪當刑者免之吏六百已上及故二千石家唯給軍賦役無有所預叔孫通為太常定園陵宗廟及高祖廟奏武德文始五行之舞武德者高祖所作以象天下樂己行武以除亂也文始舞者本舜韶舞也高祖更名文始舞五行舞者本周舞也秦始皇更名五行舞太祝迎神于廟門外奏嘉至猶古降神之樂也皇帝入廟門奏禮至以為行步之節猶古采薺肆夏也乾豆上奏登歌不以管絃欲使在位者遍聞之猶古清廟之樂歌再終也下奏休成之樂美神明既嚮也皇帝既就東廂坐定奏永安之樂美禮已成也令郡諸侯王立高廟元年冬改諸侯王相國為丞相十二月趙王如意薨諡曰隱王先是太后囚戚夫人于永巷髡鉗之令舂且歌曰子為王兮母為虜終日常舂兮與死同伍相去數千里誰可使告汝呂后聞之曰欲倚弱子邪召趙王欲誅之趙相周昌令王稱疾使者三反王不行呂后乃召周昌周昌至復使召趙王上知太后怒自迎王於霸上夾與起居數月上晨出苑中獵趙王不能早起太后鴆而殺之周昌乃謝病不朝見呂后乃斷戚夫人手足去眼熏耳飲以喑藥使居鞠室中名曰人豕召帝視之帝驚乃大哭因病歲餘不能起使人謂太后曰此非人所為臣不堪為太后子終不能治天下遂不聽政事賜民爵初元年故也凡賜民爵所以宣恩惠慰人心必有所由也徙淮陽王春正月城長安二年冬十月齊王來朝王上之庶兄也上與王讌飲太后前置王上坐如家人禮太后怒酌鴆酒令齊王為壽齊王起上亦起太后恐自反巵酒王怪之因偽醉而出齊內史令王獻城陽郡以尊魯元公主為湯沐邑太后嘉而許之乃遣王歸國春正月癸酉有兩龍見於蘭陵人家井中乙亥夕始不見本志以為其後趙王幽死之象隴西地震天開東北廣十餘丈長二十餘丈本志曰地動陰有餘天裂陽不足人主微之應夏五月大旱郃陽侯仲薨七月相國蕭何薨諡文終侯初何病上自臨問百歲之後誰可代君者對曰知臣莫若君上曰曹參何如對曰陛下得之矣何死不恨初何買田宅必居窮僻處為家不治園屋且曰後世賢師吾約不賢毋為勢家所奪癸巳齊丞相曹參為相國初參在齊召長老諸先生數百人問以時政長老諸先生言人人殊異膠西蓋公治黃老術曰治道貴清靜而民自定參乃師蓋公齊國大治初田榮欲叛項羽劫齊處士不預者死齊處士東郭先生梁石君隱在劫中及榮敗二人愧之隱居深山蒯通謂曹參曰彼東郭先生隱居不出君未嘗卑禮下節以求士也願足下禮之參曰諾皆以為上客而齊人安期生嘗干項羽項羽不用其策已而羽欲封之亦不肯受封曹參聞蕭何薨告其舍人曰趣治行吾且入相矣使者召參參始微時與蕭何善及為齊相有隙至何疾所推賢惟參參為相國遵何之政擇郡國吏謹厚者即丞相史其文刻深務聲名者輒斥去之日夜飲酒見人有細過專覆蓋之府中無事上怪而問參不治政事之意參對曰陛下聖德孰與高皇帝上曰朕安敢望先帝又問陛下視臣孰與蕭何上曰君似不及也參曰陛下言之是也高皇時與蕭何定天下法令既具陛下垂拱臣等守職遵而勿失不亦可乎上曰善民歌之曰蕭何為法較若畫一曹參代之守而勿失載其清淨民因寧謐三年春發京師六百里內男女十四萬六千人築長安城三十日罷以宗室女為公主妻匈奴單于夏五月立閩越君繇為東甌王初繇與諸粵俱佐諸侯伐秦繇功未錄故立為王都甌東號東甌六月發諸侯王列侯徒屬一萬人城長安秋七月都廄災南越王尉佗稱臣奉貢殞石緜諸一四年十月立皇后張氏帝長姊魯元公主女也太后欲為重親故配帝荀悅曰夫婦之際人道之大倫也詩稱刑于寡妻至于兄弟以御于家邦易稱正家道家道正而天下大定矣姊子而為后昏於禮而黷於人情非所以示天下作民則也群臣莫敢諫過哉春二月舉民孝弟力田者復其身三月大赦天下除民挾書律長樂宮鴻臺災雨血于一頃本志以為血者洪範所謂赤祥也一曰凡雨血有大誅三月未央宮冰室災丙子織室災本志以為冰室奉供養之饋織室供宗廟衣服皇后之象也天誠若曰皇后無宗廟之德云耳後嗣果絕其于洪範為火不炎上視不明之咎洪範者天人之變其法本于五行通于五事善惡吉凶之應于是在矣五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡田臘不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上好治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成好攻戰輕百姓亂飾城郭侵邊境則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下五事一曰貌二曰言三曰視四曰聽五曰思水為貌貌曰恭恭作肅肅時雨若厥福攸好德貌失厥咎狂厥罰常雨厥極惡時則有服妖時則有龜孽時則有鷄禍時則有下體生於上之痾時則有青眚青祥惟金沴木金為言言曰從從作乂乂時陽若厥福康寧言失厥咎僣厥罰常陽厥極憂時則有詩妖時則有介虫之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟火沴金火為視視曰明明作哲哲時燠若厥福壽視失厥咎舒厥罰常燠厥極疾時則有草妖時則有蠃虫之孽時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火水為聽聽曰聰聰作謀謀時寒若厥福富聰失厥咎急厥罰常寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟土沴水土為思思曰心心曰叡叡作聖聖時風若厥福考終命思失厥咎霧厥罰常風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有腹心之痾時則有黃眚黃祥惟金木水火沴土皇之不極厥咎眊厥罰常陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行此洪範之大體也五年十月雷桃李杏棗實常燠也春正月發京師六百里內男女十四萬五千人築長安城三十日罷三月上遊離宮叔孫通曰古者春常獻果今櫻桃始熟願陛下取獻宗廟諸果獻自此始初通秦時徵為待詔陳勝等起反二世詔問群臣博士群臣博士咸曰君親無將將而必誅宜急發兵擊反賊二世怒通進曰今明主在於上法令具於下安得有反賊乎此真狗盜鼠竊耳二世乃按誅諸言反者而拜通為博士出曰幾不免虎口乃遂亡後從漢及天下定通乃召魯諸生學者以定儀法魯召二人不肯行曰公為人臣不忠專面諛不諫苟免今兵革未休死傷者未收乃欲定禮樂公去矣無汙我通曰子真鄙儒不知時變乃去之漢諸禮儀皆通所定然猶草創未能具備矣夫禮樂聖人之所以興化致治太平之本也本志曰五經之道同歸而禮樂之用宜急治身者斯須忘禮則暴慢及之為國者一朝忘禮則荒亂及之人含天地陰陽之氣有善惡喜怒哀樂之情人稟異性而不能節也唯聖人能為之節而不能絕也故象天地而制禮樂所以通神明立人倫正情性節萬事者也有男女之情有妬忌之心為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有為崇敬上之心為制朝覲之禮喪有哭踊之節樂有歌舞之容正人足以副其情邪人足以防其失故婚姻之禮廢則夫婦之道缺而淫僻之罪多鄉飲酒之禮廢則長幼之序失而爭訟之獄繁喪紀之禮廢則骨肉之恩薄而皆死忘生者眾矣朝覲之禮廢則君臣之位失而侵凌之漸起矣故孔子曰安上治民莫善於禮移風易俗莫善於樂禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂以治內而為同禮以修外而為異同則和親異則畏敬和親則無怨畏敬則不爭揖讓而治天下者禮樂之謂也二者並行合為一體畏敬之意難見則著之於享獻辭受登降跪拜和親之說難形則發之於詩歌詠言鍾石管絃盡其敬意而不多其財賄盡其歡心而不留其聲音孔子曰禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉言明王設禮樂之本也故知禮樂之情者能作識禮樂之文者能述作者謂之聖述者謂之明王者必因先王之禮樂順時施宜有所損益即人之心稍稍制作至于太平而大備周監於二代禮文尤具故稱經禮三百威儀三千於是教化浹洽民用和睦災害不生禍亂不作囹圄空虛三十餘年孔子美之曰郁郁乎文哉吾從周及其衰也諸侯縱橫逾越法度惡禮制之害己去其篇籍遭秦滅學遂以亂亡夫樂可以善民心其感人深移人疾是故先王著其教焉夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉是故纖微譙偯之音作而民憂思闡諧慢易之音作而民康樂麤厲猛奮之音作而民剛毅廉直正誠之音作而民肅敬寬裕和睦之音作而民慈愛流僻邪放之音作而民淫亂故先王制雅頌之聲本之情性稽之度數制之禮儀合生氣之和導五常之性使之陽而不散陰而不奪剛氣不怒柔氣不懾四暢於中而發於外各安其位而不相奪足以感動民之善心不使邪氣得襲焉是先王立禮樂之方也黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作大韶禹作大夏湯作大濩武王作大武周公作勺咸池備矣六莖澤及根莖也五英茂也大章章之也韶繼也夏大也濩救也武言以武功定天下勺言酌先王之道自夏以往其流不可得聞也殷頌猶有存者周詩既備而器用陳張周官具矣夫禮樂者威儀足以充目聲音足以動耳詩歌足以感心故聞其音而德和省其詩而志正觀其數而法立是以薦之郊廟則鬼神享作之朝廷則君臣和立之學官則萬民協莫不虛己竦神悅而承流是以海內通知上德被服其風光耀日新化上遷善而不自知其所以然至于萬物化天地順而嘉應祥故詩云鍾鼓煌煌磬管鏘鏘降福穰穰書云擊石拊石百獸率舞至於末世衰亂殷紂斷棄先祖之正樂乃作淫聲用變亂正聲以悅婦人周道既缺而王官失業雅頌相錯禮樂大壞諸侯設兩觀乘大輅大夫八佾舞于庭政遂陵遲而不變於是桑間濮上鄭衛宋楚之聲並出內則致疾短壽外則亂政傷民巧偽之人因而飾之以熒亂富貴之耳目庶人以求利列國以相聞故秦穆公遺戎樂而由餘去齊人饋女樂而孔子行自此禮樂喪矣漢興乃復存之禮樂古事稍稍增集夏大旱江河水少谿谷水絕八月相國曹參薨諡懿侯九月長安城成十月安國侯王陵為右丞相陳平為左丞相賜民爵戶一級六年十月齊王肥薨諡悼惠王夏六月武陽侯樊噲薨諡曰武侯留侯張良薨諡文成侯高帝十四年留侯果得穀城山下黃石及薨與石并葬復置太尉官周勃為太尉太尉秦官掌武事自先王之立官名雖不同其致一也昔伏羲氏龍名神農氏火師火名黃帝雲師雲名少昊氏鳥師鳥名顓頊以來為民師民名有重黎勾芒祝融后土蓐收玄冥之官唐虞致羲和四子十有二牧禹作司空平水土棄作后稷播種百穀契作司徒訓五品皋陶作士官正五刑垂作共工利器用益作朕虞育草木鳥獸伯夷作秩宗典三禮夔作典樂和神人龍作納言出入帝命夏殷所聞略焉周官則備矣天官冢宰地官司徒春官宗伯夏官司馬秋官司寇冬官司空是為六卿太師太傅太保坐參天子而議政事不統職又立三少為副曰少師少傅少保是為三孤兼卿而九秦兼天下建皇帝之號改立臣官漢因循而不革從簡易隨時之宜丞相金印紫綬有左右丞相佐天子助治萬機高帝更名相國綠綬復為丞相御史大夫位上卿副丞相銀印青綬太尉有長史丞相置兩長史御史大夫置兩丞一曰中丞外督部剌史一曰內史掌祕書受公卿奏事舉掌劾章秩皆千石武帝置丞相司直掌左丞相舉不法秩比二千石前後左右將軍掌武衛本周末官秦因之金印紫綬位上卿太常掌郊廟祭祀禮樂典經景帝更名太常卿郎中令掌宮殿門戶宿衛屬官武帝更名光祿勳衛尉掌宮門衛士屯兵諸侯司馬太僕掌輿馬屬官廷尉掌刑辟典客掌諸侯歸義蠻夷景帝更名大行武帝更為大鴻臚宗正掌視親屬官治粟內史掌寶貨景帝更名大司農令武帝更改為大司農少府掌山海河澤之稅及供養內職屬官凡九卿秩皆中二千石丞皆千石廷尉無丞有正監秩比千石中尉掌徼巡京師位秩與卿同武帝更名執金吾太子太傅少府古官也將作少府掌治宗室事景帝更名大匠詹事掌后太子家令景帝更名長信少府武帝更名長樂少府將作官與詹事同并職景帝更名大長秋成帝省詹事并大長秋典屬國事掌蠻夷降者武帝省職并鴻臚內史掌京師景帝分置左右內史武帝更名內史為京兆尹左內史為左馮翊主爵中尉掌列侯景帝更名為都尉武帝更名為右扶風自太子太傅至右扶風秩比二千石丞六百石皆秦官唯內史為周官司隸周官漢為司隸校尉掌京師城門屯兵中壘校尉掌北軍壘門內外及掌四城門屯騎校尉掌騎士步兵校尉掌上林苑門屯兵越騎校尉掌馹騎馬長水校尉胡騎校尉掌池陽胡騎射聲校尉掌待詔射聲虎賁校尉掌輜重騎士皆武帝時置之西域都尉并加官以騎都尉使護西域有副校尉宣帝置也自司隸已下至副校尉秩比二千石有左右丞秩六百石五官中郎將左右將軍秩比二千石光祿大夫秩比二千石太中大夫秩比二千石掌論議諫議大夫秩比六百石奉車都尉掌御乘輿駙馬都尉掌駙馬秩皆二千石侍中左右諸曹吏散騎中常侍皆加官皆列侯將軍大夫騎都尉尚封令太毉令太官令至郎中無常員多至數十人侍中中常侍皆加官得入禁中其後侍中或特綰諸曹吏綬尚書奏事諸吏問舉劾按不法散騎並乘車輿給事中黃門亦加官所加或大夫博士議郎掌顧問應帝位次中常侍侍郎左右有給事中黃門侍郎位從將軍大夫官皆秦制也凡爵二十級一曰公士二曰上造三曰簪褭四曰不更五曰大夫六曰官大夫七曰公大夫八曰公乘九曰五大夫十曰左庶長十一曰右庶長十二曰左更十三曰中更十四曰右更十五曰少上造十六曰大上造十七曰駟馬車庶長十八曰大庶長十九曰關內侯二十曰通侯以賞功勞皆秦制諸侯王高帝初置之金印紫綬治其監官掌監郡縣秩比六百石後為刺史郡守掌治其郡郡都尉掌左守典職皆有丞縣令長掌治其縣萬戶以上為令秩比千石下至六百石而不滿萬戶為長秩皆五百石皆有丞尉皆秦制列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道荀悅曰諸侯之制所由來尚矣易曰先王建萬國親諸侯孔子作春秋為後世法譏世卿不改世侯昔者聖王之有天下非所以自為所以為民也不得專其權利與天下同之唯義而已無所私焉封建諸侯各世其位欲使親民如子愛國如家於是為置賢卿大夫考績黜陟使有分土而無分民而王者摠其一統以御其政故有暴禮於其國者則民叛於下王誅加於上是以計利慮害勸賞畏威各兢其力而無亂心及至天子失道諸侯正之王室微弱則大國輔之雖無道不得虐於天下賢人君子有所周流上下左右皆相夾輔凡此所以輔相天地之宜以左右民者也故民主兩利上下俱便是則先王之所以能永有其世也然古之建國或小或大監前之弊變而通之夏殷之時蓋不過百里故諸侯微而天子強桀紂得肆其虐紂脯邢侯而醢九侯以文王之上德不免於羑里周承之弊故大國方五百里所以崇寵諸侯而自抑損也至其末流諸侯強大更相侵伐周室卑微禍亂用作秦承其弊不能正其制以求其中而遂廢諸侯改為郡縣以一威權以專天下其意主以自為非以為民深淺之慮德量之殊豈不遠哉故秦得擅其海內之勢無所拘忌肆行奢淫暴虐天下然十四年而滅亡故人主失道則天下遍被其害百姓一亂則魚爛土崩莫之匡救賢人君子復無息肩眾庶無所遷徙此民主俱害上下兩危漢興承周秦之弊故兼而用之六王七國之難作者誠失之於強大非諸侯治國之咎其後遂皆郡縣治民而絕諸侯之權矣當時之制未必百王之法也凡長吏秩二千石上皆銀印青綬比六百石已上皆銅印墨綬比二百石已上皆銅印黃綬其後雖不及六百石其長相皆墨綬除八百石五百石秩荀悅曰先王之制祿也下足以代耕上足以充祀故食祿之家不與下民爭利所以厲其公義塞其私心其或犯逾之者則繩以政法是以君子勸慕小人無怨若位苟祿薄外而不充憂匱是卹所求不贍則私利之制萌矣放而聽之則貪利之心濫矣以法繩之則下情怨矣故位必稱德祿必稱爵故一物而不稱則亂之本也今漢之賦祿薄而吏非員者眾在位者貪於財產規奪官民之利則殖貨無厭奪民之利不以為恥是以清節毀傷公義損缺富者比公室貧者匱朝夕非為所濟俗也然古今異制爵賦不同祿亦如之雖不及古度時有可嘉也七年春正月辛酉朔日有食之是謂正朔王者惡之夏五月日有食之秋八月帝崩于未央宮太后哭而淚不下侍中張辟強者張良子年十五餘謂陳平曰太后泣不下淚者畏君等危呂氏宜請呂產呂祿為將監南北軍事太后必喜君等免禍平從之太后果喜而泣之淚下九月皇帝葬于安陵讚曰本紀稱孝惠內修親親外禮傅相優寵齊悼趙隱恩愛篤矣可謂寬仁之主遭呂太后虧損至德枉流濫哉深可悲矣
