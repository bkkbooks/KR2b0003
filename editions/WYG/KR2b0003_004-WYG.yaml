body:
  text: 前漢紀卷四漢荀悅撰髙祖四八年冬上擊韓王信餘㓂于東垣建武侯靳歙有功遷為車騎將軍上還過趙趙相貫髙伏兵栢人亭欲為逆上宿心動曰栢人者迫於人也乃去之初上過趙王甚卑恭上箕踞罵詈甚辱之貫髙謂王曰皇帝遇王無禮請殺之王嚙其指出血曰先人亡國頼皇帝得復徳流乎子孫君無出口髙等私相謂曰吾王長者終不背徳何為汙王事成歸之于王不成獨身坐之乃隂獨為謀而王不知十有一月令士卒従軍死者送歸于縣給衣衾長吏視葬祠以少牢十有二月至自東垣春三月行如洛陽令賈人無得衣錦繡綺榖絺紵九月至自洛陽九年冬十月淮南王趙王楚王来朝置酒前殿上為太上皇壽曰始者大人常以臣不如仲能治産業今臣之業孰與仲多殿上皆稱萬歳十有一月徙郡國大族豪傑名家十餘萬戸以實闗中婁敬之計也十有二月行如洛陽趙相貫髙逆謀彂覺同謀者趙午等十餘人皆自刎死髙曰若皆死誰當明王不反乃就檻車送詣長安言王不知考治身無完者終不復言上曰壮士哉令人私問之髙曰人情豈不各愛其親戚乎今吾三族皆以論死豈以王易吾親戚哉具以情對上乃詔赦趙王嘉貫髙之節乃赦之髙曰所不死者欲明王不反今王已出吾責塞矣且人臣有篡弑之名將何面目復事上哉乃仰天絶吭而死趙王張敖尚魯元公主故封敖為宣平侯荀恱曰貫髙首為亂謀殺主之賊雖能證明其王小亮不塞大逆私行不贖公罪春秋之義大居正罪無赦趙王掩髙之逆心失將而必誅之義使髙得行其謀不亦殆乎無藩國之義減死可也侯之過歟初捕趙王詔有敢従者夷三族趙王郎中田叔孟舒皆賢召見之漢朝廷臣無能出其右者皆以為郡守春正月徙代王如意為趙王夏六月乙未晦日有食之十年冬十月淮南王梁王燕王荆王楚王齊王長沙王来朝夏五月太上皇崩秋七月癸卯太上皇葬于萬年八月令諸侯王皆立太上皇廟于國都上欲廢太子立戚夫人子如意羣臣爭之不能得御史大夫周昌固爭之上問其状昌為人剛直少言對曰臣雖口不能言然心知其不可陛下必欲廢太子立戚夫人子如意臣期不奉詔昌甞奏事上方擁戚夫人昌還走上追之騎昌項上問曰我何如主曰陛下桀紂主也上笑之後上甞心不樂悲歌羣臣不知所謂符璽御史郎趙堯進曰陛下所為不樂者非以為趙王年少而戚夫人與吕后有隙萬歳之後不能自全也上曰然堯曰宜為趙王置貴强相吕后太子羣臣素所憚者上曰誰可使對曰周昌可相趙王上謂昌曰吾極知其左遷然吾憂趙王非公莫可相者乃以昌為趙相以趙堯代昌為御史大夫初趙人方與公謂昌曰君之吏趙堯竒士也且代君位昌笑曰堯年少刀筆吏耳何至是乎卒如方與公言九月陳豨反初豨接下賓客從車千餘乘適代時辭淮隂侯韓信韓信既廢恐懼怨望乃與豨謀曰趙代精兵處也公反于外上必自出吾従中起天下可圖也及反上欲自擊之建成侯周緤泣曰陛下常自行是無人可使初緤従上每有不利終無離上之心上以為愛我賜上殿不趨上遂東至邯鄲選壮士可令將者四人各封千戸侯左右皆曰此人何功而封千戸上曰非爾所知夫陳豨反趙代皆豨之有吾以羽檄徴天下兵未有至者今獨邯鄲中兵至吾何愛四千戸不以慰趙子弟心乎復求樂毅之後得樂叔封樂鄉侯號曰華成君令吏民為豨所劫略皆赦其罪問豨將皆故賈人曰吾知易與之矣乃多以金購豨將將多降是時沛人任敖素善於上上以客従拜為上黨太守堅守不下封敖廣阿侯御史大夫趙堯擊豨有功封江邑侯詔御史曰獄之疑者吏或不敢決或有死者久而不能論無罪者久繫自今以後有疑獄者各讞所屬二千石二千石不能決移之廷尉廷尉不決具奏以聞十一年冬十月遣周勃征代地春正月淮隂侯韓信謀反與陳豨為内應欲夜詐詔諸宫徒奴以襲吕后太子其舎人告之吕后與蕭何謀詐令人従上所来言陳豨已死羣臣皆賀遂執信斬之夷三族信方斬歎曰悔不用蒯通之言為女子所執上自邯鄲至洛陽召蒯通將烹之通曰臣聞狗各吠非其主當彼之時臣但知有齊王信不知有陛下且秦失其鹿天下爭逐之髙材輕足者先得當此之時爭欲為陛下所為顧力不能可盡烹耶乃赦之上使使者拜丞相蕭何為相國益封五千戸令卒五百人一都尉為相國衛諸羣臣皆賀故秦東陵侯邵平獨揖曰禍自此始矣上暴露於外而君守其内非有矢石之難而益封置衛者以今淮隂侯新反於中有疑君心夫置衛者衛君非所以寵君也願君讓封勿受以家財給軍何従之上大恱立皇子恒為代王都晋陽赦天下三月梁王彭越反誅三族上擊陳豨時徴兵梁王梁王但遣將徃上怒之梁王欲自行其將扈輒曰王始不行見讓而徃即為擒矣不如遂彂兵反梁王不聽稱疾梁王太僕有罪亡者告彭越與扈輒謀反上捕囚越赦為庶人徙之蜀道逢吕后於路涕泣曰無罪願歸昌邑吕后與俱還洛陽謂上曰彭越壮士徙之蜀自貽後患不如遂誅之吕后令其舎人告彭越復謀反乃誅之夷三族梟其首令曰敢有收視者輒捕之梁太傅欒布為彭越使于齊還報命首下祠而哭之上欲烹之方提頭趨湯鑊布曰願一言而死曰陛下非彭越項氏不亡今天下已定彭王剖符受封亦欲𫝊之萬世今一徴兵王不自行而疑以為反反形未見以苛察誅之臣恐功臣人人自危彭王已死臣生不如死請就湯鑊上赦之拜為都尉於是醢彭越以醢遍賜諸侯淮南王英布聞越死見醢乃驚恐隂有疑謀立皇子恢為梁王皇子友為淮陽王夏四月上行自洛陽五月遣楚人陸賈使南越立尉佗為王佗者秦時為南海郡尉因天下之亂遂有南越賈至尉佗椎髻箕踞見賈賈曰足下中國之人親戚昆季墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗行為敵國禍且及身矣天子聞君王南越不助天下誅暴秦將欲移兵於王天子為百姓勤勞遣臣授君王印綬剖符通使王宜郊迎北面稱臣乃欲以新造朱集之越屈彊於此漢誠聞之掘燒王先人墳墓夷滅宗族遣一偏將將十萬師以臨越越人即殺王降漢如反手耳於是尉佗乃蹷然起坐而謝曰吾居蠻夷中乆殊失禮儀因問賈曰我孰與蕭何􅔟參賢賈曰王則賢矣復問我孰與皇帝賢賈曰皇帝起豐沛討暴秦誅彊楚為天下興利除害繼五帝三王之業統治中國政由一家自天地剖判已来未曽有也今王衆不過數十萬皆蠻夷﨑嶇山海譬猶漢之一郡何乃比於漢也佗大笑曰吾不起中國故王此使我起中國何遽不若漢乃遂受符印稱王賜賈槖中装直千金餘贈送亦千金賈還報命拜太中大夫賈時上前說詩書上罵之曰吾居馬上得天下安用詩書乎賈對曰陛下居馬上得之寧能馬上治之乎且湯武逆取而順守文武並用久長之道昔呉王夫差極武而亡秦任刑法不變而滅向使秦已兼天下行仁義法先王陛下安得而有之上有慙色謂賈曰試為我著秦之所以失天下吾所以得天下及古今成敗之故賈凡著書十二篇每奏一篇上讀之未甞不稱善號其書曰新語秋淮南王黥布謀反謂其將曰上老矣厭兵必不能自来諸將獨韓信與彭越今皆死矣餘不足畏遂反汝隂侯問故楚令尹薛公曰布何故反對曰徃年殺韓信今年殺彭越此三人者同功一體之人自疑禍及其身故反耳夏侯嬰乃言薛公於上上召問之薛公對曰布出上計則山東非漢之有也出中計勝敗之數未可知布出下計陛下髙枕而卧耳上曰何謂上計對曰東取呉西取楚并齊與魯傳檄燕趙固守其所山東非漢之有何謂中計對曰東取呉西取楚并齊韓取魏據敖倉之粟塞成皋之口勝敗之數未可見也何謂下計東取呉西取蔡歸重於越身歸長沙陛下無患矣上曰此計將安出曰必出下計布故驪山徒耳致萬乗之王此皆為身不顧其後不為百姓萬世之業也上曰善封薛公為千戸侯上遂自征布赦死罪已下皆令従軍立皇子長為淮南王布果東擊楚楚王分軍為三欲以相救為竒兵或謂楚將曰諸侯自戰其地為散地今分軍為三布敗其一兩軍散走安能相救不聽布果敗其一軍而二軍皆走布遂與帝遇于蘄西㑹垂布兵精甚其置陣如項羽軍上惡之上謂布曰何苦反布曰我欲為帝耳上罵之遂戰布敗十二年冬十月上破布軍布走江南長沙王使人殺之上撃布也數使使勞相國或謂何曰君居闗中甚得百姓心上畏君傾動闗中君何不多買人田宅賤貰貣以自汙不然上心不安何従之上還過沛悉召故人父老子弟置酒上自歌曰大風起兮雲飛揚威加海内兮歸故鄊安得猛士兮守四方上乃起舞忼慨傷懐泣數行下歎息曰游子悲故鄉吾萬歳之後魂魄猶思沛其以沛為朕湯沐邑復其人世無所與又以豐比沛既至長安立豐縣豐之枌榆故廬社皆如舊制也周勃定代斬陳豨或言燕王綰與豨通謀上召盧綰盧綰謂其臣曰徃年族淮隂侯彭越皆吕后計今上疾病吕后婦人專欲誅異姓及大功臣遂稱疾不行上怒使樊噲將兵擊之綰將其家屬與數千騎居長城下欲候上差自入謝之上立沛侯濞為呉王濞者郃陽侯仲之子也已拜上相曰汝面狀有反相漢後五十年東南有亂豈非汝也然天下一家慎勿反也濞頓首曰不敢上過魯以太牢祀孔子十有二月還京師民遮道上書數千人言相國彊賤買民田宅上笑曰相國亦愛利乎使相國自謝民後蕭何為民復請上林苑中空地令民得入田無収槀為禽獸食上怒曰相國多受賈人金錢為人請吾苑乃詔下廷尉王衛尉諫曰相國何罪繫之暴也上曰吾聞李斯相秦有善歸主有惡自與今相國多受賈人錢為請吾苑以自媚於人王衛尉曰事茍有便於人而請之宰相職也陛下奈何乃疑相國受賈人金乎且陛下拒楚數年及陳豨反時上自將兵徃當時相國守闗中闗中揺足則闗西非陛下之有相國不以此時為利乃今利賈人金錢乎且秦以不聞其過而亡天下夫李斯之分過又何足法哉上乃令相國復其位詔為秦始皇帝置守冡三十家楚隱王十家復無所與春二月熒惑守心星占曰王者惡之立皇子建為燕王上擊黥布時為流矢所中疾甚吕后迎良醫良醫曰可治上怒曰吾以布衣提三尺取天下此非天命乎命乃在天雖扁鵲何益遂不使治吕后問曰陛下即百歳之後蕭相國終孰可代者上曰􅔟參可又問其次曰王陵可然少戅陳平可以佐之平智有餘然難獨任周勃厚重少文然安劉氏者必勃也可為太尉又問其次上曰過此以後非乃所知先是上甞疾困惡見人詔戸者無納羣臣羣臣莫敢入十餘日樊噲乃排闥直入大臣隨之上獨枕一宦者卧噲等見上流涕曰陛下疾甚大臣震恐久不見臣等計事顧獨枕一宦者嗟乎陛下獨不見趙髙之事乎上笑而起初上欲廢太子吕后聞之使留侯為太子計留侯曰上有所不能致者四人曰東園公夏黄公甪里先生綺里季皆逃在山中然上髙之今令太子卑辭安車迎此四人来以為客時隨入朝則一助也吕后従其計四人果来年皆八十鬚眉皓白故謂之四皓初黥布反時上欲使太子將兵擊布四人相謂曰凡来將以安太子太子將兵事危矣有功則位無益也無功従此受禍乃令吕后對上泣涕而言黥布善為兵諸將皆陛下故人今乃令太子獨將兵擊之恐諸將莫肯為用且懼布聞之鼓行而西耳陛下雖疾彊載輜車卧而䕶之諸將不敢不盡力上乃自行及還其疾稍愈欲易太子太傅叔孫通固諫曰晋獻公以驪姬故廢太子申生而立奚齊晋國大亂數十年秦不早定扶蘇胡亥詐詔自立使滅絶秦祀臣敢以死爭之上雖聼之而心欲廢太子及讌置酒太子侍四人従上怪而問之四人前對各言姓名上乃驚曰吾召公等不奉詔今侍太子者何四人對曰陛下喜罵輕士臣等義不受辱故亡今聞太子仁孝愛人敬士天下莫不延頸願為太子死者臣等故来上曰煩公等幸卒調䕶太子四人退上召戚夫人指示曰吾欲易太子彼四人者為之輔羽翼已成難揺動也太子遂定春三月詔曰吾有天下十二年于今與天下賢士大夫共安輯之至于褒賞功臣可謂無負矣其不義背天下約擅起兵者與天下共伐誅之夏四月甲辰帝崩于長安宫吕后畏諸將大臣與審食其謀欲盡誅大臣數日不彂喪酈商謂辟陽侯曰今陳平灌嬰將十萬衆守滎陽樊噲周勃将二十萬衆定燕代此四人聞帝崩諸將皆誅必連兵還嚮京師大臣内叛諸將外反亡可翹足而待審食其言之於吕后乃以丁未彂喪大赦天下盧綰聞上已崩遂亡入匈奴中五月丙辰皇帝葬長陵本志曰髙祖入秦初順人心作三章之約天下既定命蕭何定律令韓信申軍法張蒼定章程叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵劵藏之宗廟雖日不暇給規模𢎞逺矣讚曰髙祖起於布衣之中奮劒而取天下不由唐虞之禪不階湯武之王龍行虎變率従風雲征亂伐暴廓清帝宇八載之間海内克定遂何天之衢登建皇極上古已来書籍所載未甞有也非雄俊之才寛明之略厯數所授神祗所相安能致功如此夫帝王之作必有神人之助非徳無以建業非命無以定衆或以文昭或以武興或以聖立或以人崇焚烉斬蛇異功同符豈非精靈之感哉書曰天工人其代之易曰湯武革命順乎天而應乎人其斯之謂乎故觀秦項之所亡察大漢之所興得失之驗可見於兹矣太史公曰夏政忠政忠之弊野故殷承之以敬以敬之弊鬼故周承之以文以文之弊薄救薄莫若忠三王之道周而復始周秦之間可謂文弊秦不改文酷刑漢承秦弊得天下矣前漢紀卷四
