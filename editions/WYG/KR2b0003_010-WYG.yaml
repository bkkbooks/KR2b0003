body:
  text: 前漢紀卷十漢荀恱撰孝武一皇帝甲子即位年十六二月癸酉孝景帝葬陽陵三月尊太后母臧兒為平原君封田蚡田勝為列侯臧兒初為槐里王仲妻生太后後改嫁長陵田氏生蚡及勝建元元年冬十月詔舉賢良方正丞相衞綰奏所舉賢良或治刑名縱横之術亂國政罷之春二月赦天下賜民爵一級民年八十復二算九十復甲卒行三銖錢夏四月詔民年九十已上復子若孫令奉供養五月詔修山川之祀六月丞相衞綰免丙寅魏其侯竇嬰為丞相武安侯田蚡為太尉秋七月詔省衞士卒萬人罷苑馬賜貧民遣使者安車蒲輪束帛加璧徵魯申公議立明堂申公年八十餘矣上問以政事對曰為治者不在於多言顧力行何如耳拜為太中大夫漢興草創尚簡易未甚用儒者而竇太后好黄老術故諸愽士具官待問未有進者至上即位乃崇立太學矣二年冬十月丞相竇嬰太尉田蚡皆免御史大夫趙綰郎中令王臧下獄死蚡嬰綰臧皆同心欲興太學建立明堂以朝諸侯而嬰請無奏事太皇太后又罷竇氏子弟無行者絶屬籍故毁謗日至竇太后怒皆抵之罪明堂遂不立春二月丙戌朔日有食之三月己未太常許昌為丞相夏四月戊申有星如日夜出初置茂陵邑徙郡國豪傑於茂陵河内郭解在徙中衞將軍為言解家貧不應徙上曰解布衣權至使將軍知之此不貧也及解徙諸公贈送出千餘萬解任俠睚眦上崖下柴觸死於塵中者甚衆藏匿亾命攻剽作姦不可勝數然折節恭約厚施而薄望解嘗出有人箕踞視之者解問其姓名客欲殺之解不聴乃隂使吏脫其徭役其人乃肉袒謝罪解姊子與人爭不直人殺之自歸解解曰吾兒不直公殺之故當縱之諸公聞之皆多賢解洛陽人有相仇者賢豪居其間以十數人不能和解客乃令解見仇家仇家聴命解夜至夜去解乃謂仇家曰解如何從他郡奪人邑中權乎且須士大夫復居其間乃聴之其居家夜過半後門閭住居嘗十餘乗有與解忤者少年輒為報仇不使解知也解兄子為解殺人為其家人上書訟之又殺之闕下上捕解解亾過臨晉籍少翁少翁素不知解然慕其名送之出闗自殺以絶口語其得人率如此賢豪知與不知聞聲爭與交歡後捕得解所犯皆在赦前後有謗毁解者客殺之斷其舌解實不知有司奏解無罪時公孫𢎞為丞相以為解布衣以睚眦殺人雖不知甚於知遂族之荀恱曰世有三遊德之賊也一曰遊俠二曰遊說三曰遊行立氣勢作威福結私交以立彊於世者謂之遊俠飾辨辭設詐謀馳逐於天下以要時勢者謂之遊說色取仁以合時好連黨類立虚譽以為權利者謂之遊行此三遊者亂之所由生也傷道害德敗法惑世失先王之所慎也國有四民各修其業不由四民之業者謂之姦民姦民不生王道乃成凡此三遊之作生於季世周秦之末尤甚焉上不明下不正制度不立綱紀廢弛以毁譽為榮辱不核其真以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯是以言論者計薄厚而吐辭選舉者度親疎而舉筆善惡謬於衆聲功罪亂於王法然則利不可以義求害不可以道避也是以君子犯禮小人犯法奔走馳騁越職僭度飾華廢實競趨時利簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛㤀修身之道而求衆人之譽割衣食之業以供饗宴之好苞苴盈於門庭聘問交於道路書記繁於公文私務衆於官事於是流俗成矣而正道壞矣遊俠之本生於武毅不撓乆要不㤀平生之言見危授命以救時難而濟同類以正行之者謂之武毅其失之甚者至於為盗賊也遊說之本生於使乎四方不辱君命出境有可以安社稷利國家則專對解結辭之懌矣民之莫矣以正行之者謂之辨智其失之甚者至於為詐紿徒衆矣遊行之本生於道德仁義汎愛容衆以文㑹友和而不同進德及時樂行其道以立功業於世以正行之者謂之君子其失之甚者至於因事害私為姦宄矣其相去殊逺豈不哀哉故大道之行則三遊廢矣是以聖王在上經國序民正其制度善惡要於公罪而不淫於毁譽聴其言而責其事舉其名而指其實故實不應其聲者謂之虚情不覆其貌者謂之偽毁譽失其真者謂之誣言事失其類者謂之罔虚偽之行不得設誣㒺之辭不得行有罪惡者無僥倖無罪過者不憂懼請謁無所行貨賂無所用民志定矣民志既定於是先之以德義示之以好惡奉業勸功以敦本務不求無益之物不畜難得之貨絶靡麗之飾遏利欲之巧則淫流之民定矣而貪穢之俗清矣息華文去浮辭禁偽辨絶淫智放百家之紛亂一聖人之至道則虚誕之術絶而道德有所定矣尊天地而不瀆敬鬼神而逺之除小忌去淫祀絶竒怪正人事則妖偽之言塞而性命之理得矣然後百姓上下皆反其本人人親其親尊其尊修其身守其業於是養之以仁惠文之以禮樂則風俗定而大化成矣三年春河水決溢於平原大饑人相食賜茂陵徙者户錢二十萬田二頃初作便門橋秋亡月有星孛於西北濟川王明廢遷房陵坐殺太傅中尉閩越圍東甌告急上以問太尉武安侯田蚡蚡以為越人相攻其常事也又數反復不煩中國自秦時棄之不内屬詔㑹議太中大夫嚴助詰蚡曰但患力不能救德不能覆誠能何棄之且秦時舉咸陽而棄之何乃越乎今小國以窮困告急於天子天子不能救當安所訴又何以子萬國乃遣助使持節𤼵㑹稽兵救之未至閩越走九月丙子晦日有食之起上林苑時上使太中大夫吾丘壽王舉籍盩厔以東宜春以西北至阿城屬之南山提封頃畝價直欲除以為苑侍郎東方朔進諌曰臣聞謙遜靜慤天應以福驕盈奢靡天應以禍酆鄗之間號曰土膏其價畝直一金規以為苑上乏國家之用下奪農桑之業不可一也盛荆棘之林崇虎狼之墟壞民冢墓發民廬舎令幼小懷土而思耆老流淚而悲不可二也斥而營之垣而囿之馳騎逐東西車輦駕南北有深溝大渠險阻之危不可三也務苑囿之大不䘏農時非所以彊國富民也夫殷作九市之宫而諸侯叛楚靈王起章華之臺而楚人散秦興阿房之殿而天下亂上乃賜金百斤拜為太中大夫然猶起上林苑朔字曼倩平原人也好學稱為滑稽年二十二初為郎中上書自稱待詔公車奉禄薄朔謂侏儒曰上欲盡殺汝侏儒大恐皆叩頭號泣上召問朔朔對曰侏儒長三尺臣朔長九尺三寸俸禄正等侏儒侏儒飽欲死臣朔飢欲死臣言可用宜異其禄不可用罷之無但虚索長安米也上大笑使待詔金馬門稍稍親近之上置守宫於盆下使筮者射之莫能中朔自請布卦射之曰臣欲以為龍復無角臣欲以為蛇復有足跂跂脈脈善縁壁此非守宫當是蜥蝪上曰善復使射他物連中輒賜帛時有幸倡優郭舎人等曰朔幸中耳乃復覆置樹上寄生於盆中曰朔知之榜臣百不中賜臣帛朔曰是窶數也舎人曰朔果不能中朔曰溼肉為膾乾肉為脯樹上為寄生盆下為窶數乃榜舎人百朔對問響應權變鋒出文章辭令縱横無窮上頗倡優畜之然而時𤼵忠直之言極諌尤亦以此異焉朔因設客難已用位卑以自慰諭又設非有先生之論其辭曰非有先生仕於吳黙然無言者三年吳王怪而問之曰可以談矣先生伏而唯唯王曰可以談矣先生曰於戲可言乎哉談何容易王曰何為其然也寡人將聴焉先生對曰昔闗龍逢深諌於桀王子比干直言於紂此二臣者皆盡忠極慮將以為君之榮除君之禍也然以䝉不辜之戮為天下笑飛廉惡來巧言利口以進其身隂奉雕琢刻鏤之好以納於上快耳目之欲以茍容為度而見親近故宗廟崩阤國家丘墟夫卑身賤體恱色㣲辭愉愉呴呴終無益於主上之治即志士仁人不忍為也儼然而作矜莊之貌深言直諌上以拂人主之邪下以除百姓之害則忤於時主之心離於衰世之法故養性愛命之士莫肎進也遂隠居深山以詠先聖之風是以伯夷叔齊餓于首陽之下後世稱其仁如是邪主之行固足畏也故曰談何容易於是吳王瞿然易容為坐而聴之先生曰昔伊尹負鼎於湯太公釣於渭濱而遇文王心合意同謀無不成計無不從誠得其君也故能誅㬥亂總逺方一統類美風俗而王業興矣太公伊尹以如此龍逢比干獨如彼豈不哀哉故曰談何容易於是吳王黙然俛而深思仰而泣曰嗟乎殆哉予國之不亾也緜緜哉聮聮哉於是正明堂之朝齊君臣之位舉賢才布德惠施仁義恭儉節約減后宫之費損車馬之用放鄭聲逺佞人省庖㕑去奢靡卑宫室壞苑囿填池塹以與貧民開内藏以賚貧乏存耆老恤孤獨薄賦斂省刑罰行此三年隂陽調和萬物咸寧國無災害之變民無飢寒之色蓄積有餘囹圄空虚鳯皇來集麒麟在郊逺方異俗慕義向風治亂之道存亡之端若此易見然而人主莫肎為也悲夫是時上以安車蒲輪迎枚乗乗年老道死而乗子皋亦以談說能為辭賦得幸比朔上好自擊熊豕中郎司馬相如從上獵長楊長卿上疏諌曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育然臣之愚竊以為人誠有之獸亦宜然今陛下好陵險阻射猛獸卒然遇逸羣之獸駭於不存之地犯屬車之清塵輿不及還轅馬不及旋踵人不暇施巧雖有烏獲逢䝉之技而不及用枯木朽株盡為患難矣是胡越起於轂下而羌夷接軫矣豈不殆哉雖曰萬全而無害然本非天子所宜近也且夫清道而後行中路而後馳猶時有銜橛之變况涉乎豐草馳乎丘墟前有利獸之樂内無存變之計其為害也不難上善之相如字長卿蜀郡成都人也初家貧與臨卭令王吉相善富人卓王孫置酒請令并請相如相如善鼓琴王孫寡女字文君好音夜奔相如遂與俱歸成都後家貧夫妻酤酒臨卭卓王孫恥之杜門不出後不得已乃厚分財物遺文君而相如作子虚賦上得讀而善之曰朕獨不得與此人同時或對曰司馬相如所作也上驚乃召相如復奏上林賦拜為郎中子虚上林皆言苑囿之美卒歸之於節儉因託以諷焉相如口吃而善著書四年夏有氣赤如血六月旱秋九月有星孛于東北江都相陳人鄭當時為内史每朝候上間未嘗不言天下之長者其推轂名士嘗以為賢於己禄賜盡以饋士大夫家無餘財賓客甚盛及中廢賓客衰落先是下邽翟公為廷尉賓客填門及廢門外可設雀羅復廷尉客復徃翟公大板署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交態乃見冬十月地震是嵗武彊侯嚴青翟為御史大夫五年春正月己巳朔日有食之行半兩錢罷三銖錢初置五經博士博士本秦官掌通古今貟至數十人漢置五經而已太常選人年十八以上好學補弟子郡國有好文學敬鄉里者令與計偕受業太常補弟子一嵗輒課通經一藝補文學掌故髙第為郎中其秀才異等太常以名聞其下才不事學者罷之是時廬江人文翁為蜀郡太守其為人愛學好教化見蜀地僻陋有蠻夷之風文翁乃選郡縣小吏有才器者輒給資用令詣博士受業還皆以為右職用察舉之又修起學宫於城中學者復除徭役嘗選學宫童子所在便坐受書每事嘗出入行縣益從諸生明經修行者使傳教出入縣邑見而榮之由是蜀邑大化學者比齊魯焉郡國學校官自文翁始也夏四月平原君薨五月大蝗秋八月廣川王越薨清河王乗薨六年春三月乙未遼東髙廟災夏四月壬子髙園便殿災上素服五日其後太中大夫董仲舒居家推其意以髙廟不當居遼東髙園便殿不當居陵旁於禮不當立廟在外像諸侯不正者髙園在内像大臣不正者天誡若曰去諸侯大臣貴幸不正者云爾時太中大夫主父偃素妒嫉仲舒竊其書奏之仲舒下獄吏當死詔宥之本志以為淮南王田蚡之應也五月丁亥太皇太后崩六月癸未丞相許昌免武安侯田蚡為丞相秋七月有星出于東方長終天本志曰是為蚩尤之旗似彗星而後曲見則天子征伐四夷之應也閩越圍南越南越守天子約不敢發兵上遣大司農韓安國帥師出㑹稽大行王恢出豫章救之淮南王安上書諌曰越方外之國斷髪文身之人不可以冠帶之國法度治之自三代之盛明胡越不與受正朔非彊不能服也以為不居之地不牧之民不足以煩中國古者封内甸服封外侯服侯外賓服蠻夷要服戎狄荒服逺近之勢異也越人名為蕃臣實不給上事自相攻擊耳陛下以兵救之是反以中國勞蠻夷也且越人故數反覆非一一不奉詔舉兵誅之臣恐中國兵革無時得息也間者嵗比不登民生未復今發兵行數千里舉轎而踰嶺拕舟而入水行數千里夾以深林叢竹又多蝮蛇猛獸夏月暑時則生吐泄霍亂之病曽未接兵死傷者必衆矣或以越人衆兵彊能作難邊地臣竊聞之與中國異限以髙山人迹隔絶車道不通天地所以絶内外也其入中國必先下嶺水嶺水之山峻峭漂石破舟不可大船運糧下也越人欲為變必先田餘干界中積糧食乃入山伐材治舩邊地守候誠使謹防越人有伐材輒收捕之焚其積聚雖百越無奈邊城何也臣聞越卒不下數十萬人所以入者五倍乃足挽車奉餉不在其中且越非有城郭邑里也處谿谷之間篁竹之中習於水闘便於用舟中國之人不知其地勢不能服其水土雖有彊兵百不當一臣安竊為陛下重之臣聞閩越王弟甲殺其王甲以誅死其民衆未有所屬陛下若欲納之中國遣重臣臨問存恤施德垂賞此必攜幼扶老以歸聖德若無用之則繼其絶世存其亾國建其侯王此必委質為蕃臣矣陛下以方寸之印尺二之組鎮撫方外不勞一卒不頓一㦸而威德並行天下歸服今以兵深入其地此必震恐以有司為欲屠滅之也必雉逃竄深入阻險背而去之則復羣聚留而守之卒勞糧乏丁壯從軍老弱饋餉男子不耕婦人不織居者無食行者無糧萬民苦於兵事逃亾必衆隨而誅之不可勝盡盗賊必起臣聞秦時嘗使尉屠雎擊南越又使監禄鑿渠通道越逃入山林不可得攻留軍屯守空地曠日彌乆士卒勞倦越人乃出擊之秦師大敗乃𤼵兵戍當此之時内外騷動百姓疲弊行者不還徃者莫返天下之人皆不聊生逃竄相聚羣為盗賊是故山東之難興矣兵者凶器也一方有急四面皆聳臣恐變故姦邪從此始矣易曰髙宗伐鬼方三年克之以盛德之天子伐小蠻夷而猶三年言用兵之難也陛下以四海為境九州為家八藪為園江漢為池人徒之衆足以奉千官之供租稅之入足以供乗輿之御玩心神明秉執聖道負黼扆憑玉几南面而聴斷號令天下莫不響應使元元之民皆安土樂業則澤被萬世施之無窮天下之安猶若太山而四維夷狄之地何足以為一日之間煩汗馬之勞詩云王猶允塞徐方既來言王道甚大而逺方懷之也是時兵已出未逾五嶺㑹閩越王弟餘善殺王以降漢罷兵上嘉淮南王之意美將帥之功乃遣嚴助喻淮南之意且諷切南越南越頓首遣太子隨助入侍是時嚴助薦邑子朱買臣為中大夫買臣因言東越王故居泉山一夫守險千夫不能上今更徙南五百里居大澤中今𤼵兵浮海直至泉山陳舟列騎席卷南行必破滅也上即拜買臣㑹稽太守上謂之曰富貴不歸故鄉如衣錦夜行今還故鄉富貴於子如何買臣頓首謝上既到郡與横海將軍韓說等俱擊東越大破有功初買臣家貧好讀書樵薪自給吟咏且行時人謂之癡其妻恥之而去買臣笑曰我年五十富貴今四十八矣待我富貴當報汝勤苦其妻恚曰嘻公終餓死耳何以報我遂改嫁其後買臣嘗負薪於墓間故妻與其夫俱上冢以為得志見買臣飢寒呼飲食之後數嵗為㑹稽太守故妻與其後夫治道甚窮乏買臣命後車載其夫婦置後園中給衣食經數月妻自縊死東海太守汲黯為主爵都尉黯字長孺東郡人也好直諫上曰吾欲興政治法堯舜何如黯曰陛下内多欲而外施仁義如何欲效堯舜之治乎上大怒變色而罷朝羣臣共數黯黯曰天子置公卿輔弼之臣寧令從㫖順意陷主於不義乎自丞相宴見上或時不冠至見黯必冠上嘗在武帳不冠望見黯奏事避入帷中使人可其奏其見敬禮如此初東越人相攻黯為中謁者使越不至而報上曰越人相攻其常俗也不足勞天子之使者河内失火燒千餘家使黯視之還曰人家屋相比火相連乃不足為怪臣憂有甚於此者憂河内飢民相食臣謹以按節發河内粟以賑飢民請受矯制之罪上賢而赦之上嘗問嚴助曰汲黯何如人助曰使黯任職居官無以逾人然至其輔少主威四夷守城郭愛百姓雖自謂賁育不能奪也上曰然古有社稷之臣黯近之矣御史大夫嚴青翟免大司農韓安國為御史大夫前漢紀卷十
