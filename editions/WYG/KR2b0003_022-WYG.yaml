body:
  text: 前漢紀卷二十二漢荀恱撰孝元二永光元年春正月行幸甘泉郊泰畤免雲陽徒賜民爵一級女子百户牛酒鰥寡孤獨髙年帛所過無出田租上留射獵御史大夫薛廣徳上書言竊見闗東困極民人流移陛下日日撞亡秦之鐘聴鄭衛之樂馳騁干戈縱恣於野不䘏百姓臣誠悼之今士卒暴露從官勞倦願陛下亟反宫與天下同憂樂上即日還宫詔丞相御史大夫舉質樸敦厚遜讓有行者三月殞霜殺麥苗詔曰朕之不明無以知賢佞人在位哲人壅蔽民漸薄俗去禮觸刑豈不哀哉其赦天下令勵精自新各務農畝無田者假貸種食賜吏六百石以上爵五大夫勤事吏爵二級民一級女子百户牛酒鰥寡孤獨髙年帛秋七月己未大司馬騎將軍史高賜金安車駟馬就第上自酹祭宗廟出便門欲御樓舩薛廣徳當乗輿免冠頓首曰宜從橋上曰大夫冠廣徳曰陛下不聴臣言臣自刎頸以血汙車輪陛下不得渡矣上不悦先驅光禄大夫張猛曰主聖臣直從橋安乗船危御史大夫言可聴上曰曉人不當如是邪乃從橋廣徳病賜安車駟馬免辛亥太傅韋𤣥成為御史大夫九月戊子侍中尉王接為大司馬車騎將軍接者宣帝舅王無敬之子也冬十有二月丞相于定國賜安車駟馬免子永嗣位至御史尚館陶公主施施者宣帝長女也賢而有行永以選尚焉周堪復為光祿勲與張猛皆給事中見親任而石顯等數譖毁之劉向以草莽臣上書曰臣聞舜命九官濟濟相讓和之至也衆賢和於朝則萬物和於野故簫韶九成鳳皇來儀擊石拊石百獸率舞及至周文開基西郊雜集衆賢莫不肅和崇推讓之風以息忿爭之訟周詠文王之徳其詩曰於穆清廟肅雍顯相濟濟多士秉文之徳武王周公繼政朝臣和於内萬國歡於外故得萬國之歡心以事其先祖其詩曰有來雝雝至止肅肅相維辟公天子穆穆諸臣和於下天應報於上故周頌曰降福穰穰貽我來麰下至幽厲之際朝廷不和轉相非怨詩人疾而刺之曰民之無良相怨一方衆小人在位而從邪議潝潝相是而背君子其詩曰潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依君子獨處守正不撓衆枉勉彊以從王事則反見憎毒譖愬其詩曰黽俛從事不敢告勞無罪無辜讒口嗸嗸當此之時日月薄蝕而無光其詩曰日有蝕之亦恐之醜又曰日月鞠凶不用其行天變見於上地變動於下水泉沸騰山谷易處其詩曰百川沸騰山冢卒崩髙岸為谷深谷為陵霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將此皆不和賢不肖易位之所致也自此之後天下大亂厲王奔彘幽王見弑尹氏世卿而専恣諸侯背叛而不朝二百四十二年之間日蝕三十六地震五山陵崩阤二彗星見三野雞夜鳴常星不見夜中星隕如雨者一火災十四長狄入中國三五石隕墜六鶂退飛冬麋有蜮蜚鸜鵒來巢晝晦雨木冰李梅冬實七月霜降草木死八月殺菽大雨雹雷電失序水旱饑饉蝝螽俱出衆災並起當此之時禍亂輒應弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數周室多禍晉敗其師於貿戎鄭傷桓王戎執其使五大夫爭權三君更立莫能正理遂至陵遲不能復興由此觀之氣和致祥氣乖致異祥多者其國安異衆者其國危天地之常徳古今之通議也當今邪正雜糅忠讒並進章交公車人滿北軍朝臣乖忤分􅔟為黨更相譛愬不可稱言是以災異並起皆妖氣之所致也夫履衰周之迹循詩人之刺而欲成太平致雅頌猶却行而求及前人也讒邪所以並進者由上多疑心既已用賢人行善政而或譖之則賢人退而善政消矣懷多疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進者賢人退羣枉盛者正士消故易有否泰善惡相消詩曰雨雪麃麃見睍聿消昔舜禹與驩兜共工雜處堯朝周公與管蔡並居周位當是之時皆迭進相毁流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治孔子與季孟俱事於魯李斯與叔孫通並宦於秦定公始皇賢李斯與季孟而消孔子叔孫通故以大亂夫治亂之端在於所信任信任既賢在於堅固詩云我心匪石不可轉也言守善固也昔孔子與顔淵子貢更相稱與不為朋黨禹稷臯陶更相汲引不為比周何則忠於為國而無邪心也故賢人在上位引其類聚於朝故易曰飛龍在天大人造也在下位則與類俱進故易曰拔茅連茹以其彚征吉今姦邪與賢臣並進在交㦸之内數設危險之言欲以傾移主上此天地所以見誡災異所以重至也自古聖王未有無誅而治者故舜有四放之罰孔子有兩觀之誅今以陛下之聖明宜深思天地之心察兩觀四放之意鑒否泰之卦觀雨雪之詩歷唐周之所進以為法原秦魯之所消以為戒考祥應之福省災異之禍以揆當時之變仰鑒前古之事宜放遠佞邪之黨廣開衆正之路决斷狐疑分别去就則百異消滅衆祥並至太平之基萬世之利顯等見其書而愈與許史比周而怨向向等遂禁錮十餘年初上内重周堪而患諸譖愬無所信時長安令楊興嘗稱舉堪上欲以為助乃問興曰朝臣不可光禄勲何也興傾巧士也謂上疑堪因順㫖曰非獨不可於朝廷自州里亦不可臣前見堪等與劉向謀毁骨肉議者以為當誅故臣前言不可也上曰然此何罪而當誅也今宜如何興曰臣愚以為賜爵為關内侯食邑三百户勿令典事明主不忘師傅之恩此最計之得者上由是疑焉又惜其才乃遷堪為河東太守張猛為槐里令後下詔曰河東太守堪先帝賢臣命之傅朕論議正直憂國之心以不阿尊事貴孤特寡助黜退往者衆臣每有災異託咎此人朕迫逼於俗不得專心堪出之後天變仍臻衆亦晻然堪治郡未期年而三老官屬有識之士稱說其美使者過郡靡人不稱此固足以彰先帝知人朕有以自明也其復徵堪拜光禄大夫給事中領尚書事堪病卒而顯遂誣張猛令自殺顯知專權恐左右耳目一旦間己者乃時歸誠取一信以為驗顯嘗出使自白曰恐後漏盡還請稱詔開門上許之顯故投夜還稱詔開門後果有人上書告顯專命矯詔上笑以其書示顯顯因泣下曰陛下過私小臣屬任以事羣下無不妒嫉欲陷害者類如此非一愚臣微賤不能以一身快萬衆任天下怨也願歸樞機之職充後宫埽除之役死無所恨上以為然而憐之數勞勉之益信任厚其賞賜貲至萬數初顯殺望之知天下怨己因薦貢禹而深禮事之明進賢不妒望之其設變詐以自解免皆此類也顯見左將軍馮奉世父子為公卿著名心欲附之因薦奉世中子謁者逡為侍中逡因言顯專權不可任上怒免逡歸郎官後御史大夫缺羣臣皆薦昭儀兄野王上以問顯顯曰九卿無出野王上然昭儀兄也恐後世以陛下度越衆賢私後宫之親上曰善吾不見是乃不用野王曰人皆以内寵貴我獨以内寵賤自此公卿以下畏顯重足一跡矣荀悅曰夫佞臣之惑君主也甚矣故孔子曰逺佞人非但不用而已乃逺而絶之隔塞其源戒之極也察觀其言行未必合於道者必此人也此亦察人情之一端也偽生於多巧邪生於多慾是以君子不尚也禮與其奢也寧儉事與其煩也寧畧言與其華也寧質行與其綵也寧朴孔子曰政者正也夫要道之本正己而已矣平直真實者正之主也故徳必核其真然後授其位能必核其真然後授其事功必核其真然後授其賞罪必核其真然後授其刑行必核其真然後貴之言必核其真然後信之物必核其真然後用之事必核其真然後修之一物不稱則榮辱賞罰從而繩之故衆正積於上萬事實於下先王之道如斯而已矣二年春二月大赦天下賜民爵一級女子百戸牛酒鰥寡孤獨高年孝弟力田帛丁酉御史大夫韋𤣥成為丞相左扶風鄭𢎞為御史大夫𢎞所在著名迹法度條教為後世所稱三月壬戌朔日有蝕之六月詔曰元元之民困於饑饉朕為民父母徳不能覆而加其刑甚自傷焉其赦天下時災異數𤼵上問言事得失者博士匡衡上疏曰夫朝廷者天下之楨榦公卿大夫相與修禮恭讓則民不爭好仁樂施則民不暴上義高節則民興行寛柔和順則衆相愛此四者明王所以不嚴而治也朝有變色之言則下有爭鬬之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民皆在本也詩云商邑翼翼四方之極今長安天子之都也親承聖化其習俗無以異於逺方郡國來者無所法則或見侈靡而仿效之宜先正本朝使海内昭然易其視聽道徳興於京師淑問揚於疆外然後大教成也𫝊曰審好惡治性情而王道興矣治性情之道必彊已之不足而審已之有餘蓋聰明疏通者戒於大察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷沈静安舒者戒於後時廣心浩大者戒於遺忘審已之所當戒而齊之以義然後中和之化應而偽巧之徒不敢比周而妄進矣今俗吏致治不奉禮讓而尚苛暴貪財而慕勢故犯法者衆姦邪不止陛下哀愍吏民觸法抵禁比年大赦而今日赦令明日犯法相隨而入獄不改其原雖歲赦之刑猶不息是時赦令數故衡對及之荀悅曰夫赦者權時之宜非常典也漢興承秦兵革之後凟亂之世比户可刑故設三章之法大赦之令蕩滌穢流與民更始時勢然也後世承業襲而不革失時宜矣若惠文之世無所赦之若孝景之時七國皆亂異心並起姦邪非一及武帝末賊役緐興羣賊並起加太子之事巫蠱之禍天下紛然百姓無聊人不自安及光武之際撥亂之後如此之比宜用赦矣君臣失禮政教陵遲犯法者衆亡命流竄而不擒獲前後相積布滿山野勢窮刑蹙將為羣盜或刑政失中猛暴横作怨枉緐多天下憂慘羣獄姦昬難得而治承此之後宜為赦也或赦大逆或赦輕罪或赦一方或赦天下期於應變濟時也秋七月西羌反遣右將軍馮奉世擊之奉世字子明上黨人也徙杜陵初前將軍韓増舉之自宣帝時為名臣矣上議出兵奉世曰虜無過三萬人而兵法當倍用六萬然羌衆弓矛之兵耳器不鋒利可四萬人守屯足矣議𤼵萬人奉世曰國家戰守之備久廢夷狄皆有輕邊之心今以萬人分屯數處虜見兵少必無畏懼戰則兵挫守則不足如此怯弱之形見羌人乘利諸種並㑹臣恐中國之役不得止於四萬人也故少𤼵師而曠日與一舉而疾決功相萬倍固爭之不能得有詔益二千人於是奉世將萬二千騎以兩禆將至隴西分兵數處又别遣校尉救民於廣陽上谷羌虜衆多漢兵為羌所敗殺兩校尉奉世具上地形部衆多少之計願益三萬六千乃足上乃大為𤼵兵六萬人拜太常任千秋為奮威將軍以助之奉世上書願得其衆不煩大將上不聽遂並進兵羌虜大破斬首數千級餘皆走出塞八月天雨草如莎相樛結如彈丸是歲有獻雄雞生角者本志以為黄龍元初永光雞變三見王氏僭位之萌也黄龍元年而宣帝崩上即位皇后將立應是正宫之中雌雞為雄不鳴不將無距者貴始萌而未成也元初元年封王媫妤父為丞相内史禁為平陽侯媫妤立為皇后故應是也丞相府史家雌雞為雄即丞相内史女之應也伏子者明己有子將距者尊己成也以永光二年禁薨子鳳嗣侯為侍中衛尉始見用雄雞生角明布威行權從此始也卒成簒之漸矣三年春西羌平軍罷奉世還以有功賜爵闗内侯食邑五百户三月立皇太子康為濟隂王夏四月癸未大司馬王接薨七月壬戌左將軍許嘉為大司馬車騎將軍嘉上之元舅即廣漢弟延夀之子廣漢無子嘉奉其祀冬十有一月己丑地震雨水大霧復鹽鐵官博士弟子員以用不足民多復除故也四年春二月赦天下所賑貸貧民勿收責三月行幸雍祠五畤六月甲戌孝宣帝園東闕災戊寅晦日有蝕之詔曰葢聞明王在上忠臣布職則羣生和樂方外䝉澤今朕闇於王道夙夜憂懼不通其理靡瞻不眩靡聴不惑是以教令多違民心未得邪説虚進事無成功此天下所著聞也公卿大夫好惡未同或縁姦作邪侵削細民元元安所歸命哉詩不云乎今此下民亦孔之哀自今以後公卿大夫其勉思天戒慎身修永以輔朕之不逮直言盡意無有所諱秋七月罷衛思后園及戾園冬十月乙丑罷祖廟在郡國者先是貢禹奏言古者天子七廟今孝景皆親盡宜毁及郡國廟不依古禮宜止未及施行而禹卒於是追思禹言乃下詔議丞相𤣥成御史大夫𢎞等十七人皆曰臣聞祭者皆由中出生於心者也惟聖人為能饗帝孝子為能饗親立廟於京師之居躬親承事四海之内各以其職來祭尊尊之大義也五帝三王不易之道也詩云有來雝雝至止肅肅春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸侯臣等愚以為宗廟在郡國一切勿修奏可因罷昭靈后武哀王昭哀王衛思后戾太子戾后園皆不奉祀置吏守而已諸陵分屬三輔以渭城亭部北原上以為初陵詔曰往者縁臣子之義奏徙郡國民以奉園陵今百姓逺棄先祖墳墓破業失産親戚分離人懷思慕之心家有不自安之意是以東垂被虚耗之災關中有無聊之民非乆長之䇿詩不云乎民亦勞止汔可小康惠此中國以綏四方初陵無置縣邑使天下安土樂業無有揺動之心又罷先后父母奉邑五年春正月行幸甘泉郊㤗畤三月行幸河東祀后土秋潁川水出流殺人民吏從官縣被害者與告士卒遣還冬上幸長楊布車騎大獵十有二月乙酉毁太上皇孝惠帝寢園是時丞相列侯中二千石博士等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖繼太祖五廟皆迭毁毁廟主藏於太祖五年而再殷祭言一禘一祫祫祭者言毁廟及未毁廟之主合食於太廟父為昭子為穆孫復為昭古之正禮祭義曰王者禘其祖之所自出而以祖配之而不為立廟親盡也立親廟四親親也周之所立七廟者以后稷始封文武受命而王是以三廟不毁與親廟四而七焉非有后稷始封文武受命之功皆親盡而毁成王承二王之業制禮作樂功徳茂盛廟從毁以行為諡而已臣愚以為髙帝受命定天下宜為帝者太祖之廟世世不毁太上皇孝文孝惠孝景廟皆親盡宜毁皇考廟親未盡如故宜皆就太祖廟序昭穆如禮大司馬許嘉等二十九人以為孝文皇帝徳化茂盛宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諌議大夫尹更始等十六人以為皇考廟上序於昭穆非正禮宜毁於是上重序昭穆猶立廟而已世宗廟留不毁建昭元年春正月戊辰有石隕於梁國六三月行幸雍祀五畤秋八月有白蛾羣飛蔽日從東都門至軹道冬河間王元有罪廢遷房陵罷孝文太后孝昭太后寢園上幸虎圏鬭獸後宫昭儀等皆坐熊逸出圏攀檻欲及上左右貴人傳昭儀等皆驚走馮媫妤直前當熊而立左右格殺熊上問媫妤曰人情驚懼何故當熊對曰妾聞猛獸得人而止恐至御座故以身當之上嗟歎而嘉之傅昭儀甚慙由是與媫妤有隙媫妤即右將軍馮奉世之女傅昭儀者少為上官太后才人自上為太子得進幸為人有才略善事人下至宫人左右飲酒酹地皆祝延之甚寵有男是為定國恭王上欲殊於後宫故曰昭儀位次皇后昭儀之號自此始也前漢紀卷二十二
