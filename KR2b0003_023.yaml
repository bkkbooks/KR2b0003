body:
  text: 前漢孝元皇帝紀下卷第二十三二年春正月行幸甘泉郊泰畤三月行幸河東祠后土益三河郡太守秩中二千石戶十二萬為大郡夏四月赦天下六月立皇子興為信都王興母婕妤為昭儀閏月丁酉太皇太后上官氏崩冬十有一月齊楚地震大雨雪深五尺樹折屋壞魏郡太守京房棄市房字君明東郡人也為郎中以言災異屢中上親幸房嘗宴見問上曰幽厲之君何以危所任何人也上曰君不明也而任巧佞房曰知其巧佞而任之耶將以為賢也上曰賢之房曰今何以驗之不賢上曰以其時亂君危而知之房曰齊桓公秦二世亦嘗聞二君而非笑時任豎刁易牙趙高治政日亂何不以幽厲卜之而覺悟乎上曰惟有道者能以往知來耳臨亂之君各賢其臣令皆覺悟安得危亡房因免冠頓首曰春秋紀二百四十二年災異以示萬世之君今陛下即位以來災異並出人民饑饉盜賊不禁視今為治邪亂邪所任者誰與房旨謂石顯上亦知之曰然幸其愈於彼又以為不在此人房曰夫前世之君亦皆然矣臣恐後之視今猶今之視昔也是時房奏考功課吏法上令房上弟子曉考功者欲試用之房薦上弟子姚平任良願以為刺史臣得通藉殿中為奏事以防擁隔石顯等進言用弟子不若師上欲以房為刺史顯等知刺史當得徑奏事因言為刺史恐太守不與同心宜以為郡守房自請歲盡得乘傳奏事上許之房既拜上封事曰辛酉以來霧氣衰去太陽清明臣獨欣然以為陛下有所定也然少陰倍力而乘消息臣疑陛下獨不得如意臣出之後恐為執事者所蔽身死而功不成及辛巳霧氣復乘太陽侵危此上大夫侵陽之氣而上意疑也己卯庚辰之間必有隔絶臣令不得乘傳奏事者房未發顯果白詔止房無乘傳奏事房至新豐復上奏曰臣以六月言遁卦不交法曰道人始去寒涌水為災至七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也今湧水出道人當遁死尚復何言臣獨謂曰陛下與臣尤厚雖死臣猶言也平又謂曰房可謂小忠未可謂大忠也昔秦之時趙高用事有正生者非刺高而死高威自此而成故秦之亂也正先趨之也今臣守郡竊恐未效而死惟陛下無使臣塞涌水之災異當正生之必死為姚平所笑房至陜復上封事曰乃者丙戌小霧丁亥霧衰去然少陰并力而乘消息戊子益盛至壬辰五十分霧氣復起此消息欲正離卦之黨并力而爭安危之機不可不察己丑有還風盡辛卯而太陽復侵危至癸巳日月相薄此邪陰用事而太陽為之疑也臣去稍遠太陽侵奪願陛下察焉房去月餘竟徵下獄房妻父張博淮陽王之舅也欲為淮陽王求入朝謂房曰淮陽王入朝可以為助因使房為淮陽王求入朝奏草又房為上道幽厲之事出對御史大夫鄭弘道之顯告房張博誹謗朝廷詿誤諸侯窺導以邪意漏泄省中語博腰斬房棄市時年三十一房治易事梁人焦戇戇為外黃令以伺候先知姦邪盜賊不得發嘗曰得我道以亡身者京生其說長為災變分為六十四卦更直日用事有占驗焉鄭弘坐與房言免光祿勳匡衡為御史大夫三年夏令三輔都尉及太郡都尉秩皆二千石六月甲辰丞相韋玄成薨秋七月御史大夫匡衡為丞相戊辰衛尉李延壽為御史大夫副校尉甘延壽陳湯矯制發戊巳校尉屯田吏士及西域羌胡兵攻郅支單于冬斬郅支首傳詣京師時郅支強暴東擊烏孫西脅大宛諸國漢遣使三輩至康居求谷吉等尸郅支不肯奉詔而困辱漢使上書驕慢曰康居困危已久願歸強漢於是湯與延壽等謀曰郅支單于威名遠震今烏孫脅大宛欲降伏康居如得此三國北擊伊婁西取安息南排月支數月之間城郭諸國危矣郅支分離所在絶遠無城郭強弩之守如發兵直詣城下彼亡則無所之守則不足以自保千載之功可一朝而定延壽以為然欲奏請之湯曰國家與公卿議大策非衆所見事必不從會延壽久病湯獨矯制發諸國兵延壽聞之起大驚欲止之湯按劍叱延壽曰大衆已集豎子欲沮吾衆耶延壽遂從漢兵合四萬餘人延壽湯上疏自劾奏矯制陳言形勢兵狀即引兵分為六校尉其三校尉從南道逾葱領經大宛其三校尉從北道入赤谷過烏孫經康居萬餘騎救之數奔營不利輒卻漢兵遂燒木城城中人皆入土城漢兵四面推櫓楯並入土城單于被創死得漢使節及谷吉等所賚帛書凡斬閼氏太子名王以下千五百級生虜百四十五人降虜五千餘人上議其功丞相匡衡大夫李延壽及石顯皆以為延壽湯擅興師矯制幸得不誅不宜加爵土又遣吏訊驗湯私盜金事皆不與湯故正宗劉向上疏曰郅支單于殺漢使吏士以百數事暴於外國傷威毀重陛下赫然欲討之意未嘗忘延壽湯承聖旨倚神靈總百蠻之軍攬城郭之兵出萬死之計入絶域之地遂陷康居屠五重城搴翕侯之旗斬郅支之首懸旌萬里之外揚威昆山之西而掃谷吉之助立昭明之功蠻夷率服稽首來賓郡臣之功莫有大焉昔周大夫方叔尹吉甫為宣王誅玁狁而百蠻從之其詩曰驒驒惇惇如霆如雷顯允方叔征伐玁狁蠻荊來威易曰有嘉折首獲非其醜今延壽湯所誅威振天下雖易之折首詩之雷霆不能及也吉甫之歸周厚賜之其詩曰吉甫燕喜既多受祉來歸自鎬我行永久千里之鎬猶以為遠況萬里之外齊桓先有匡周之功後有滅項之罪君子計功補過近事二師李廣利損五萬之衆糜億萬之費經四年之勞而廑獲駿馬四十匹雖獲宛王之首不足復費而私罪甚衆孝武以為萬里之伐不録其過厚加封賞今康居之國盛於大宛郅支之號重於宛王殺漢使甚於留馬延壽湯不煩漢使不費斗儲比於二師功德相百倍且常惠隨欲擊之烏孫鄭吉迎自來之日遂猶皆列土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓二師近事之功則高於長羅安遠大功未著小惡數布臣竊痛之上於是赦湯等矯制貪穢小罪封延壽為宜城侯湯為關內侯食邑各三百戶延壽為長水校尉湯為射聲校尉延壽北地人也本為羽林士超逾羽林亭樓以材力進湯字子公山陽人也家貧無行初富平侯張敞舉湯為茂材湯待遷父死不奔喪坐下獄論敞舉非其人削戶二百會敞薨諡曰謬侯湯立功西域世以為張敞知人初宣帝時前將軍韓增舉馮奉世以為衛侯使持節送大宛諸國客時莎車王與諸國共殺漢所置莎車王萬年并殺漢使者奚充國胸奴發兵攻莎車師不能下而莎車遣揚言曰北道諸國已降胸奴矣於是攻劫南道與之盟而背漢鄯善以西皆絶不通奉世以莎車日強其勢難制必危西域乃矯以節告諭諸國王各發其兵合萬五千人追擊莎車莎車王自殺傳其首詣長安諸國遂平威振西域宣帝謂韓增曰賀將軍舉得人也議封奉世以為侯丞相將軍皆曰大夫出疆有可以安國家定社稷專之可也宜加爵位少府蕭望之以為奉使有所指而擅矯制違命今封奉世關內侯後奉使者競逐利要功於夷狄為國家生事不可長也宣帝從望之議及甘延壽之封也杜延年子欽上疏追訟奉世前功曰比罪則郅支薄量功則莎車衆用師則奉世寡制勝則奉世於邊境為功多慮危則延壽於國家為禍深其違命生事則與奉世同延壽割地而封奉世獨不見録臣聞功同賞異則勞臣疑罪均刑別則百姓惑願陛下下有司議之上為前世事不録荀悅曰成其功義足封追録前可也春秋之義毀泉臺則惡之舍中軍則善之各由其宜也夫矯制之事先王之所慎也不得已而行之若矯大而功小者罪之可也矯小而功大者賞之可也功過相敵如斯而已可也權其輕重而為之制宜焉四年春正月以討郅支單于功告祠郊廟赦天下夏六月甲申中山王竟薨藍田地震山崩壅灞水安陽岸崩壅涇水涇水逆流五年春二月赦天下賜民爵一級女子百戶牛酒三老孝弟力田鰥寡孤獨帛夏六月庚申復戾后園壬申晦日有食之秋七月庚子復太上皇寢廟園原廟昭靈后武哀王衛思后昭哀后廟園上寢疾夢祖宗譴罷郡國廟園上少弟楚孝主亦夢焉上召問丞相匡衡議欲復衡言不可衡乃禱高祖孝文孝景廟陳言禮正咎在臣衡當受其咎皇帝宜蒙福祐盡禱諸廟上疾久不平皆復修舊祀如故山陽社中大槐樹吏民伐斷之其夜樹自復立故處竟寧元年春正月胸奴呼韓邪單于來朝單于請妻漢女以自親賜單于待詔掖庭王嬙字昭君為閼氏單于上書願保塞請罷邊備塞上下有司議皆以為便郎中令侯應以為不可許上詰問狀對曰臣聞北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢是苑囿也至孝武出師征伐斥奪其地攘之於漢北建塞徼起亭隧築外城而設屯戍以守之然後邊境得少安漠北地平少草木多大砂胸奴來寇抄無所藏隱從塞以南徑深山大谷往來差難邊境長老言胸奴失陰山後過之無不哭如罷備邊戍卒示夷狄之大利不可一也今聖德廣被單于稽首來臣夫夷狄之情困則卑辱強則驕逆天性然也前以罷外城省亭燧今才足候望通烽火而已古者安不忘危不可復罷二也中國有義禮之則刑罰之禁臣愚猶禁犯又況單于能必其衆不犯約哉三也自中國尚設關梁以制諸侯所以絶臣下之覬覦也設塞徼置屯戍非獨為單于而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡四也近西羌保塞與漢交通吏民貪利侵盜其畜産妻子以此怨恨起而背叛世世不絶今罷乘塞則生慢易忿爭之漸五也往者從軍多沒不還者其子孫貧困一旦走出從其親戚六也又邊人婢奴怨苦欲走者多自知胸奴中樂無奈邊侯急切何時有走塞者七也盜賊桀黠群輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土坦也或因山巖石木柴僵落溪谷之間稍稍率徒卒築治費功久遠不可勝計臣恐議者不深慮其始終欲以一切息徭役十年之後百年之內卒有他變障塞敗壞亭戍滅絶當發戍屯治繕纍世之功不可卒就九也若罷戍卒省候望單于自以保塞守衛必深得漢請求無己小失其意則不可測開夷狄之隙以虧中國之固十也非所以永持至安威制百蠻之長策上乃使車騎軍口喻單于曰中國亦有關梁非徙以備外亦以防中國之姦邪放縱出為寇害故為制度以專衆心遂不罷塞焉皇太子冠初定陶恭王有才藝曉音樂而太子頗有酒色之失王皇后無寵上有意欲立定陶王為太子數稱其才樂陵侯史丹者悼皇后之舅史恭之孫為侍中護太子家於是丹進曰所謂才者敏而好學溫故知新皇太子是也若乃器人于絲竹鼓鼙之間是則陳惠李微高於匡衡可為相國也於是上默而笑後上疾甚數問景帝時立膠東王故事丹涕泣因以死爭之上亦以太子先帝所愛卒不易二月御史大夫李延壽卒三月丙寅太子太傅張談為御史大夫癸未復孝惠寢廟園孝文太后孝昭太后寢廟園等夏五月壬辰帝崩于未央宮匡衡復奏言前以上體不平故復諸祀卒不蒙福請悉罷於是毀太上皇孝惠孝景帝廟罷孝昭太后昭靈太后武哀王昭哀后寢廟園丞相御史大夫奏石顯及其黨皆免官顯徙居故鄉濟南憂悶不食道病死顯之歸也留其器物什數百萬以與故所厚萬章章不受曰石氏之禍萬氏反當為福耶章者長安大俠為京兆尹門下督嘗從至殿中侍中諸貴人爭趨揖章莫與京兆尹言者後京兆尹不復從章章既游俠亦得顯力及王遵為京兆尹誅豪桀乃殺章荀悅曰自漢興以來至於茲祖宗之治迹可得而觀也開祖開建大業統辟元功度量規矩不可尚也時天下初定庶事草創故韶夏之音未有問焉孝文皇帝克己復禮躬行玄默遂至升平而刑罰幾措時稱古典未能悉備制度玄雅禮樂之風闕焉故太平之功不興孝武皇帝規恢萬世之業安固後嗣之基內修文學外耀武威延天下之士濟濟盈朝興事創制無所不施先王之風燦然復存矣然猶好其文不盡其實發其始不要其終奢侈無限窮兵極武百姓空竭萬民疲弊當此之時天下騷動海內無聊而孝文之業衰矣孝宣皇帝任法審刑綜核名實聽斷精明事業修理下無隱情是以功光前世號為中宗然不甚用儒術從諫如流下善齊肅賓禮舊老優容寬直其仁心文德足以為賢主矣而佞臣石顯用事隳其大業明不照姦決不斷惡豈不惜哉昔齊桓公任管仲以霸任豎刁以亂一人之身唯所措之夫萬事之情常立於得失之原治亂榮辱之機可不惜哉楊朱哭多岐墨翟悲素絲傷其本同而末殊孔子曰遠佞人詩云取彼讒人投畀豺虎疾之深也若夫石顯可以痛心泣血矣豈不疾之哉初宣帝任刑法元帝諫之勸以用儒術宣帝不聽乃嘆曰亂我家者必太子也故凡世之論政治者或稱教化或稱刑法或言先教而後刑或言先刑而後教或言教化宜詳或曰教化宜簡或曰刑法宜略或曰刑法宜輕或曰宜重皆引為政之一方未究治體之終始聖人之大德也聖人之道必則天地制之以五行以通其變是以博而不泥夫德刑並行天地常道也先王之道上教化而下刑法右文德而左武功此其義也或先教化或先刑法所遇然也撥亂抑強則先刑法扶弱綏新則先教化安平之世則刑教並用大亂無教大治無刑亂之無教勢不行也治之無刑時不用也教初必簡刑始必略則其漸也教化之隆莫不興行然後責備刑法之定莫不避罪然後求密未可以備謂之虐教未可以密謂之峻刑虐教傷化峻刑害民君子弗由也設必違之教不量民力之未能是陷民於惡也故謂之傷化設必犯之法不度民情之不堪是陷民於罪也故謂之害民莫不興行則毫毛之善可得而勸也然後教備莫不避罪則纖芥之惡可得而禁也然後刑密故孔子曰不嚴以蒞之則民不敬也嚴以蒞之動之不以禮未善也是言禮刑之並施也吾末如之何言教之不行也可以勝殘去殺矣言刑之不用也周禮曰治新國用輕典略其初也春秋之義貶纖芥之惡備至密也孔子曰行有餘力則可以學文簡於始也繪事後素成有終也夫通於天人之理達於變化之數故能達於道故聖人則天賢者法地考之天道參之典經然後用於正矣讚曰本紀稱孝元皇帝多才藝善史書鼓琴吹洞簫自度聲曲分別節度窮極要妙少好儒術及即位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優游不斷然寬弘盡下出於恭儉號令溫雅有古人之風烈
