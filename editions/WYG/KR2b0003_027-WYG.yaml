body:
  text: 前漢紀卷二十七漢荀悦撰孝成四元延元年春正月長安章城門牡自亡函谷闗亦然谷永議曰章城門通路寢之門函谷闗距山東之險城闗守國之固固將去焉故門牡自飛壬戌王商復為大司馬衛將軍三月行幸雍祀五畤四月天清晏然無雲殷殷有聲如雷有流星其首如缾長十餘丈皎然赤白從日下東南行四靣或大如杵或如雞燿燿而下如雨自晡及昏而止本志隕星而雨為王者失勢諸侯起伯之異赦天下秋七月有星孛于東井時谷永為北地太守方之官上使使問永所欲言對曰臣聞天生蒸民不能自治而立王者統理之方制海内非為天子列土封疆非為諸侯皆為民也垂三統立三正去無道開有徳明天下者非一人之天下也陛下承八世之功業當陽九之標季渉三七之節紀遇无妄之卦運值百六之阨㑹加之以災異因之以饑饉内則有深宫後庭將有驕臣悍妾醉酒狂悖卒起之敗外則有諸夏下土將有樊並蘇令陳勝項籍之禍此臣所以為陛下破膽寒心也願陛下正君臣之義黜羣小媟瀆之臣脩後宫之政抑逺驕妒之寵常近婉順之行加惠失意之人懐柔怨恨之士保至尊之重秉帝王之威朝覲法駕而後出陳兵清道而後行減損諸宫用度流恩廣施問民疾苦循行風俗宣布聖徳以慰元元之心防大姦之隙至誠應天則異禍消伏何憂患之有竊恐陛下公意未專而私好尚存弗肯為耳上甚感其言復永為大司農而終黨於王氏毎言無傷王氏之意專正上身與後宫而已四月光禄大夫劉向上奏曰易曰觀乎天文以察時變昔秦始皇之末及二世之初日月薄食山陵淪亡辰星出於四孟太白再經天無雲而雷枉矢夜光熒惑襲月㜸火燒宫野禽戲庭都門内崩大人見臨洮星孛於大角秦氏以亡及項籍之敗亦孛於大角漢之入秦五星聚東井得天下之象也孝恵有雨血日蝕於衝滅光星見之異孝昭有泰山臥石自立上林苑中僵栁復起大星如月西行衆星隨之此為特異孝宣興起之表也天狗夾漢而西行天乆隂不雨二十餘日昌邑不終之兆也故觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭然哉今日蝕奎婁星孛東井攝提炎及紫宫有識長老莫不振動此變之大也今同姓疎逺母黨專政禄去公室權在外家非所以强漢之宗保守社稷安固後嗣也其事難一二而記臣謹案圖上猶須口說願賜清讌之閒指圖陳狀上納之而終不能用時上無繼嗣災異寖數向謂陳湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬累世蒙國厚恩身為宗室遺老歴事三主上以我為先帝舊臣常優禮吾吾不言誰當言者乃上封事曰臣聞人君莫不欲安而常危莫不欲存而常亡此皆失御臣之術也今王氏一姓而朱輪華轂者二十三人青紫貂蟬充牣幄内魚鱗左右大將軍秉事用權五侯驕奢僭盛竝作威福出入不待報命擊斷自恣尚書九卿州牧郡守皆出其門管執樞機朋黨比周行汙而寄治身私而託公稱舉者登進忤恨者中傷遊談者為之說執政者為之言排擯宗室孤弱公族數稱燕王蓋主以疑上心避諱吕霍而不肯道内有管蔡之萌外假周公之論兄弟據重宗族盤牙歴自上古以來未有其比物盛則必有非常之變先見其微象今王氏先祖墳墓在濟南者其梓柱生枝葉扶疎上出屋根插地中雖孝昭立石起栁之異無以過此之明也夫事勢不兩大劉氏王氏亦不竝立陛下為人子孫守持宗廟而令國祚移於外親降為皁𨽻縱不為身奈宗廟何婦人外夫家而内父母家此亦非皇太后之福也夫明者起福於無形消禍於未然宜發明詔吐徳音援近宗室黜逺外戚皆罷令就第使王氏永存保其爵位劉氏長安不失社稷所以褒睦内外子子孫孫為無疆之計也如不行此則田氏復見於今六卿復起於漢不可不深圖不可不早慮機事不密則害成矣奏上上召見向悲歎謂曰君且休矣吾將思之以向為中壘校尉上欲用為九卿輒為王氏所排及在位為大臣所抑故終不遷大位前後四十餘年年七十二卒向卒後十三年王氏簒封蕭相國後喜為酇侯時杜鄴說上繼絶侯之世曰昔唐虞協和萬邦致雍熙之政虞夏以多羣后享恭己之治湯法三聖殷民太平周封八百重譯來貢是以内恕之君樂繼絶世隆名之主安存亡國至於武王伐紂不及下車徳念深矣成王察牧野之克顧羣后之勤知其恩結於民心功光於天府故追先人之志録遺老之䇿髙其位大其宇愛敬敕盡命賜厚備大孝之隆於是為至其沒也世主歎其功無民而不思所息之樹而猶不伐况其廟乎是以燕齊之後與周竝傳子繼弟及歴載不隳豈無邪辟以祖宗之竭力故支庶賴焉漢初功臣亦皆剖符受山河之誓百餘年間而絶滅失姓枯骨孤棄於丘墓苖裔流絶於道路以徃况今甚可悲傷雖難盡繼宜舉其隆功者於是封蕭何之後其餘未録冬十一月乙未大司馬王商為大將軍辛亥商薨庚申王根為大司馬驃騎將軍張禹以光禄大夫特進居家為天子師甚見親任禹既年老自治冡塋奏請平陵肥牛亭地上許之徙亭於他地王根聞而爭之曰此地當平陵寢廟衣冠出遊之地又徙壊舊亭非所宜上不聽根由是害禹寵數毁惡之上逾敬厚禹禹疾上親臨問禹拜牀下禹曰臣老有三男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思與相近上即日徙咸為𢎞農太守禹小子未有官禹數視其小子即於牀前拜黄門侍郎給事中長子閎官至太常第二子官至校尉國家每有大政與禹定議時吏民多上書言災異諷切王氏者上意然之而未有以明也及是上乃車駕至禹家辟左右問禹以天變及民所言王氏事問禹禹自見年老子孫㓜弱又與曲陽侯王根有隙恐為所害即謂上曰災異之事深逺難見故聖人罕言命性與天道子貢不得聞陛下宜以善應之與天下同福慶此經義意也淺見鄙儒亂道誤人宜無信用上雅愛信禹由是不疑王氏曲陽侯及諸王氏子弟聞禹言皆恱遂親禹焉故魯國博士朱雲上書求見公卿在前雲曰朝廷大臣皆尸禄素餐願賜臣上方斬馬劒斷佞臣一人頭以勵其餘上問曰誰也曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史持雲下雲攀檻檻折雲曰臣得下從龍逢比干遊於地下足矣未知聖上何如主耳御史將雲去左將軍辛慶忌者武賢子也免冠解印綬叩頭殿下曰此臣素著狂直之名於世其言是不可誅其言非固宜容之臣敢以死爭叩頭流血上意乃解後將理檻上曰勿易因而輯之以旌直臣初元帝時五鹿充宗與石顯皆貴幸治梁丘易帝令諸易家考合異同充宗乘貴口辨諸儒莫敢與抗皆稱疾不㑹有薦雲能説易者雲攝齊升堂抗辭而請音動左右既論連折充宗諸儒為之語曰五鹿嶽嶽朱雲折其角由是為博士遷杜陵槐里令以忤於貴戚遂稱疾廢因終於家是嵗趙媫妤害後宫子時許美人生男媫妤大怒曰帝常與我言不從後宫中徃來今許美人兒安從生乎以手自搏擊以頭觸壁戸柱從牀上自投地涕泣不食上亦為之不食昭儀曰陛下常言不負汝今竟負約云何上曰要使天下無出趙氏上者無憂也後使中黄門靳嚴封緑囊書與許美人乃殺兒置葦篋中封上閉戸而發昭儀與上共視之復封函詔掖庭丞籍武埋屏處勿令人知武取埋獄垣下又宫中學女史曹才官幸御上有娠生兒掖庭才官令舎有令中黄門田閎持詔記與武取才官令舎婦人新生兒及婢六人盡置暴室獄無問男女誰兒女也武迎置獄三日復令閎持詔問兒死未武對曰未有頃閎出上與昭儀大怒曰何不殺武叩頭泣即因閎奏封事曰陛下未有繼嗣子無貴賤宜皆留意奏入上令閎持詔與武夜漏上五刻令持兒與中黄門王舜㑹掖門武以兒付舜舜受詔内兒殿中為擇乳母告善養視之無令漏洩時兒生八九日昭儀聞之大怒後三日詔賜才官藥令自殺才官曰我兒男也額上有壯髪類孝元帝今兒安在柰何令長信得聞之遂飲藥死及婢六人皆自殺後十餘日詔取兒去不知復何置之二年春正月行幸甘泉郊泰畤三月行幸河東祠后土四月立廣陵孝王子憲為王冬行幸長楊宫從胡客大校獵初烏孫末振將殺大昆彌㑹病死漢誅未加於是遣右中郎段㑹宗發戊巳校尉諸侯國兵即誅末振將太子番丘㑹宗恐大兵入烏孫驚番丘逃亡不可得即選精兵騎弩四十張徑至昆彌所在召番丘數其罪以手劒擊殺之小昆彌安犂靡者末振將從兄子也勒兵數千騎圍㑹宗㑹宗為言來誅之意今圍殺我如去漢牛一毛耳宛王郅支縣頭於藁街烏孫所知也小昆彌曰何不豫告我令飲食之邪㑹宗曰豫告之恐亡匿為大罪即飲食之以付我恐傷骨肉之恩耳昆彌咸服號泣而罷㑹宗還賜爵闗内侯㑹宗天水人也三年春正月丙寅蜀郡岷山崩擁江水竭逆流三日乃通劉向以為岐山崩三川竭而周幽王亡岐山周之所興也蜀郡本漢所興今所起之地山崩水竭殆必亡矣二月封侍中衛尉淳于長為定陵侯三月行幸雍祠五畤四年春正月行幸甘泉館二月罷司𨽻校尉官三月行幸河東祠后土甘露降於京師有石隕于闗東二綏和元年春正月赦天下二月戊午御史大夫孔光貶為廷尉廷尉何武為御史大夫癸丑立定陶王昕為太子光禄師丹為太子太傅初王祖母傅太后隂為王求漢嗣私事趙皇后及昭儀及帝舅王根皆勸立定陶王於是引大臣入禁中議丞相方進大司馬王根右將軍廉褒後將軍朱博皆以為定陶帝弟之子也禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣孔光以為非禮立嗣以親中山王先帝之子帝之親弟也以尚書盤庚殷之弟及為比中山宜嗣上以禮兄弟不相入廟又皇后昭儀有言遂立定陶王光以議不合上意故左遷廷尉荀恱曰聖人立制必有所定所以防忿爭一統序也春秋之義立嫡以長立子以貴是以言嫡無二也貴有常也以弟及兄則貴有常矣兄弟之子非一也不可以為典雖立其長猶非正也且兄弟近而親所以繼父也兄弟子疎而卑所以承亡也俱非正統舎親取疎廢父立子非順也以弟繼父近於義矣春秋傳曰太子亡則立母弟無則立長立均以順義均則卜之道也封中山王舅馮參為宜鄉侯益封中山王三萬戸以慰王心詔求殷後封孔吉為殷紹嘉侯三月進爵為公及周承休侯皆為公各食邑百里行幸雍祠五畤夏四月乙丑大司馬驃騎將軍王根為大司馬罷車騎大將軍官御史大夫何武更為大司空封汜鄉侯益大司馬大司空位秩如左丞相是為三公先是武為廷尉奏言王者法天三光備三公官各為分職今丞相獨兼三公職所以乆廢而不治宜建三公之官分職更任以考功效及至是乃置之武字君公蜀郡郫人仁厚好進士疾朋黨絶請託其臨州郡無赫赫之名去後常見思初武兄弟五人皆為吏郡縣敬之弟顯家有市籍租顯數負其課市嗇夫仇商捕辱顯家顯怒之武曰以吾家租税不為衆先奉公吏不亦宜乎武即白之太守召商為吏州里服焉及為三公功名略比薛宣其才不及也而經術正直過之時司空掾平陽何竝字子廉武高其志節舉為長陵令道不拾遺時卭城太后家貴寵王林卿為侍中通輕俠傾京師免官歸過長陵上冢因留數日竝恐其犯法自造門謁曰宜以時歸先是林卿殺人埋冢舎下竝隂知之非竝時事不發覺林卿怨竝遣之北渡渭橋令騎奴還拔刀剥寺門建鼓竝即從吏兵追林卿行數十里林卿窘迫令奴冠己冠自身從間道馳去及追及冠奴遂收之奴曰我乃奴耳竝心知己失林卿乃因曰王君困乃稱奴得免死邪竝斬奴頭并所剥建鼓置都亭下書其罪吏驚駭以為林卿實死由是威名流行後為潁川太守潁川鍾元為尚書令領廷尉甚用事有權元弟威為郡掾犯罪贓千金竝過辭廷尉廷尉為弟請免一等之罪竝曰罪在君弟與君法律不在太守既至郡威所犯多在赦前竝敕吏驅使入函谷闗無令汙民間不入闗乃收之威留止洛陽吏遂格殺之及誅俠趙季李欵等郡中清肅竝廉潔妻子不到官終潁川遺令勿受賻賵椁足周棺棺足掩尸而已其治名次黄霸秋八月庚戌中山王興薨冬十月甲寅大司馬根病免十一月立楚孝王孫景為定陶王定陵侯淳于長大逆不道下獄死長與廢許后姊孊私通許后因孊賂遺長欲求復為媫妤長受許后金錢乘輿服御物前後千餘萬詐言欲白上立為左皇后孊毎入長信宫長即與孊書戲侮許后慢易無所不言交通書記賂遺連年曲陽侯根輔政以乆病免長次第當代根王莽害長寵因白根曰長私與貴人姊交通受其衣服又見將軍乆病私喜對人議語署置根怒令莽白之上怒免長官就國長素與紅陽侯立有隙及長就國因立子融厚賂立立為長固請上疑之下有司案騐吏捕融立令融自殺以滅口上愈疑遂逮長繫獄窮治其罪服戲謔長信宫謀立左皇后罪長死於獄妻子徙合浦長母歸故鄉立歸國許貴人賜藥死侍中光禄大夫莽以首發大姦拜大司馬時年三十八莽既拔出同列繼四父而輔政欲令名譽過前遂克己㤀倦招延賢良賞賜邑俸盡以享士身執謙約母病公卿列侯遣夫人問疾莽妻迎之衣不曵地著布蔽厀見者以為僮僕使人問乃知其夫人其飾名如此十二月罷刺史置州牧秩二千石是嵗犍為得石磬十六枚議者以為善祥劉向説上曰宜設辟雍陳禮樂以風化天下雖不能具夫禮樂以養人為本就有過差是過於養人也刑罰之過或至死亡今禮樂雖非唐虞之典刑罰亦非咎繇之則而有司請定刑罰至於禮樂則曰不敢是敢於殺人而不敢於養人也有刑罰而無禮樂大不備也為其俎豆管弦之間小不備因是絶而不為是去小不備而就大不備也教化比於刑罰教化重而刑罰輕是舎所重而急所輕也且教化所恃以為治刑罰助治者也今廢所治而獨立其所助非所以致太平也夫承千嵗之衰周繼亡秦之餘緒民漸漬惡俗不親大化終以不改上以向言下公卿立辟雍㑹向病卒丞相大司空營表長安城南將立辟雍未及作二年春正月行幸甘泉宫郊泰畤二月壬子丞相翟方進薨是時熒惑守心占者以為大臣當應之以塞災異上召方進告之方進不得已乃自殺上祕之加贈禮親臨䘮赦天下大水平襄縣有燕生雀哺食至大俱飛去太僕廐馬生角在左耳前圍長各一寸八分行幸河東祠后土三月丙午帝崩于未央宫上素康壯無疾病向晨欲起因失音不能言晝漏十刻而崩衆皆歸罪於趙昭儀昭儀自殺富平侯張放素親幸放不奉法度太后及大臣以為言上涕泣而遣之就國及上崩放思慕哭泣而卒荀恱曰放非不愛上忠不存焉故愛而不忠人之賊也上崩辟雍遂不立左將軍孔光為丞相皇太后詔曰皇帝即位定郊祀已來未有皇子故復甘泉泰畤汾隂后土祠卒不蒙福其復南北郊於長安如前夏四月己夘皇帝葬延陵自崩及葬三十四日延陵在扶風去長安六十二里讚曰本紀稱孝成帝善脩容儀升車正立不内顧不疾言不親指臨朝淵黙尊嚴若神可謂穆穆天子之容貌也博覽古今容受直言公卿稱職威儀可述遭世承平上下和睦然沈於酒色趙氏内亂外家擅朝言之可為於邑建始已後王氏始執國命迄於哀平莽遂簒位蓋其威福所由來漸矣劉向朱雲之忠言明矣若得而用之福祚未已張禹不吐直言佞於垂死
