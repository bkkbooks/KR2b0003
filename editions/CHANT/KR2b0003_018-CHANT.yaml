body:
  text: 前漢孝宣皇帝紀二卷第十八四年春正月封蕭何孫建為酇侯詔民有太父母父母喪勿徭事夏五月山陽濟陰雹如鷄子地深一尺五寸殺二十餘人飛鳥皆死詔曰自今子有匿父母妻匿夫孫匿太父母皆勿治其父母匿子夫匿妻太父母匿孫罪殊死以下皆詣廷尉以聞立廣川惠王孫文為廣川王秋七月大司馬霍禹謀反誅初霍氏顯殺許后事頗漏泄而未察上乃徙霍氏諸女婿在內及為將校者皆為郡守更以禹為大司馬罷其屯兵霍氏由是恐懼而顯乃以許后事告禹等禹等驚恐曰縣官所以斥逐諸女婿必以是故也霍雲所親張放謂雲曰可令太夫人言於太后先殺丞相及平恩侯移徙陛下在太后耳男子張章告之事下廷尉執金吾捕霍山及張放等後有詔勿捕山等愈恐曰惡端已見之久尤未發發即族我矣不如先之遂謀反令太后為博平君置酒召丞相平恩侯因令其女婿光祿勳范明友等承太后制引斬丞相平恩侯因廢帝而立禹會發覺雲山明友等自殺禹具五刑顯腰斬先是禹夢見第門皆壞有人發第端門屋瓦投之地就視之則不見先是茂陵徐福上䟽曰霍氏太盛陛下即愛厚之宜以時抑割無令亡書三上輒不報聞霍氏既誅而告霍氏反者金安王等五人皆封侯或為徐生上書曰臣聞客有過主人者見其竈直突旁有積薪客曰更為曲突遠徙其薪不者恐有火患主人不聽俄而其家失火鄰人救之幸而得息於是殺牛置酒謝其鄰灼爛者在上其餘以功次坐而言曲突者不得與焉或謂主人曰向使聽客之言不費牛酒終無火患今論功請客不及曲突徙薪曲突徙薪反無恩澤燋頭爛額復為上客邪主人乃悟而請之向使徐福之言早行國無列土之費而臣亡逆亂之敗矣上乃賜福帛千疋以為郎中初禹與張安世長子千秋俱為郎中將兵從擊匈奴還霍光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能對光由是賢千秋以禹為不才乃歎曰霍氏世衰而張氏興矣八月己酉皇后霍氏廢處昭臺宮九月詔曰今繫者或以笞無辜饑寒凍死獄中何為用心逆人道也朕甚痛之其令郡國歲上繫囚以笞掠若病死者所坐名縣爵里丞相御史課殿最以聞十有二月清河王延年有罪廢遷防陵渤海太守龔遂以治民有績徵先是渤海左右數郡歲饑盜賊並起二千石不能禁遂以選為太守時年七十餘形貌短小上望而心輕之問遂曰渤海擾亂將何以息其盜賊遂對曰渤海遐遠不沾聖化其民困於饑寒而吏不卹故使陛下赤子盜弄陛下之兵於潢池中爾今欲使臣勝之邪將安之邪上聞遂對甚悅曰選用賢良故欲安之也遂曰臣聞治亂民猶治亂絲不可急也唯緩之然後可治臣願陛下詔丞相御史且勿拘臣以文法得一切以便宜行事上許之加錫黃金未至郡郡界遣兵以迎遂遂於是移書罷追捕盜賊吏民諸持鋤鉤田器皆為良民吏無得問持兵者乃為盜賊悉遣迎兵還單車至府郡中翕然盜亦皆罷又多劫掠聞教令即時解散皆持鋤鉤於是郡內悉平民安土樂業乃開倉廩假貸貧民選用良吏慰安收養焉齊俗奢侈好為未伎末技不作田種遂乃躬率以節約使民賣刀劍買牛犢曰何為帶牛而佩犢乎勸民農桑課民收歛數年之間民皆富足而獄訟息止上徵遂到將見議曹掾王生謂遂曰天子即問君何以為理者君宜曰皆聖主之德非小臣之力也上嘉其言有讓歎曰君安得長者之言而稱之也遂對曰議曹掾教戒臣上拜遂為水衡都尉而王生為水衡丞以褒顯遂元康元年春正月龜茲王及其夫人來朝龜茲夫人即烏孫公主女也自以得尚漢外孫故請朝上納之贈賜甚厚焉號夫人曰公主龜茲王樂漢衣服制度歸國治宮室作徼道周衛出入傳呼撞鐘鼓如漢家儀外國為之語曰驢非驢馬非馬龜茲王所謂騾也以杜陵東原上為初陵更名杜縣為杜陵徙丞相將軍列侯吏二千石貲百萬者於杜陵鳳凰集太山陳留甘露降於未央宮三月赦天下徙勤事者賜吏民爵鰥寡孤獨帛夏五月立皇考廟益奉明國百戶為奉明縣有司奏言禮父為士子為天子祭以天子悼考園宜稱尊號曰皇考立廟置縣尊戾夫人曰戾太后置園廟奉邑益戾園各滿三百家復高祖功臣絳侯周勃等三十六人子孫世世勿絕嗣其無敵後者復其次秋八月詔舉通文學者冬置建章衛尉二年春正月詔曰書曰文王作罰刑茲無赦今吏修身奉法未能有稱朕甚憫焉其赦天下厲精更始二月乙丑立皇后王氏賜丞相以下至郎從官錦帛各有差王氏之先有功於高祖賜爵關內侯至王皇后父奉光上在民間時與相識有女當適人夫輒死及上即位乃納之後宮為婕妤是時諸愛寵婕妤皆有子上懲霍后之欲鴆太子也以王婕妤無子有寵乃立之以母養太子封父奉光為卬城侯夏五月詔曰吏用法式或以心巧析律二端深淺不平增辭飾非以成其罪奏不如實上無由得知或擅興徭役飾廚傳稱過客越職逾法以取名譽二千石皆察官屬勿用此人今民頗被疾疫之災其令郡國被災甚者無出今年租詔曰聞古者天子之名難知而易諱而今百姓多上書觸諱以犯罪朕甚憐之其改諱詢觸諱在令前者赦之冬京兆尹趙廣漢有罪腰斬廣漢字子都涿郡人也坐殺人不辜丞相按驗之廣漢疑丞相夫人殺侍婢以此脅丞相丞相按之愈急廣漢乃將吏突之丞相府召其夫人跪堂下收奴婢十餘人考問其事丞相上書自陳曰妻實不殺婢婢有過自殺耳丞相司直劾奏廣漢摧辱大臣欲以劫持奉公不道上乃下廣漢廷尉獄又坐殺人不辜治罪吏民守闕號泣者數萬人初廣漢為京兆尹廉明抑強扶弱小民得職而吏士盡心其盜賊姦邪纖微皆知之長安少年數人會窮里空舍謀欲劫人語未及竟廣漢知之使吏捕治之具伏富人蘇回為郎二人私劫質之有頃廣漢至曉賊曰釋質束手善相遇幸逢赦賊驚愕即出叩頭廣漢為跪謝曰幸全活郎甚厚遂送獄敕吏謹遇之給酒肉冬當斷預為調官歛具皆曰死無所恨矣廣漢嘗召湖都亭長湖亭長西經界上界上亭長戲曰為我通問趙君湖亭長至廣漢曰界上亭長謝我何故不為致問其摘姦發伏如神皆此類也廣漢奏令長安遊徼獄秩百石其後百石吏皆差自重不敢枉法京兆清正長老稱之以漢興京兆尹無及廣漢者百姓追思而歌之初為頴川太守誅大姓首惡郡中震慄一切治理威名流聞匈奴及匈奴降者言匈奴中皆聞廣漢然好用新進少年率多果敢之計侵犯貴戚大臣卒以此敗焉車師王烏貴靡初和於匈奴後降漢又恐匈奴攻之懼而奔烏孫漢使者鄭吉田於渠黎乃迎車師王妻子傳送長安賞賜甚厚四夷朝會常尊顯而示之乃立車師太子軍宿為車師王徙居渠黎而吉等田車師故地匈奴爭之而攻漢屯田者趙充國等議欲因匈奴衰弱出兵擊之丞相諫曰臣聞救亂誅暴謂之義兵兵義者王敵加於己不得已而應之者謂之應兵兵應者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地寶貨者謂之貪兵兵貪者破恃國家之大矜人民之眾欲見威於敵者謂之驕兵兵驕者滅此非但人事自頃匈奴常有善意所得漢民輒奉歸之未有犯於邊境雖爭田車師故地不足以置意中國今諸將軍欲興兵入奪其地臣愚不知此兵欲何名也今邊境困乏難以動兵軍旅之後必有凶年言民以愁苦之氣傷陰陽之和也兵出雖勝必有後憂今郡國守相率多不精選風俗尤薄水旱不時郡國盜賊繁多今左右不憂乃欲發兵報纖微之忿於遠夷此乃所謂季孫之憂不在顓臾而在蕭墻之內也上乃棄車師之地丞相又奏言古有羲和之官以承四時之節以敬授民事人君動靜奉順陰陽則和氣應而災害不生自高皇帝時有主四時之官臣願陛下選用明經通知陰陽者四人各主一事明言所職以順陰陽上從之丞相勑掾吏案事郡國若休告還府輒白四方得失異聞盜賊災變輒奏言之以廣視聽是歲烏孫昆彌上書願以漢外孫楚公主子元貴靡為嗣得復尚漢公主上以楚公主弟子相相夫妻之送至燉煌聞烏孫昆彌死元貴靡不得立乃還荅公主侍者馮嫽常持節為漢公主侍者馮嫽常持節為漢公主使外國外國敬信之號曰馮夫人上乃徵馮夫人問烏孫狀而遣謁者送馮夫人軺車持節詔昆彌烏孫就居以為小昆彌而立元貴靡為大昆彌兩昆彌之號自此始也三年春神雀集泰山有烏五色以萬數飛過京師翱翔屬縣賜諸侯王將軍列侯二千石至郎從官帛各有差賜天下吏民爵鰥寡孤獨高年帛三月詔曰蓋聞象有罪而舜封之有痺骨肉之親放而不誅其封故昌邑王賀子為海昏侯又曰御史大夫邴中郎將史魯史玄長樂衛尉許舜侍中光祿大夫許延壽皆與朕有舊恩故掖庭令張賀輔導朕躬厥功茂矣詩不云乎無德不報其封賀子侍中中郎彭祖為陽都侯追諡賀為哀侯吉魯玄舜延壽皆列侯故人及郡邸獄復作嘗有阿保之功者皆以差受祿賜是時掖宮婢名則令民夫上書自陳嘗有阿保之功下掖庭令問則則辭引御史大夫邴吉知狀吉識之謂則曰汝嘗坐養皇孫不謹督笞之安得有功獨渭城胡組淮陽郭徵卿有恩耳詔求組徵卿皆已死有子孫皆受厚賞免則為庶人賜錢十萬上見具問則乃知吉有舊恩賢其不言會吉病篤封吉為博陽侯就加印綬及其生存也太子太傅夏侯勝曰臣聞有陰德者必饗其樂以及子孫今者吉未獲報而病甚非其死疾也後吉瘳上書固辭封上不聽及杜陵陳遂字長子上微時與上遊戲博奕數負遂上即位稍見進用至太原太守乃賜遂璽書曰制詔太原太守官尊祿重可以償遂博負矣妻君寧時在旁知狀遂乃上書謝恩曰事在元平元年赦前其見厚如此元帝時遂為京兆尹後至廷尉遂孫遵字孟公以好賓客著名身長八尺餘容貌甚偉貴戚豪傑咸敬重之所在輻湊莫不震動為河南太守作私書與京師故人召善書吏十人於前遵憑几口授與書吏且省官事書數百封親踈各有意義河南人大驚性善書與人尺牘莫不藏之以為榮然好酒奢放不拘禮度與張敞之孫張竦字伯松相善而竦好學問節約自守並著名字仕官相及遵謂竦曰足下苦身自約而我放意自恣官爵功名不減於子而我獨差樂顧不優耶竦曰人各有長短子欲學我亦不能吾欲效子亦敗矣夏六月立皇太子欽為淮陽王欽者張婕妤之子也好經學法律聰達有才上甚愛之而張婕妤最幸有寵上有意欲立張婕妤子欽然以太子起於細微上少時依許氏及即位而許后以殺死故不忍廢也是歲皇太子冠既學通論語孝經太傅踈廣謂少傅受曰吾聞知止不辱知足不殆功成名遂而身退天之道也即日廣受俱謝病上䟽乞骸骨上以其年老皆許之賜黃金各二十斤而皇太子贈以金五十斤公卿大夫故人邑子為祖道於東都門外送者車數百兩及道路觀者莫不歎息皆曰賢哉二大夫廣受既歸東海令其家供酒食諸族人鄉里相與娛樂數問其家金盡未昆弟諸老謂宜為子頗立產業廣曰吾自有舊田廬子孫勤力於中足以供衣食今復增益之但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者人之所怨吾既無以教化其子孫不欲益其過而生其怨又此金者聖主所以惠老臣也故樂與其鄉黨宗族共受其賜以盡吾餘日不亦可乎於是宗正陽成侯劉德者辟強之子也亦抑損自守家產不過百金餘與昆弟賓客終不積財霍光秉政欲以女妻德德不敢娶畏盛滿也好黃老術有智略少時數召見武帝謂之千里駒德治淮南獄盡得淮南秘書德小子向字子政幼而誦習之以為奇奏言黃金可成上令向典向萬鑄作事費金甚多不驗向坐偽鑄黃金下獄當死德上書訟向有司奏德訟子罪失大臣之體會德病卒上亦奇向有才德減死後論立穀梁春秋上因令向受穀梁春秋傳與諸儒講五經於石渠拜郎中給事黃門遷諫議大夫給事中向後為宗正向為人簡易無威儀廉清樂道不交接世俗專精思於經術晝讀書傳夜觀天文或寢不達旦四年春正月詔曰朕惟耋老之人髮齒墮落血氣衰微亦無暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以來諸年八十已上非誣告殺傷人他皆勿坐遣太中大夫李強等十二人循行天下存問孤寡觀風俗察吏治得失舉茂才異論之士二月河東霍徵史等謀反誅三月詔曰乃者神雀五采以萬數集長樂未央北宮高寢甘泉泰畤殿中及上林苑朕之不逮寡于厚德屢獲嘉祥非朕之任其賜天下吏民爵三老孝弟力田鰥寡孤獨各有差秋八月賜功臣嫡後黃金人二千斤賜故右扶風尹翁歸子黃金百斤以奉其祭祀翁歸字子沉其清潔語不及私溫良謙退不以行能驕人然任刑威京師畏之其奸斜遊俠皆有名藉盜賊發其比伍輒使以類推迹其所過抵率常如其言初田延年為河東太守召見故吏五六十人令有文者東有武者西翁歸獨伏不肯起對曰文武兼備惟所施設延年乃與語大奇之自以為不及翁歸遂舉孝廉後為東海太守過辭廷尉于定國欲以邑子二人囑托且令坐後堂待見及與翁歸語終日不敢見之已而謂其邑子曰此賢將汝不任事也且不可干以私丙寅大司馬衛將軍張安世薨安世以大司馬領尚書事職典樞機謹慎周密再定大政已決輒稱病出聞有詔令乃大驚使吏之丞相府問焉自朝廷大臣莫知其預議也常有所薦其人來謝安世安世大恨之以為舉能達賢豈有私謝耶後絕不通有郎功高不調自言安世安世曰以君之功高明主所知絕不許已而郎果自遷幕府長史或謂安世曰將軍為明主股肱而士無所進議者以為譏安世曰明主在上賢不肖較然人臣自修而已安知士而薦之其匿名迹遠權勢皆如此然安世家僮七百人各有伎巧積累纖微故能值其貨富將擬過霍氏然身衣弋綈夫人紡績車服甚節安世薨子延壽為嗣自以身無功德何以久堪先人大國數上書讓減戶邑又因從弟陽都侯彭祖口陳至誠彭祖初上微時與同硯席讀書上親之上以延壽為有讓乃徙封平原侯戶口如故租稅減半遣使至烏孫求車師前王是歲車師王烏貴靡自烏孫至賜第舍令與妻子居是時比年豐嘉穀玄稷降於郡國金芝九莖產於函德殿銅池中九真獻奇獸南郡獲白虎獻其皮骨爪牙神雀仍集
