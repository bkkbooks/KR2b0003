body:
  text: 前漢孝成皇帝紀三卷第二十六四年秋雨魚於新都長五尺勃海清河河水溢灌縣邑三十一壞官亭民舍四萬餘所丞相御史李尋以為陰氣盛溢水則為之長故一日之內晝減夜增所謂水不潤下猶日月變見於天也應之以政災變自除議者常欲求索九河故迹而穿之宜因其決且可勿塞以觀其勢河所居之處稍刮除自成水迹跳出沙土然後順天心而圖之必有成功而財力寡於是止不塞冬鄭躬之黨侵廣漢衆且萬餘拜河東都尉趙護為廣漢太守發郡中及蜀郡合三萬人擊之旬月平遷護執金吾賜金百斤永始元年春正月癸丑太官淩室災戊午戾太后園闕災北海出大魚長六丈高一丈四枚二月河南郵亭樗樹生枝狀如人頭眉目鬚皆具無髮耳京房易傳曰王者德衰下人將起則有木為人狀夏四月封趙婕妤父臨為陽城侯五月封舅曼子侍中騎都尉王莽為新都侯莽幼孤貧獨折節恭約謹身學業平陽侯鳳薨以託太后而成都侯商願分戶邑封莽當世名士多為莽言者上由是賢之遂封遷光祿大夫侍中莽遂交結將相卿大夫救贍名士賑於賓客家無餘財故在位者更相推薦遊談者為之言説故虛譽日洽傾其諸父矣六月丙寅立皇后趙氏本長安宮人後屬陽阿公主善歌舞號曰飛燕上微行陽阿公主家見而説之及女弟俱為婕妤貴傾後宮許后之廢也欲立為皇后太后甚難之太后娣子淳于長數往來傳言勸太后立之先是諫議大夫王仁上疏言臣聞立后妃者王教之太端三綱之本理治道所由廢興也社稷所以存亡也故夏之興也以塗山亡也以妹嬉殷之興也以有娥亡也以妲己周之興也以文母亡也以褒姒夫三代安危後王所觀是以聖王必審舉措察操行以計勝色者昌以色勝計者亡無鹽宿瘤天下之醜女也齊一君以計勝色立為后皆以折衝安國今許后以罪廢遂事已往如是欲立后妃宜得殊異於前上當奉宗廟下令萬民有所法則河魴河鯉齊薑宋子詩人所高萬乘之主當持久長非一切畢決目前者驪姬亂晉吳姬危趙夫媵妾非天下之母為玩弄可也昔薑后崇禮宣王中興樊姬正言楚莊成霸願留思察小臣惓惓之心上不聽竟立之諫議大夫劉輔諫曰夫妙選有德之士考卜窈窕之女以承宗廟順神祇之心猶懼或失之今乃觸情縱恣於卑賤之女欲以母天下不畏於天不愧於人惑莫大焉語曰腐木不可以為柱卑人不可以為主天人之所不與也必有禍而無福市道皆知其非朝臣莫肯一言臣竊傷之上怒使御史收輔繫掖庭祕獄群臣不知所故於是左將軍辛慶忌右將軍廉褒光祿勳師丹太中大夫谷永俱上書曰竊見諫議大夫劉輔前以縣令求見擢為諫議大夫此其言必有卓絶切至當於聖心者旬月之間收下詔獄小罪宜隱忍如有大惡宜暴之理官與衆共之不宜困于掖庭祕獄公卿已見陛下進用輔亟而折傷之暴人有懼心莫敢正言非所以昭有虞之聽廣德美之風也臣等竊傷之上乃徙繫共工獄減死罪一等論為鬼薪終於家趙皇后既立寵乃少衰而弟絶幸為昭陽舍其中庭彤朱而壁髹漆切皆銅沓黃金塗白玉陛金釭函藍田壁明珠翠具飾之自有宮室已來未之有也初謠曰燕燕尾涎涎張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢本志以為燕者飛燕木門蒼琅根宮門銅鋪也言其將尊貴也張公子謂富平侯張放也即安世之孫父臨上敬武公主放以公主子開明得幸嘗與上遊宴俱適陽阿公主家而見飛燕故曰時相見放娶皇后女弟上為供帳賜以甲第及乘輿服飾兩宮使者冠蓋相望不絶賞賜以千萬數號為天子娶婦皇后嫁女甚為貴寵安世到臨世履恭儉臨母登閣殿嘗歎曰呂霍為我戒豈不厚哉唯放為驕者是歲昌陵猶未就光祿大夫劉向上疏曰昔黃帝葬喬山堯葬濟陰丘壟皆少小舜葬倉梧二妃不從禹葬會稽不改其畝殷湯無葬處文武周公葬於畢秦穆公葬於雍祈年館下樗里子葬於武庫皆無丘壟之處此聖帝明王賢君智士遠覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也孔子葬母於防墳高四尺遇雨而崩延陵季子之適齊而反其子道死葬於嬴博之間穿斂以時服封墳掩坎其高可隱而號曰骨肉歸於上命也魂氣則無不之也孔子曰延陵季子之於禮合矣故仲尼孝子延陵慈父舜禹忠臣周公悌弟其葬君親皆微薄矣非苟為約誠便於禮也至吳闔閭違禮厚葬十餘年越發之秦惠文武昭莊襄皆大其丘壟多其瘞藏咸盡發掘曝露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山陵墳高五十餘丈周回五里棺槨之麗不可勝原項籍發掘其墓後牧童亡羊羊入其墓牧者持火燒其棺槨自古及今葬未有盛於始皇者也數年之間外被項籍之禍內罹牧豎之災豈不哀哉故德彌厚者葬彌薄智愈深者葬益微無德寡智者葬益厚發掘必速以此觀之照然可見也今昌陵增卑為高積土為山發民墳墓以萬數死者恨於下生者愁於上怨氣結於陰陽因之以飢饉臣竊愍焉以死者為有知發人墳墓為害多矣若其無知又焉用大謀之賢智則不悅以示衆庶則苦矣若苟以悅愚夫淫奢之人亦何為哉陛下慈仁篤美其厚聰明踈達蓋世宜弘漢家之德以崇劉氏之業而欲與亂秦之暴政競為奢侈比方丘壟悅於愚夫之日隆於一時之觀違賢智之心忘萬世之安臣竊為陛下羞之上甚感向言而不能從有司議曰昌陵增卑為高積土為山度便房猶在平地客土中不保幽冥之靈外淺不固卒徒功庸日以萬數至㸐脂火夜作取土東山與粟同價作治數年天下遍被其勞國家疲弊府庫空虛下至衆庶嗷嗷苦之故陵因天性據真上處勢高敞傍近祖考前已有十餘年功績宜還復故陵上知不就秋詔罷昌陵荀悅曰夫葬之侈也從來久矣是以直節遂志之士見其失而矯之武帝時楊王孫者學黃老術家業千金厚自奉養將終告其子曰吾欲裸葬以復吾真死則為布囊盛尸入地七尺既下從足引脫取囊以身親土其子不忍從命往見友人祁侯祁侯曰豈禮哉王孫曰蓋聞聖人因人之情不忍其親故為制禮今則越之是以裸葬將以矯世也夫厚葬誠無益於死者而俗人競以相高糜財殫弊盡腐之地下或乃今日入土而明日見發此真與曝骸中野何異夫死者衆生之化而物之歸也歸者得至化者得變是各反其真故謂之鬼鬼之言歸也其尸塊然獨居豈有知哉裹以幣帛隔以棺槨支體束絡口含金玉欲化不得鬱為枯臘千載之後棺槨朽腐乃得歸土就其真宅由此言之焉用遠宅故聖王不加力於無用不殫財於無益謂今費財厚葬皆為歸隔至生者不知死者不得是謂大惑於戲吾不為也祁侯曰善遂裸葬焉立城陽孝王子理為王秋八月丁酉太皇太后王氏崩九月乙巳晦日有蝕之京師知之四方不見二年春正月乙己大司馬車騎將軍王音薨二月癸未夜星隕如雨長二丈繹繹未至地滅乙酉晦日有蝕之四方見京師不見谷永對曰賦斂有不得所致也四方見京師不見陰蔽也天戒若曰好治宮室大增墳墓賦斂滋重百姓虛竭禍在外也元年日蝕京師知之四方不見天戒若曰沈湎於酒君臣不別禍在內也三月丁酉成都侯王商為大司馬衛將軍御史大夫王卒京兆尹翟方進為御史大夫秋八月方進貶為執金吾冬黑龍見東萊十月己丑丞相薛宣免十一月壬子光祿勳孔光為御史大夫光字子夏孔子十四世孫孔子生伯魚鯉鯉生子思伋伋生子上白白生子家求求生子真箕箕生子羔穿穿生子慎斌斌為魏相慎生鮒為陳涉博士死陳下鮒弟子襄惠帝時為博士長沙王太傅襄生忠忠生武武生延年延年生安國延年生位至臨淮太守延年生霸字次孺元帝時為太子太傅時霸以太中大夫授太子經元帝立以霸為師賜爵關內侯食邑八百戶號曰褒城君給事中霸為人謙退常稱爵位太過何德以堪之上欲致之相位自貢禹之卒薛廣德之免輒欲拜霸霸讓至三四上知其誠乃弗用霸薨上素服臨弔者再賜東園祕器錢帛册贈以列侯禮葬諡曰列君霸生光光為尚書僕射職典樞機十餘年守法度修故事上有所問據經法而對不希上旨苟合亦不強諫諍以是久見委信有所奏言輒削其草以為彰人主之過以訏為忠直人臣之大罪也有所薦舉唯恐其人聞知休沐兄弟宴語終不及省中事或問溫室中樹皆何等木光默然不應更答以他語其重慎如此執金吾翟方進為丞相封高陵侯方進字子威汝南人初為府小吏相於同郡蔡父父曰小吏有封侯骨當以經術進乃辭後母至京師學後母憐其幼隨至長安織屨以給之對策甲科遷議郎諸儒稱之時宿儒胡常與方進同經陰構毀之方進伺常大都講日遣生咨問疑義咨問疑義因記其説卒改意而親友後為丞相司直從上至甘泉行馳道中司隸陳慶劾奏方進沒車馬方進伺慶微過劾奏免官北地浩商殺義渠長丞相請遣司隸與掾郡部刺史逮賊司隸涓勳奏言春秋之義王人微者序於諸侯之上尊王命也今丞相欲遣宰士督察天下奉使大夫專權作威甚悖逆順之理乃止方進於是伺勳微過劾奏勳左遷昌陵令方進頻免兩司隸朝廷憚之其任勢立威以取世資皆此類也能探人主微旨以濟其事然方進內行修飾事後母甚篤為丞相後母猶存及亡既葬三十六日除服視事以為身被漢相不敢渝國家之制在位公潔請託不行然持法深刻上行幸河南雍祠五畤侍中淳于長賜爵關內侯食邑千戶初將作大匠解萬年奏請營作昌陵常侍王閎數言昌陵不可成長亦言之上以趙皇后之立也欲封長乃詔曰常侍王閎前為大司農中丞上言昌陵不可成朕以長言下閎章公卿議者皆合長策長首建至策閎省息大費民以康寧宜賜爵關內侯食邑千戶閎前賜爵關內侯黃金百斤罷昌陵勿徙吏民萬年佞邪不忠雖遇赦令不宜居京師其徙萬年燉煌郡而陳湯俱徙燉煌湯素與萬年相善昌陵之計湯與及之又見黑龍或私問湯湯曰是謂玄門開上數出入不時微行故龍非時出也是時丞相奏廢昌陵邑中屋奏未下湯以為上須順衆心昌陵亦恐復發徙也湯坐非所宜言大不敬故徙先是湯上言康居王侍子非王子也案驗實王子湯坐下獄當死谷永誦湯曰臣聞楚有子玉得臣文公為之側席而坐趙有廉頗馬服秦不敢窺兵井陘漢有郅都魏尚胸奴不敢南牧夫戰剋之將不可不重也蓋君聞鼓鼙之聲則思將帥之臣湯前出西域忿郅支之無道閔王誅之不加策慮愊億義勇奮發興師猋逝橫厲馬孫逾其都賴屠三重之城斬郅支之首報十年之邊誅雪邊吏之宿恥威振百蠻武揚四海自漢元已來征伐方外之將未嘗有也昔白起為秦將南拔郢都北破趙括以纖芥之過賜死杜郵秦民憐之莫不流涕今湯親秉斧鉞席卷乘勝歃血千里之外薦功祖廟告類上帝以言事為罪無烜赫之惡周書曰記人之功忘人之過宜為人君者也犬馬於人有功尚加帷蓋之報況國之功臣哉竊恐陛下忽於鼓鼙之聲不察周書之意而忘帷蓋之施愚臣庸淺謂湯卒從吏議百姓介然有秦民之恨非所以勵死難之臣也上乃出湯奪爵位為士伍及西域都護假會宗為烏孫所圍上書願發諸城堡及燉煌兵以自救時大臣議數日不決上召問湯示以會宗奏湯對曰此無可憂也夫胡兵朴鈍五不當漢兵一今聞頗得漢巧然猶三而當一兵法客倍主人半然後敵今圍會宗者人衆不足勝陛下勿憂且兵法輕行五十里重行四十里而會宗欲發城郭諸兵歷時乃至所謂報讎之兵非救急之兵也上曰其解可必乎湯知烏孫瓦合不得久故事不過數日因對曰已解矣屈指計其日曰不出五日當有吉語至四日軍書至言已解矣湯既徙燉煌久之議郎耿育上書訟湯與延壽為聖漢揚鉤深致遠之威雪國家纍年之恥討絶域不羈之臣係萬里難制之虜豈有比哉今湯塊然被讒老棄燉煌令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之威夫援人之功以懼敵棄人之身以快讒豈不哀哉天子乃還湯京師三年春正月乙卯晦日有蝕之夏大旱冬十一月復甘泉泰畤汾陰后土雍五畤陳倉寶雞祠上自以久無繼嗣故復之上頗好鬼神四方多上書言祭祀方術事谷永上説曰臣聞明於天地之性者不可惑以怪神知萬物之情者不可罔以非類諸非仁義之正道不尊五經之法言而稱奇鬼神廣崇祭祀之方求報應無福之祀及言世有仙人服食不終之藥黃白變化之術皆姦人惑衆挾邪道懷詐偽以欺罔世主聽其辭洋洋滿耳若將可遇求之蕩蕩若繫風捕影終不可得是以明王距而不聽聖人絶而不語昔周萇弘欲以鬼神之道輔尊靈王而周室逾微萇弘死楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵破地削身辱國危及秦始皇甘心神仙之道而天下怨叛漢興辛垣平齊人少翁欒大之屬皆言神仙鬼神之事貴寵尊盛卒無絲髮之效皆伏誅往事之迹以揆今惟陛下拒絶此類無使姦人有所窺𨵦上善其言十二月尉氏男子樊並等十三人殺陳留太守劫掠吏民自稱將軍謀為大逆徒李談等共格殺並等皆封為列侯山陽鐵官徒蘇令等二百二十八人攻殺長吏盜庫兵自稱將軍經歷郡國十九殺東郡太守汝南都尉遣丞相長史御史中丞特節逐捕汝南太守嚴欣捕斬令等遷大司農賜黃金百斤時上不親政事貴戚驕恣交通賓客藏匿亡命長安中群輩殺吏受任報讎相與探丸為號赤丸殺武吏黑丸斬文吏白丸主治喪城中暮煙起剽劫行者死傷橫道乃選酷吏尹賞等守長安令得以一切便宜從事賞治長安獄穿地方深各數丈塹治為槨名曰虎穴乃令吏民舉籍長安中輕俠少年惡子弟無市籍商販不作業而鮮衣盛服者得數百人一日悉掩捕皆劫以通行飲食群盜賞親閲視之十置其一餘悉致之虎穴百人為輩覆以大石數日乃出其死者埋寺垣外為表其姓名百日後令家得收葬賞所留者皆其魁首或故吏善家子失意隨輕俠者於是舍其罪詭令立功百自效者因親用為爪牙由是賊盜盜賊止息然道路噓嘻有哀聲矣賞為江夏太守坐殘賊免四年春正月行幸甘泉宮郊泰畤神光降集紫殿大赦天下賜雲陽吏民爵女子百戶牛酒鰥寡高年帛三月行幸河東祠后土賜如雲陽行幸所過無出田租夏大旱四月癸未長樂臨華殿及未央宮司馬門皆災六月甲午霸陵園門闕災詔曰聖王明禮制以序尊卑異車服以昭有德雖有其財而無其尊不得踰制故民興行方今世俗奢侈靡有厭足公卿列侯親屬近臣四方所則未聞修身遵禮同心憂國者也或有奢侈逸豫務廣田宇多畜奴婢被服綺縠設鍾鼓備女樂車服嫁娶葬埋過度吏民慕效故習以成俗而欲望百姓節儉家給人足豈不難哉詩不云乎鼓鍾于宮聲聞于外又云赫赫師尹民具爾瞻宜申勑有司以漸禁之青緑民所常服且勿止列侯近臣宜各自省改司隸校尉察不變者七月辛未朔日有蝕之冬十一月庚申大司馬衛將軍王商賜金安車駟馬免
