body:
  text: 前漢孝昭皇帝紀卷第十六皇帝戊辰即位年八歲謁高廟三月甲申孝武帝葬茂陵帝姊鄂邑公主益湯沐邑為長公主共養省中大將軍霍光秉政領尚書事車騎將軍金日磾左將軍上官桀副焉夏六月赦天下秋七月有星孛於東方濟北王寬坐悖人倫祝詛有司請誅上遣大鴻臚利召王王以刃自刎死賜長公主及宗室昆弟各有差追尊趙婕妤為皇太后起雲陵冬胸奴入朔方殺略吏民發軍屯西河左將軍桀行北邊始元元年春二月黃鵠下建章宮太液池中公卿上壽賜諸王列宗室金錢各有差己亥上耕于釣盾弄田益封燕王廣陵王及鄂邑長公主各萬三千戶夏為太后起園廟雲陵益州廉頭姑繒牂柯談指同並二十四邑皆反遣水衡都尉呂破胡募吏民及發犍為蜀郡奔命擊益州大破之有司請河內屬冀州河東屬并州秋七月赦天下賜民百戶牛酒大雨渭橋絶八月齊孝王孫劉澤謀反欲殺青州刺史雋不疑發覺皆伏誅遷不疑為京兆尹賜錢百萬金日磾輔政歲餘病困大將軍光白封日磾臥授印綬一日薨賜葬具冢地送以輕車介士軍陳至茂陵諡曰敬侯閏月遣故廷尉王平等五人持節行郡國舉賢良問民所疾苦冤失職者冬無冰二年春正月大將軍光左將軍桀皆以前捕斬反虜侍中僕射莽阿羅重合候馬通功封光為博陸侯桀為安陽侯時衛尉王莽子男忽侍中揚語曰帝病忽常在左右安得遺詔封三子事群兒自相貴耳光聞之切讓王莽莽鴆殺忽以宗室母在位者舉茂才劉辟彊劉長樂皆為光祿大夫辟彊守長樂衛尉三月遣使者振貸貧民毋種食者秋八月詔曰往年災害多今年蠶麥傷所振貸種食勿收弄毋令民出今年田租冬發習戰射士詣朔方調故吏將屯田張掖郡三年春二月有星孛于西北秋募民徙雲陵賜錢田宅冬十月鳳凰集東海遣使者祠其處十一月壬辰朔日有食之四年春三月甲寅立皇后上官氏赦天下詞訟在後二年前皆勿聽治初桀子安娶霍光女結婚相親光每休沐出桀常代光入決事鄂邑蓋長公主私近子客河間丁外人上與大將軍聞之不絶主歡有詔外人付長主長主內周陽氏女令配耦帝時上官安有女即霍光外孫安因光命內之光以為尚幼不聽安素與丁外人善說外人曰聞長主內女安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重成之在於足下漢家故事常以列侯尚主足下何憂不封侯乎外人熹言于長主長主以為然詔召安女入為婕妤安為騎都尉月餘遂立為皇后以后父封桑樂侯食邑千五百戶遷車騎將軍夏六月皇后見高廟賜長公主丞相列侯中二千石以下及郎吏宗室錢帛各有差徙三輔富人雲陵賜錢戶十萬秋七月詔曰比歲不登民匱于食流庸未盡還往時令民共出馬其止勿出諸給中都官者且減之各遣大鴻臚田廣明擊益州廷尉李种坐故縱死罪棄市五年春正月追尊皇太后父為順成侯夏陽有男子乘黃犢車詣北闕自謂衛太子上使公卿中二千石雜識視之聚觀者數萬人右將軍勒兵闕下以備非常丞相已下至者並不敢言京兆尹雋不疑後至叱從吏收之或曰是非未可知且安之不疑曰昔衛蒯瞶違命出奔輒拒而不納春秋美之今衛太子得罪先帝亡不即死今自來此是罪人也遂送詣獄窮治姦詐遂訊服本夏陽人也姓成名方遂居湖以卜筮為事有故太子舍人嘗就方遂卜謂之曰子之貌甚似衛太子遂緣其言乃詣闕廷尉還召其鄉里張祿者皆識知之方遂坐誣罔腰斬一云姓張名延年霍光曰大臣當用經術士方明於大義光欲以女妻不疑固辭畏盛滿也後以病免於家夏六月封皇后父驃騎將軍上官安為樂鄉侯罷儋耳番禺九真郡秋大鴻臚田廣明軍正王平擊益州斬捕虜三萬餘人獲畜産五萬餘頭六年春正月上耕於上林二月詔有司舉賢良文學問民疾苦議罷鹽鐵榷酤中郎將蘇武自胸奴還武京兆人故將軍建之子初使胸奴張勝為副及假節使常惠等從是時渾邪王姊子勾町王及長水虞常皆前歸漢後降在胸奴中復欲歸漢謀殺胸奴近臣衛律律者本長水胡人也生在漢中後降胸奴常惠素與勝善勝知其謀會事發覺勝乃語武武驚曰事如此必及我見禍乃死後矣欲自殺常惠等止之單于召武受辭武曰屈節辱命何面目以生引佩刀自刎絶半日復蘇單于嘉其節欲降之後疾愈單于將殺虞常等召武皆會欲因此際降武先擊虞常等令衛律以劍擊勝勝請降律後以劍擬武武不動律曰律前負漢歸胸奴賜號稱王擁衆數萬蘇君今日降明日復然空以身膏草野誰復知之君因我降與君為兄弟今不聽吾計雖欲復見我尚可得乎武怒罵律曰汝為人臣不忠背叛於夷狄何用見汝為兄弟乎律知武終不可脅單于欲必降之乃置武大窖中絶不與飲食七日天雨雪武嚙雪與旃毛并咽之數日不死單于徙武北海上無人處使牧羝羊曰羊有乳乃得歸漢武掘野鼠草實而食之杖漢節牧羊臥起操持節毛盡落五六年單于弟於靬王戈獵海上見武能結網紡繳擎治弓弩於靬王愛之陰給衣食賜武馬畜三歲餘於靬王死丁零盜武牛羊武復窮厄會李陵降胸奴單于使陵降武謂武曰陵來時子卿太夫人已死妻已更嫁昆弟或抵罪或疾病死室家已盡今單于必欲降子卿子卿終不得歸矣人生如朝露何久自苦如此陵始來時忽忽如狂自以痛負漢子卿不欲降何以過陵武曰臣事君猶子事父也子為父死無所恨願勿復言陵與武飲酒數日復曰子卿一聽陵言武曰自已分死久矣少卿必欲降武武請畢今日之歡效死於子前陵見其至誠喟然歎曰嗟乎義士陵與衛律罪上通天因泣下沾𥘞與武決去後武聞武帝崩南向號哭數日嘔血及上即位與胸奴和親漢使至胸奴常惠數私見使教之曰陛下親射上林中得白鴈足有繫帛丹書言武等在荒澤中使者以語單于單于驚謝使者曰武等實在許遣之於是李陵置酒賀武曰今足下還歸名揚於胸奴功顯於漢朝雖竹帛所載丹青所畫何足以過子卿陵雖駑怯漢旦貫陵罪得全其老母得奮大恥之節志在庶幾乎曹劌於柯之盟此陵宿昔所不忘也今漢收族陵家為世大戮陵當復何顧乎吾已矣令子卿知吾意耳異域之人一別長絶陵起舞歌曰經萬里兮渡沙漠為將軍兮奮胸奴路窮絶兮矢石推士衆滅兮名已頽老母已死雖欲報恩將安歸兮單于遂遣武歸漢而陵終胸奴中初武使出百餘人在胸奴十九年凡從還者九人詔武謁孝武陵園廟拜為典屬國賜錢二百萬公田十二頃宅一區常惠徐勝趙終王良等拜郎中賜帛各二百匹其六人賜錢各十萬歸家復終身夏大旱雩秋七月罷榷酤官取天水隴西張掖各二縣以為金城郡鉤町侯無波帥其君長人民擊反者有功立無波為鉤町王元鳳元年春立泗水戴王子援為泗水王戴王前薨以無子國除後宮有遺腹子援相內史不以奏言上聞而憐之乃立援為王相內史下獄武都氐人反遣執金吾馬適建等將三輔太常徒皆免刑擊之夏六月赦天下秋七月乙亥晦日有蝕之既九月鄂邑長公主燕王旦左將軍上官桀桀子驃騎將軍安御史大夫桑弘羊皆謀反伏誅上官桀父子驕放長公主供養上於內桑弘羊為國興利自伐其功各欲為子弟黨類求官以私于光光不聽由是與光爭權欲害之詐使人為燕王旦上書言光出都肄邸羽林道上稱驚蹕太官先置又擅調發益幕府校尉光專權自恣疑有非常候光休沐日奏之桀欲從中下其事弘羊當與大臣共執退光書奏上不肯下召光光入上曰此書詐也將軍無罪光曰陛下何以知之上曰以將軍之廣明都肄邸皆道屬耳調校尉未滿十日燕王何以得知之且將軍為非不須益幕府校尉時上年十四左右尚書皆驚而上書者果亡後桀等數毀光上輒怒曰大將軍忠臣先帝所屬以輔朕躬敢有毀者坐之自是桀等不敢言乃謀令公主置酒請光伏兵殺之因廢帝誘迎立燕王燕王至殺之因立桀為帝燕王與驛者書相報許立桀為王外連諸郡國郡國豪傑以千數燕王以為事必成令群臣皆裝是時天大雨虹下屬燕王宮宮中井水皆竭有黃鼠舞燕王殿前端門中視之不去一日一夜死者數千殿上戶自閉不可開廁中豕群出壞脿御釜六十枚置殿門前烏鵲自喗宮中烏死天火燒燕南城門大風壞宮城樓板樹木流星墜地后妃已下皆恐王驚病燕占災者言當有兵圍城其在十月漢當有大臣戮死者會蓋主舍人父燕倉知其謀以告太司農楊敞敞告諫議大夫杜延年以聞桀等伏誅燕王聞之謂相平曰事已敗遂發兵乎相平曰左將軍已死百姓皆知之不可發也王憂悶會賓客群臣置酒會使者至賜王璽書曰與王骨肉至親敵吾一體乃與他族異姓謀害社稷親其所踈踈其所親有悖逆之心無忠愛之義如使古人有知當何面目復奉齊酹見高祖之廟乎旦以綬自絞死后夫人隨王死者二十餘人詔赦燕太子建為庶人諡旦曰刺王赦燕吏民杜延年燕倉皆封侯楊敞以大臣不即以聞不封其為桀等所誤未發覺者除其罪本志以為烏鵲喗燕王宮中烏死近黑祥也楚王戊時烏鵲群喗於野而白者死燕王一烏一鵲喗於宮而黑者死俱誅反亂之祥同占理合此天人之明表也楚冗陽舉兵於外大敗於野故衆烏白而金色者死燕王陰謀未發獨王自殺於內故一烏如水色者死此天道精微之效也無南城門者通漢道也天火燒之者燕往來通言姦謀之戒也豕出者近豕禍也聽之不聰暴急之咎也壞脿陳釜於庭者示不復用也而宮室將廢焉黃鼠舞端門者近黃祥也思心務亂之應將敗死亡之象也庚午右扶風王欣為御史大夫二年夏六月赦天下問民所疾苦三年春正月泰山有大石自立高丈五尺大四十八圍入地八尺三石為足石自立後有白頭烏數千下集其旁昌邑社中枯木復生上林苑中枯柳斷而自起復生有蟲食其葉成文曰公孫病已當立符節令魯人眭弘治春秋曉災異上書言大石自立僵柳復起當有匹庶為天子者枯樹復生故廢之家公孫氏當復興乎漢家承堯之後有傳國之運當求賢人禪帝位以退自封百里以順天命孟意亦不審知其所在孟坐誤妖言惑衆伏誅及宣帝起民間而立以弘子為郎冬遼東烏丸反天子拜范明友為度遼將軍擊之斬首六千餘級獲三王首四年春正月甲戌丞相車千秋薨千秋者本齊田氏也以年老上優之得乘小車上殿故世謂之小車丞相因氏焉二月乙丑御史大夫王欣為丞相欣始為范陽令暴勝之為直指使者欲斬之欣解衣伏躓仰曰使者專殺生之柄威振郡國今斬一欣不足以增威不如特有所寬以明恩貸令盡死力勝之遂赦之不誅薦欣徵為右輔都尉遂進至丞相大司農楊敞為御史大夫夏四月渡遼將軍范明友以破烏丸功及前定益州功封平陵侯平樂監傅介子使持節誅樓蘭王是時樓蘭殺漢使者介子自請於霍光曰願往殺之以威示諸國於是齎金幣揚言以賜外國樓蘭王不及承之介子陽引而西曰天子以金幣賜諸國而不來我將西矣多出金幣以示其驛使樓蘭王貪漢物因往見使者介子曰天子使我私報王隨介子入帳中屏人語壯士二人從後刺之刃交於胸左右皆散走介子告喻以王負漢罪大矣天子遣我誅王當更立太子前在漢者漢兵方至無敢動動則滅國矣遂立其王子安師持斬王首歸懸北闕封介子為義陽侯五月丁亥孝文廟正殿災六月赦天下五年春正月廣陵王來朝秋罷象郡冬十一月大雷十二月庚午丞相王欣薨六年夏赦天下右將軍光祿勳張安世以宿衛忠謹封富平侯烏丸復犯塞渡遼將軍范明友擊之冬十有一月乙丑御史大夫楊敞為丞相敞華陰人也以謹厚為霍光所親少府蔡義為御史大夫元平元年春二月詔減口賦錢什三庚辰有流星大如月西行衆星皆從之乙丑有雲如狗朱色尾長三丈俠漢西行本志以為大星如月者諸大臣之象也天以東行為順西行為逆此大臣將行權以安社稷星占曰太白散為天狗為卒起卒起身禍無時大臣運柄將安社稷夏四月癸未帝崩於未央宮無嗣大臣議所立武帝子獨有廣陵王胥胥本以行失道先帝所不用光心計不安郎有上書言周大王廢太伯而立王季文王廢伯邑考而立武王唯在所宜雖廢長立少可也廣陵不可以承宗廟言合光心光以書示丞相敞等乃擢郎為九江太守即日承皇太后詔迎昌邑王賀賀者武帝孫昌邑哀王子也六月壬申皇帝葬於平陵賀即位行淫亂光憂悶恐及禍以問大司農田延年議欲以廢王延年曰伊尹廢太甲以安殷宗廟後世稱忠將軍若如此即漢之伊尹也光乃引延年為給事中與車騎將軍張安世定謀是時天陰晝夜不見日月二十餘日賀欲出光祿大夫夏侯勝當車諫曰天久陰不雨臣下有謀上者陛下出欲何之賀怒縛勝以屬吏光以為安世泄語安世實不知乃召問勝勝曰在洪範皇之不極厥罰恆陰即有下伐上光與安世大驚由是重經術士遂召丞相已下群臣會議未央宮光曰昌邑王行淫亂恐危社稷如何群臣皆失色莫敢對者田延年前離席按劍曰先帝屬將軍以幼孤者以將軍忠賢能安劉氏也今群下鼎沸社稷將危如使漢家絶嗣將軍雖死何以見先帝於地下今日之議不可旋踵群臣後應者臣請以劍斬之光謝曰九卿責光是也於是議者皆叩頭唯大將軍命光遂白皇太后皇太后被珠襦坐武帳中群臣已下皆以次上殿召昌邑王聽詔奏曰昌邑王典喪服斬衰無悲哀之心居道上不素食使從官略人子女私內傳舍引昌邑從官騶奴三百人常與居禁闥內戲笑殿中為書曰皇帝問侍中君卿使御史府令高昌奉黃金千斤贈君卿娶妻十人今大行在前殿發樂府器引納昌邑樂人鼓吹納昌邑樂人徘徊歌舞乘法駕驅馳北宮召皇太后御小馬車使官奴騎乘遊戲與孝昭宮人蒙等淫亂取諸侯王列侯墨綬以并佩昌邑郎官者免奴即位二十七日使者旁午持節詔諸官署徵發凡一千一百二十七事荒淫迷惑失帝王義五刑之屬莫大於不孝周襄王不能事母春秋絶之於天下昌邑王不可以承宗廟當廢臣請有司以大牢告祀高廟皇太后詔曰可王曰天子有爭臣七人雖無道不失其天下光曰皇太后詔廢安得稱天子遂下解玉璽組綬奉上皇太后王出群臣隨送王西面拜曰臣愚戇不任漢事遂起就乘輿副車光送至昌邑邸光謝曰王行自絶於天下臣等負王不敢負社稷光涕泣而去王歸昌邑賜湯沐邑二千戶昌邑群臣坐無輔導之訓悉誅三百餘人唯中尉王吉字子暘郎中令襲遂字少卿以忠真數諫得減死罪一等河南王式字翁思為賀師治事使者責問式何以無諫書式曰曰臣以三百五篇詩授王至於忠臣孝子之篇未嘗不反覆為王言之至於危亡失道之君未嘗不流涕為王言之臣以三百五篇詩諫王何以為無書亦得減死為世儒宗初賀之在國也好遊獵無節度王吉上疏諫曰大王不好經術而好逸遊伏軾樽銜馳騁不止口捲於叱咤手勤於轡箠身勞於車輿朝則冒霜霧晝則犯埃塵夏則為大暑之所爆炙冬則為風雪之所偃薄非所以養性命隆仁義也夫廣廈之下旃茵之上明師在前勸頌在後上及唐虞之隆下及殷周之盛考仁聖之風習治國之道欣欣然發憤忘食日新其德其樂豈徒銜鑣之間哉王每放縱失道吉輒諫爭龔遂亦數直諫陳禍福號泣謇謇無已王曰郎中令何為哭遂曰臣痛社稷危也面刺王過王至掩耳趨走曰郎中令善愧人及國中皆畏憚焉及王之徵也吉遂又數納諫王不能用遂至於廢於是迎衛太子之孫病已而立焉是為孝宣帝荀悅曰昌邑之廢豈不哀哉書曰殷王紂自絶於天易曰斯其所取災言自取之也故曰有六主焉有王主有治主有存主有哀主有危主有亡主體正性仁心明志固動以為人不以為己是謂王主剋己恕躬好問力行動以從義不以縱情是謂治主勤事守業不敢怠荒動以先公不以先私是謂存主悖逆交爭公私並行一得一失不純道度是謂哀主情過於義私多於公制度殊限政令失常是謂危主親用讒邪放逐忠賢縱情遂欲不顧禮度出入遊放不拘儀禁賞賜行私以越公用忿怒施罰以逾法制遂非文過知而不改忠信擁塞直諫誅戮是謂亡主故王主能致興平治主能行其政存主能保其國哀主遭無難則庶幾得全有難則殆危主遇無難則幸而免有難則亡亡主必亡而已矣夫王主為人而後己利焉治主從義而後情得焉存主先公而後私立焉故遵亡主之行而求存主之福行危主之政而求治主之業蹈哀主之跡而求王主之功不可得也夫為善之至易莫易於人主立業之至難莫難於人主至福之所隆莫大於人主至禍之所加莫深於人主夫行至易以立至難便計也興至福而隆至禍厚實也其要不遠在乎所存而已矣雖在下才可以庶幾然迹觀前後中人左右多不免於亂亡何則沉於宴安誘於諂導放於情欲不思之咎也仁遠乎哉存之則至是以昔者明王戰戰兢兢如履虎尾勞謙日𣅳夙夜不怠誠達於此理也故有六主亦有六臣有王臣有良臣有直臣有具臣有嬖臣有佞臣以道事君匪躬之故達節通方立功興化是謂王臣忠順不失夙夜匪懈順理處和以輔上德是謂良臣犯顏逆意抵失不撓直諫遏非不避死罪是謂直臣奉法守職無能往來是謂具臣便辟苟容順意從諛是謂嬖臣傾險讒害誣下惑上專權擅寵唯利是務是謂佞臣或有君而無臣或有臣而無君同善則治同惡則亂雜則交爭故明主慎所用也六主之有輕重六臣之有簡易其存亡成敗之機在於是矣可不盡而深覽乎讚曰本紀稱昔者周成王以孺子繼統而有管蔡四國流言之變孝昭以幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭卒任霍光各因其時以成大矣哉承孝武奢侈餘弊師旅之後海內虛耗戶口減半霍光知時務之要輕徭薄賦與民休息至元始元鳳之間胸奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵罷擢沽尊號為昭不亦宜乎
