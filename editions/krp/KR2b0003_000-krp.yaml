front:
  text: 刻兩漢紀序夫史以述王道辨人紀彰厥軌迹以昭法戒蓋聖人之耳目來世之龜鏡也茍是非善惡不足以未懲勸觀廢興則雖侈聞淫綴雕琢穪匠者無所取焉史官之設肇自軒后虞夏商周載在詩書王迹熄而人倫廢孔子乃遵周公之制立百王之法而作春秋春秋者事經之標的也慨夫惇史邈而行漓素文沒而言絕後有作者罕臻兹理故號良史之才者議論頗繆于聖人近通人之作者甄明或闕于前史又況情文不類出二家下者乎若乃漢侍中悅晉太守宏性靜詞華圖書掌七閣之祕學該才逸文章擅一時之宗潁川托疾文若禮敬于微年牛渚高情謝尚晤譚于申旦憤操攬權眀哲炳幾先之見當温厚遇不阿秉亮直之貞著申鑒則本仁義以獻替賦北征則遡尼父之風流抱結遐志洩而爲文故其書也要在逹道義章法式篤名教之本發帝王之藴如論災沴則本疇之休咎陳天人之際也如論夷狄則本謨之即叙嚴夏夷之防也六臣三諌惋遇主之難也三遊四弊悼養士之失也典經儒家斯文教化之任也井田封建中正協和之思也忠邪著消長之幾王覇析德刑之辨禮究承天立政之端樂契穆倫導俗之本作營玩好迪鏤彤貴異之懲内嬖外戚述倖侫亢寵之戒言多凖經議不悖聖其于作者亦云庶幾矣且書有二體曰書曰紀書之體創自馬遷紀之體沿於左氏閎衍周贍區分條燦一家之言固不可少而平易質直綜括簡要辭約而事詳則紀爲得焉故杜預有曰記事者以日繫月月繫時時繫年所以紀逺近别同異也兩漢紀者則左氏體也品擬其文並爲嘉藻荀則典麗婉通緬嗣西京之絕響袁則渾深爾雅一湔江左之靡風誠藝林之珉玉史家之圖籥矣但其刋布弗廣遂致湮晦昔大復何舍人得荀氏書抄本于徐太宰家刻于高陵涇野吕公序之曰予曩在史館數問荀氏書弗獲見而恨校讐之無副若袁氏書則尤所希覯者也宋紹興間汝隂王銍謂比班范史缺裂不傳矣況今日哉支硎楊公甞造先子五嶽山人語及荀袁之書亟爲歎賞云往時曾于雲間朱氏覽宋刻本眞天府閟笈也惜未祈借爲可悵懊乃今不可復覩矣後不逾月有持一編售者則朱氏本也先子傾嚢購焉將序刻未暇而先子已矣噫神物有歸幸獲張華之劒竒姿未耀敢私桓氏之珠輒復梓行以永流播愴焉述事聊承堂構之心率爾蕪辭豈盡作者之意可慨也巳嗚呼蓍策所以立公言也權衡所以立公正也書契所以立公信也然譽或倖得毀有外來心迹之間沉隱莫察㣲瑕掩瑜尺朱蓋紫自古然矣悲夫悲夫此仲豫所以有未克之談而彦伯所以有悢然之歎者也嘉靖歲戊申夏四月朔日士雅山人呉黃姬水譔前漢紀序
